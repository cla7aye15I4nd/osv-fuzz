name: "Fuzz native imagemagick"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: imagemagick
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  TARGETS_FILE: /tmp/fuzz_targets.tsv

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          export DEBIAN_FRONTEND=noninteractive
          # ImageMagick delegates: install the codecs the CLI tools decode/encode.
          sudo apt-get install -y -qq \
            libpng-dev \
            libjpeg-dev \
            libtiff-dev \
            libwebp-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            libxml2-dev \
            libfreetype6-dev \
            2>/dev/null || true

      - name: Build ImageMagick CLI tools with AFL++ + ASan
        run: |
          set -e
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export LDFLAGS="-fsanitize=address"

          mkdir -p /tmp/src
          rm -rf /tmp/src/ImageMagick
          # Wrap the clone in a 3x retry; pull submodules if any.
          cloned=0
          for i in 1 2 3; do
            if git clone --depth 1 --recurse-submodules \
                 https://github.com/ImageMagick/ImageMagick.git /tmp/src/ImageMagick; then
              cloned=1
              break
            fi
            echo "[!] clone attempt $i failed; retrying..."
            rm -rf /tmp/src/ImageMagick
            sleep 5
          done
          if [ "$cloned" -ne 1 ]; then
            echo "[!] Failed to clone ImageMagick after 3 attempts"
            exit 1
          fi
          cd /tmp/src/ImageMagick
          git submodule update --init --recursive || true

          # ./configure is normally committed; regenerate it if missing.
          if [ ! -x ./configure ]; then
            if [ -x ./autogen.sh ]; then
              ./autogen.sh
            else
              autoreconf -fi
            fi
          fi

          # Autotools git build: --disable-werror so upstream warnings don't fail the build.
          ./configure \
            --with-quantum-depth=16 \
            --disable-shared \
            --disable-docs \
            --disable-werror \
            --without-magick-plus-plus
          make -j"$(nproc)"

          # --disable-shared yields a real ELF (no libtool wrapper) at utilities/magick.
          BINDIR="$(pwd)/utilities"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "MAGICK=$BINDIR/magick" >> "$GITHUB_ENV"
          echo "[+] Built binaries in $BINDIR:"
          ls -la "$BINDIR" || true
          if [ ! -x "$BINDIR/magick" ]; then
            echo "[!] magick was not built — aborting"
            exit 1
          fi
          file "$BINDIR/magick" || true

      - name: Enumerate fuzz targets
        run: |
          set -e
          : > "$TARGETS_FILE"
          # Candidate targets: "label:subcommand:trailing-args".
          # @@ marks the input file position for afl-fuzz / replay.
          #   identify @@                    -> ReadPWPImage / general readers
          #   convert @@ /tmp/out.mng        -> WriteOnePNGImage (MNG encoder)
          #   convert @@ /tmp/out.png        -> generic decode -> PNG re-encode
          #   mogrify -format png @@         -> in-place decode/encode path
          CANDIDATES=(
            "identify:identify:@@"
            "convert_mng:convert:@@ /tmp/out_convert_mng.mng"
            "convert_png:convert:@@ /tmp/out_convert_png.png"
            "mogrify:mogrify:-format png @@"
          )

          # Pick a sample seed for the afl-showmap startup probe.
          SEED="$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1 || true)"

          for spec in "${CANDIDATES[@]}"; do
            label="${spec%%:*}"
            rest="${spec#*:}"
            sub="${rest%%:*}"
            args="${rest#*:}"

            # Prefer a standalone ELF tool if present; else use the magick subcommand.
            if [ -x "$BINDIR/$sub" ] && file "$BINDIR/$sub" 2>/dev/null | grep -q ELF; then
              cmd="$BINDIR/$sub $args"
            elif [ -x "$BINDIR/magick" ]; then
              cmd="$BINDIR/magick $sub $args"
            else
              echo "[!] Skipping $label: no binary for '$sub'"
              continue
            fi

            # afl-showmap startup probe: skip targets that cannot be exec'd/instrumented.
            if [ -n "$SEED" ]; then
              probe_cmd="${cmd//@@/$SEED}"
              rc=0
              AFL_SKIP_CPUFREQ=1 AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 \
                ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 afl-showmap -m none -t 10000 -o /dev/null -- $probe_cmd \
                >/dev/null 2>&1 || rc=$?
              # rc 126/127 => cannot execute; rc 2 => target crashed but is instrumented (keep).
              if [ "$rc" -eq 126 ] || [ "$rc" -eq 127 ]; then
                echo "[!] Skipping $label: afl-showmap could not start it (rc=$rc)"
                continue
              fi
            fi

            printf '%s\t%s\n' "$label" "$cmd" >> "$TARGETS_FILE"
            echo "[+] Target: $label -> $cmd"
          done

          echo "[+] Enumerated $(wc -l < "$TARGETS_FILE") target(s):"
          cat "$TARGETS_FILE"
          if [ ! -s "$TARGETS_FILE" ]; then
            echo "[!] No usable targets — aborting"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0
          crash_count=0
          total=0
          while IFS=$'\t' read -r label cmd; do
            [ -n "$label" ] || continue
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname="$(basename "$seed" .bin)"
              total=$((total + 1))
              # Substitute @@ with the seed path, split into argv.
              read -ra parts <<< "$cmd"
              argv=()
              for p in "${parts[@]}"; do
                if [ "$p" = "@@" ]; then argv+=("$seed"); else argv+=("$p"); fi
              done
              echo "[*] Replaying $label with $sname ..."
              rc=0
              timeout 60 "${argv[@]}" > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $label with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${label}_${sname}.txt"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done < "$TARGETS_FILE"
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1:symbolize=0

          ntargets=$(wc -l < "$TARGETS_FILE")
          [ "$ntargets" -lt 1 ] && ntargets=1
          per=$(( FUZZ_DURATION / ntargets ))
          [ "$per" -lt 60 ] && per=60
          echo "[*] $ntargets target(s), ${per}s each"

          while IFS=$'\t' read -r label cmd; do
            [ -n "$label" ] || continue
            echo "[*] Fuzzing $label for ${per}s: $cmd"
            # cmd already contains the absolute binary path and @@; word-split intentionally.
            afl-fuzz \
              -i "seeds/$PROJECT" \
              -o "results/afl/$label" \
              -m none \
              -V "$per" \
              -- $cmd || true
          done < "$TARGETS_FILE"
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1
          shopt -s nullglob
          n=0
          while IFS=$'\t' read -r label cmd; do
            [ -n "$label" ] || continue
            crash_dir="results/afl/$label/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname="$(basename "$crash")"
              [ "$cname" = "README.txt" ] && continue
              n=$((n + 1))
              echo "[*] Triaging $label $cname ..."
              read -ra parts <<< "$cmd"
              argv=()
              for p in "${parts[@]}"; do
                if [ "$p" = "@@" ]; then argv+=("$crash"); else argv+=("$p"); fi
              done
              rc=0
              timeout 60 "${argv[@]}" > /dev/null 2> "results/fuzz/${label}_${cname}.txt" || rc=$?
              cp "$crash" "results/fuzz/${label}_${cname}.bin"
            done
          done < "$TARGETS_FILE"
          echo "[+] Triaged $n crashing inputs"

      - name: Sanitize result filenames
        if: always()
        run: |
          # AFL crash files contain ':' (id:000000,time:...) which breaks upload-artifact@v4.
          if [ -d results ]; then
            find results -depth -name '*:*' | while read -r path; do
              newpath="$(echo "$path" | tr ':' '_')"
              [ "$path" = "$newpath" ] && continue
              mv "$path" "$newpath" 2>/dev/null || true
            done
          fi
          echo "[+] Filename sanitization complete"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-imagemagick
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-imagemagick
          path: results/
          retention-days: 30
