name: "Fuzz native libmeshb"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libmeshb
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest libMeshb with AFL++ + ASan
        run: |
          set -euo pipefail
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/LoicMarechal/libMeshb.git /tmp/src/libMeshb
          cd /tmp/src/libMeshb
          mkdir -p build && cd build
          export AFL_USE_ASAN=1
          CC=afl-cc CXX=afl-c++ cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=afl-cc \
            -DCMAKE_CXX_COMPILER=afl-c++ \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DWITH_GMF_CTEST=OFF
          cmake --build . -j"$(nproc)"
          # The vulnerable CLI (example program that calls GmfOpenMesh):
          BINDIR="$(pwd)/examples"
          BIN="$BINDIR/mesh2poly"
          echo "[+] Looking for target binary..."
          if [ ! -x "$BIN" ]; then
            echo "[!] mesh2poly not at expected path, searching build tree..."
            FOUND=$(find "$(pwd)" -type f -name mesh2poly -perm -u+x 2>/dev/null | head -1 || true)
            if [ -n "$FOUND" ]; then
              BIN="$FOUND"
              BINDIR="$(dirname "$FOUND")"
            fi
          fi
          if [ ! -x "$BIN" ]; then
            echo "[!] mesh2poly binary not found after build"
            find "$(pwd)" -type f -perm -u+x 2>/dev/null | head -40 || true
            exit 1
          fi
          echo "[+] Target binary: $BIN"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "TARGET_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          BIN="$TARGET_BIN"
          bname=$(basename "$BIN")
          mkdir -p results/dry_run
          crash_count=0
          total=0
          shopt -s nullglob
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$BIN" "$seed" /tmp/out.mesh > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "results/dry_run/${bname}_${sname}.txt"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          BIN="$TARGET_BIN"
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          echo "[+] Fuzzing $BIN for $FUZZ_DURATION seconds..."
          afl-fuzz -i "seeds/$PROJECT" -o results/afl -V "$FUZZ_DURATION" \
            -- "$BIN" @@ /tmp/out.mesh || true

      - name: Triage AFL++ crashes
        run: |
          set -uo pipefail
          BIN="$TARGET_BIN"
          bname=$(basename "$BIN")
          mkdir -p results/fuzz
          shopt -s nullglob
          crash_count=0
          for crash in results/afl/default/crashes/*; do
            [ -f "$crash" ] || continue
            cname=$(basename "$crash")
            [ "$cname" = "README.txt" ] && continue
            echo "[*] Triaging $cname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$BIN" "$crash" /tmp/out.mesh > /dev/null 2> "results/fuzz/${bname}_${cname}.txt"
            exit_code=$?
            set -e
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
            crash_count=$((crash_count + 1))
          done
          echo "[+] Triaged $crash_count crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libmeshb
          path: results/
          retention-days: 30

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libmeshb
          path: results/pocs/
          retention-days: 90
