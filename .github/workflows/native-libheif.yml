name: "Fuzz native libheif"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 22 * * 0"

env:
  PROJECT: libheif
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/"$PROJECT"/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/"$PROJECT"/ 2>/dev/null | head -20 || true

      - name: Install AFL++ and build dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            cmake \
            clang \
            git \
            pkg-config \
            libde265-dev \
            zlib1g-dev
          # libvvdec-dev is not available on all Ubuntu runners; install best-effort.
          sudo apt-get install -y -qq libvvdec-dev 2>/dev/null || true

      - name: Clone latest libheif source and build with AFL++ + ASan
        run: |
          set -e
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          git clone --depth 1 https://github.com/strukturag/libheif.git /tmp/src/libheif
          cd /tmp/src/libheif
          export SRC=$PWD
          # Enable VVDEC only if its dev package is actually present.
          VVDEC_FLAG="-DWITH_VVDEC=OFF"
          if pkg-config --exists libvvdec 2>/dev/null; then
            VVDEC_FLAG="-DWITH_VVDEC=ON"
          fi
          echo "[+] $VVDEC_FLAG"
          cmake -S . -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address" \
            -DBUILD_SHARED_LIBS=ON \
            -DENABLE_PLUGIN_LOADING=OFF \
            -DWITH_EXAMPLES=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_DEVELOPMENT_TOOLS=ON \
            -DWITH_UNCOMPRESSED_CODEC=ON \
            -DWITH_LIBDE265=ON \
            $VVDEC_FLAG \
            -DWITH_REDUCED_VISIBILITY=OFF \
            -DCMAKE_COMPILE_WARNING_AS_ERROR=OFF
          cmake --build build -j"$(nproc)"
          # Record build outputs for later steps.
          BINDIR="$SRC/build/examples"
          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          # libheif.so lives here; make sure the CLI tools can find it.
          echo "LD_LIBRARY_PATH=$SRC/build/libheif:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools:"
          ls -la "$BINDIR" | head -20
          if [ ! -x "$BINDIR/heif-dec" ] && [ ! -x "$BINDIR/heif-info" ]; then
            echo "[!] Expected CLI binaries not found — build failed"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set -u
          mkdir -p results/dry_run
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"
          crash_count=0
          total=0
          # Each recorded invocation: "<binary>|<args-with-POC-placeholder>"
          # __POC__ is replaced with the seed path; __OUT__ with a scratch output path.
          invocations=(
            "heif-dec|__POC__ __OUT__.y4m"
            "heif-info|__POC__"
            "heif-dec|__POC__ __OUT__.png"
          )
          shopt -s nullglob
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            for inv in "${invocations[@]}"; do
              bin="${inv%%|*}"
              args="${inv#*|}"
              binpath="$BINDIR/$bin"
              [ -x "$binpath" ] || continue
              args="${args//__POC__/$seed}"
              args="${args//__OUT__//tmp/out_${bin}_${sname}}"
              total=$((total + 1))
              echo "[*] Replaying $bin $args"
              set +e
              # shellcheck disable=SC2086
              timeout 60 "$binpath" $args > /dev/null 2> results/dry_run/.stderr_tmp
              exit_code=$?
              set -e
              if [ $exit_code -ne 0 ] && [ $exit_code -ne 124 ]; then
                echo "  [!] CRASH: $bin with $sname (exit=$exit_code)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${bin}_${sname}.txt"
                cp "$seed" "results/dry_run/${bin}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry-run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++
        run: |
          set -u
          mkdir -p results/afl
          # Primary target: heif-dec (covers 3 of 4 recorded PoCs). It reads a file
          # argument, so AFL's @@ replaces the input path.
          TARGET_BIN="$BINDIR/heif-dec"
          if [ ! -x "$TARGET_BIN" ]; then
            echo "[!] heif-dec not available — skipping fuzzing"
            exit 0
          fi
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          # Guard the whole fuzz run so a target that can't start doesn't fail the job.
          ( AFL_SKIP_CPUFREQ=1 AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 AFL_NO_UI=1 \
            afl-fuzz -i seeds/"$PROJECT" -o results/afl -V "$FUZZ_DURATION" -m none \
            -- "$TARGET_BIN" @@ /tmp/afl_out.y4m ) || true
          echo "[+] Fuzzing finished"

      - name: Triage crashes
        run: |
          set -u
          mkdir -p results/fuzz
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"
          TARGET_BIN="$BINDIR/heif-dec"
          bname="heif-dec"
          crash_dir="results/afl/default/crashes"
          if [ ! -d "$crash_dir" ]; then
            echo "[+] No crashes directory — nothing to triage"
            exit 0
          fi
          shopt -s nullglob
          new_crashes=0
          for crash_file in "$crash_dir"/*; do
            [ -f "$crash_file" ] || continue
            base=$(basename "$crash_file")
            [ "$base" = "README.txt" ] && continue
            crash_name=$(echo "$base" | tr ':,' '__')
            result_file="results/fuzz/${bname}_${crash_name}.txt"
            set +e
            timeout 60 "$TARGET_BIN" "$crash_file" /tmp/triage_out.y4m > /dev/null 2> "$result_file"
            replay_exit=$?
            set -e
            if [ $replay_exit -ne 0 ] && [ $replay_exit -ne 124 ]; then
              echo "  [!] Confirmed crash: $crash_name"
              cp "$crash_file" "results/fuzz/${bname}_${crash_name}.bin"
              new_crashes=$((new_crashes + 1))
            else
              rm -f "$result_file"
            fi
          done
          echo "[+] Triage complete: $new_crashes confirmed crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Sanitize result filenames for upload
        if: always()
        run: |
          set -u
          # actions/upload-artifact@v4 rejects any path containing a colon.
          # AFL++ names its queue/crash files "id:000000,time:0,execs:0,orig:..."
          # which breaks the upload. Rename bottom-up so parents are renamed
          # only after their children.
          if [ -d results ]; then
            find results -depth -name '*:*' -print0 | while IFS= read -r -d '' p; do
              d=$(dirname "$p")
              b=$(basename "$p")
              mv -f "$p" "$d/${b//:/_}"
            done
          fi
          echo "[+] Sanitized colon-containing filenames under results/"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libheif
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libheif
          path: results/
          retention-days: 30
