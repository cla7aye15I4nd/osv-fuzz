name: "Fuzz native libheif"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 22 * * 0"

env:
  PROJECT: libheif
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and build dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            cmake \
            clang \
            git \
            pkg-config \
            libde265-dev \
            libx265-dev \
            libaom-dev \
            libjpeg-dev \
            libpng-dev \
            zlib1g-dev 2>/dev/null || true
          # libvvdec-dev is not available on all Ubuntu runners; best-effort.
          sudo apt-get install -y -qq libvvdec-dev 2>/dev/null || true

      - name: Clone latest libheif source and build with AFL++ + ASan
        run: |
          set -euo pipefail
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1

          # Clone with submodules, wrapped in a 3x retry.
          SRC=/tmp/src/libheif
          rm -rf "$SRC"
          mkdir -p /tmp/src
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                 https://github.com/strukturag/libheif.git "$SRC"; then
              break
            fi
            n=$((n + 1))
            echo "[!] clone attempt $n failed, retrying..."
            rm -rf "$SRC"
            sleep 5
          done
          [ -d "$SRC" ] || { echo "[!] git clone failed after 3 attempts"; exit 1; }
          git -C "$SRC" submodule update --init --recursive || true

          # Enable VVDEC only if its dev package is actually present.
          VVDEC_FLAG="-DWITH_VVDEC=OFF"
          if pkg-config --exists libvvdec 2>/dev/null; then
            VVDEC_FLAG="-DWITH_VVDEC=ON"
          fi
          echo "[+] $VVDEC_FLAG"

          # Build OUT-OF-SOURCE: build dir lives OUTSIDE the source tree.
          BUILD=/tmp/libheif-build
          rm -rf "$BUILD"
          cmake -S "$SRC" -B "$BUILD" -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=afl-cc \
            -DCMAKE_CXX_COMPILER=afl-c++ \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address" \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=OFF \
            -DENABLE_PLUGIN_LOADING=OFF \
            -DWITH_EXAMPLES=ON \
            -DBUILD_DEVELOPMENT_TOOLS=ON \
            -DWITH_UNCOMPRESSED_CODEC=ON \
            -DWITH_LIBDE265=ON \
            $VVDEC_FLAG \
            -DWITH_REDUCED_VISIBILITY=OFF \
            -DCMAKE_COMPILE_WARNING_AS_ERROR=OFF
          cmake --build "$BUILD" -j"$(nproc)"

          # heif-dec / heif-info / heif-enc / heif-thumbnailer land here.
          BINDIR="$BUILD/examples"
          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "BUILD=$BUILD" >> "$GITHUB_ENV"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          # The shared libheif.so lives here; CLI tools must find it at runtime.
          echo "LD_LIBRARY_PATH=$BUILD/libheif:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools in $BINDIR:"
          ls -la "$BINDIR" | head -40
          if [ ! -x "$BINDIR/heif-dec" ] && [ ! -x "$BINDIR/heif-info" ]; then
            echo "[!] Expected CLI binaries not found — build failed"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set -u
          mkdir -p results/dry_run
          export LD_LIBRARY_PATH="$BUILD/libheif:${LD_LIBRARY_PATH:-}"

          # Single source of truth for file-input CLI targets: "tool|args-with-@@".
          # @@ marks the input path (replaced by the seed here, by AFL when fuzzing).
          declare -a TARGETS=()
          add_target() { [ -x "$BINDIR/$1" ] && TARGETS+=("$1|$2"); }
          add_target heif-dec "@@ /tmp/out_heif-dec.y4m"
          add_target heif-info "@@"
          add_target heif-thumbnailer "@@ /tmp/out_heif-thumbnailer.png"
          add_target heif-enc "@@ -o /tmp/out_heif-enc.heif"
          echo "[+] Dry-run targets: ${#TARGETS[@]}"

          crash_count=0
          total=0
          shopt -s nullglob
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            for entry in "${TARGETS[@]}"; do
              tool="${entry%%|*}"
              args="${entry#*|}"
              runargs="${args//@@/$seed}"
              total=$((total + 1))
              echo "[*] Replaying $tool with $sname..."
              # Capture the exit code without toggling global set -e.
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 "$BINDIR/$tool" $runargs \
                > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${tool}_${sname}.txt"
                cp "$seed" "results/dry_run/${tool}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set -u
          mkdir -p results/afl
          export LD_LIBRARY_PATH="$BUILD/libheif:${LD_LIBRARY_PATH:-}"
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          declare -a TARGETS=()
          add_target() { [ -x "$BINDIR/$1" ] && TARGETS+=("$1|$2"); }
          add_target heif-dec "@@ /tmp/out_heif-dec.y4m"
          add_target heif-info "@@"
          add_target heif-thumbnailer "@@ /tmp/out_heif-thumbnailer.png"
          add_target heif-enc "@@ -o /tmp/out_heif-enc.heif"

          # Filter to targets that actually instrument/start under afl-showmap.
          first_seed=$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)
          declare -a VALID=()
          if [ -z "$first_seed" ]; then
            echo "[!] No seeds available — skipping fuzzing"
            exit 0
          fi
          for entry in "${TARGETS[@]}"; do
            tool="${entry%%|*}"
            args="${entry#*|}"
            testargs="${args//@@/$first_seed}"
            echo "[*] afl-showmap probe: $tool"
            # shellcheck disable=SC2086
            if AFL_SKIP_CPUFREQ=1 AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 \
                 timeout 60 afl-showmap -o /dev/null -m none -t 10000 \
                 -- "$BINDIR/$tool" $testargs >/dev/null 2>&1; then
              VALID+=("$entry")
              echo "  [+] $tool OK"
            else
              echo "  [!] $tool failed afl-showmap startup — skipping"
            fi
          done

          n=${#VALID[@]}
          if [ "$n" -eq 0 ]; then
            echo "[!] No fuzzable targets — nothing to do"
            exit 0
          fi

          # Split the budget across targets, minimum 60s each.
          per=$((FUZZ_DURATION / n))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Fuzzing $n target(s) for ${per}s each"

          for entry in "${VALID[@]}"; do
            tool="${entry%%|*}"
            args="${entry#*|}"
            echo "[*] Fuzzing $tool ($per s)..."
            # shellcheck disable=SC2086
            AFL_SKIP_CPUFREQ=1 AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 AFL_NO_UI=1 \
              afl-fuzz -i "seeds/$PROJECT" -o "results/afl/$tool" -m none -V "$per" \
              -- "$BINDIR/$tool" $args || true
          done
          echo "[+] Fuzzing finished"

      - name: Triage AFL++ crashes
        run: |
          set -u
          mkdir -p results/fuzz
          export LD_LIBRARY_PATH="$BUILD/libheif:${LD_LIBRARY_PATH:-}"

          declare -a TARGETS=()
          add_target() { [ -x "$BINDIR/$1" ] && TARGETS+=("$1|$2"); }
          add_target heif-dec "@@ /tmp/out_heif-dec.y4m"
          add_target heif-info "@@"
          add_target heif-thumbnailer "@@ /tmp/out_heif-thumbnailer.png"
          add_target heif-enc "@@ -o /tmp/out_heif-enc.heif"

          shopt -s nullglob
          new_crashes=0
          for entry in "${TARGETS[@]}"; do
            tool="${entry%%|*}"
            args="${entry#*|}"
            crash_dir="results/afl/$tool/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              cbase=$(basename "$crash_file")
              [ "$cbase" = "README.txt" ] && continue
              crash_name=$(echo "$cbase" | tr ':,' '__')
              result_file="results/fuzz/${tool}_${crash_name}.txt"
              runargs="${args//@@/$crash_file}"
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 "$BINDIR/$tool" $runargs \
                > /dev/null 2> "$result_file" || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] Confirmed crash: $tool ($crash_name, exit=$rc)"
                cp "$crash_file" "results/fuzz/${tool}_${crash_name}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          done
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Sanitize result filenames for upload
        if: always()
        run: |
          set -u
          # actions/upload-artifact@v4 rejects any path containing a colon.
          # AFL++ names its queue/crash files "id:000000,time:0,execs:0,orig:..."
          # Rename bottom-up so parents are renamed only after their children.
          if [ -d results ]; then
            find results -depth -name '*:*' -print0 | while IFS= read -r -d '' p; do
              d=$(dirname "$p")
              b=$(basename "$p")
              mv -f "$p" "$d/${b//:/_}"
            done
          fi
          echo "[+] Sanitized colon-containing filenames under results/"

      - name: Generate report
        if: always()
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libheif
          path: results/pocs/
          retention-days: 90

