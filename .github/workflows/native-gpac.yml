name: "Fuzz native gpac"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: gpac
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          # GPAC's ./configure is hand-written (NOT autotools/cmake); zlib is the
          # only extra dep we need for a minimal MP4Box build.
          sudo apt-get install -y -qq zlib1g-dev 2>/dev/null || true

      - name: Build latest gpac with AFL++ + ASan
        run: |
          set -euo pipefail

          # AFL++ instrumentation + AddressSanitizer.
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1

          SRC=/tmp/gpac
          rm -rf "$SRC"
          git clone --depth 1 https://github.com/gpac/gpac.git "$SRC"
          cd "$SRC"

          # GPAC uses a hand-written ./configure + make (NOT autotools/cmake/meson).
          # --enable-sanitizer injects "-fsanitize=address -g2 -DASAN_ENABLED";
          # combined with AFL_USE_ASAN=1 above this builds an AFL+ASan MP4Box.
          ./configure --enable-sanitizer \
            --extra-cflags="-g -O1 -fno-omit-frame-pointer -fsanitize=address" \
            --extra-ldflags="-fsanitize=address"
          make -j"$(nproc)"

          BINDIR="$SRC/bin/gcc"
          if [ ! -x "$BINDIR/MP4Box" ]; then
            echo "[!] Build failed — $BINDIR/MP4Box not found"
            exit 1
          fi

          # MP4Box is linked against ./bin/gcc/libgpac.so — expose it to every
          # later step (dry-run / fuzz / triage) via the job environment.
          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$BINDIR:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

          # Best-effort media input for the -crypt target (CVE-2019-11222 fuzzes
          # the DRM cryptfile that is MP4Box's FIRST -crypt argument; it still
          # needs a media file as its second argument). Pick any seed that
          # MP4Box can parse cleanly; if none do, the -crypt target is skipped.
          MEDIA="$SRC/overview.mp4"
          for s in "$GITHUB_WORKSPACE/seeds/$PROJECT"/*.bin; do
            [ -f "$s" ] || continue
            if LD_LIBRARY_PATH="$BINDIR:${LD_LIBRARY_PATH:-}" \
                 timeout 20 "$BINDIR/MP4Box" -info "$s" >/dev/null 2>&1; then
              cp "$s" "$MEDIA"
              break
            fi
          done
          if [ -f "$MEDIA" ]; then
            echo "MEDIA=$MEDIA" >> "$GITHUB_ENV"
            echo "[+] -crypt target enabled with media: $MEDIA"
          else
            echo "[!] No parseable media seed found — -crypt target disabled"
          fi

          echo "[+] Built MP4Box:"
          ls -la "$BINDIR/MP4Box" "$BINDIR"/libgpac.so* || true

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run

          # target table: "label|pre-args|post-args"
          # command run is:  MP4Box <pre> <input> <post>
          #   info :  MP4Box -info <input>              (most CVEs)
          #   diso :  MP4Box -diso <input> -out /dev/null   (CVE-2019-20208)
          #   srt  :  MP4Box -srt 0 <input>             (CVE-2018-20763)
          #   crypt:  MP4Box -crypt <input> <media> -out <tmp>  (CVE-2019-11222)
          targets=(
            "info|-info|"
            "diso|-diso|-out /dev/null"
            "srt|-srt 0|"
          )
          if [ -n "${MEDIA:-}" ] && [ -f "$MEDIA" ]; then
            targets+=("crypt|-crypt|$MEDIA -out $SRC/enc_out.mp4")
          fi

          crash_count=0
          total=0
          for entry in "${targets[@]}"; do
            IFS='|' read -r bname pre post <<< "$entry"
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname="$(basename "$seed" .bin)"
              result_file="results/dry_run/${bname}_${sname}.txt"
              total=$((total + 1))
              echo "[*] Replaying $bname with $sname..."
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 30 "$BINDIR/MP4Box" $pre "$seed" $post \
                > /dev/null 2> "results/dry_run/.stderr_tmp"
              exit_code=$?
              set -e
              if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
                echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
                mv "results/dry_run/.stderr_tmp" "$result_file"
                cp "$seed" "results/dry_run/${bname}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f "results/dry_run/.stderr_tmp"
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          targets=(
            "info|-info|"
            "diso|-diso|-out /dev/null"
            "srt|-srt 0|"
          )
          if [ -n "${MEDIA:-}" ] && [ -f "$MEDIA" ]; then
            targets+=("crypt|-crypt|$MEDIA -out $SRC/enc_out.mp4")
          fi

          # Split the total budget evenly across the distinct targets (min 60s each).
          ntargets=${#targets[@]}
          per_target=$(( FUZZ_DURATION / ntargets ))
          [ "$per_target" -lt 60 ] && per_target=60
          echo "[+] $ntargets targets, ${per_target}s each"

          for entry in "${targets[@]}"; do
            IFS='|' read -r bname pre post <<< "$entry"
            out="results/afl/$bname"
            echo "[*] Fuzzing $bname for ${per_target}s..."
            # @@ is AFL's file input placeholder; guard so a target that cannot
            # start does not fail the whole job.
            afl-fuzz -i "seeds/$PROJECT" -o "$out" -m none -V "$per_target" \
              -- "$BINDIR/MP4Box" $pre @@ $post || true
          done

      - name: Triage AFL++ crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz

          targets=(
            "info|-info|"
            "diso|-diso|-out /dev/null"
            "srt|-srt 0|"
          )
          if [ -n "${MEDIA:-}" ] && [ -f "$MEDIA" ]; then
            targets+=("crypt|-crypt|$MEDIA -out $SRC/enc_out.mp4")
          fi

          new_crashes=0
          for entry in "${targets[@]}"; do
            IFS='|' read -r bname pre post <<< "$entry"
            crash_dir="results/afl/$bname/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              case "$(basename "$crash_file")" in
                README.txt) continue ;;
              esac
              cname="$(basename "$crash_file" | tr ':,' '__')"
              result_file="results/fuzz/${bname}_${cname}.txt"
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 30 "$BINDIR/MP4Box" $pre "$crash_file" $post \
                > /dev/null 2> "$result_file"
              replay_exit=$?
              set -e
              if [ "$replay_exit" -ne 0 ] && [ "$replay_exit" -ne 124 ]; then
                echo "  [!] NEW CRASH: $bname $cname (exit=$replay_exit)"
                cp "$crash_file" "results/fuzz/${bname}_${cname}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          done
          echo "[+] Triage complete: $new_crashes crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-gpac
          path: results/
          retention-days: 30

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-gpac
          path: results/pocs/
          retention-days: 90
