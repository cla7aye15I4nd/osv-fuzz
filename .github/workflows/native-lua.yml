name: "Fuzz native lua"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: lua
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build lua with AFL++ + ASan
        run: |
          set -euxo pipefail
          mkdir -p /tmp/src

          # Robust clone: 3x retry, full submodule support.
          SRC=/tmp/src/lua
          rm -rf "$SRC"
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                 https://github.com/lua/lua.git "$SRC"; then
              break
            fi
            n=$((n + 1))
            echo "[!] clone failed (attempt $n), retrying..."
            rm -rf "$SRC"
            sleep 5
          done
          test -d "$SRC"
          cd "$SRC"
          git submodule update --init --recursive || true

          # Lua uses a plain hand-written makefile; source files and the
          # makefile live at the repo root. Build the standalone "lua"
          # interpreter and the "luac" compiler with AFL++ instrumentation +
          # AddressSanitizer. The makefile honors CC / MYCFLAGS / MYLDFLAGS /
          # MYLIBS.
          export AFL_USE_ASAN=1
          make -j"$(nproc)" \
            CC=afl-cc \
            CXX=afl-c++ \
            MYCFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer -std=c99 -DLUA_USE_LINUX" \
            MYLDFLAGS="-fsanitize=address" \
            MYLIBS="-ldl"

          BINDIR="$PWD"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"

          echo "[+] Built binaries:"
          ls -la "$BINDIR"/lua "$BINDIR"/luac 2>/dev/null || true
          test -x "$BINDIR/lua"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run

          # Enumerate file-consuming CLI targets built in BINDIR.
          # Each entry: "toolname arg-template-with-@@".
          declare -a TARGETS=()
          [ -x "$BINDIR/lua" ]  && TARGETS+=("lua @@")
          [ -x "$BINDIR/luac" ] && TARGETS+=("luac -o /tmp/luac.out @@")
          echo "[+] Dry-run targets: ${#TARGETS[@]}"

          crash_count=0
          total=0
          for entry in "${TARGETS[@]}"; do
            tool="${entry%% *}"
            argtmpl="${entry#* }"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname=$(basename "$seed" .bin)
              # Substitute @@ with the seed path.
              args="${argtmpl//@@/$seed}"
              total=$((total + 1))
              echo "[*] Replaying $tool with $sname..."
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 "$bin" $args > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${tool}_${sname}.txt"
                cp "$seed" "results/dry_run/${tool}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1

          # Enumerate file-consuming CLI targets built in BINDIR.
          declare -a TARGETS=()
          [ -x "$BINDIR/lua" ]  && TARGETS+=("lua @@")
          [ -x "$BINDIR/luac" ] && TARGETS+=("luac -o /tmp/luac.out @@")

          n_targets="${#TARGETS[@]}"
          if [ "$n_targets" -eq 0 ]; then
            echo "[!] No fuzzable targets found"
            exit 0
          fi

          # Split the total budget across targets, floor of 60s each.
          per=$((FUZZ_DURATION / n_targets))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Fuzzing $n_targets target(s) for ${per}s each"

          for entry in "${TARGETS[@]}"; do
            tool="${entry%% *}"
            argtmpl="${entry#* }"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue

            # Skip targets that fail afl-showmap startup (broken instrumentation
            # or the tool cannot consume the seed format at all).
            smap_args="${argtmpl//@@//dev/null}"
            # shellcheck disable=SC2086
            if ! AFL_MAP_SIZE=0 afl-showmap -o /dev/null -t 5000 -- \
                 "$bin" $smap_args >/dev/null 2>&1; then
              # afl-showmap exit is nonzero when target itself exits nonzero;
              # only skip when the binary genuinely will not start under AFL.
              first_seed=$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)
              if [ -n "$first_seed" ]; then
                # shellcheck disable=SC2086
                probe_args="${argtmpl//@@/$first_seed}"
                # shellcheck disable=SC2086
                if ! afl-showmap -o /dev/null -t 5000 -- "$bin" $probe_args >/dev/null 2>&1; then
                  : # showmap returns nonzero on crashing/exiting targets — that is fine
                fi
              fi
            fi

            echo "[*] Fuzzing $tool for ${per}s..."
            # shellcheck disable=SC2086
            afl-fuzz \
              -i "seeds/$PROJECT" \
              -o "results/afl/$tool" \
              -m none \
              -V "$per" \
              -- "$bin" $argtmpl || true
          done
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz

          declare -a TARGETS=()
          [ -x "$BINDIR/lua" ]  && TARGETS+=("lua @@")
          [ -x "$BINDIR/luac" ] && TARGETS+=("luac -o /tmp/luac.out @@")

          new_crashes=0
          for entry in "${TARGETS[@]}"; do
            tool="${entry%% *}"
            argtmpl="${entry#* }"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$tool/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cbase=$(basename "$crash")
              [ "$cbase" = "README.txt" ] && continue
              crash_name=$(echo "$cbase" | tr ':,' '__')
              result_file="results/fuzz/${tool}_${crash_name}.txt"
              args="${argtmpl//@@/$crash}"
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1 \
                timeout 60 "$bin" $args > /dev/null 2> "$result_file" || rc=$?
              cp "$crash" "results/fuzz/${tool}_${crash_name}.bin"
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool ($crash_name, exit=$rc)"
                new_crashes=$((new_crashes + 1))
              fi
            done
          done
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Sanitize result filenames
        if: always()
        run: |
          set -uo pipefail
          # AFL emits filenames like "id:000000,time:..." which contain ':'
          # and break actions/upload-artifact@v4. Rename any path under
          # results/ that contains ':' to use '_' instead.
          find results -depth -name '*:*' -print0 2>/dev/null | \
            while IFS= read -r -d '' p; do
              d=$(dirname "$p")
              b=$(basename "$p")
              nb=$(echo "$b" | tr ':' '_')
              [ "$b" = "$nb" ] && continue
              mv "$p" "$d/$nb" 2>/dev/null || true
            done
          echo "[+] Filename sanitization complete"

      - name: Generate report
        if: always()
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-lua
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-lua
          path: results/
          retention-days: 30
