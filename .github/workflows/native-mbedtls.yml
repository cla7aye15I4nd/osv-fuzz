name: "Fuzz native mbedtls"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: mbedtls
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${PROJECT}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${PROJECT}/ 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone latest upstream mbedtls and build with AFL++ + ASan
        run: |
          set -e
          git clone --depth 1 --recursive https://github.com/Mbed-TLS/mbedtls.git /tmp/src/mbedtls
          cd /tmp/src/mbedtls
          # programs/fuzz/README.md: fuzz targets need the alt time platform to build standalone
          perl scripts/config.py set MBEDTLS_PLATFORM_TIME_ALT
          mkdir -p build && cd build
          export AFL_USE_ASAN=1
          CC=afl-cc CXX=afl-c++ cmake \
            -DCMAKE_BUILD_TYPE= \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DENABLE_TESTING=Off \
            ..
          make -j"$(nproc)"
          # Standalone CLI reproducer: reads argv[1] as the input file.
          BINDIR="/tmp/src/mbedtls/build/programs"
          TARGET_BIN="$BINDIR/fuzz/fuzz_x509crl"
          if [ ! -x "$TARGET_BIN" ]; then
            echo "[!] Expected target not built: $TARGET_BIN"
            find "$BINDIR" -type f -executable 2>/dev/null | head -40
            exit 1
          fi
          echo "[+] Built target: $TARGET_BIN"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "TARGET_BIN=$TARGET_BIN" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          mkdir -p results/dry_run
          bname="$(basename "$TARGET_BIN")"
          crash_count=0
          total=0
          for seed in seeds/${PROJECT}/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 30 "$TARGET_BIN" "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          afl-fuzz -i seeds/${PROJECT} -o results/afl -V "$FUZZ_DURATION" \
            -- "$TARGET_BIN" @@ || true

      - name: Triage AFL++ crashes
        run: |
          mkdir -p results/fuzz
          bname="$(basename "$TARGET_BIN")"
          crash_dir="results/afl/default/crashes"
          if [ ! -d "$crash_dir" ]; then
            echo "[+] No crashes directory ($crash_dir) — nothing to triage"
            exit 0
          fi
          for crash in "$crash_dir"/*; do
            [ -f "$crash" ] || continue
            cname="$(basename "$crash")"
            [ "$cname" = "README.txt" ] && continue
            result_file="results/fuzz/${bname}_${cname}.txt"
            echo "[*] Triaging $cname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 30 "$TARGET_BIN" "$crash" > /dev/null 2> "$result_file"
            set -e
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
          done

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-mbedtls
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-mbedtls
          path: results/
          retention-days: 30
