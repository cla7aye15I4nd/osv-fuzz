name: "Fuzz libwebp"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 4 * * 0"

env:
  PROJECT: libwebp
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            cmake \
            libgif-dev \
            libjpeg-dev \
            libpng-dev \
            libtool \
            zip

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://chromium.googlesource.com/webm/libwebp /tmp/src/libwebp
          git clone --depth 1 --recursive https://chromium.googlesource.com/webm/libwebp-test-data /tmp/src/libwebp-test-data

      - name: Build libwebp with AFL++ instrumentation
        run: |
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="-fsanitize=address -DWEBP_MAX_IMAGE_SIZE=838860800"
          export CXXFLAGS="-fsanitize=address"

          cd /tmp/src/libwebp
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=afl-cc \
            -DCMAKE_CXX_COMPILER=afl-c++ \
            -DCMAKE_C_FLAGS="$CFLAGS" \
            -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_SHARED_LIBS=OFF \
            -DWEBP_BUILD_CWEBP=OFF \
            -DWEBP_BUILD_DWEBP=OFF \
            -DWEBP_BUILD_GIF2WEBP=OFF \
            -DWEBP_BUILD_IMG2WEBP=OFF \
            -DWEBP_BUILD_VWEBP=OFF \
            -DWEBP_BUILD_WEBPINFO=OFF \
            -DWEBP_BUILD_WEBPMUX=OFF \
            -DWEBP_BUILD_EXTRAS=OFF \
            -DWEBP_BUILD_ANIM_UTILS=OFF \
            -DWEBP_BUILD_LIBWEBPMUX=ON
          cmake --build build -j$(nproc)
          sudo cmake --install build
          sudo ldconfig

      - name: Compile fuzz harnesses
        run: |
          mkdir -p build/fuzz-targets
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          HARNESS_DIR=$GITHUB_WORKSPACE/harnesses/libwebp
          COMMON_FLAGS="-fsanitize=address,fuzzer -I/usr/local/include"
          COMMON_LIBS="-L/usr/local/lib -lwebp -lsharpyuv -lpthread -lm"
          DEMUX_LIBS="-L/usr/local/lib -lwebpdemux -lwebp -lsharpyuv -lpthread -lm"
          MUX_LIBS="-L/usr/local/lib -lwebpmux -lwebpdemux -lwebp -lsharpyuv -lpthread -lm"

          afl-cc $COMMON_FLAGS "$HARNESS_DIR/simple_api_fuzzer.c" \
            -o "$OUT/simple_api_fuzzer" $COMMON_LIBS

          afl-cc $COMMON_FLAGS "$HARNESS_DIR/advanced_api_fuzzer.c" \
            -o "$OUT/advanced_api_fuzzer" $COMMON_LIBS

          afl-cc $COMMON_FLAGS "$HARNESS_DIR/animdecoder_fuzzer.c" \
            -o "$OUT/animdecoder_fuzzer" $DEMUX_LIBS

          afl-cc $COMMON_FLAGS "$HARNESS_DIR/enc_dec_fuzzer.c" \
            -o "$OUT/enc_dec_fuzzer" $COMMON_LIBS

          afl-cc $COMMON_FLAGS "$HARNESS_DIR/mux_demux_api_fuzzer.c" \
            -o "$OUT/mux_demux_api_fuzzer" $MUX_LIBS

          # Copy the fuzzing dictionary from source tree
          cp /tmp/src/libwebp/tests/fuzzer/fuzz.dict "$OUT/" 2>/dev/null || true

          # Verify at least one fuzz target was built
          target_count=$(find "$OUT" -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

