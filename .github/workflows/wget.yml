name: "Fuzz wget"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: wget
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf-archive \
            autogen \
            automake \
            autopoint \
            bison \
            flex \
            gengetopt \
            gettext \
            gperf \
            gtk-doc-tools \
            libtasn1-bin \
            libtool \
            libz-dev \
            pkg-config \
            rsync \
            texinfo

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://git.savannah.gnu.org/git/gnulib.git /tmp/src/gnulib
          git clone --depth 1 --recursive https://github.com/rockdaboot/libpsl.git /tmp/src/libpsl
          git clone --depth 1 --recursive https://git.lysator.liu.se/nettle/nettle.git /tmp/src/--branch=nettle_3.10_release_20240616
          git clone --depth 1 --recursive https://gitlab.com/gnutls/gnutls.git /tmp/src/gnutls
          git clone --depth 1 --recursive https://git.savannah.gnu.org/git/wget.git /tmp/src/wget

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+w /etc/ld.so.cache 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/wget
          export WGET_DEPS_PATH=/tmp/src/wget_deps
          export PKG_CONFIG_PATH=$WGET_DEPS_PATH/lib64/pkgconfig:$WGET_DEPS_PATH/lib/pkgconfig
          export CPPFLAGS="-I$WGET_DEPS_PATH/include"
          export CFLAGS="$CFLAGS -I$WGET_DEPS_PATH/include -L$WGET_DEPS_PATH/lib"
          export LDFLAGS="-L$WGET_DEPS_PATH/lib"
          export GNULIB_SRCDIR=/tmp/src/gnulib
          export LLVM_PROFILE_FILE=/tmp/prof.test
          cd /tmp/src/libunistring
          ./configure --enable-static --disable-shared --prefix=$WGET_DEPS_PATH
          make -j$(nproc)
          make install
          cd /tmp/src/libidn2
          ./configure --enable-static --disable-shared --disable-doc --disable-gcc-warnings --prefix=$WGET_DEPS_PATH
          make -j$(nproc)
          make install
          cd /tmp/src/libpsl
          ./autogen.sh
          ./configure --enable-static --disable-shared --disable-gtk-doc --enable-runtime=libidn2 --enable-builtin=libidn2 --prefix=$WGET_DEPS_PATH
          make -j$(nproc)
          make install
          cd /tmp/src/gmp
          ./configure --enable-static --disable-shared --prefix=$WGET_DEPS_PATH
          make -j$(nproc)
          make install
          cd /tmp/src/nettle
          bash .bootstrap
          ./configure --enable-static --disable-shared --disable-documentation --disable-openssl --disable-assembler --disable-fat --prefix=$WGET_DEPS_PATH
          ( make -j$(nproc) || make -j$(nproc) ) && make install
          if test $? != 0;then
                  echo "Failed to compile nettle"
                  exit 1
          fi
          cd /tmp/src/gnutls
          touch .submodule.stamp
          ./bootstrap
          GNUTLS_CFLAGS=`echo $CFLAGS|sed s/-DFUZZING_BUILD_MODE_UNSAFE_FOR_PRODUCTION//`
          LIBS="-lunistring" \
          CFLAGS="$GNUTLS_CFLAGS" \
          ./configure --enable-gcc-warnings --enable-static --disable-shared --with-included-libtasn1 \
              --with-included-unistring --without-p11-kit --disable-doc --disable-tests --disable-tools --disable-cxx \
              --disable-maintainer-mode --disable-libdane --disable-gcc-warnings --disable-full-test-suite --disable-guile \
              --prefix=$WGET_DEPS_PATH
          make -j$(nproc)
          make install
          export ASAN_OPTIONS=detect_leaks=0
          ln -sf $WGET_DEPS_PATH/lib64/libhogweed.a $WGET_DEPS_PATH/lib/libhogweed.a
          ln -sf $WGET_DEPS_PATH/lib64/libnettle.a  $WGET_DEPS_PATH/lib/libnettle.a
          cd /tmp/src/wget
          sed -i '/GETTEXT_REQUIRE_VERSION/d' configure.ac
          ./bootstrap --skip-po
          LIBS="-lgnutls -lhogweed -lnettle -lgmp -lidn2 -lunistring -lpsl -lz" \
          ./configure -C
          make clean
          make -j$(nproc) -C lib
          make -j$(nproc) -C src
          make -j$(nproc) -C fuzz check
          LIBS="-lgnutls -lhogweed -lnettle -lgmp -lidn2 -lunistring -lpsl -lz" \
          ./configure --enable-fuzzing -C
          make clean
          make -j$(nproc) -C lib
          make -j$(nproc) -C src
          cd fuzz
          make -j$(nproc) ../src/libunittest.a
          make oss-fuzz
          find . -name '*_fuzzer' -exec cp -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets ';'
          find . -name '*_fuzzer.dict' -exec cp -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets ';'
          find . -name '*_fuzzer.options' -exec cp -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets ';'
          for dir in *_fuzzer.in; do
            fuzzer=$(basename $dir .in)
            zip -rj "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer}_seed_corpus.zip" "${dir}/"
          done

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
