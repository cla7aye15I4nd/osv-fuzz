name: "Fuzz native libetpan"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libetpan
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq zlib1g-dev 2>/dev/null || true

      - name: Clone latest libetpan source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/dinhvh/libetpan.git /tmp/src/libetpan

      - name: Build libetpan CLI (mime-parse) with AFL++ + ASan
        run: |
          set -euxo pipefail
          cd /tmp/src/libetpan
          export SRC=$PWD
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1

          # 1) Generate the autotools build system without auto-running configure.
          NOCONFIGURE=1 ./autogen.sh

          # 2) Configure with AFL++ compilers + ASan. Build a static CLI so the
          #    resulting mime-parse binary is self-contained and afl-fuzz can
          #    drive the real instrumented ELF directly (no libtool wrapper /
          #    shared-lib path juggling).
          ./configure \
            --disable-shared --enable-static \
            CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            LDFLAGS="-fsanitize=address"

          # 3) Build the library and the bundled CLI test programs (incl. mime-parse).
          make -j"$(nproc)"

          # 4) Locate the real (instrumented) mime-parse ELF. With libtool, the
          #    top-level tests/mime-parse is a wrapper script; the real binary
          #    lives in tests/.libs/ when a shared build slips through.
          if [ -x "$SRC/tests/.libs/mime-parse" ]; then
            BIN="$SRC/tests/.libs/mime-parse"
          else
            BIN="$SRC/tests/mime-parse"
          fi
          echo "[+] mime-parse binary: $BIN"
          file "$BIN" || true

          # Export paths for later steps.
          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "BINDIR=$SRC/tests" >> "$GITHUB_ENV"
          echo "BIN=$BIN" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$SRC/src/.libs:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

          if [ ! -x "$BIN" ]; then
            echo "[!] mime-parse was not built — build failed"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uxo pipefail
          mkdir -p results/dry_run
          bname=$(basename "$BIN")
          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 30 "$BIN" "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uxo pipefail
          mkdir -p results/afl
          AFL_SKIP_CPUFREQ=1 \
          AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 \
          AFL_NO_UI=1 \
          ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
            afl-fuzz -i "seeds/$PROJECT" -o results/afl -m none -V "$FUZZ_DURATION" \
              -- "$BIN" @@ || true
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set -uxo pipefail
          mkdir -p results/fuzz
          bname=$(basename "$BIN")
          crash_dir="results/afl/default/crashes"
          if [ -d "$crash_dir" ]; then
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              cbase=$(basename "$crash_file")
              [ "$cbase" = "README.txt" ] && continue
              crash_name=$(echo "$cbase" | tr ':,' '__')
              result_file="results/fuzz/${bname}_${crash_name}.txt"
              set +e
              ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
                timeout 30 "$BIN" "$crash_file" > /dev/null 2> "$result_file"
              replay_exit=$?
              set -e
              if [ "$replay_exit" -ne 0 ] && [ "$replay_exit" -ne 124 ]; then
                echo "  [!] NEW CRASH: $bname $crash_name (exit=$replay_exit)"
                cp "$crash_file" "results/fuzz/${bname}_${crash_name}.bin"
              else
                rm -f "$result_file"
              fi
            done
          else
            echo "[+] No AFL crashes directory found"
          fi

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libetpan
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libetpan
          path: results/
          retention-days: 30
