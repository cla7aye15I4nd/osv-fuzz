name: "Fuzz libxslt"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 8 * * 0"

env:
  PROJECT: libxslt
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            libgcrypt-dev \
            libtool \
            pkg-config

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://gitlab.gnome.org/GNOME/libxml2.git /tmp/src/--branch=$LATEST_LIBXML2_RELEASE_TAG
          git clone --depth 1 --recursive https://gitlab.gnome.org/GNOME/libxslt.git /tmp/src/libxslt

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+w /etc/ld.so.cache 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/libxslt
          set +e
          if [ "$SANITIZER" = undefined ]; then
              export CFLAGS="$CFLAGS -fsanitize=integer -fno-sanitize-recover=integer"
              export CXXFLAGS="$CXXFLAGS -fsanitize=integer -fno-sanitize-recover=integer"
          fi
          if [ "$SANITIZER" = memory ]; then
              CRYPTO_CONF=--without-crypto
              CRYPTO_LIBS=
          else
              CRYPTO_CONF=--with-crypto
              CRYPTO_LIBS=-lgcrypt
          fi
          cd ../libxml2
          ./autogen.sh \
              --disable-shared \
              --without-c14n \
              --without-push \
              --without-python \
              --without-reader \
              --without-regexps \
              --without-sax1 \
              --without-schemas \
              --without-schematron \
              --without-valid \
              --without-writer \
              --without-zlib \
              --without-lzma
          make -j$(nproc) V=1
          cd ../libxslt
          ./autogen.sh \
              --with-libxml-src=../libxml2 \
              --disable-shared \
              --without-python \
              $CRYPTO_CONF \
              --without-debug \
              --without-debugger \
              --without-profiler
          make -j$(nproc) V=1
          cd tests/fuzz
          rm -rf seed
          make fuzz.o
          for fuzzer in xpath xslt; do
              make $fuzzer.o
              $CXX $CXXFLAGS \
                  $fuzzer.o fuzz.o \
                  -o $GITHUB_WORKSPACE/build/fuzz-targets/$fuzzer \
                  $LIB_FUZZING_ENGINE \
                  ../../libexslt/.libs/libexslt.a ../../libxslt/.libs/libxslt.a \
                  ../../../libxml2/.libs/libxml2.a \
                  $CRYPTO_LIBS
              [ -e seed/$fuzzer ] || make seed/$fuzzer.stamp
              zip -j $GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer}_seed_corpus.zip seed/$fuzzer/*
          done
          cp *.dict $GITHUB_WORKSPACE/build/fuzz-targets/
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
