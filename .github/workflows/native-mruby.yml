name: "Fuzz native mruby"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Total fuzzing duration in seconds (split across targets)"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: mruby
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install mruby build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq ruby ruby-dev rake bison || true
          ruby --version || true
          rake --version || true

      - name: Clone and build mruby CLI tools with AFL++ + ASan
        run: |
          set -eux
          mkdir -p /tmp/src

          # Robust clone: retry up to 3x, pull submodules recursively.
          SRC=/tmp/src/mruby
          rm -rf "$SRC"
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                https://github.com/mruby/mruby "$SRC"; then
              break
            fi
            n=$((n + 1))
            echo "[!] clone failed, retry $n/3"
            rm -rf "$SRC"
            sleep 5
          done
          test -d "$SRC/.git"
          cd "$SRC"
          git submodule update --init --recursive || true

          # AFL++ instrumentation with AddressSanitizer.
          # mruby's Rake build honors CC/CXX/CFLAGS/LDFLAGS (same as oss-fuzz).
          export CC=afl-cc
          export CXX=afl-c++
          export LD=afl-cc
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          rake -j"$(nproc)" all

          BINDIR="$SRC/build/host/bin"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"

          echo "[+] Built binaries:"
          ls -la "$BINDIR" || true
          # At minimum the interpreter must exist.
          test -x "$BINDIR/mruby"

      - name: Dry-run replay (lost-bug check)
        run: |
          # NOTE: step runs under bash -e by default; never toggle global set -e.
          # Capture exit codes locally with: rc=0; cmd || rc=$?
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0

          # Build the target table: label|command-template (@@ = input file).
          # Only file-consuming CLI tools that were actually built are added.
          TARGETS=()
          [ -x "$BINDIR/mruby" ] && TARGETS+=("mruby|$BINDIR/mruby @@")
          [ -x "$BINDIR/mrbc" ]  && TARGETS+=("mrbc|$BINDIR/mrbc -o /tmp/mrbc_out.mrb @@")
          # mirb is an interactive REPL (reads stdin) -> not a file-input target.
          echo "[+] Dry-run targets: ${#TARGETS[@]}"

          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            for entry in "${TARGETS[@]}"; do
              label="${entry%%|*}"
              template="${entry#*|}"
              cmd="${template//@@/$seed}"
              total=$((total + 1))
              echo "[*] Replaying $label with $sname..."
              rc=0
              # shellcheck disable=SC2086
              timeout 60 $cmd > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $label with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${label}_${sname}.txt"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1:symbolize=0

          # Same target table as the dry-run step.
          TARGETS=()
          [ -x "$BINDIR/mruby" ] && TARGETS+=("mruby|$BINDIR/mruby @@")
          [ -x "$BINDIR/mrbc" ]  && TARGETS+=("mrbc|$BINDIR/mrbc -o /tmp/mrbc_out.mrb @@")

          n_targets="${#TARGETS[@]}"
          if [ "$n_targets" -eq 0 ]; then
            echo "[!] No fuzzable targets found"
            exit 0
          fi

          # Split the total budget across targets, minimum 60s each.
          per=$((FUZZ_DURATION / n_targets))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Fuzzing $n_targets target(s) for ${per}s each"

          first_seed=$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)

          for entry in "${TARGETS[@]}"; do
            label="${entry%%|*}"
            template="${entry#*|}"

            # Skip targets that cannot even start under afl-showmap.
            if [ -n "$first_seed" ]; then
              showcmd="${template//@@/$first_seed}"
              # shellcheck disable=SC2086
              afl-showmap -o /dev/null -m none -t 5000 -- $showcmd >/dev/null 2>&1
              sm_rc=$?
              # afl-showmap returns the target's own exit code; only a
              # startup failure (>=137 signal / exec error) is disqualifying.
              if [ "$sm_rc" -ge 137 ]; then
                echo "[!] Skipping $label — afl-showmap startup failed (rc=$sm_rc)"
                continue
              fi
            fi

            echo "[*] Fuzzing $label for ${per}s..."
            # shellcheck disable=SC2086
            afl-fuzz -i "seeds/$PROJECT" -o "results/afl/$label" \
              -m none -V "$per" \
              -- $template || true
            echo "[+] Finished fuzzing $label"
          done
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set +e
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1
          shopt -s nullglob

          TARGETS=()
          [ -x "$BINDIR/mruby" ] && TARGETS+=("mruby|$BINDIR/mruby @@")
          [ -x "$BINDIR/mrbc" ]  && TARGETS+=("mrbc|$BINDIR/mrbc -o /tmp/mrbc_out.mrb @@")

          n=0
          for entry in "${TARGETS[@]}"; do
            label="${entry%%|*}"
            template="${entry#*|}"
            crash_dir="results/afl/$label/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname=$(basename "$crash")
              [ "$cname" = "README.txt" ] && continue
              n=$((n + 1))
              echo "[*] Triaging $label / $cname..."
              cmd="${template//@@/$crash}"
              rc=0
              # shellcheck disable=SC2086
              timeout 60 $cmd > /dev/null 2> "results/fuzz/${label}_${cname}.txt" || rc=$?
              cp "$crash" "results/fuzz/${label}_${cname}.bin"
            done
          done
          echo "[+] Triaged $n crash inputs"

      - name: Sanitize result filenames for upload
        if: always()
        run: |
          # actions/upload-artifact@v4 rejects paths containing ':' — AFL names
          # crashes like id:000000,time:... . Rename ':' -> '_' depth-first.
          set +e
          [ -d results ] || exit 0
          find results -depth -name '*:*' | while read -r p; do
            d=$(dirname "$p")
            b=$(basename "$p")
            nb=$(printf '%s' "$b" | tr ':' '_')
            [ "$b" != "$nb" ] && mv "$p" "$d/$nb"
          done
          echo "[+] Filename sanitize complete"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-mruby
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-mruby
          path: results/
          retention-days: 30
