name: "Fuzz native mruby"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: mruby
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install mruby build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq ruby rake bison 2>/dev/null || true
          ruby --version || true
          rake --version || true

      - name: Clone and build mruby with AFL++ + ASan
        run: |
          set -eux
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/mruby/mruby /tmp/src/mruby
          cd /tmp/src/mruby

          # AFL++ instrumentation with AddressSanitizer.
          # mruby's Rake build honors CC/CXX/CFLAGS/LDFLAGS (same as oss-fuzz).
          export CC=afl-cc
          export CXX=afl-c++
          export LD=afl-cc
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          rake -j"$(nproc)" all

          BINDIR="$PWD/build/host/bin"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "MRUBY_BIN=$BINDIR/mruby" >> "$GITHUB_ENV"

          echo "[+] Built binaries:"
          ls -la "$BINDIR" || true
          test -x "$BINDIR/mruby"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -u
          mkdir -p results/dry_run
          bin="$MRUBY_BIN"
          bname=$(basename "$bin")
          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$bin" "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "results/dry_run/${bname}_${sname}.txt"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total seeds"

      - name: Fuzz with AFL++
        run: |
          set -u
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0:symbolize=1"
          echo "[*] Fuzzing for $FUZZ_DURATION seconds..."
          afl-fuzz -i seeds/"$PROJECT" -o results/afl -V "$FUZZ_DURATION" \
            -- "$MRUBY_BIN" @@ || true
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set -u
          mkdir -p results/fuzz
          bin="$MRUBY_BIN"
          bname=$(basename "$bin")
          crash_dir=results/afl/default/crashes
          if [ ! -d "$crash_dir" ]; then
            echo "[+] No crashes directory found — nothing to triage"
            exit 0
          fi
          n=0
          for crash in "$crash_dir"/*; do
            [ -f "$crash" ] || continue
            cname=$(basename "$crash")
            [ "$cname" = "README.txt" ] && continue
            n=$((n + 1))
            echo "[*] Triaging $cname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0:symbolize=1" \
              timeout 60 "$bin" "$crash" > /dev/null 2> "results/fuzz/${bname}_${cname}.txt"
            set -e
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
          done
          echo "[+] Triaged $n crash inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-mruby
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-mruby
          path: results/
          retention-days: 30
