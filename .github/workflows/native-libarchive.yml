name: "Fuzz native libarchive"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libarchive
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest libarchive with AFL++ + ASan
        run: |
          set -eux
          # Extra codec/format deps to widen the parser attack surface.
          sudo apt-get install -y -qq \
            zlib1g-dev liblzma-dev libbz2-dev liblz4-dev libzstd-dev \
            libssl-dev libxml2-dev libacl1-dev libattr1-dev 2>/dev/null || true

          mkdir -p /tmp/src
          rm -rf /tmp/src/libarchive
          # Clone with submodules, wrapped in a 3x retry.
          cloned=0
          for i in 1 2 3; do
            if git clone --depth 1 --recurse-submodules \
                 https://github.com/libarchive/libarchive.git /tmp/src/libarchive; then
              cloned=1
              break
            fi
            echo "[!] clone attempt $i failed; retrying..."
            rm -rf /tmp/src/libarchive
            sleep 5
          done
          if [ "$cloned" -ne 1 ]; then
            echo "[!] git clone failed after 3 attempts"
            exit 1
          fi
          cd /tmp/src/libarchive
          git submodule update --init --recursive || true

          # A GitHub checkout ships no ./configure script; regenerate autotools.
          if [ ! -x ./configure ]; then
            if [ -f build/autogen.sh ]; then
              /bin/sh build/autogen.sh
            else
              autoreconf -fi
            fi
          fi

          export AFL_USE_ASAN=1
          # --disable-shared makes the top-level CLI tools real ELF binaries
          # (not libtool wrapper scripts) so AFL++ can drive them directly.
          # --disable-werror keeps a warning-heavy git tree from failing the build.
          CC=afl-cc CXX=afl-c++ \
          CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
          CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
          LDFLAGS="-fsanitize=address" \
            ./configure --disable-shared --disable-werror
          make -j"$(nproc)"

          BINDIR="/tmp/src/libarchive"
          if [ ! -x "$BINDIR/bsdtar" ]; then
            echo "[!] Build failed — $BINDIR/bsdtar not found"
            exit 1
          fi
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools in $BINDIR:"
          ls -la "$BINDIR"/bsdtar "$BINDIR"/bsdcpio "$BINDIR"/bsdcat "$BINDIR"/bsdunzip 2>/dev/null || true
          "$BINDIR/bsdtar" --version || true

      - name: Dry-run replay (lost-bug check)
        run: |
          set -u
          mkdir -p results/dry_run

          # Multi-target: every file-consuming libarchive CLI tool.
          # Format: "<tool> <args-with-@@>"; @@ is the input archive path.
          TARGETS=(
            "bsdtar -tf @@"
            "bsdtar -xf @@ -O"
            "bsdcpio -it -F @@"
            "bsdcat @@"
            "bsdunzip -l @@"
          )

          crash_count=0
          total=0
          for entry in "${TARGETS[@]}"; do
            tool="${entry%% *}"
            args="${entry#* }"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || { echo "[!] skip missing tool: $tool"; continue; }
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname=$(basename "$seed" .bin)
              run_args="${args/@@/$seed}"
              result_file="results/dry_run/${tool}_${sname}.txt"
              total=$((total + 1))
              echo "[*] Replaying $tool $args with $sname..."
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" LC_ALL=C.UTF-8 \
                timeout 30 "$bin" $run_args > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "$result_file"
                cp "$seed" "results/dry_run/${tool}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set -u
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export LC_ALL=C.UTF-8

          TARGETS=(
            "bsdtar -tf @@"
            "bsdtar -xf @@ -O"
            "bsdcpio -it -F @@"
            "bsdcat @@"
            "bsdunzip -l @@"
          )

          # Keep only targets whose binary exists and that survive afl-showmap.
          sample=$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)
          RUNNABLE=()
          for entry in "${TARGETS[@]}"; do
            tool="${entry%% *}"
            args="${entry#* }"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || { echo "[!] skip missing tool: $tool"; continue; }
            if [ -z "$sample" ]; then
              RUNNABLE+=("$entry")
              continue
            fi
            test_args="${args/@@/$sample}"
            # shellcheck disable=SC2086
            if timeout 60 afl-showmap -o /dev/null -m none -- "$bin" $test_args >/dev/null 2>&1; then
              RUNNABLE+=("$entry")
            else
              echo "[!] afl-showmap startup failed for '$entry' — skipping"
            fi
          done

          n=${#RUNNABLE[@]}
          if [ "$n" -eq 0 ]; then
            echo "[!] No runnable targets"
            exit 0
          fi
          per=$(( FUZZ_DURATION / n ))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Fuzzing $n target(s), ${per}s each"

          for entry in "${RUNNABLE[@]}"; do
            tool="${entry%% *}"
            args="${entry#* }"
            bin="$BINDIR/$tool"
            outdir="results/afl/$tool"
            echo "[*] Fuzzing '$entry' for ${per}s -> $outdir"
            # shellcheck disable=SC2086
            afl-fuzz -i "seeds/$PROJECT" -o "$outdir" -m none -V "$per" \
              -- "$bin" $args || true
          done
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set -u
          mkdir -p results/fuzz

          TARGETS=(
            "bsdtar -tf @@"
            "bsdtar -xf @@ -O"
            "bsdcpio -it -F @@"
            "bsdcat @@"
            "bsdunzip -l @@"
          )

          shopt -s nullglob
          new_crashes=0
          for entry in "${TARGETS[@]}"; do
            tool="${entry%% *}"
            args="${entry#* }"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$tool/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname=$(basename "$crash")
              [ "$cname" = "README.txt" ] && continue
              run_args="${args/@@/$crash}"
              result_file="results/fuzz/${tool}_${cname}.txt"
              echo "[*] Triaging $tool $cname..."
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" LC_ALL=C.UTF-8 \
                timeout 30 "$bin" $run_args > /dev/null 2> "$result_file" || rc=$?
              cp "$crash" "results/fuzz/${tool}_${cname}.bin"
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                new_crashes=$((new_crashes + 1))
              fi
            done
          done
          echo "[+] Triage complete: $new_crashes reproduced crash exits"

      - name: Sanitize result filenames
        if: always()
        run: |
          # AFL crash files (id:000000,time:...) contain ':' which breaks
          # actions/upload-artifact@v4. Rename ':' -> '_' deepest-first.
          if [ -d results ]; then
            find results -depth -name '*:*' | while read -r p; do
              d=$(dirname "$p")
              b=$(basename "$p" | tr ':' '_')
              mv "$p" "$d/$b" 2>/dev/null || true
            done
          fi
          echo "[+] Sanitized result filenames"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

