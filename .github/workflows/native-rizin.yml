name: "Fuzz native rizin"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: rizin
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y -qq \
            meson \
            ninja-build \
            pkg-config \
            2>/dev/null || true

      - name: Clone latest rizin source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/rizinorg/rizin /tmp/src/rizin

      - name: Build rizin with AFL++ and ASan
        run: |
          set -e
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          cd /tmp/src/rizin
          # meson is the only supported build system for rizin.
          # b_sanitize=address injects -fsanitize=address -fno-omit-frame-pointer;
          # --buildtype=debug gives -g -O0; b_lundef=false lets the ASan runtime
          # link despite meson's default -Wl,--no-undefined.
          meson setup build \
            --buildtype=debug \
            -Db_sanitize=address \
            -Db_lundef=false \
            -Dc_args="-fsanitize=address -fno-omit-frame-pointer" \
            -Dc_link_args="-fsanitize=address"
          meson compile -C build
          BINDIR="$(pwd)/build/binrz"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "RIZIN=$BINDIR/rizin/rizin" >> "$GITHUB_ENV"
          echo "[+] Built binaries:"
          ls -la "$BINDIR/rizin" || true
          if [ ! -x "$BINDIR/rizin/rizin" ]; then
            echo "[!] rizin was not built — aborting"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          BIN="$RIZIN"
          bname="rizin"
          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            total=$((total + 1))
            echo "[*] Replaying $sname ..."
            # Recorded invocation: rizin -AA $POC
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0 \
              timeout 120 "$BIN" -AA "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "results/dry_run/${bname}_${sname}.txt"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_USE_ASAN=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1:symbolize=0
          # Recorded invocation: rizin -AA @@   (@@ = AFL file input)
          afl-fuzz \
            -i "seeds/$PROJECT" \
            -o results/afl \
            -V "$FUZZ_DURATION" \
            -- "$RIZIN" -AA @@ || true
          echo "[+] Fuzzing step finished"

      - name: Triage crashes
        run: |
          set +e
          mkdir -p results/fuzz
          BIN="$RIZIN"
          bname="rizin"
          crash_dir="results/afl/default/crashes"
          if [ ! -d "$crash_dir" ]; then
            echo "[+] No crashes directory found — nothing to triage"
            exit 0
          fi
          n=0
          for crash in "$crash_dir"/*; do
            [ -f "$crash" ] || continue
            cname="$(basename "$crash")"
            [ "$cname" = "README.txt" ] && continue
            n=$((n + 1))
            echo "[*] Triaging $cname ..."
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1 \
              timeout 120 "$BIN" -AA "$crash" > /dev/null 2> "results/fuzz/${bname}_${cname}.txt"
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
          done
          echo "[+] Triaged $n crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-rizin
          path: results/pocs/
          retention-days: 90

