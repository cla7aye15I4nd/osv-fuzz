name: "Fuzz native nokogiri"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 9 * * 0"

env:
  PROJECT: nokogiri
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          # gumbo-parser fuzzer build needs clang/llvm + make; libFuzzer driver
          # is provided by AFL++ when afl-cc sees -fsanitize=fuzzer.
          sudo apt-get install -y -qq \
            clang \
            llvm \
            cmake \
            make \
            pkg-config 2>/dev/null || true

      - name: Clone latest upstream source
        run: |
          set -euo pipefail
          mkdir -p /tmp/src
          rm -rf /tmp/src/nokogiri
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                https://github.com/sparklemotion/nokogiri.git /tmp/src/nokogiri; then
              break
            fi
            n=$((n + 1))
            echo "[!] Clone attempt $n failed — retrying..."
            rm -rf /tmp/src/nokogiri
            sleep 5
          done
          [ -d /tmp/src/nokogiri ] || { echo "[!] Clone failed after 3 attempts"; exit 1; }
          git -C /tmp/src/nokogiri submodule update --init --recursive || true

      - name: Build gumbo-parser fuzzer with AFL++ + ASan
        run: |
          set -euo pipefail
          cd /tmp/src/nokogiri/gumbo-parser

          # Drive the project's own fuzzer build (fuzzer/build.sh via `make fuzzer-asan`)
          # with the AFL++ toolchain instead of plain Clang. afl-cc/afl-c++ understand
          # -fsanitize=fuzzer and substitute AFL++'s libFuzzer-compatible driver, so the
          # resulting parse_fuzzer-asan is both AFL-instrumented AND still accepts a
          # single input file as argv[1] (usable by afl-fuzz @@, dry-run, and triage).
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export LLVM_CONFIG="${LLVM_CONFIG:-$(command -v llvm-config || command -v llvm-config-18 || command -v llvm-config-14 || true)}"
          export CFLAGS="-O1 -g -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-O1 -g -fsanitize=address -fno-omit-frame-pointer"

          make fuzzer-asan

          BINDIR="$PWD/fuzzer/build"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Build output in $BINDIR:"
          ls -la "$BINDIR" || true

          # -------------------------------------------------------------------
          # Enumerate every file-input CLI/fuzzer target under BINDIR and record
          # a "<binary-basename>\t<arg-template-with-@@>" line per target in
          # /tmp/targets.txt (shared across steps on the same runner).
          # The libFuzzer drivers here take a single input file as argv[1] => "@@".
          # -------------------------------------------------------------------
          : > /tmp/targets.txt
          # Known target names from the recorded PoC invocations.
          declare -A KNOWN_ARGS=(
            ["parse_fuzzer-asan"]="@@"
          )
          shopt -s nullglob
          for f in "$BINDIR"/*; do
            [ -f "$f" ] || continue
            [ -x "$f" ] || continue
            case "$f" in
              *.o|*.a|*.so|*.sh|*.txt|*.dSYM) continue ;;
            esac
            name="$(basename "$f")"
            args="${KNOWN_ARGS[$name]:-@@}"
            printf '%s\t%s\n' "$name" "$args" >> /tmp/targets.txt
          done

          if [ ! -s /tmp/targets.txt ]; then
            echo "[!] No executable targets discovered under $BINDIR — build likely failed"
            exit 1
          fi
          echo "[+] Fuzz targets:"
          cat /tmp/targets.txt

      - name: Dry-run replay (lost-bug check)
        run: |
          # NOTE: step runs under `bash -e`. Capture the replay exit code with
          # `|| rc=$?` instead of toggling global set -e/+e.
          set -uo pipefail
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          crash_count=0
          total=0
          while IFS=$'\t' read -r tool argtpl; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname="$(basename "$seed" .bin)"
              # Substitute @@ with the concrete seed path, then split into argv.
              runargs="${argtpl//@@/$seed}"
              # shellcheck disable=SC2206
              argv=($runargs)
              total=$((total + 1))
              echo "[*] Replaying $tool with $sname..."
              rc=0
              timeout 30 "$bin" "${argv[@]}" > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${tool}_${sname}.txt"
                cp "$seed" "results/dry_run/${tool}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done < /tmp/targets.txt
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0

          # Pick a seed to validate each target's instrumentation via afl-showmap.
          first_seed="$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1 || true)"

          # First pass: keep only targets that survive afl-showmap startup.
          ENABLED_TOOLS=()
          ENABLED_ARGS=()
          while IFS=$'\t' read -r tool argtpl; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            if [ -z "$first_seed" ]; then
              # No seed to probe with — include the target anyway.
              ENABLED_TOOLS+=("$tool"); ENABLED_ARGS+=("$argtpl")
              continue
            fi
            probeargs="${argtpl//@@/$first_seed}"
            # shellcheck disable=SC2206
            pargv=($probeargs)
            if AFL_SKIP_CPUFREQ=1 timeout 60 afl-showmap -o /dev/null -m none -q \
                -- "$bin" "${pargv[@]}" >/dev/null 2>&1; then
              echo "[+] Target OK: $tool"
              ENABLED_TOOLS+=("$tool"); ENABLED_ARGS+=("$argtpl")
            else
              echo "[!] Skipping $tool — afl-showmap startup failed"
            fi
          done < /tmp/targets.txt

          n="${#ENABLED_TOOLS[@]}"
          if [ "$n" -eq 0 ]; then
            echo "[!] No fuzzable targets — nothing to do"
            exit 0
          fi

          # Split the total budget across targets, minimum 60s each.
          per=$((FUZZ_DURATION / n))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Fuzzing $n target(s) for ${per}s each"

          for i in "${!ENABLED_TOOLS[@]}"; do
            tool="${ENABLED_TOOLS[$i]}"
            argtpl="${ENABLED_ARGS[$i]}"
            bin="$BINDIR/$tool"
            # shellcheck disable=SC2206
            fargv=($argtpl)   # keeps literal @@ for afl-fuzz
            echo "[*] Fuzzing $tool for ${per}s..."
            afl-fuzz \
              -i "seeds/$PROJECT" \
              -o "results/afl/$tool" \
              -m none \
              -V "$per" \
              -- "$bin" "${fargv[@]}" || true
          done
          echo "[+] Fuzzing complete"

      - name: Triage AFL++ crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          shopt -s nullglob
          new_crashes=0
          while IFS=$'\t' read -r tool argtpl; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$tool/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cbase="$(basename "$crash")"
              [ "$cbase" = "README.txt" ] && continue
              cname="$(echo "$cbase" | tr ':,' '__')"
              result_file="results/fuzz/${tool}_${cname}.txt"
              runargs="${argtpl//@@/$crash}"
              # shellcheck disable=SC2206
              argv=($runargs)
              rc=0
              timeout 30 "$bin" "${argv[@]}" > /dev/null 2> "$result_file" || rc=$?
              cp "$crash" "results/fuzz/${tool}_${cname}.bin"
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] Reproduced crash: $tool ($cname, exit=$rc)"
                new_crashes=$((new_crashes + 1))
              fi
            done
          done < /tmp/targets.txt
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Sanitize result filenames
        if: always()
        run: |
          # AFL emits files like `id:000000,time:...` — the ':' breaks
          # actions/upload-artifact@v4. Rename any offending path under results/.
          if [ -d results ]; then
            find results -depth -name '*:*' | while read -r p; do
              newp="$(dirname "$p")/$(basename "$p" | tr ':' '_')"
              [ "$p" != "$newp" ] && mv "$p" "$newp" || true
            done
          fi

      - name: Generate report
        if: always()
        run: python3 scripts/report.py results/ "$PROJECT" || true

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-nokogiri
          path: results/pocs/
          retention-days: 90

