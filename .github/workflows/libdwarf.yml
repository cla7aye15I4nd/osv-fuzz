name: "Fuzz libdwarf"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 19 * * 0"

env:
  PROJECT: libdwarf
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            cmake \
            zlib1g-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/davea42/libdwarf-code /tmp/tmp/src/libdwarf
          git clone --depth 1 --recursive https://github.com/davea42/libdwarf-binary-samples /tmp/tmp/src/libdwarf-binary-samples

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+w /etc/ld.so.cache 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/libdwarf
          export BINARY_SAMPLES_DIR="/tmp/src/libdwarf-binary-samples"
          export BINARY_SAMPLES_V1="$BINARY_SAMPLES_DIR/binary-samples"
          export BINARY_SAMPLES_V2="$BINARY_SAMPLES_DIR/binary-samples-v2"
          export FUZZER_DIR="/tmp/src/libdwarf/fuzz"
          mkdir /tmp/src/corp
          cp $BINARY_SAMPLES_V1/elf* /tmp/src/corp
          cp $BINARY_SAMPLES_V1/Mach* /tmp/src/corp
          cp $BINARY_SAMPLES_V1/pe* /tmp/src/corp
          cp $BINARY_SAMPLES_V1/lib* /tmp/src/corp
          for file in $BINARY_SAMPLES_V2/{linux,windows}/*_DWARF*/* $BINARY_SAMPLES_V2/macOS-arm/*/*; do 
           export newfile=$(echo $file | sed 's/ /_/g')
           cp "$file" /tmp/src/corp/$(echo "$newfile" | cut -d/ -f5,6 | sed 's/\//_/g')_$(basename "$newfile")
          done
          zip -r -j $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_seed_corpus.zip /tmp/src/corp
          for fuzzFile in $FUZZER_DIR/fuzz*.c; do
            fuzzName=$(basename "$fuzzFile" '.c')
            cp $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/${fuzzName}_seed_corpus.zip
          done
          rm $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_seed_corpus.zip
          mkdir build
          cd build
          cmake ../ -DDO_TESTING=ON
          make
          for fuzzFile in $FUZZER_DIR/fuzz*.c; do
            fuzzName=$(basename "$fuzzFile" '.c')
            $CC $CFLAGS $LIB_FUZZING_ENGINE -I../src/lib/libdwarf/ \
              "$FUZZER_DIR/${fuzzName}.c" -o "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzzName}" ./src/lib/libdwarf/libdwarf.a -lz
          done

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
