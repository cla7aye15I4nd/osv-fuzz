name: "Fuzz wolfssl"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 17 * * 0"

env:
  PROJECT: wolfssl
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            bsdmainutils \
            libtool \
            zip

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/wolfssl/wolfssl /tmp/tmp/src/wolfssl
          git clone --depth 1 --recursive https://github.com/wolfSSL/wolfsm /tmp/src/wolfsm
          git clone --depth 1 --recursive https://github.com/wolfSSL/wolfssh.git /tmp/src/wolfssh
          git clone --depth 1 --recursive https://github.com/JacobBarthelmeh/fuzzing-headers.git /tmp/src/fuzzing-headers
          git clone --depth 1 --recursive https://github.com/JacobBarthelmeh/wolf-ssl-ssh-fuzzers /tmp/src/wolf-ssl-ssh-fuzzers
          git clone --depth 1 --recursive https://github.com/MozillaSecurity/cryptofuzz /tmp/src/cryptofuzz
          git clone --depth 1 --recursive https://github.com/google/wycheproof.git /tmp/src/wycheproof
          git clone --depth 1 --recursive https://github.com/wolfssl/oss-fuzz-targets /tmp/src/--depth

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+w /etc/ld.so.cache 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/wolfssl
          if true
          then
              cd /tmp/src/wolfsm/
              ./install.sh
              cd /tmp/src/wolfssl/
              WOLFCRYPT_CONFIGURE_PARAMS="--enable-static --enable-md2 --enable-md4 --enable-ripemd --enable-blake2 --enable-blake2s --enable-pwdbased --enable-scrypt --enable-hkdf --enable-cmac --enable-arc4 --enable-camellia --enable-aesccm --enable-aesctr --enable-xts --enable-des3 --enable-x963kdf --enable-harden --enable-aescfb --enable-aesofb --enable-aeskeywrap --enable-aessiv --enable-keygen --enable-curve25519 --enable-curve448 --enable-shake256 --disable-crypttests --disable-examples --enable-compkey --enable-ed448 --enable-ed25519 --enable-ecccustcurves --enable-xchacha --enable-cryptocb --enable-eccencrypt --enable-aesgcm-stream --enable-smallstack --enable-ed25519-stream --enable-ed448-stream --enable-aesgcm-stream --enable-shake128 --enable-siphash --enable-eccsi --with-eccminsz=0 --enable-sm2 --enable-sm3 --enable-sm4-cbc --enable-sm4-ccm --enable-sm4-ctr --enable-sm4-ecb --enable-sm4-gcm"
              if [[ $CFLAGS = *sanitize=memory* ]]
              then
                  WOLFCRYPT_CONFIGURE_PARAMS="$WOLFCRYPT_CONFIGURE_PARAMS --disable-asm"
              fi
              cd /tmp/src/
              tar jxf boost_1_82_0.tar.bz2
              cd boost_1_82_0/
              CFLAGS="" CXXFLAGS="" ./bootstrap.sh
              CFLAGS="" CXXFLAGS="" ./b2 headers
              cp -R boost/ /usr/include/
              OLD_CFLAGS="$CFLAGS"
              OLD_CXXFLAGS="$CXXFLAGS"
              cd /tmp/src/cryptofuzz
              sed -i 's/kNegativeIntegers = false/kNegativeIntegers = true/g' config.h
              sed -i \
                's/Init_Void<Md2>, DigestUpdate_Void<Md2>, DigestFinalize_Void<Md2>/Init_Int<Md2>, DigestUpdate_Int<Md2>, DigestFinalize_Int<Md2>/' \
                modules/wolfcrypt/module.cpp
              sed -i \
                's/Init_Void<Md4>, DigestUpdate_Void<Md4>, DigestFinalize_Void<Md4>/Init_Int<Md4>, DigestUpdate_Int<Md4>, DigestFinalize_Int<Md4>/' \
                modules/wolfcrypt/module.cpp
              cp -R /tmp/src/cryptofuzz/ /tmp/src/cryptofuzz-openssl-api/
              cd /tmp/src/cryptofuzz-openssl-api/
              python gen_repository.py
              rm extra_options.h
              echo -n '"' >>extra_options.h
              echo -n '--force-module=wolfCrypt-OpenSSL ' >>extra_options.h
              echo -n '"' >>extra_options.h
              cp -R /tmp/src/wolfssl/ /tmp/src/wolfssl-openssl-api/
              cd /tmp/src/wolfssl-openssl-api/
              autoreconf -ivf
              CFLAGS="$CFLAGS -DHAVE_AES_ECB -DWOLFSSL_DES_ECB -DHAVE_ECC_SECPR2 -DHAVE_ECC_SECPR3 -DHAVE_ECC_BRAINPOOL -DHAVE_ECC_KOBLITZ -DWOLFSSL_ECDSA_SET_K -DWOLFSSL_ECDSA_SET_K_ONE_LOOP"
              if [[ $CFLAGS = *-m32* ]]
              then
                  ./configure $WOLFCRYPT_CONFIGURE_PARAMS --enable-opensslall --enable-opensslextra --disable-fastmath
              else
                  ./configure $WOLFCRYPT_CONFIGURE_PARAMS --enable-opensslall --enable-opensslextra
              fi
              make -j$(nproc)
              export CXXFLAGS="$CXXFLAGS -DCRYPTOFUZZ_NO_OPENSSL -DCRYPTOFUZZ_WOLFCRYPT_OPENSSL -Wno-deprecated-literal-operator"
              export WOLFCRYPT_LIBWOLFSSL_A_PATH="/tmp/src/wolfssl-openssl-api/src/.libs/libwolfssl.a"
              export WOLFCRYPT_INCLUDE_PATH="/tmp/src/wolfssl-openssl-api/"
              cd /tmp/src/cryptofuzz-openssl-api/modules/wolfcrypt-openssl
              make -j$(nproc)
              cd /tmp/src/cryptofuzz-openssl-api/
              LIBFUZZER_LINK="$LIB_FUZZING_ENGINE" make -B -j$(nproc)
              cp cryptofuzz $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-openssl-api
              CFLAGS="$OLD_CFLAGS"
              CXXFLAGS="$OLD_CXXFLAGS"
              unset WOLFCRYPT_LIBWOLFSSL_A_PATH
              unset WOLFCRYPT_INCLUDE_PATH
              cd /tmp/src/cryptofuzz/
              python gen_repository.py
              rm extra_options.h
              echo -n '"' >>extra_options.h
              echo -n '--force-module=wolfCrypt ' >>extra_options.h
              echo -n '--digests=NULL ' >>extra_options.h
              echo -n '--operations=' >>extra_options.h
              echo -n 'BignumCalc,' >>extra_options.h
              echo -n 'DH_GenerateKeyPair,' >>extra_options.h
              echo -n 'DH_Derive,' >>extra_options.h
              echo -n 'ECC_GenerateKeyPair,' >>extra_options.h
              echo -n 'ECC_PrivateToPublic,' >>extra_options.h
              echo -n 'ECC_ValidatePubkey,' >>extra_options.h
              echo -n 'ECDSA_Verify,' >>extra_options.h
              echo -n 'ECDSA_Sign,' >>extra_options.h
              echo -n 'ECIES_Encrypt,' >>extra_options.h
              echo -n 'ECIES_Decrypt,' >>extra_options.h
              echo -n 'ECC_Point_Add,' >>extra_options.h
              echo -n 'ECC_Point_Mul,' >>extra_options.h
              echo -n 'ECC_Point_Dbl,' >>extra_options.h
              echo -n 'ECDH_Derive,' >>extra_options.h
              echo -n 'ECCSI_Sign,' >>extra_options.h
              echo -n 'ECCSI_Verify ' >>extra_options.h
              echo -n '"' >>extra_options.h
              cp -R /tmp/src/cryptofuzz/ /tmp/src/cryptofuzz-normal-math/
              cp -R /tmp/src/wolfssl/ /tmp/src/wolfssl-normal-math/
              cd /tmp/src/wolfssl-normal-math/
              autoreconf -ivf
              CFLAGS="$CFLAGS -DHAVE_AES_ECB -DWOLFSSL_DES_ECB -DHAVE_ECC_SECPR2 -DHAVE_ECC_SECPR3 -DHAVE_ECC_BRAINPOOL -DHAVE_ECC_KOBLITZ -DWOLFSSL_ECDSA_SET_K -DWOLFSSL_ECDSA_SET_K_ONE_LOOP"
              if [[ $CFLAGS != *-m32* ]]
              then
                  ./configure $WOLFCRYPT_CONFIGURE_PARAMS
              else
                  ./configure $WOLFCRYPT_CONFIGURE_PARAMS --disable-asm
              fi
              make -j$(nproc)
              export CXXFLAGS="$CXXFLAGS -DCRYPTOFUZZ_NO_OPENSSL -DCRYPTOFUZZ_WOLFCRYPT -Wno-deprecated-literal-operator"
              export WOLFCRYPT_LIBWOLFSSL_A_PATH="/tmp/src/wolfssl-normal-math/src/.libs/libwolfssl.a"
              export WOLFCRYPT_INCLUDE_PATH="/tmp/src/wolfssl-normal-math/"
              cd /tmp/src/cryptofuzz-normal-math/modules/wolfcrypt
              make -j$(nproc)
              cd /tmp/src/cryptofuzz-normal-math/
              LIBFUZZER_LINK="$LIB_FUZZING_ENGINE" make -B -j$(nproc)
              cp cryptofuzz $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-normal-math
              CFLAGS="$OLD_CFLAGS"
              CXXFLAGS="$OLD_CXXFLAGS"
              unset WOLFCRYPT_LIBWOLFSSL_A_PATH
              unset WOLFCRYPT_INCLUDE_PATH
              cp -R /tmp/src/cryptofuzz/ /tmp/src/cryptofuzz-sp-math-all/
              cp -R /tmp/src/wolfssl/ /tmp/src/wolfssl-sp-math-all/
              cd /tmp/src/wolfssl-sp-math-all/
              autoreconf -ivf
              CFLAGS="$CFLAGS -DHAVE_AES_ECB -DWOLFSSL_DES_ECB -DHAVE_ECC_SECPR2 -DHAVE_ECC_SECPR3 -DHAVE_ECC_BRAINPOOL -DHAVE_ECC_KOBLITZ -DWOLFSSL_ECDSA_SET_K -DWOLFSSL_ECDSA_SET_K_ONE_LOOP -DWOLFSSL_SP_INT_NEGATIVE"
              ./configure $WOLFCRYPT_CONFIGURE_PARAMS --enable-sp-math-all
              make -j$(nproc)
              export CXXFLAGS="$CXXFLAGS -DCRYPTOFUZZ_NO_OPENSSL -DCRYPTOFUZZ_WOLFCRYPT -Wno-deprecated-literal-operator"
              export WOLFCRYPT_LIBWOLFSSL_A_PATH="/tmp/src/wolfssl-sp-math-all/src/.libs/libwolfssl.a"
              export WOLFCRYPT_INCLUDE_PATH="/tmp/src/wolfssl-sp-math-all/"
              cd /tmp/src/cryptofuzz-sp-math-all/modules/wolfcrypt
              make -j$(nproc)
              cd /tmp/src/cryptofuzz-sp-math-all/
              LIBFUZZER_LINK="$LIB_FUZZING_ENGINE" make -B -j$(nproc)
              cp cryptofuzz $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-sp-math-all
              CFLAGS="$OLD_CFLAGS"
              CXXFLAGS="$OLD_CXXFLAGS"
              unset WOLFCRYPT_LIBWOLFSSL_A_PATH
              unset WOLFCRYPT_INCLUDE_PATH
              cp -R /tmp/src/cryptofuzz/ /tmp/src/cryptofuzz-sp-math-all-8bit/
              cp -R /tmp/src/wolfssl/ /tmp/src/wolfssl-sp-math-all-8bit/
              cd /tmp/src/wolfssl-sp-math-all-8bit/
              autoreconf -ivf
              CFLAGS="$CFLAGS -DHAVE_AES_ECB -DWOLFSSL_DES_ECB -DHAVE_ECC_SECPR2 -DHAVE_ECC_SECPR3 -DHAVE_ECC_BRAINPOOL -DHAVE_ECC_KOBLITZ -DWOLFSSL_ECDSA_SET_K -DWOLFSSL_ECDSA_SET_K_ONE_LOOP -DSP_WORD_SIZE=8 -DWOLFSSL_SP_INT_NEGATIVE"
              ./configure $WOLFCRYPT_CONFIGURE_PARAMS --enable-sp-math-all
              make -j$(nproc)
              export CXXFLAGS="$CXXFLAGS -DCRYPTOFUZZ_NO_OPENSSL -DCRYPTOFUZZ_WOLFCRYPT -Wno-deprecated-literal-operator"
              export WOLFCRYPT_LIBWOLFSSL_A_PATH="/tmp/src/wolfssl-sp-math-all-8bit/src/.libs/libwolfssl.a"
              export WOLFCRYPT_INCLUDE_PATH="/tmp/src/wolfssl-sp-math-all-8bit/"
              cd /tmp/src/cryptofuzz-sp-math-all-8bit/modules/wolfcrypt
              make -j$(nproc)
              cd /tmp/src/cryptofuzz-sp-math-all-8bit/
              LIBFUZZER_LINK="$LIB_FUZZING_ENGINE" make -B -j$(nproc)
              cp cryptofuzz $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-sp-math-all-8bit
              CFLAGS="$OLD_CFLAGS"
              CXXFLAGS="$OLD_CXXFLAGS"
              unset WOLFCRYPT_LIBWOLFSSL_A_PATH
              unset WOLFCRYPT_INCLUDE_PATH
              cp -R /tmp/src/cryptofuzz/ /tmp/src/cryptofuzz-sp-math/
              cp -R /tmp/src/wolfssl/ /tmp/src/wolfssl-sp-math/
              cd /tmp/src/wolfssl-sp-math/
              autoreconf -ivf
              CFLAGS="$CFLAGS -DHAVE_AES_ECB -DWOLFSSL_DES_ECB -DHAVE_ECC_SECPR2 -DHAVE_ECC_SECPR3 -DWOLFSSL_ECDSA_SET_K -DWOLFSSL_ECDSA_SET_K_ONE_LOOP -DWOLFSSL_PUBLIC_ECC_ADD_DBL"
              export WOLFCRYPT_CONFIGURE_PARAMS_SP_MATH=${WOLFCRYPT_CONFIGURE_PARAMS//"--enable-ecccustcurves"/}
              if [[ $CFLAGS = *-m32* ]]
              then
                  setarch i386 ./configure $WOLFCRYPT_CONFIGURE_PARAMS_SP_MATH --enable-sp --enable-sp-math
              elif [[ $CFLAGS = *sanitize=memory* ]]
              then
                  ./configure $WOLFCRYPT_CONFIGURE_PARAMS_SP_MATH --enable-sp --enable-sp-math --disable-sp-asm
              else
                  ./configure $WOLFCRYPT_CONFIGURE_PARAMS_SP_MATH --enable-sp --enable-sp-math
              fi
              make -j$(nproc)
              export CXXFLAGS="$CXXFLAGS -DCRYPTOFUZZ_NO_OPENSSL -DCRYPTOFUZZ_WOLFCRYPT -Wno-deprecated-literal-operator"
              export WOLFCRYPT_LIBWOLFSSL_A_PATH="/tmp/src/wolfssl-sp-math/src/.libs/libwolfssl.a"
              export WOLFCRYPT_INCLUDE_PATH="/tmp/src/wolfssl-sp-math/"
              cd /tmp/src/cryptofuzz-sp-math/modules/wolfcrypt
              make -j$(nproc)
              cd /tmp/src/cryptofuzz-sp-math/
              LIBFUZZER_LINK="$LIB_FUZZING_ENGINE" make -B -j$(nproc)
              cp cryptofuzz $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-sp-math
              CFLAGS="$OLD_CFLAGS"
              CXXFLAGS="$OLD_CXXFLAGS"
              unset WOLFCRYPT_LIBWOLFSSL_A_PATH
              unset WOLFCRYPT_INCLUDE_PATH
              cp -R /tmp/src/cryptofuzz/ /tmp/src/cryptofuzz-fastmath/
              cp -R /tmp/src/wolfssl/ /tmp/src/wolfssl-fastmath/
              cd /tmp/src/wolfssl-fastmath/
              autoreconf -ivf
              CFLAGS="$CFLAGS -DHAVE_AES_ECB -DWOLFSSL_DES_ECB -DHAVE_ECC_SECPR2 -DHAVE_ECC_SECPR3 -DHAVE_ECC_BRAINPOOL -DHAVE_ECC_KOBLITZ -DWOLFSSL_ECDSA_SET_K -DWOLFSSL_ECDSA_SET_K_ONE_LOOP"
              ./configure $WOLFCRYPT_CONFIGURE_PARAMS --enable-fastmath
              make -j$(nproc)
              export CXXFLAGS="$CXXFLAGS -DCRYPTOFUZZ_NO_OPENSSL -DCRYPTOFUZZ_WOLFCRYPT -Wno-deprecated-literal-operator"
              export WOLFCRYPT_LIBWOLFSSL_A_PATH="/tmp/src/wolfssl-fastmath/src/.libs/libwolfssl.a"
              export WOLFCRYPT_INCLUDE_PATH="/tmp/src/wolfssl-fastmath/"
              cd /tmp/src/cryptofuzz-fastmath/modules/wolfcrypt
              make -j$(nproc)
              cd /tmp/src/cryptofuzz-fastmath/
              LIBFUZZER_LINK="$LIB_FUZZING_ENGINE" make -B -j$(nproc)
              cp cryptofuzz $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-fastmath
              CFLAGS="$OLD_CFLAGS"
              CXXFLAGS="$OLD_CXXFLAGS"
              unset WOLFCRYPT_LIBWOLFSSL_A_PATH
              unset WOLFCRYPT_INCLUDE_PATH
              cp -R /tmp/src/cryptofuzz/ /tmp/src/cryptofuzz-heapmath/
              cp -R /tmp/src/wolfssl/ /tmp/src/wolfssl-heapmath/
              cd /tmp/src/wolfssl-heapmath/
              autoreconf -ivf
              CFLAGS="$CFLAGS -DHAVE_AES_ECB -DWOLFSSL_DES_ECB -DHAVE_ECC_SECPR2 -DHAVE_ECC_SECPR3 -DHAVE_ECC_BRAINPOOL -DHAVE_ECC_KOBLITZ -DWOLFSSL_ECDSA_SET_K -DWOLFSSL_ECDSA_SET_K_ONE_LOOP"
              ./configure $WOLFCRYPT_CONFIGURE_PARAMS --enable-heapmath
              make -j$(nproc)
              export CXXFLAGS="$CXXFLAGS -DCRYPTOFUZZ_NO_OPENSSL -DCRYPTOFUZZ_WOLFCRYPT -Wno-deprecated-literal-operator"
              export WOLFCRYPT_LIBWOLFSSL_A_PATH="/tmp/src/wolfssl-heapmath/src/.libs/libwolfssl.a"
              export WOLFCRYPT_INCLUDE_PATH="/tmp/src/wolfssl-heapmath/"
              cd /tmp/src/cryptofuzz-heapmath/modules/wolfcrypt
              make -j$(nproc)
              cd /tmp/src/cryptofuzz-heapmath/
              LIBFUZZER_LINK="$LIB_FUZZING_ENGINE" make -B -j$(nproc)
              cp cryptofuzz $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-heapmath
              CFLAGS="$OLD_CFLAGS"
              CXXFLAGS="$OLD_CXXFLAGS"
              unset WOLFCRYPT_LIBWOLFSSL_A_PATH
              unset WOLFCRYPT_INCLUDE_PATH
              mkdir /tmp/src/cryptofuzz-seed-corpus/
              find /tmp/src/wycheproof/testvectors_v1/ -type f -name 'ecdsa_*' -exec /tmp/src/cryptofuzz-fastmath/cryptofuzz --from-wycheproof={},/tmp/src/cryptofuzz-seed-corpus/ \;
              find /tmp/src/wycheproof/testvectors_v1/ -type f -name 'ecdh_*' -exec /tmp/src/cryptofuzz-fastmath/cryptofuzz --from-wycheproof={},/tmp/src/cryptofuzz-seed-corpus/ \;
              unzip -n /tmp/src/corpus_bearssl.zip -d /tmp/src/cryptofuzz_seed_corpus/ >/dev/null
              unzip -n /tmp/src/corpus_libecc.zip -d /tmp/src/cryptofuzz_seed_corpus/ >/dev/null
              unzip -n /tmp/src/corpus_relic.zip -d /tmp/src/cryptofuzz_seed_corpus/ >/dev/null
              unzip -n /tmp/src/corpus_cryptofuzz-openssl.zip -d /tmp/src/cryptofuzz_seed_corpus/ >/dev/null
              unzip -n /tmp/src/corpus_cryptofuzz-boringssl.zip -d /tmp/src/cryptofuzz_seed_corpus/ >/dev/null
              unzip -n /tmp/src/corpus_cryptofuzz-nss.zip -d /tmp/src/cryptofuzz_seed_corpus/ >/dev/null
              mkdir /tmp/src/openssl-expmod-corpus/
              unzip /tmp/src/corpus_openssl_expmod.zip -d /tmp/src/openssl-expmod-corpus/ >/dev/null
              find /tmp/src/openssl-expmod-corpus/ -type f -exec /tmp/src/cryptofuzz-fastmath/cryptofuzz --from-openssl-expmod={},/tmp/src/cryptofuzz-seed-corpus/ \;
              mkdir /tmp/src/libressl-expmod-corpus/
              unzip /tmp/src/corpus_libressl_expmod.zip -d /tmp/src/libressl-expmod-corpus/ >/dev/null
              find /tmp/src/libressl-expmod-corpus/ -type f -exec /tmp/src/cryptofuzz-fastmath/cryptofuzz --from-openssl-expmod={},/tmp/src/cryptofuzz-seed-corpus/ \;
              /tmp/src/cryptofuzz-fastmath/cryptofuzz --from-builtin-tests=/tmp/src/cryptofuzz-seed-corpus/
              cd /tmp/src/cryptofuzz_seed_corpus
              zip -r /tmp/src/cryptofuzz_seed_corpus.zip . >/dev/null
              cp /tmp/src/cryptofuzz_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-normal-math_seed_corpus.zip
              cp /tmp/src/cryptofuzz_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-sp-math-all_seed_corpus.zip
              cp /tmp/src/cryptofuzz_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-sp-math-all-8bit_seed_corpus.zip
              cp /tmp/src/cryptofuzz_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-sp-math_seed_corpus.zip
              cp /tmp/src/cryptofuzz_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-fastmath_seed_corpus.zip
              cp /tmp/src/cryptofuzz_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/cryptofuzz-heapmath_seed_corpus.zip
              rm -rf /tmp/src/openssl-expmod-corpus/
              rm -rf /tmp/src/libressl-expmod-corpus/
              rm -rf /tmp/src/cryptofuzz_seed_corpus/
              rm -rf /tmp/src/cryptofuzz_seed_corpus.zip
              NEW_SRC=/tmp/src/wolf-ssl-ssh-fuzzers/oss-fuzz/projects/wolf-ssl-ssh/
              cp -R /tmp/src/wolfssl/ $NEW_SRC
              cp -R /tmp/src/wolfssh/ $NEW_SRC
              cp -R /tmp/src/fuzzing-headers/ $NEW_SRC
              OSS_FUZZ_BUILD=1 SRC="$NEW_SRC" $NEW_SRC/build.sh
              cp /tmp/src/wolf-ssl-ssh-fuzzers/corpora/fuzzer-wolfssl-client-randomize_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/
          fi
          if [[ $CFLAGS != *-m32* ]]
          then
              cd /tmp/src/wolfssl
              target_dir="/tmp/src/fuzz-targets"
              ./autogen.sh
              ./configure --enable-static --disable-shared --prefix=/usr CC="clang"
              make -j "$(nproc)" all
              make install
              export LDFLAGS="${LDFLAGS-""}"
              export LDLIBS="${LDLIBS-""} -lwolfssl $LIB_FUZZING_ENGINE"
              cd "${target_dir}"
              make -e all
              make -e export prefix="$GITHUB_WORKSPACE/build/fuzz-targets"
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
