name: "Fuzz arrow"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 2 * * 0"

env:
  PROJECT: arrow
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            bison \
            flex \
            libboost-all-dev \
            ninja-build

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/apache/arrow.git /tmp/src/arrow

      - name: Download fuzzer files from oss-fuzz
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/google/oss-fuzz /tmp/oss-fuzz
          cd /tmp/oss-fuzz && git sparse-checkout set projects/arrow
          cp -r /tmp/oss-fuzz/projects/arrow/* /tmp/src/

      - name: Build Boost from source
        run: |
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          BOOST_VERSION=1.89.0
          BOOST_COMPONENTS="filesystem;system;process;multiprecision;crc;uuid;locale"
          cd /tmp
          wget -q https://github.com/boostorg/boost/releases/download/boost-${BOOST_VERSION}/boost-${BOOST_VERSION}-cmake.tar.gz
          tar -xf boost-${BOOST_VERSION}-cmake.tar.gz
          cd boost-${BOOST_VERSION}
          mkdir -p build && cd build
          cmake .. -GNinja \
            -DBOOST_INCLUDE_LIBRARIES="${BOOST_COMPONENTS}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build . --target install || sudo cmake --build . --target install

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src
          set +e
          OPENSSL_VERSION=3.5.4
          cd /tmp/src
          wget https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz
          tar -xf openssl-${OPENSSL_VERSION}.tar.gz
          cd openssl-${OPENSSL_VERSION}
          ./Configure no-apps no-docs no-tests no-shared no-asm
          make -j
          sudo make install
          ARROW=/tmp/src/arrow/cpp
          BUILD_DIR=/tmp/src/build-dir
          mkdir -p ${BUILD_DIR}
          cd ${BUILD_DIR}
          cmake ${ARROW} -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DARROW_DEPENDENCY_SOURCE=BUNDLED \
              -DARROW_OPENSSL_USE_SHARED=off \
              -DBOOST_SOURCE=SYSTEM \
              -DARROW_BOOST_USE_SHARED=off \
              -DCMAKE_C_FLAGS="${CFLAGS}" \
              -DCMAKE_CXX_FLAGS="${CXXFLAGS}" \
              -DARROW_EXTRA_ERROR_CONTEXT=off \
              \
              -DARROW_BUILD_SHARED=off \
              -DARROW_BUILD_STATIC=on \
              -DARROW_BUILD_BENCHMARKS=off \
              -DARROW_BUILD_EXAMPLES=off \
              -DARROW_BUILD_INTEGRATION=off \
              -DARROW_BUILD_TESTS=on \
              -DARROW_BUILD_UTILITIES=off \
              -DARROW_TEST_LINKAGE=static \
              -DPARQUET_BUILD_EXAMPLES=off \
              -DPARQUET_BUILD_EXECUTABLES=off \
              -DPARQUET_REQUIRE_ENCRYPTION=on \
              \
              -DARROW_CSV=on \
              -DARROW_JEMALLOC=off \
              -DARROW_MIMALLOC=off \
              -DARROW_PARQUET=on \
              -DARROW_WITH_BROTLI=on \
              -DARROW_WITH_BZ2=off \
              -DARROW_WITH_LZ4=on \
              -DARROW_WITH_SNAPPY=on \
              -DARROW_WITH_ZLIB=on \
              -DARROW_WITH_ZSTD=on \
              \
              -DARROW_USE_ASAN=off \
              -DARROW_USE_UBSAN=off \
              -DARROW_USE_TSAN=off \
              -DARROW_FUZZING=on
          cmake --build . -j$(nproc)
          ${ARROW}/build-support/fuzzing/generate_corpuses.sh ${BUILD_DIR}/release
          find . -executable -name "*-fuzz" -exec cp -a -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets \;
          find . -name "*-fuzz_seed_corpus.zip" -exec cp -a -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets \;
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
