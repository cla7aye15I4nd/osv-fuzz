name: "Fuzz dlplibs"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 2 * * 0"

env:
  PROJECT: dlplibs
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            gperf \
            libboost-dev \
            libglm-dev \
            libtool \
            patch \
            pkg-config \
            xz-utils

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive git://git.code.sf.net/p/libwpd/librevenge /tmp/src/librevenge
          git clone --depth 1 --recursive git://gerrit.libreoffice.org/libmspub /tmp/src/libmspub
          git clone --depth 1 --recursive git://gerrit.libreoffice.org/libcdr /tmp/src/libcdr
          git clone --depth 1 --recursive git://gerrit.libreoffice.org/libvisio /tmp/src/libvisio
          git clone --depth 1 --recursive git://gerrit.libreoffice.org/libzmf /tmp/src/libzmf
          git clone --depth 1 --recursive git://gerrit.libreoffice.org/libpagemaker /tmp/src/libpagemaker
          git clone --depth 1 --recursive git://gerrit.libreoffice.org/libfreehand /tmp/src/libfreehand
          git clone --depth 1 --recursive git://git.code.sf.net/p/libwpd/code /tmp/src/libwpd
          git clone --depth 1 --recursive git://git.code.sf.net/p/libwpg/code /tmp/src/libwpg
          git clone --depth 1 --recursive https://github.com/fosnola/libstaroffice /tmp/src/&&
          git clone --depth 1 --recursive git://git.code.sf.net/p/libwps/code /tmp/src/libwps
          git clone --depth 1 --recursive git://git.code.sf.net/p/libmwaw/libmwaw /tmp/src/libmwaw
          git clone --depth 1 --recursive git://git.code.sf.net/p/libebook/code /tmp/src/libe-book
          git clone --depth 1 --recursive git://gerrit.libreoffice.org/libabw /tmp/src/libabw
          git clone --depth 1 --recursive git://gerrit.libreoffice.org/libetonyek /tmp/src/libetonyek
          git clone --depth 1 --recursive git://gerrit.libreoffice.org/libqxp /tmp/src/libqxp

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          # Pattern: *.options — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/dlplibs" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.options', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done
          # Pattern: *.patch — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/dlplibs" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.patch', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Make /usr/local writable for install commands
          sudo chmod -R a+w /usr/local/lib /usr/local/include /usr/local/bin 2>/dev/null || true
          sudo mkdir -p /usr/local/lib/pkgconfig && sudo chmod a+w /usr/local/lib/pkgconfig 2>/dev/null || true
          cd /tmp/src
          export CXXFLAGS="$CXXFLAGS -Wno-register"
          tar -xJf /tmp/src/zlib-1.3.2.tar.xz
          pushd zlib-1.3.2
          ./configure --static
          make -j$(nproc)
          export ZLIB_CFLAGS="-I$(pwd)"
          export ZLIB_LIBS="-L$(pwd) -lz"
          popd
          tar -xzf /tmp/src/lcms2-2.18.tar.gz
          pushd lcms2-2.18
          ./configure --disable-shared --enable-static --without-jpeg --without-tiff
          make -C src -j$(nproc)
          export LCMS2_CFLAGS="-I$(pwd)/include"
          export LCMS2_LIBS="-L$(pwd)/src -llcms2"
          popd
          tar -xJf /tmp/src/libpng-1.6.56.tar.xz
          pushd libpng-1.6.56
          ./configure --disable-shared --enable-static CPPFLAGS="$ZLIB_CFLAGS" LDFLAGS="$ZLIB_LIBS"
          make -j$(nproc)
          export LIBPNG_CFLAGS="-I$(pwd)"
          export LIBPNG_LIBS="-L$(pwd) -lpng16"
          popd
          tar -xJf /tmp/src/libxml2-2.14.6.tar.xz
          pushd libxml2-2.14.6
          ./configure --disable-shared --enable-static --disable-ipv6 --without-python --without-zlib --without-lzma
          make -j$(nproc)
          export LIBXML_CFLAGS="-I$(pwd)/include"
          export LIBXML_LIBS="-L$(pwd) -lxml2"
          export XML_CFLAGS="$LIBXML_CFLAGS"
          export XML_LIBS="$LIBXML_LIBS"
          popd
          tar -xzf /tmp/src/icu4c-78.2-sources.tgz
          pushd icu/source
          ./configure --disable-shared --enable-static --with-data-packaging=static --disable-dyload --disable-strict \
              --disable-layout --disable-samples --disable-extras --disable-icuio --disable-plugins \
              CPPFLAGS=-DU_USE_STRTOD_L=0
          make -j$(nproc)
          export ICU_CFLAGS="-I$(pwd) -I$(pwd)/i18n -I$(pwd)/common"
          export ICU_LIBS="-L$(pwd)/lib -licui18n -licuuc -licudata"
          popd
          tar -xJf /tmp/src/mdds-3.1.0.tar.xz
          pushd mdds-3.1.0
          ./configure
          export MDDS_CFLAGS="-I$(pwd)/include"
          export MDDS_LIBS=' '
          popd
          pushd librevenge
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tests --enable-fuzzers
          make -j$(nproc)
          rvnginc=$(pwd)/inc
          rvnglib=$(pwd)/src/lib
          export REVENGE_CFLAGS="-I$(pwd)/inc"
          export REVENGE_LIBS="-L$(pwd)/src/lib -lrevenge-0.0"
          export REVENGE_STREAM_CFLAGS="-I$(pwd)/inc"
          export REVENGE_STREAM_LIBS="-L$(pwd)/src/lib -lrevenge-stream-0.0"
          export REVENGE_GENERATORS_CFLAGS="-I$(pwd)/inc"
          export REVENGE_GENERATORS_LIBS="-L$(pwd)/src/lib -lrevenge-generators-0.0"
          popd
          pushd libmspub
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers
          make -j$(nproc)
          popd
          pushd libcdr
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers --disable-tests
          make -j$(nproc)
          popd
          pushd libvisio
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers --disable-tests
          make -j$(nproc)
          popd
          pushd libzmf
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers --disable-tests
          make -j$(nproc)
          popd
          pushd libpagemaker
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers
          make -j$(nproc)
          popd
          pushd libfreehand
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers --disable-tests
          make -j$(nproc)
          popd
          pushd libwpd
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers
          make -j$(nproc)
          export WPD_CFLAGS=-I$(pwd)/inc
          export WPD_LIBS="-L$(pwd)/src/lib -lwpd-0.10"
          popd
          pushd libwpg
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers
          make -j$(nproc)
          popd
          pushd libstaroffice
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers
          make -j$(nproc)
          popd
          pushd libwps
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers
          make -j$(nproc)
          popd
          pushd libmwaw
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --disable-zip --enable-fuzzers
          make -C src/lib -j$(nproc)
          make -j2
          popd
          pushd libe-book
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static \
              --without-tools --enable-fuzzers --without-liblangtag --disable-tests
          make -j$(nproc)
          popd
          pushd libabw
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers
          make -j$(nproc)
          popd
          pushd libetonyek
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static \
              --without-tools --enable-fuzzers --with-mdds=0.x --without-liblangtag --disable-tests
          make -j$(nproc)
          popd
          pushd libqxp
          ./autogen.sh
          ./configure --without-docs --disable-werror --disable-shared --enable-static --disable-tools --enable-fuzzers --disable-tests
          make -j$(nproc)
          popd
          cp */src/fuzz/*fuzzer $GITHUB_WORKSPACE/build/fuzz-targets
          cp */src/fuzz/*.dict $GITHUB_WORKSPACE/build/fuzz-targets
          cp *_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets
          cp *.options $GITHUB_WORKSPACE/build/fuzz-targets

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
