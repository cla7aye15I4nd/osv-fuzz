name: "Fuzz native freetype2"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 15 * * 0"

env:
  PROJECT: freetype2
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Build latest freetype2 with AFL++ + ASan
        run: |
          set -euo pipefail

          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          SRC=/tmp/freetype2
          rm -rf "$SRC"
          git clone --depth 1 https://github.com/aseprite/freetype2 "$SRC"
          cd "$SRC"

          # git snapshot: regenerate configure, then build a static lib (no external deps)
          sh autogen.sh
          ./configure --enable-static --disable-shared \
            --without-zlib --without-bzip2 --without-png --without-harfbuzz --without-brotli
          make -j"$(nproc)"

          # locate the static archive (libtool places it under objs/.libs)
          FT_LIB="$(find "$SRC/objs" -name 'libfreetype.a' | head -1)"
          echo "[+] FreeType static lib: $FT_LIB"

          # ftfuzzer-style CLI driver: load face, query MM table, load every glyph
          cat > "$SRC/ft_driver.c" <<'EOF'
          #include <ft2build.h>
          #include FT_FREETYPE_H
          #include FT_MULTIPLE_MASTERS_H
          #include <stdio.h>
          #include <stdlib.h>

          int main(int argc, char** argv) {
            if (argc < 2) return 1;
            FILE* fp = fopen(argv[1], "rb");
            if (!fp) return 1;
            fseek(fp, 0, SEEK_END); long n = ftell(fp); fseek(fp, 0, SEEK_SET);
            unsigned char* buf = (unsigned char*)malloc(n ? n : 1);
            if (fread(buf, 1, n, fp) != (size_t)n) { /* ignore */ }
            fclose(fp);

            FT_Library lib;
            if (FT_Init_FreeType(&lib)) return 1;
            FT_Face face;
            if (FT_New_Memory_Face(lib, buf, n, 0, &face) == 0) {
              FT_MM_Var* mm = NULL;
              if (FT_Get_MM_Var(face, &mm) == 0 && mm) FT_Done_MM_Var(lib, mm);
              for (FT_Long i = 0; i < face->num_glyphs; i++)
                FT_Load_Glyph(face, (FT_UInt)i, FT_LOAD_DEFAULT);
              FT_Done_Face(face);
            }
            FT_Done_FreeType(lib);
            free(buf);
            return 0;
          }
          EOF

          # compile the driver with AFL++ instrumentation + ASan
          "$CC" $CFLAGS -I"$SRC/include" "$SRC/ft_driver.c" "$FT_LIB" -lm -o "$SRC/ft_driver"

          if [ ! -x "$SRC/ft_driver" ]; then
            echo "[!] Failed to build ft_driver"
            exit 1
          fi
          echo "[+] Built ASan+AFL driver: $SRC/ft_driver"

          # Record binary location for later steps
          echo "BINDIR=$SRC" >> "$GITHUB_ENV"
          echo "FT_DRIVER=$SRC/ft_driver" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run
          BIN="$FT_DRIVER"
          bname="$(basename "$BIN")"
          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0 \
              timeout 60 "$BIN" "$seed" > /dev/null 2> "results/dry_run/.stderr_tmp"
            exit_code=$?
            set -e
            if [ $exit_code -ne 0 ] && [ $exit_code -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv "results/dry_run/.stderr_tmp" "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f "results/dry_run/.stderr_tmp"
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          echo "[*] Fuzzing $FT_DRIVER for ${FUZZ_DURATION}s..."
          set +e
          afl-fuzz -i "seeds/$PROJECT" -o results/afl -m none -V "$FUZZ_DURATION" \
            -- "$FT_DRIVER" @@
          echo "[+] afl-fuzz exit: $?"
          set -e
        continue-on-error: true

      - name: Triage crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          BIN="$FT_DRIVER"
          bname="$(basename "$BIN")"
          crash_dir="results/afl/default/crashes"
          new_crashes=0
          if [ -d "$crash_dir" ]; then
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              case "$(basename "$crash_file")" in
                README.txt) continue ;;
              esac
              crash_name="$(basename "$crash_file" | tr ':,' '__')"
              result_file="results/fuzz/${bname}_${crash_name}.txt"
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 "$BIN" "$crash_file" > /dev/null 2> "$result_file"
              replay_exit=$?
              set -e
              if [ $replay_exit -ne 0 ] && [ $replay_exit -ne 124 ]; then
                echo "  [!] NEW CRASH: $bname $crash_name (exit=$replay_exit)"
                cp "$crash_file" "results/fuzz/${bname}_${crash_name}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          fi
          echo "[+] Triage complete: $new_crashes crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-freetype2
          path: results/pocs/
          retention-days: 90

