name: "Fuzz native harfbuzz"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: harfbuzz
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install HarfBuzz build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            meson \
            ninja-build \
            pkg-config \
            libglib2.0-dev \
            libfreetype6-dev \
            2>/dev/null || true
          meson --version || true
          ninja --version || true

      - name: Clone and build HarfBuzz (latest) with AFL++ + ASan
        run: |
          set -e
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/harfbuzz/harfbuzz.git /tmp/src/harfbuzz
          cd /tmp/src/harfbuzz
          # AFL++ instrumentation + AddressSanitizer.
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          # b_sanitize wires ASan into compile + link; b_lundef=false avoids
          # undefined-symbol link errors with the sanitizer runtime.
          # tests=enabled builds the standalone fuzzers (test/fuzzing/*-fuzzer,
          # which read a font file passed as argv). utilities=true builds hb-shape.
          meson setup build \
            -Db_sanitize=address \
            -Db_lundef=false \
            -Dtests=enabled \
            -Dutilities=enabled \
            --buildtype=debug
          ninja -C build
          # Record the target binary path for later steps.
          BINDIR="$PWD/build"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "TARGET_BIN=$BINDIR/test/fuzzing/hb-shape-fuzzer" >> "$GITHUB_ENV"
          echo "[+] Built target:"
          ls -la "$BINDIR/test/fuzzing/hb-shape-fuzzer"
          if [ ! -x "$BINDIR/test/fuzzing/hb-shape-fuzzer" ]; then
            echo "[!] hb-shape-fuzzer not built — build failed"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          mkdir -p results/dry_run
          bin="$TARGET_BIN"
          bname="hb-shape-fuzzer"
          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 30 "$bin" "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set +e
          mkdir -p results/afl
          AFL_SKIP_CPUFREQ=1 \
          AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 \
          AFL_NO_UI=1 \
            afl-fuzz -i "seeds/$PROJECT" -o results/afl -m none \
            -V "$FUZZ_DURATION" \
            -- "$TARGET_BIN" @@
          echo "[+] afl-fuzz exited with code $? (continuing)"
          exit 0
        continue-on-error: true

      - name: Triage crashes
        run: |
          mkdir -p results/fuzz
          bin="$TARGET_BIN"
          bname="hb-shape-fuzzer"
          crash_dir="results/afl/default/crashes"
          if [ ! -d "$crash_dir" ]; then
            echo "[+] No crashes directory — nothing to triage"
            exit 0
          fi
          new_crashes=0
          for crash_file in "$crash_dir"/*; do
            [ -f "$crash_file" ] || continue
            cbase=$(basename "$crash_file")
            [ "$cbase" = "README.txt" ] && continue
            crash_id=$(echo "$cbase" | tr ':,' '__')
            result_file="results/fuzz/${bname}_${crash_id}.txt"
            echo "[*] Triaging $cbase..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 30 "$bin" "$crash_file" > /dev/null 2> "$result_file"
            replay_exit=$?
            set -e
            if [ "$replay_exit" -ne 0 ] && [ "$replay_exit" -ne 124 ]; then
              echo "  [!] NEW CRASH: $bname ($cbase)"
              cp "$crash_file" "results/fuzz/${bname}_${crash_id}.bin"
              new_crashes=$((new_crashes + 1))
            else
              rm -f "$result_file"
            fi
          done
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-harfbuzz
          path: results/
          retention-days: 30

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-harfbuzz
          path: results/pocs/
          retention-days: 90
