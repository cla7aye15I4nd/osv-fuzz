name: "Fuzz native harfbuzz"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: harfbuzz
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install HarfBuzz build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            meson \
            ninja-build \
            pkg-config \
            libglib2.0-dev \
            libfreetype6-dev \
            libcairo2-dev \
            2>/dev/null || true
          meson --version || true
          ninja --version || true

      - name: Clone and build HarfBuzz (latest) with AFL++ + ASan
        run: |
          set -e
          mkdir -p /tmp/src
          rm -rf /tmp/src/harfbuzz
          # Robust clone: 3x retry, recurse submodules.
          n=0
          until [ "$n" -ge 3 ]; do
            git clone --depth 1 --recurse-submodules \
              https://github.com/harfbuzz/harfbuzz.git /tmp/src/harfbuzz && break
            n=$((n + 1))
            echo "[!] clone failed (attempt $n) — retrying..."
            rm -rf /tmp/src/harfbuzz
            sleep 5
          done
          if [ ! -d /tmp/src/harfbuzz ]; then
            echo "[!] Unable to clone HarfBuzz after 3 attempts"
            exit 1
          fi
          cd /tmp/src/harfbuzz
          git submodule update --init --recursive || true

          # AFL++ instrumentation + AddressSanitizer.
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          # meson feature options take enabled/disabled (NOT true/false).
          # b_sanitize wires ASan into compile + link; b_lundef=false avoids
          # undefined-symbol link errors with the sanitizer runtime.
          # tests=enabled builds the standalone fuzzers (test/fuzzing/*-fuzzer,
          # which read a font file passed as argv). utilities=enabled builds hb-shape.
          meson setup build \
            -Db_sanitize=address \
            -Db_lundef=false \
            -Dtests=enabled \
            -Dutilities=enabled \
            --buildtype=debug
          ninja -C build

          BINDIR="$PWD/build"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Build complete. Contents of $BINDIR/test/fuzzing:"
          ls -la "$BINDIR/test/fuzzing" 2>/dev/null || true
          ls -la "$BINDIR/util" 2>/dev/null || true

          # ---- Enumerate every file-input CLI tool into a target manifest ----
          # Format per line:  NAME|BINARY|ARG_TEMPLATE   (@@ marks the input file)
          MANIFEST=/tmp/harfbuzz-targets.tsv
          : > "$MANIFEST"

          # Standalone libFuzzer-style drivers: each reads a font file from argv.
          for f in "$BINDIR"/test/fuzzing/*-fuzzer; do
            [ -x "$f" ] || continue
            name=$(basename "$f")
            echo "${name}|${f}|@@" >> "$MANIFEST"
          done

          # hb-shape CLI shaper: takes FONT TEXT (font is the fuzzed file input).
          if [ -x "$BINDIR/util/hb-shape" ]; then
            echo "hb-shape|$BINDIR/util/hb-shape|@@ ABC" >> "$MANIFEST"
          fi

          if [ ! -s "$MANIFEST" ]; then
            echo "[!] No fuzzable CLI tools were built — build failed"
            exit 1
          fi
          echo "MANIFEST=$MANIFEST" >> "$GITHUB_ENV"
          echo "[+] Target manifest:"
          cat "$MANIFEST"

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          crash_count=0
          total=0
          while IFS='|' read -r name bin args; do
            [ -n "$name" ] || continue
            [ -x "$bin" ] || continue
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname=$(basename "$seed" .bin)
              # Substitute @@ with the current seed in the arg template.
              read -r -a argarr <<< "$args"
              runargs=("${argarr[@]/@@/$seed}")
              total=$((total + 1))
              echo "[*] Replaying $name with $sname..."
              rc=0
              timeout 30 "$bin" "${runargs[@]}" > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $name with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${name}_${sname}.txt"
                cp "$seed" "results/dry_run/${name}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done < "$MANIFEST"
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          # Count fuzzable targets to split the budget (min 60s each).
          num_targets=$(grep -c . "$MANIFEST")
          [ "$num_targets" -ge 1 ] || num_targets=1
          per=$(( FUZZ_DURATION / num_targets ))
          [ "$per" -lt 60 ] && per=60
          echo "[+] $num_targets target(s), ${per}s each"

          first_seed=$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)

          while IFS='|' read -r name bin args; do
            [ -n "$name" ] || continue
            [ -x "$bin" ] || continue
            read -r -a argarr <<< "$args"

            # Startup sanity check via afl-showmap; skip tools that abort.
            if [ -n "$first_seed" ]; then
              checkargs=("${argarr[@]/@@/$first_seed}")
              showout=$(AFL_SKIP_CPUFREQ=1 afl-showmap -o /dev/null -m none -t 5000 \
                -- "$bin" "${checkargs[@]}" 2>&1)
              if echo "$showout" | grep -q "PROGRAM ABORT"; then
                echo "[!] Skipping $name — afl-showmap startup failed:"
                echo "$showout" | tail -5
                continue
              fi
            fi

            echo "[*] Fuzzing $name for ${per}s..."
            afl-fuzz -i "seeds/$PROJECT" -o "results/afl/$name" -m none -V "$per" \
              -- "$bin" "${argarr[@]}" || true
          done < "$MANIFEST"
          echo "[+] Multi-target fuzzing complete"
        continue-on-error: true

      - name: Triage crashes
        run: |
          set +e
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          shopt -s nullglob
          new_crashes=0
          while IFS='|' read -r name bin args; do
            [ -n "$name" ] || continue
            [ -x "$bin" ] || continue
            read -r -a argarr <<< "$args"
            crash_dir="results/afl/$name/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cbase=$(basename "$crash")
              [ "$cbase" = "README.txt" ] && continue
              crash_id=$(echo "$cbase" | tr ':,' '__')
              result_file="results/fuzz/${name}_${crash_id}.txt"
              runargs=("${argarr[@]/@@/$crash}")
              echo "[*] Triaging $name / $cbase..."
              rc=0
              timeout 30 "$bin" "${runargs[@]}" > /dev/null 2> "$result_file" || rc=$?
              cp "$crash" "results/fuzz/${name}_${crash_id}.bin"
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] Reproduced crash: $name ($cbase, exit=$rc)"
                new_crashes=$((new_crashes + 1))
              fi
            done
          done < "$MANIFEST"
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Sanitize result filenames for upload
        if: always()
        run: |
          # actions/upload-artifact@v4 rejects paths containing ':' (AFL names
          # crashes like id:000000,time:...). Rename ':' -> '_' depth-first.
          [ -d results ] || exit 0
          find results -depth -name '*:*' | while read -r p; do
            d=$(dirname "$p")
            b=$(basename "$p")
            nb=${b//:/_}
            [ "$b" = "$nb" ] && continue
            mv "$p" "$d/$nb"
          done
          echo "[+] Filename sanitation complete"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-harfbuzz
          path: results/
          retention-days: 30

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-harfbuzz
          path: results/pocs/
          retention-days: 90
