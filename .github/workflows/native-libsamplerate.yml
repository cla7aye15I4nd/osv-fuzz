name: "Fuzz native libsamplerate"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libsamplerate
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/${PROJECT}/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/${PROJECT}/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install libsamplerate build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libsndfile1-dev \
            libfftw3-dev \
            2>/dev/null || true

      - name: Clone LATEST upstream source and build with AFL++ + ASan
        run: |
          set -euo pipefail
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/libsndfile/libsamplerate.git /tmp/src/libsamplerate
          cd /tmp/src/libsamplerate

          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          # libsamplerate uses autotools; fall back to autoreconf if autogen is absent.
          if [ -x ./autogen.sh ]; then
            ./autogen.sh
          else
            autoreconf -vif
          fi
          ./configure --enable-static --disable-shared
          make -j"$(nproc)"

          # Record the CLI target path. On latest master the sndfile-resample
          # example may have been removed; locate whatever was built.
          BIN=""
          for cand in \
            "$(pwd)/examples/sndfile-resample" \
            "$(pwd)/src/sndfile-resample" ; do
            if [ -x "$cand" ]; then BIN="$cand"; break; fi
          done
          if [ -z "$BIN" ]; then
            BIN=$(find "$(pwd)" -type f -name 'sndfile-resample' -perm -u+x 2>/dev/null | head -1 || true)
          fi
          if [ -z "$BIN" ]; then
            echo "[!] sndfile-resample CLI was not built on latest master."
            echo "[!] Available example binaries:"
            find "$(pwd)/examples" -type f -perm -u+x 2>/dev/null || true
            # Still export empty so later steps can guard/no-op gracefully.
          fi
          echo "[+] Target binary: ${BIN:-<none>}"
          echo "TARGET_BIN=${BIN}" >> "$GITHUB_ENV"
          echo "BINDIR=$(dirname "${BIN:-/tmp/src/libsamplerate/examples/x}")" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run
          BIN="${TARGET_BIN:-}"
          if [ -z "$BIN" ] || [ ! -x "$BIN" ]; then
            echo "[!] No target binary — skipping dry-run replay."
            exit 0
          fi
          bname=$(basename "$BIN")
          crash_count=0
          total=0
          for seed in "seeds/${PROJECT}"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            [ -f "$result_file" ] && continue
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$BIN" -to 24000 -c 1 "$seed" "results/dry_run/.out_${sname}" \
              > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            rm -f "results/dry_run/.out_${sname}"
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          BIN="${TARGET_BIN:-}"
          if [ -z "$BIN" ] || [ ! -x "$BIN" ]; then
            echo "[!] No target binary — skipping fuzzing."
            exit 0
          fi
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"
          # @@ is the AFL-provided input file; "out" is the CLI's output path.
          afl-fuzz -i "seeds/${PROJECT}" -o results/afl -V "$FUZZ_DURATION" -- \
            "$BIN" -to 24000 -c 1 @@ results/afl/.resample_out || true

      - name: Triage AFL crashes under ASan
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          BIN="${TARGET_BIN:-}"
          if [ -z "$BIN" ] || [ ! -x "$BIN" ]; then
            echo "[!] No target binary — skipping triage."
            exit 0
          fi
          bname=$(basename "$BIN")
          crashes_dir="results/afl/default/crashes"
          if [ ! -d "$crashes_dir" ]; then
            echo "[+] No crashes directory produced."
            exit 0
          fi
          count=0
          for crash in "$crashes_dir"/*; do
            [ -f "$crash" ] || continue
            cname=$(basename "$crash")
            [ "$cname" = "README.txt" ] && continue
            result_file="results/fuzz/${bname}_${cname}.txt"
            echo "[*] Triaging $cname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$BIN" -to 24000 -c 1 "$crash" "results/fuzz/.out_${cname}" \
              > /dev/null 2> "$result_file"
            set -e
            rm -f "results/fuzz/.out_${cname}"
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
            count=$((count + 1))
          done
          echo "[+] Triaged $count crash inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libsamplerate
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libsamplerate
          path: results/
          retention-days: 30
