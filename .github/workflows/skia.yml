name: "Fuzz skia"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"

env:
  PROJECT: skia
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            /dev/null \
            > \
            cmake \
            libglu1-mesa-dev \
            libxcb-shm0-dev \
            libxext-dev \
            zlib1g-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 'https://chromium.googlesource.com/chromium/tools/depot_tools.git' /tmp/src/--depth
          git clone --depth 1 https://skia.googlesource.com/skia.git /tmp/src/--depth

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          cd /tmp/src/skia
          DISABLE="-Wno-zero-as-null-pointer-constant -Wno-unused-template
                   -Wno-cast-qual"
          export CFLAGS="$CFLAGS $DISABLE \
           -fno-sanitize=vptr -DSK_BUILD_FOR_LIBFUZZER -DSK_BUILD_FOR_FUZZER"
          export CXXFLAGS="$CXXFLAGS $DISABLE \
           -fno-sanitize=vptr -DSK_BUILD_FOR_LIBFUZZER -D SK_BUILD_FOR_FUZZER"
          export LDFLAGS="$LIB_FUZZING_ENGINE $CXXFLAGS -fuse-ld=lld"
          export CFLAGS_ARR=`echo $CFLAGS | sed -e "s/\s/\",\"/g"`
          export CXXFLAGS_ARR=`echo $CXXFLAGS | sed -e "s/\s/\",\"/g"`
          export LDFLAGS_ARR=`echo $LDFLAGS | sed -e "s/\s/\",\"/g"`
          LIMITED_LINK_POOL="link_pool_depth=1"
          SKIA_ARGS="skia_build_fuzzers=true
                     skia_enable_fontmgr_custom_directory=false
                     skia_enable_fontmgr_custom_embedded=false
                     skia_enable_fontmgr_custom_empty=true
                     skia_enable_ganesh=true
                     skia_enable_graphite=true
                     skia_enable_skottie=true
                     skia_enable_precompile=true
                     skia_use_vulkan=false
                     skia_use_egl=false
                     skia_use_gl=false
                     skia_use_fontconfig=false
                     skia_use_freetype=true
                     skia_use_system_freetype2=false
                     skia_use_wuffs=true
                     skia_provide_default_fuzz_engine=false"
          /tmp/src/skia/bin/gn gen out/Fuzz\
              --args='cc="'$CC'"
                cxx="'$CXX'"
                '"$LIMITED_LINK_POOL"'
                '"${SKIA_ARGS[*]}"'
                is_debug=false
                extra_cflags_c=["'"$CFLAGS_ARR"'"]
                extra_cflags_cc=["'"$CXXFLAGS_ARR"'"]
                extra_ldflags=["'"$LDFLAGS_ARR"'"]'
          /tmp/src/skia/third_party/ninja/ninja -C out/Fuzz \
            animated_image_decode \
            api_create_ddl \
            api_ddl_threading \
            api_draw_functions \
            api_gradients \
            api_image_filter \
            api_mock_gpu_canvas \
            api_null_canvas \
            api_path_measure \
            api_pathop \
            api_polyutils \
            api_precompile \
            api_raster_n32_canvas \
            api_regionop \
            api_skparagraph \
            api_svg_canvas \
            api_triangulation \
            colrv1 \
            image_decode \
            image_decode_incremental \
            image_filter_deserialize \
            jpeg_encoder \
            path_deserialize \
            png_encoder \
            region_set_path \
            skdescriptor_deserialize \
            skjson \
            skottie_json \
            skp \
            svg_dom \
            textblob_deserialize \
            webp_encoder
          /tmp/src/skia/bin/gn gen out/FuzzDebug\
              --args='cc="'$CC'"
                cxx="'$CXX'"
                '"$LIMITED_LINK_POOL"'
                '"${SKIA_ARGS[*]}"'
                is_debug=false
                extra_cflags_c=["-DSK_DEBUG","'"$CFLAGS_ARR"'"]
                extra_cflags_cc=["-DSK_DEBUG","'"$CXXFLAGS_ARR"'"]
                extra_ldflags=["'"$LDFLAGS_ARR"'"]'
          /tmp/src/skia/third_party/ninja/ninja -C out/FuzzDebug \
            api_grshape \
            cubic_roots \
            hdr_agtm \
            parse_path \
            quad_roots \
            region_deserialize \
            skmeshspecification \
            skruntimeblender \
            skruntimecolorfilter \
            skruntimeeffect \
            sksl2glsl \
            sksl2metal \
            sksl2pipeline \
            sksl2spirv \
            sksl2wgsl \
            skcolorspace
          rm -rf $GITHUB_WORKSPACE/build/fuzz-targets/data
          mkdir $GITHUB_WORKSPACE/build/fuzz-targets/data
          mv out/FuzzDebug/region_deserialize $GITHUB_WORKSPACE/build/fuzz-targets/region_deserialize
          mv ../skia_data/skregion_deserialize_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/region_deserialize_seed_corpus.zip
          mv out/Fuzz/region_set_path $GITHUB_WORKSPACE/build/fuzz-targets/region_set_path
          mv ../skia_data/region_set_path_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/region_set_path_seed_corpus.zip
          mv out/Fuzz/textblob_deserialize $GITHUB_WORKSPACE/build/fuzz-targets/textblob_deserialize
          mv ../skia_data/textblob_deserialize_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/textblob_deserialize_seed_corpus.zip
          mv out/Fuzz/path_deserialize $GITHUB_WORKSPACE/build/fuzz-targets/path_deserialize
          mv ../skia_data/path_deserialize_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/path_deserialize_seed_corpus.zip
          mv out/Fuzz/animated_image_decode $GITHUB_WORKSPACE/build/fuzz-targets/animated_image_decode
          mv ../skia_data/animated_image_decode_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/animated_image_decode_seed_corpus.zip
          if [ "$FUZZING_ENGINE" == "libfuzzer" ]
          then
            cp out/Fuzz/image_filter_deserialize $GITHUB_WORKSPACE/build/fuzz-targets/image_filter_deserialize_width
            mv ../skia_data/image_filter_deserialize_width.options $GITHUB_WORKSPACE/build/fuzz-targets/image_filter_deserialize_width.options
            cp ../skia_data/image_filter_deserialize_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/image_filter_deserialize_width_seed_corpus.zip
          fi
          mv out/Fuzz/image_filter_deserialize $GITHUB_WORKSPACE/build/fuzz-targets/image_filter_deserialize
          mv ../skia_data/image_filter_deserialize_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/image_filter_deserialize_seed_corpus.zip
          mv out/Fuzz/api_draw_functions $GITHUB_WORKSPACE/build/fuzz-targets/api_draw_functions
          mv ../skia_data/api_draw_functions_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_draw_functions_seed_corpus.zip
          mv out/Fuzz/api_gradients $GITHUB_WORKSPACE/build/fuzz-targets/api_gradients
          mv ../skia_data/api_gradients_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_gradients_seed_corpus.zip
          mv out/Fuzz/api_path_measure $GITHUB_WORKSPACE/build/fuzz-targets/api_path_measure
          mv ../skia_data/api_path_measure_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_path_measure_seed_corpus.zip
          mv out/Fuzz/api_pathop $GITHUB_WORKSPACE/build/fuzz-targets/api_pathop
          mv ../skia_data/api_pathop_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_pathop_seed_corpus.zip
          mv out/Fuzz/png_encoder $GITHUB_WORKSPACE/build/fuzz-targets/png_encoder
          cp ../skia_data/encoder_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/png_encoder_seed_corpus.zip
          mv out/Fuzz/jpeg_encoder $GITHUB_WORKSPACE/build/fuzz-targets/jpeg_encoder
          cp ../skia_data/encoder_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/jpeg_encoder_seed_corpus.zip
          mv out/Fuzz/webp_encoder $GITHUB_WORKSPACE/build/fuzz-targets/webp_encoder
          mv ../skia_data/encoder_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/webp_encoder_seed_corpus.zip
          mv out/Fuzz/skottie_json $GITHUB_WORKSPACE/build/fuzz-targets/skottie_json
          mv ../skia_data/skottie_json_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/skottie_json_seed_corpus.zip
          mv out/Fuzz/skjson $GITHUB_WORKSPACE/build/fuzz-targets/skjson
          mv ../skia_data/json.dict $GITHUB_WORKSPACE/build/fuzz-targets/skjson.dict
          mv ../skia_data/skjson_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/skjson_seed_corpus.zip
          mv out/Fuzz/api_mock_gpu_canvas $GITHUB_WORKSPACE/build/fuzz-targets/api_mock_gpu_canvas
          cp ../skia_data/canvas_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_mock_gpu_canvas_seed_corpus.zip
          mv out/Fuzz/api_raster_n32_canvas $GITHUB_WORKSPACE/build/fuzz-targets/api_raster_n32_canvas
          cp ../skia_data/canvas_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_raster_n32_canvas_seed_corpus.zip
          mv out/Fuzz/api_svg_canvas $GITHUB_WORKSPACE/build/fuzz-targets/api_svg_canvas
          cp ../skia_data/canvas_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_svg_canvas_seed_corpus.zip
          mv out/Fuzz/api_null_canvas $GITHUB_WORKSPACE/build/fuzz-targets/api_null_canvas
          mv ../skia_data/canvas_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_null_canvas_seed_corpus.zip
          mv out/Fuzz/api_image_filter $GITHUB_WORKSPACE/build/fuzz-targets/api_image_filter
          mv ../skia_data/api_image_filter_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_image_filter_seed_corpus.zip
          mv out/Fuzz/api_polyutils $GITHUB_WORKSPACE/build/fuzz-targets/api_polyutils
          mv ../skia_data/api_polyutils_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/api_polyutils_seed_corpus.zip
          mv out/Fuzz/image_decode $GITHUB_WORKSPACE/build/fuzz-targets/image_decode
          cp ../skia_data/image_decode_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/image_decode_seed_corpus.zip
          mv out/Fuzz/image_decode_incremental $GITHUB_WORKSPACE/build/fuzz-targets/image_decode_incremental
          mv ../skia_data/image_decode_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/image_decode_incremental_seed_corpus.zip
          mv out/FuzzDebug/skmeshspecification $GITHUB_WORKSPACE/build/fuzz-targets/skmeshspecification
          cp ../skia_data/sksl.dict $GITHUB_WORKSPACE/build/fuzz-targets/skmeshspecification.dict
          mv ../skia_data/skmeshspecification_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/skmeshspecification_seed_corpus.zip
          mv out/FuzzDebug/sksl2glsl $GITHUB_WORKSPACE/build/fuzz-targets/sksl2glsl
          cp ../skia_data/sksl.dict $GITHUB_WORKSPACE/build/fuzz-targets/sksl2glsl.dict
          cp ../skia_data/sksl_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/sksl2glsl_seed_corpus.zip
          mv out/FuzzDebug/sksl2metal $GITHUB_WORKSPACE/build/fuzz-targets/sksl2metal
          cp ../skia_data/sksl.dict $GITHUB_WORKSPACE/build/fuzz-targets/sksl2metal.dict
          cp ../skia_data/sksl_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/sksl2metal_seed_corpus.zip
          mv out/FuzzDebug/sksl2pipeline $GITHUB_WORKSPACE/build/fuzz-targets/sksl2pipeline
          cp ../skia_data/sksl.dict $GITHUB_WORKSPACE/build/fuzz-targets/sksl2pipeline.dict
          cp ../skia_data/sksl_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/sksl2pipeline_seed_corpus.zip
          mv out/FuzzDebug/sksl2spirv $GITHUB_WORKSPACE/build/fuzz-targets/sksl2spirv
          cp ../skia_data/sksl.dict $GITHUB_WORKSPACE/build/fuzz-targets/sksl2spirv.dict
          cp ../skia_data/sksl_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/sksl2spirv_seed_corpus.zip
          mv out/FuzzDebug/sksl2wgsl $GITHUB_WORKSPACE/build/fuzz-targets/sksl2wgsl
          cp ../skia_data/sksl.dict $GITHUB_WORKSPACE/build/fuzz-targets/sksl2wgsl.dict
          cp ../skia_data/sksl_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/sksl2wgsl_seed_corpus.zip
          mv out/FuzzDebug/skruntimeblender $GITHUB_WORKSPACE/build/fuzz-targets/skruntimeblender
          cp ../skia_data/sksl.dict $GITHUB_WORKSPACE/build/fuzz-targets/skruntimeblender.dict
          cp ../skia_data/sksl_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/skruntimeblender_seed_corpus.zip
          mv out/FuzzDebug/skruntimecolorfilter $GITHUB_WORKSPACE/build/fuzz-targets/skruntimecolorfilter
          cp ../skia_data/sksl.dict $GITHUB_WORKSPACE/build/fuzz-targets/skruntimecolorfilter.dict
          cp ../skia_data/sksl_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/skruntimecolorfilter_seed_corpus.zip
          mv out/FuzzDebug/skruntimeeffect $GITHUB_WORKSPACE/build/fuzz-targets/skruntimeeffect
          mv ../skia_data/sksl.dict $GITHUB_WORKSPACE/build/fuzz-targets/skruntimeeffect.dict
          mv ../skia_data/sksl_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/skruntimeeffect_seed_corpus.zip
          mv out/FuzzDebug/skcolorspace $GITHUB_WORKSPACE/build/fuzz-targets/skcolorspace
          mv ../skia_data/skcolorspace_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/skcolorspace_seed_corpus.zip
          mv out/FuzzDebug/parse_path $GITHUB_WORKSPACE/build/fuzz-targets/parse_path
          mv ../skia_data/parse_path_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/parse_path_seed_corpus.zip
          mv out/FuzzDebug/quad_roots $GITHUB_WORKSPACE/build/fuzz-targets/quad_roots
          mv out/FuzzDebug/cubic_roots $GITHUB_WORKSPACE/build/fuzz-targets/cubic_roots
          mv out/FuzzDebug/api_grshape $GITHUB_WORKSPACE/build/fuzz-targets/api_grshape
          mv out/FuzzDebug/hdr_agtm $GITHUB_WORKSPACE/build/fuzz-targets/hdr_agtm
          mv out/Fuzz/skdescriptor_deserialize $GITHUB_WORKSPACE/build/fuzz-targets/skdescriptor_deserialize
          mv ../skia_data/skdescriptor_deserialize_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/skdescriptor_deserialize_seed_corpus.zip
          mv out/Fuzz/svg_dom $GITHUB_WORKSPACE/build/fuzz-targets/svg_dom
          mv ../skia_data/svg_dom_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/svg_dom_seed_corpus.zip
          mv out/Fuzz/api_create_ddl $GITHUB_WORKSPACE/build/fuzz-targets/api_create_ddl
          mv out/Fuzz/api_ddl_threading $GITHUB_WORKSPACE/build/fuzz-targets/api_ddl_threading
          mv out/Fuzz/skp $GITHUB_WORKSPACE/build/fuzz-targets/skp
          mv ../skia_data/skp_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/skp_seed_corpus.zip
          mv out/Fuzz/api_skparagraph $GITHUB_WORKSPACE/build/fuzz-targets/api_skparagraph
          mv out/Fuzz/api_precompile $GITHUB_WORKSPACE/build/fuzz-targets/api_precompile
          mv out/Fuzz/api_regionop $GITHUB_WORKSPACE/build/fuzz-targets/api_regionop
          mv out/Fuzz/api_triangulation $GITHUB_WORKSPACE/build/fuzz-targets/api_triangulation
          mv out/Fuzz/colrv1 $GITHUB_WORKSPACE/build/fuzz-targets/colrv1
          mv ../skia_data/colrv1_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/colrv1_seed_corpus.zip

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
