name: "Fuzz fluent-bit"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 17 * * 0"

env:
  PROJECT: fluent-bit
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            bison \
            cmake \
            flex \
            libssl-dev \
            libyaml-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/fluent/fluent-bit/ /tmp/src/fluent-bit
          git clone --depth 1 --recursive https://github.com/fluent/ctraces /tmp/src/ctraces

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address -O1"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address -O1"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src
          set +e
          find /usr/ -name "libyaml*.so" -exec rm {} \;
          find /usr/ -name "libyaml-0*" -exec rm {} \;
          export FUZZ_INTROSPECTOR_CONFIG=/tmp/src/fuzz_introspector_exclusion.config
          cat > $FUZZ_INTROSPECTOR_CONFIG <<EOF
          FILES_TO_AVOID
          fluent-bit/lib
          EOF
          cd fluent-bit
          if [ $(grep "fuzz" -ic ./lib/msgpack-c/src/zone.c) -eq 0 ]
          then
            sed -i 's/malloc(/fuzz_malloc(/g' ./lib/msgpack-c/src/zone.c
            sed -i 's/struct msgpack_zone_chunk {/void *fuzz_malloc(size_t size) {if (size > 0xa00000) return NULL;\nreturn malloc(size);}\nstruct msgpack_zone_chunk {/g' ./lib/msgpack-c/src/zone.c
          fi
          rm -rf ./build
          mkdir build
          cd build
          export CFLAGS="$CFLAGS -fcommon -DFLB_TESTS_OSSFUZZ=ON"
          export CXXFLAGS="$CXXFLAGS -fcommon -DFLB_TESTS_OSSFUZZ=ON"
          INPUT_PLUGINS="-DFLB_IN_COLLECTD=OFF \
            -DFLB_IN_CPU=OFF     \
            -DFLB_IN_DISK=OFF    \
            -DFLB_IN_DOCKER=OFF  \
            -DFLB_IN_EXEC=OFF    \
            -DFLB_IN_FORWARD=OFF \
            -DFLB_IN_HEAD=OFF    \
            -DFLB_IN_HEALTH=OFF  \
            -DFLB_IN_KMSG=OFF    \
            -DFLB_IN_MEM=OFF     \
            -DFLB_IN_MQTT=OFF    \
            -DFLB_IN_NETIF=OFF   \
            -DFLB_IN_PROC=OFF    \
            -DFLB_IN_RANDOM=OFF  \
            -DFLB_IN_SERIAL=OFF  \
            -DFLB_IN_STDIN=OFF   \
            -DFLB_IN_SYSLOG=OFF  \
            -DFLB_IN_SYSTEMD=OFF \
            -DFLB_IN_TAIL=OFF    \
            -DFLB_IN_TCP=OFF     \
            -DFLB_IN_THERMAL=OFF \
            -DFLB_IN_WINLOG=OFF"
          OUTPUT_PLUGINS="-DFLB_OUT_AZURE=OFF  \
            -DFLB_OUT_BIGQUERY=OFF      \
            -DFLB_OUT_COUNTER=OFF       \
            -DFLB_OUT_DATADOG=OFF       \
            -DFLB_OUT_ES=OFF            \
            -DFLB_OUT_FILE=OFF          \
            -DFLB_OUT_FLOWCOUNTER=OFF   \
            -DFLB_OUT_FORWARD=OFF       \
            -DFLB_OUT_GELF=OFF          \
            -DFLB_OUT_HTTP=ON           \
            -DFLB_OUT_INFLUXDB=OFF      \
            -DFLB_OUT_KAFKA=OFF         \
            -DFLB_OUT_KAFKA_REST=OFF    \
            -DFLB_OUT_LOKI=OFF          \
            -DFLB_OUT_NATS=OFF          \
            -DFLB_OUT_NRLOGS=OFF        \
            -DFLB_OUT_NULL=OFF          \
            -DFLB_OUT_PGSQL=OFF         \
            -DFLB_OUT_PLOT=OFF          \
            -DFLB_OUT_SLACK=OFF         \
            -DFLB_OUT_SPLUNK=OFF        \
            -DFLB_OUT_STACKDRIVER=OFF   \
            -DFLB_OUT_STDOUT=ON         \
            -DFLB_OUT_SYSLOG=OFF        \
            -DFLB_OUT_TCP=OFF"
          MISC_PLUGINS="-DFLB_LUAJIT=OFF \
            -DFLB_STREAM_PROCESSOR=OFF"
          FILTER_PLUGINS="-DFLB_FILTER_ALTER_SIZE=ON  \
            -DFLB_FILTER_AWS=ON              \
            -DFLB_FILTER_GREP=ON             \
            -DFLB_FILTER_KUBERNETES=ON       \
            -DFLB_FILTER_MODIFY=ON           \
            -DFLB_FILTER_NEST=ON             \
            -DFLB_FILTER_PARSER=ON           \
            -DFLB_FILTER_RECORD_MODIFIER=ON  \
            -DFLB_FILTER_REWRITE_TAG=ON      \
            -DFLB_FILTER_THROTTLE=ON"
          EXTRA_FLAGS="-DFLB_BINARY=OFF \
            -DFLB_EXAMPLES=OFF \
            -DFLB_METRICS=ON   \
            -DFLB_DEBUG=ON     \
            -DMBEDTLS_FATAL_WARNINGS=OFF \
            -DFLB_CONFIG_YAML=ON"
          cmake -DFLB_TESTS_INTERNAL=ON \
                -DFLB_TESTS_INTERNAL_FUZZ=ON \
                -DFLB_TESTS_OSSFUZZ=ON \
                -DFLB_UNICODE_ENCODER=OFF \
                ${EXTRA_FLAGS} \
                ${INPUT_PLUGINS} \
                ${FILTER_PLUGINS} \
                ${MISC_PLUGINS} \
                ${OUTPUT_PLUGINS} \
                ..
          if [[ "$SANITIZER" == introspector ]]; then
            make
          else
            make -j$(nproc)
          fi
          cp /tmp/src/fluent-bit/build/bin/*OSSFUZZ $GITHUB_WORKSPACE/build/fuzz-targets/
          mkdir -p /tmp/src/config_yaml_seeds
          cd /tmp/src/config_yaml_seeds
          find /tmp/src/fluent-bit/tests/internal/data/config_format/yaml -name "*.yaml" -exec cp {} . \;
          zip -rj $GITHUB_WORKSPACE/build/fuzz-targets/flb-it-fuzz-config_yaml_fuzzer_OSSFUZZ_seed_corpus.zip /tmp/src/config_yaml_seeds/*
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
