name: "Fuzz cairo"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 17 * * 0"

env:
  PROJECT: cairo
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autotools-dev \
            gperf \
            gtk-doc-tools \
            libffi-dev \
            libtool \
            ninja-build
          pip3 install meson

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive git://git.sv.nongnu.org/freetype/freetype2.git /tmp/src/freetype2
          git clone --depth 1 --recursive https://gitlab.gnome.org/GNOME/glib /tmp/src/glib
          git clone --depth 1 --recursive https://gitlab.freedesktop.org/cairo/cairo.git /tmp/src/cairo

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sL -o /tmp/src/targets "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/cairo/targets"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/cairo
          set +e
          PREFIX=/tmp/work/prefix
          mkdir -p $PREFIX
          export PKG_CONFIG="`which pkg-config` --static"
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
          export PATH=$PREFIX/bin:$PATH
          BUILD=/tmp/work/build
          rm -rf /tmp/work/*
          rm -rf $BUILD
          mkdir -p $BUILD $PREFIX
          pushd /tmp/src/glib/
          meson \
              setup \
              --prefix=$PREFIX \
              --libdir=lib \
              --default-library=static \
              -Db_lundef=false \
              -Doss_fuzz=enabled \
              -Dlibmount=disabled \
              _builddir
          ninja -C _builddir
          ninja -C _builddir install
          popd
          pushd /tmp/src/freetype2
          ./autogen.sh
          ./configure --prefix="$PREFIX" --disable-shared PKG_CONFIG_PATH="$PKG_CONFIG_PATH"
          make -j$(nproc)
          make install
          pushd /tmp/src/cairo
          CFLAGS="-DDEBUG_SVG_RENDER $CFLAGS" meson \
              setup \
              --prefix=$PREFIX \
              --libdir=lib \
              --default-library=static \
              _builddir
          ninja -C _builddir
          ninja -C _builddir install
          popd
          mv /tmp/src/{*.zip,*.dict} $GITHUB_WORKSPACE/build/fuzz-targets
          if [ ! -f "$GITHUB_WORKSPACE/build/fuzz-targets/cairo_seed_corpus.zip" ]; then
            echo "missing seed corpus"
            exit 1
          fi
          if [ ! -f "$GITHUB_WORKSPACE/build/fuzz-targets/cairo.dict" ]; then
            echo "missing dictionary"
            exit 1
          fi
          PREDEPS_LDFLAGS="-Wl,-Bdynamic -ldl -lm -lc -pthread -lrt -lpthread"
          DEPS="gmodule-2.0 glib-2.0 gio-2.0 gobject-2.0 freetype2 cairo cairo-gobject cairo-script-interpreter"
          BUILD_CFLAGS="$CFLAGS `pkg-config --static --cflags $DEPS` -I/tmp/src/fuzz"
          BUILD_LDFLAGS="-Wl,-static `pkg-config --static --libs $DEPS`"
          fuzzers=$(find /tmp/src/fuzz/ -name "*_fuzzer.c")
          for f in $fuzzers ; do
            fuzzer_name=$(basename $f .c)
            $CC $CFLAGS $BUILD_CFLAGS \
              -c $f -o /tmp/work/${fuzzer_name}.o
            $CXX $CXXFLAGS \
              /tmp/work/${fuzzer_name}.o -o $GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer_name} \
              $PREDEPS_LDFLAGS \
              $BUILD_LDFLAGS \
              $LIB_FUZZING_ENGINE \
              -Wl,-Bdynamic
            cd $GITHUB_WORKSPACE/build/fuzz-targets; ln -sf cairo_seed_corpus.zip ${fuzzer_name}_seed_corpus.zip
            cd $GITHUB_WORKSPACE/build/fuzz-targets; ln -sf cairo.dict ${fuzzer_name}.dict
          done
          for f in /tmp/src/cairo/test/svg/fuzzer/svg-render-fuzzer.c ; do
            fuzzer_name=$(basename $f .c)
            $CC $CFLAGS $BUILD_CFLAGS \
              -c $f -o /tmp/work/${fuzzer_name}.o
            $CXX $CXXFLAGS \
              /tmp/work/${fuzzer_name}.o -o $GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer_name} \
              $PREDEPS_LDFLAGS \
              $BUILD_LDFLAGS \
              $LIB_FUZZING_ENGINE \
              -Wl,-Bdynamic
          done
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
