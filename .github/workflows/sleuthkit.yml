name: "Fuzz sleuthkit"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 5 * * 0"

env:
  PROJECT: sleuthkit
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            libtool \
            zlib1g-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/sleuthkit/sleuthkit.git /tmp/src/sleuthkit

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address -Wno-error=non-c-typedef-for-linkage"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address -Wno-error=non-c-typedef-for-linkage"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/sleuthkit
          set +e
          # Work around -all-static flag (see sleuthkit issue #3020)
          sed -i 's/-all-static//g' configure.ac
          # Work around hardcoded -Werror flags — the flag lives in
          # tsk/pool/Makefile.am (not the root), so strip it recursively
          find . -name Makefile.am -exec sed -i 's/-Werror//g' {} +
          # Download seed corpora (non-fatal if some downloads fail)
          if [ -x ./ossfuzz/buildcorpus.sh ]; then
              ./ossfuzz/buildcorpus.sh || true
              # Package any downloaded corpus files
              for corpus_dir in ./ossfuzz/*_seed_corpus; do
                  if [ -d "$corpus_dir" ]; then
                      target=$(basename "$corpus_dir" _seed_corpus)
                      zip -j -q "$OUT/${target}_seed_corpus.zip" "$corpus_dir"/* || true
                  fi
              done
              # Also package any .zip corpora already built by buildcorpus.sh
              find ./ossfuzz -name '*_seed_corpus.zip' -exec cp {} "$OUT/" \; 2>/dev/null || true
          fi
          ./bootstrap
          ./configure --enable-static --enable-shared=no \
              --disable-java --without-afflib --without-libcrypto \
              --without-libewf --without-libvhdi --without-libvmdk
          make -j$(nproc)
          # The autotools build does not compile the fuzzer targets (ossfuzz/
          # is not in SUBDIRS). Build them manually against libtsk.
          echo "[+] Building fuzzer targets from ossfuzz/"
          for fuzzer_src in ossfuzz/*_fuzzer.cpp; do
              if [ -f "$fuzzer_src" ]; then
                  name=$(basename "$fuzzer_src" .cpp)
                  echo "  -> $name"
                  $CXX $CXXFLAGS -std=c++14 -DHAVE_CONFIG_H -I. -I./tsk \
                      -c "$fuzzer_src" -o "ossfuzz/${name}.o"
                  $CXX $CXXFLAGS $LIB_FUZZING_ENGINE \
                      "ossfuzz/${name}.o" tsk/.libs/libtsk.a \
                      -lz -lsqlite3 -ldl -lstdc++ -lm \
                      -o "$OUT/${name}"
              fi
          done
          # Also check for any fuzzers the autotools build may have produced
          find . -name '*_fuzzer' -type f -executable -not -path './ossfuzz/*' \
              -exec cp {} "$OUT/" \; 2>/dev/null || true
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
