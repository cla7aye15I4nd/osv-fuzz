name: "Fuzz gnutls"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 6 * * 0"

env:
  PROJECT: gnutls
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            autogen \
            automake \
            autopoint \
            bison \
            gengetopt \
            gettext \
            gperf \
            gtk-doc-tools \
            libtasn1-bin \
            libtool \
            lzip \
            mercurial \
            pkg-config \
            texinfo

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 500 git://git.savannah.gnu.org/gnulib.git /tmp/src/gnulib
          # Download dependency tarballs (matching oss-fuzz Dockerfile)
          cd /tmp/src
          wget -qO- https://ftp.gnu.org/gnu/libunistring/libunistring-latest.tar.gz | tar xz && mv libunistring-* libunistring
          wget -qO- https://ftp.gnu.org/gnu/libidn/libidn2-latest.tar.gz | tar xz && mv libidn2-* libidn2
          wget -qO- https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.gz | tar xz && mv gmp-* gmp
          wget -qO- https://ftp.gnu.org/gnu/libtasn1/libtasn1-4.20.0.tar.gz | tar xz && mv libtasn1-* libtasn1
          git clone --depth 1 --branch nettle_3.10.1_release_20241230 https://git.lysator.liu.se/nettle/nettle.git /tmp/src/nettle
          # Try twice in case of network issues
          git clone --depth 1 --recursive https://gitlab.com/gnutls/gnutls.git /tmp/src/gnutls || \
            git clone --depth 1 --recursive https://gitlab.com/gnutls/gnutls.git /tmp/src/gnutls

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/gnutls
          set +e
          export DEPS_PATH=/tmp/src/deps
          export PKG_CONFIG_PATH=$DEPS_PATH/lib64/pkgconfig:$DEPS_PATH/lib/pkgconfig
          export CPPFLAGS="-I$DEPS_PATH/include"
          export LDFLAGS="-L$DEPS_PATH/lib -L$DEPS_PATH/lib64"
          export GNULIB_SRCDIR=/tmp/src/gnulib
          export GNULIB_TOOL=$GNULIB_SRCDIR/gnulib-tool
          if grep -q -F "20.04" /etc/os-release ; then
              cd /tmp
              wget https://archive.ubuntu.com/ubuntu/pool/main/a/autoconf/autoconf_2.71-2_all.deb
              if echo "96b528889794c4134015a63c75050f93d8aecdf5e3f2a20993c1433f4c61b80e autoconf_2.71-2_all.deb" | sha256sum --check --status ; then
              	dpkg -i -G /tmp/autoconf_2.71-2_all.deb
              fi
          fi
          cd "/tmp/src"/libunistring
          ASAN_OPTIONS=detect_leaks=0 \
            ./configure --enable-static --disable-shared --prefix="$DEPS_PATH"
          make -j"$(nproc)"
          make install
          cd "/tmp/src"/libidn2
          ASAN_OPTIONS=detect_leaks=0 \
            ./configure --enable-static --disable-shared --disable-doc --disable-gcc-warnings --prefix="$DEPS_PATH"
          make -j"$(nproc)"
          make install
          GMP_CONFIGURE_FLAGS="--disable-assembly --disable-fat"
          cd "/tmp/src"/gmp
          ASAN_OPTIONS=detect_leaks=0 \
            ./configure --disable-shared --prefix="$DEPS_PATH" $GMP_CONFIGURE_FLAGS
          make -j"$(nproc)"
          make install
          cd /tmp/src/libtasn1
          ASAN_OPTIONS=detect_leaks=0 \
            ./configure --disable-gcc-warnings --disable-gtk-doc --disable-gtk-doc-pdf --disable-doc \
            --disable-shared --enable-static --prefix="$DEPS_PATH"
          make -j"$(nproc)"
          make install
          NETTLE_CONFIGURE_FLAGS="--disable-assembler"  # Temporarily disalbe asm to work around error "undefined reference to [...]"
          if [[ $CFLAGS = *sanitize=memory* ]]; then
            NETTLE_CONFIGURE_FLAGS="--disable-assembler --disable-fat"
          fi
          cd "/tmp/src"/nettle
          bash .bootstrap
          ASAN_OPTIONS=detect_leaks=0 \
            ./configure --enable-static --disable-shared --disable-documentation --prefix="$DEPS_PATH" $NETTLE_CONFIGURE_FLAGS
          ( make -j"$(nproc)" || make -j"$(nproc)" ) && make install
          if test $? != 0; then
            echo "Failed to compile nettle"
            exit 1
          fi
          GNUTLS_CONFIGURE_FLAGS=""
          if [[ $CFLAGS = *sanitize=memory* ]]; then
            GNUTLS_CONFIGURE_FLAGS="--disable-hardware-acceleration"
          fi
          cd "/tmp/src"/gnutls
          ./bootstrap
          ASAN_OPTIONS=detect_leaks=0 LIBS="-lunistring" CXXFLAGS="$CXXFLAGS -L$DEPS_PATH/lib" \
            ./configure --enable-fuzzer-target --disable-gcc-warnings --enable-static --disable-shared --disable-doc --disable-tests \
              --disable-tools --disable-cxx --disable-maintainer-mode --disable-libdane --without-p11-kit \
              --disable-full-test-suite $GNUTLS_CONFIGURE_FLAGS
          sed -i 's|include <sys/syscall.h>|include <sys/syscall.h>\n#undef SYS_getrandom|' lib/nettle/sysrng-linux.c
          make -j"$(nproc)" -C gl
          make -j"$(nproc)" -C lib
          cd fuzz
          make oss-fuzz
          find . -name '*_fuzzer' -exec cp -v '{}' "$GITHUB_WORKSPACE/build/fuzz-targets" ';'
          find . -name '*_fuzzer.dict' -exec cp -v '{}' "$GITHUB_WORKSPACE/build/fuzz-targets" ';'
          find . -name '*_fuzzer.options' -exec cp -v '{}' "$GITHUB_WORKSPACE/build/fuzz-targets" ';'
          for dir in *_fuzzer.in; do
              fuzzer=$(basename "$dir" .in)
              zip -rj "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer}_seed_corpus.zip" "${dir}/"
          done
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

