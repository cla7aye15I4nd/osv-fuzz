name: "Fuzz ghostscript"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 1 * * 0"

env:
  PROJECT: ghostscript
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            liblcms2-dev \
            libpng-dev \
            libtool \
            zlibc

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/apple/cups.git /tmp/src/cups
          git clone --depth 1 --recursive https://git.savannah.gnu.org/git/freetype/freetype2.git /tmp/src/freetype
          git clone --depth 1 --recursive git://git.ghostscript.com/ghostpdl.git /tmp/src/ghostpdl

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sL -o /tmp/src/pdf_seeds "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/ghostscript/pdf_seeds"
          curl -sL -o /tmp/src/dicts "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/ghostscript/dicts"
          # Pattern: *.cc — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/ghostscript" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.cc', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done
          # Pattern: *.options — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/ghostscript" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.options', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done
          # Pattern: *.h — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/ghostscript" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.h', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done
          curl -sL -o /tmp/src/generate_seeds.py "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/ghostscript/generate_seeds.py"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+w /etc/ld.so.cache 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/ghostpdl
          set +e
          pushd /tmp/src/cups
          sed -i '2110s/\(\s\)f->value/\1(int)f->value/' cups/ppd-cache.c
          LSB_BUILD=y ./configure --prefix="/tmp/work" --libdir="$GITHUB_WORKSPACE/build/fuzz-targets" --disable-gnutls \
             --disable-libusb --with-components=core
          make clean
          make install-headers install-libs
          make -C filter libs install-libs
          install -m755 cups-config "/tmp/work"/cups-config
          popd
          rm -rf cups/libs || die
          rm -rf freetype || die
          rm -rf zlib || die
          mv /tmp/src/freetype freetype
          CUPSCONFIG="/tmp/work/cups-config"
          CUPS_CFLAGS=$($CUPSCONFIG --cflags)
          CUPS_LDFLAGS=$($CUPSCONFIG --ldflags)
          CUPS_LIBS=$($CUPSCONFIG --image --libs)
          export CXXFLAGS="$CXXFLAGS $CUPS_CFLAGS"
          CPPFLAGS="${CPPFLAGS:-} $CUPS_CFLAGS -DPACIFY_VALGRIND" ./autogen.sh \
            CUPSCONFIG=$CUPSCONFIG \
            --enable-freetype --enable-fontconfig \
            --enable-cups --with-ijs --with-jbig2dec \
            --with-drivers=pdfwrite,cups,ljet4,laserjet,pxlmono,pxlcolor,pcl3,uniprint,pgmraw,ps2write,png16m,tiffsep1,faxg3,psdcmyk,eps2write,bmpmono,xpswrite
          make -j$(nproc) libgpdl libgs
          fuzzers="gstoraster_fuzzer                \
                   gstoraster_fuzzer_all_colors     \
                   gstoraster_ps_fuzzer             \
                   gstoraster_pdf_fuzzer            \
                   gs_device_pdfwrite_fuzzer        \
                   gs_device_pxlmono_fuzzer         \
                   gs_device_pgmraw_fuzzer          \
                   gs_device_ps2write_fuzzer        \
                   gs_device_png16m_fuzzer          \
                   gs_device_psdcmyk_fuzzer         \
                   gs_device_eps2write_fuzzer       \
                   gs_device_faxg3_fuzzer           \
                   gs_device_bmpmono_fuzzer         \
                   gs_device_xpswrite_fuzzer        \
                   gs_device_pxlcolor_fuzzer        \
                   gs_device_tiffsep1_fuzzer        \
                   gs_device_pdfwrite_opts_fuzzer  \
                   gs_device_ljet4_fuzzer          \
                   gs_icc_fuzzer"
          for fuzzer in $fuzzers; do
            $CXX $CXXFLAGS $CUPS_LDFLAGS -std=c++11 -I. -I/tmp/src \
              /tmp/src/${fuzzer}.cc \
              -o "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer}" \
              -Wl,-rpath='$ORIGIN' \
              $CUPS_LIBS \
              $LIB_FUZZING_ENGINE bin/gs.a
          done
          fuzzers2="gs_pcl_fuzzer                    \
                   gs_pxl_fuzzer                    \
                   gs_xps_fuzzer"
          for fuzzer in $fuzzers2; do
            $CXX $CXXFLAGS $CUPS_LDFLAGS -std=c++11 -I. -I/tmp/src \
              /tmp/src/${fuzzer}.cc \
              -o "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer}" \
              -Wl,-rpath='$ORIGIN' \
              $CUPS_LIBS \
              $LIB_FUZZING_ENGINE bin/gpdl.a
          done
          zip -j "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_pdf_fuzzer_seed_corpus.zip" /tmp/src/pdf_seeds/*
          mkdir -p "/tmp/work/all_color_seeds"
          for f in examples/ridt91.eps examples/snowflak.ps /tmp/src/pdf_seeds/pdf.pdf; do
            printf "\x01" | cat - "$f" > tmp_file.txt
            mv tmp_file.txt $f
            s=$(sha1sum "$f" | awk '{print $1}')
            cp "$f" "/tmp/work/all_color_seeds/$s"
          done
          zip -j "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_fuzzer_all_colors_seed_corpus.zip" "/tmp/work"/all_color_seeds/*
          mkdir -p "/tmp/work/gs_device_pdfwrite_opts_fuzzer_seeds"
          for f in examples/ridt91.eps examples/snowflak.ps /tmp/src/pdf_seeds/pdf.pdf; do
            printf "\x01\x01" | cat - "$f" > tmp_file.txt
            mv tmp_file.txt $f
            s=$(sha1sum "$f" | awk '{print $1}')
            cp "$f" "/tmp/work/gs_device_pdfwrite_opts_fuzzer_seeds/$s"
          done
          zip -j "$GITHUB_WORKSPACE/build/fuzz-targets/gs_device_pdfwrite_opts_fuzzer_seed_corpus.zip" "/tmp/work"/gs_device_pdfwrite_opts_fuzzer_seeds/*
          python3 /tmp/src/generate_seeds.py "/tmp/work/generated_gs_seeds"
          mkdir -p "/tmp/work/seeds"
          for f in examples/*.{ps,pdf}; do
            s=$(sha1sum "$f" | awk '{print $1}')
            cp "$f" "/tmp/work/seeds/$s"
          done
          for f in "/tmp/work"/generated_gs_seeds/ps/*.ps; do
            s=$(sha1sum "$f" | awk '{print $1}')
            cp "$f" "/tmp/work/seeds/$s"
          done
          zip -j "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_fuzzer_seed_corpus.zip" "/tmp/work"/seeds/*
          cp "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_fuzzer_seed_corpus.zip" "$GITHUB_WORKSPACE/build/fuzz-targets/gs_device_pdfwrite_fuzzer_seed_corpus.zip"
          cp "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_fuzzer_seed_corpus.zip" "$GITHUB_WORKSPACE/build/fuzz-targets/gs_device_pxlmono_fuzzer_seed_corpus.zip"
          cp "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_fuzzer_seed_corpus.zip" "$GITHUB_WORKSPACE/build/fuzz-targets/gs_device_eps2write_fuzzer_seed_corpus.zip"
          cp "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_fuzzer_seed_corpus.zip" "$GITHUB_WORKSPACE/build/fuzz-targets/gs_device_bmpmono_fuzzer_seed_corpus.zip"
          cp "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_fuzzer_seed_corpus.zip" "$GITHUB_WORKSPACE/build/fuzz-targets/gs_device_xpswrite_fuzzer_seed_corpus.zip"
          cp "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_fuzzer_seed_corpus.zip" "$GITHUB_WORKSPACE/build/fuzz-targets/gs_device_pxlcolor_fuzzer_seed_corpus.zip"
          cp "$GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_fuzzer_seed_corpus.zip" "$GITHUB_WORKSPACE/build/fuzz-targets/gs_device_ljet4_fuzzer_seed_corpus.zip"
          cp /tmp/src/*.options $GITHUB_WORKSPACE/build/fuzz-targets/
          fuzzers_with_dict="gstoraster_fuzzer  \
                   gstoraster_fuzzer_all_colors \
                   gstoraster_pdf_fuzzer        \
                   gs_device_pdfwrite_fuzzer    \
                   gs_device_faxg3_fuzzer       \
                   gs_device_bmpmono_fuzzer     \
                   gs_device_xpswrite_fuzzer    \
                   gs_device_ljet4_fuzzer"
          for fuzzer in $fuzzers_with_dict; do
            cp /tmp/src/dicts/pdf.dict $GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer}.dict
          done
          cp /tmp/src/dicts/ps.dict $GITHUB_WORKSPACE/build/fuzz-targets/gstoraster_ps_fuzzer.dict
          mkdir -p "/tmp/work/pcl_seeds"
          for f in pcl/examples/*.pcl; do
            s=$(sha1sum "$f" | awk '{print $1}')
            cp "$f" "/tmp/work/pcl_seeds/$s"
          done
          cp "/tmp/work"/generated_gs_seeds/pcl/* "/tmp/work/pcl_seeds/" 2>/dev/null || true
          zip -j "$GITHUB_WORKSPACE/build/fuzz-targets/gs_pcl_fuzzer_seed_corpus.zip" "/tmp/work"/pcl_seeds/*
          mkdir -p "/tmp/work/pxl_seeds"
          for f in pcl/examples/*.pxl pcl/examples/*.px3; do
            s=$(sha1sum "$f" | awk '{print $1}')
            cp "$f" "/tmp/work/pxl_seeds/$s"
          done
          cp "/tmp/work"/generated_gs_seeds/pxl/* "/tmp/work/pxl_seeds/" 2>/dev/null || true
          zip -j "$GITHUB_WORKSPACE/build/fuzz-targets/gs_pxl_fuzzer_seed_corpus.zip" "/tmp/work"/pxl_seeds/*
          mkdir -p "/tmp/work/xps_seeds"
          for f in pcl/examples/*.xps xps/tools/*.xps; do
            if [ -f "$f" ]; then
              s=$(sha1sum "$f" | awk '{print $1}')
              cp "$f" "/tmp/work/xps_seeds/$s"
            fi
          done
          cp "/tmp/work"/generated_gs_seeds/xps/* "/tmp/work/xps_seeds/" 2>/dev/null || true
          zip -j "$GITHUB_WORKSPACE/build/fuzz-targets/gs_xps_fuzzer_seed_corpus.zip" "/tmp/work"/xps_seeds/*
          cp /tmp/src/dicts/pcl.dict $GITHUB_WORKSPACE/build/fuzz-targets/gs_pcl_fuzzer.dict
          cp /tmp/src/dicts/pxl.dict $GITHUB_WORKSPACE/build/fuzz-targets/gs_pxl_fuzzer.dict
          cp /tmp/src/dicts/xps.dict $GITHUB_WORKSPACE/build/fuzz-targets/gs_xps_fuzzer.dict
          mkdir -p "/tmp/work/icc_seeds"
          for f in iccprofiles/*.icc lcms2mt/testbed/*.icc; do
            if [ -f "$f" ]; then
              s=$(sha1sum "$f" | awk '{print $1}')
              printf "\x01" | cat - "$f" > "/tmp/work/icc_seeds/$s"
            fi
          done
          zip -j "$GITHUB_WORKSPACE/build/fuzz-targets/gs_icc_fuzzer_seed_corpus.zip" "/tmp/work"/icc_seeds/*
          cp /tmp/src/dicts/pdf.dict $GITHUB_WORKSPACE/build/fuzz-targets/gs_icc_fuzzer.dict
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
