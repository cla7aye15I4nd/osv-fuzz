name: "Fuzz native libidn2"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libidn2
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest libidn2 with AFL++ + ASan
        run: |
          set -eux
          # Build libidn2 (latest master) with AFL++ compilers + AddressSanitizer.
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer -DFUZZING_BUILD_MODE_UNSAFE_FOR_PRODUCTION"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          mkdir -p /tmp/src
          rm -rf /tmp/src/libidn2
          git clone --depth 1 https://github.com/libidn/libidn2.git /tmp/src/libidn2
          cd /tmp/src/libidn2

          # ./bootstrap fetches gnulib + generates ./configure.
          ./bootstrap
          # detect_leaks=0 so ASan does not abort configure's iconv detection.
          ASAN_OPTIONS=detect_leaks=0 ./configure \
            --enable-static --disable-shared --disable-doc --disable-gcc-warnings
          make -j"$(nproc)"

          # The fuzz/ harnesses are standalone argv-driven programs that link
          # ../lib/.libs/libidn2.a + main.c and read input files from argv.
          make -C fuzz

          # BINDIR is the fuzz/ directory. The recorded invocation is
          #   $BINDIR/libidn2_to_ascii_8z_fuzzer "$POC"
          BINDIR="$PWD/fuzz"

          # The built target may be a libtool wrapper script; prefer the real
          # ELF in .libs/ so AFL's forkserver attaches to the instrumented binary.
          TARGET_BIN="$BINDIR/libidn2_to_ascii_8z_fuzzer"
          if [ -x "$BINDIR/.libs/libidn2_to_ascii_8z_fuzzer" ] && \
             file "$BINDIR/.libs/libidn2_to_ascii_8z_fuzzer" | grep -q ELF; then
            TARGET_BIN="$BINDIR/.libs/libidn2_to_ascii_8z_fuzzer"
          fi

          echo "[+] BINDIR=$BINDIR"
          echo "[+] TARGET_BIN=$TARGET_BIN"
          file "$TARGET_BIN"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "TARGET_BIN=$TARGET_BIN" >> "$GITHUB_ENV"

      - name: Dry-run replay of lost-bug PoC seeds
        run: |
          set -u
          mkdir -p results/dry_run
          bname=$(basename "$TARGET_BIN")
          crash_count=0
          total=0
          shopt -s nullglob
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0 \
              timeout 60 "$TARGET_BIN" "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ $exit_code -ne 0 ] && [ $exit_code -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -u
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          # The invocation takes the input as a file argument -> use AFL's @@.
          afl-fuzz -i "seeds/$PROJECT" -o results/afl -m none \
            -V "$FUZZ_DURATION" -- "$TARGET_BIN" @@ || true

      - name: Triage AFL crashes
        run: |
          set -u
          mkdir -p results/fuzz
          bname=$(basename "$TARGET_BIN")
          shopt -s nullglob
          crash_dir="results/afl/default/crashes"
          if [ ! -d "$crash_dir" ]; then
            echo "[+] No crashes directory produced by AFL"
            exit 0
          fi
          new_crashes=0
          for crash_file in "$crash_dir"/*; do
            [ -f "$crash_file" ] || continue
            case "$(basename "$crash_file")" in
              README.txt) continue ;;
            esac
            crash_id=$(basename "$crash_file" | tr ':,' '__')
            result_file="results/fuzz/${bname}_${crash_id}.txt"
            set +e
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
              timeout 60 "$TARGET_BIN" "$crash_file" > /dev/null 2> "$result_file"
            replay_exit=$?
            set -e
            if [ $replay_exit -ne 0 ] && [ $replay_exit -ne 124 ]; then
              echo "  [!] NEW CRASH: $bname $crash_id (exit=$replay_exit)"
              cp "$crash_file" "results/fuzz/${bname}_${crash_id}.bin"
              new_crashes=$((new_crashes + 1))
            else
              rm -f "$result_file"
            fi
          done
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libidn2
          path: results/pocs/
          retention-days: 90

