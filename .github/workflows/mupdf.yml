name: "Fuzz mupdf"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 2 * * 0"

env:
  PROJECT: mupdf
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            libtool \
            pkg-config

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/ArtifexSoftware/mupdf.git /tmp/src/mupdf
          git clone --depth 1 https://github.com/mozilla/pdf.js /tmp/src/pdf.js
          # Create seed corpus from pdf.js test PDFs (matches oss-fuzz Dockerfile)
          cd /tmp/src && zip -q pdf_fuzzer_seed_corpus.zip pdf.js/test/pdfs/*.pdf
          rm -rf /tmp/src/pdf.js

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sfL --retry 3 --retry-delay 5 -o /tmp/src/pdf_fuzzer.cc "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/mupdf/pdf_fuzzer.cc"
          curl -sfL --retry 3 --retry-delay 5 -o /tmp/src/pdf_fuzzer.options "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/mupdf/pdf_fuzzer.options"
          # Download PDF dictionary (matches oss-fuzz Dockerfile ADD)
          curl -sfL --retry 3 --retry-delay 5 -o /tmp/src/pdf_fuzzer.dict \
            https://raw.githubusercontent.com/rc0r/afl-fuzz/master/dictionaries/pdf.dict

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/mupdf
          set +e
          sed -i 's/supp_size;/supp_size;(void)(supp_size);/g' ./thirdparty/harfbuzz/src/hb-subset-cff1.cc
          LDFLAGS="$CXXFLAGS" make -j$(nproc) HAVE_GLUT=no build=debug OUT=/tmp/work \
              /tmp/work/libmupdf-third.a /tmp/work/libmupdf.a
          fuzz_target=pdf_fuzzer
          $CXX $CXXFLAGS -std=c++11 -Iinclude \
              /tmp/src/pdf_fuzzer.cc -o $GITHUB_WORKSPACE/build/fuzz-targets/$fuzz_target \
              $LIB_FUZZING_ENGINE /tmp/work/libmupdf.a /tmp/work/libmupdf-third.a
          cp /tmp/src/{*.zip,*.dict,*.options} $GITHUB_WORKSPACE/build/fuzz-targets
          if [ ! -f "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzz_target}_seed_corpus.zip" ]; then
            echo "missing seed corpus"
            exit 1
          fi
          if [ ! -f "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzz_target}.dict" ]; then
            echo "missing dictionary"
            exit 1
          fi
          if [ ! -f "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzz_target}.options" ]; then
            echo "missing options"
            exit 1
          fi
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
