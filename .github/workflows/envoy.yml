name: "Fuzz envoy"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"

env:
  PROJECT: envoy
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/envoyproxy/envoy.git /tmp/src/envoy

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          cd /tmp/src/envoy/
          export USE_BAZEL_VERSION=7.4.0
          declare -r FUZZ_TARGET_QUERY='
            let all_fuzz_tests = attr(tags, "fuzz_target", "test/...") in
            $all_fuzz_tests - attr(tags, "no_fuzz", $all_fuzz_tests)
          '
          if [ -n "${OSS_FUZZ_CI-}" ]
          then
            declare -r OSS_FUZZ_TARGETS="$(bazel query "${FUZZ_TARGET_QUERY}" | grep ':header' | sed 's/$/_oss_fuzz/')"
          else
            declare -r OSS_FUZZ_TARGETS="$(bazel query "${FUZZ_TARGET_QUERY}" | sed 's/$/_oss_fuzz/')"
          fi
          declare -r EXTRA_BAZEL_FLAGS="$(
          echo "--features=-layering_check"
          if [ -n "$CC" ]; then
            echo "--action_env=CC=${CC}"
          fi
          if [ -n "$CXX" ]; then
            echo "--action_env=CXX=${CXX}"
          fi
          echo "--host_action_env=CC=gcc"
          if [ "$SANITIZER" = "undefined" ]
          then
            echo "--linkopt=$(clang -print-file-name=libclang_rt.ubsan_standalone_cxx.a)"
            echo "--linkopt=-fsanitize=undefined"
          elif [ "$SANITIZER" = "address" ]
          then
            echo "--copt=-D__SANITIZE_ADDRESS__" "--copt=-DADDRESS_SANITIZER=1" "--linkopt=-fsanitize=address"
          fi
          )"
          export FUZZING_CFLAGS="$CFLAGS"
          export FUZZING_CXXFLAGS="$CXXFLAGS"
          declare -r DI="$(
          if [ "$SANITIZER" != "coverage" ]
          then
            echo " --per_file_copt=^.*source/extensions/access_loggers/.*\.cc\$@-fsanitize-coverage=0"
            echo " --per_file_copt=^.*source/common/protobuf/.*\.cc\$@-fsanitize-coverage=0"
            echo " --per_file_copt=^.*test/.*\.cc\$@-fsanitize-coverage=0"
            echo " --per_file_copt=^.*com_google_protobuf.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*com_google_absl.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*com_github_grpc_grpc.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*boringssl.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*com_googlesource_code_re2.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*upb.*\.cpp\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*org_brotli.*\.cpp\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*com_github_jbeder_yaml_cpp.*\.cpp\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*proxy_wasm_cpp_host/.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*com_github_google_libprotobuf_mutator/.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*com_googlesource_googleurl/.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*com_lightstep_tracer_cpp/.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*com_google_cel_cpp.*\.cpp\$@-fsanitize-coverage=0"
            echo " --per_file_copt=^.*antlr4_runtimes.*\.cpp\$@-fsanitize-coverage=0"
            echo " --per_file_copt=^.*googletest.*\.cc\$@-fsanitize-coverage=0"
            echo " --per_file_copt=^.*\.pb\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
            echo " --per_file_copt=^.*bazel-out/.*\.cc\$@-fsanitize-coverage=0,-fno-sanitize=all"
          fi
          )"
          bazel build --verbose_failures --dynamic_mode=off ${DI} \
            --spawn_strategy=standalone --genrule_strategy=standalone \
            --local_cpu_resources=HOST_CPUS*0.256 \
            --//source/extensions/wasm_runtime/v8:enabled=false \
            --build_tag_filters=-no_asan --config=oss-fuzz \
            ${EXTRA_BAZEL_FLAGS} \
            ${OSS_FUZZ_TARGETS[*]}
          if [ "$SANITIZER" = "coverage" ]
          then
            declare -r REMAP_PATH="$GITHUB_WORKSPACE/build/fuzz-targets/proc/self/cwd"
            mkdir -p "${REMAP_PATH}"
            rsync -av "/tmp/src"/envoy/source "${REMAP_PATH}"
            rsync -av "/tmp/src"/envoy/test "${REMAP_PATH}"
            rsync -av "/tmp/src"/envoy/envoy "${REMAP_PATH}"
            declare -r BAZEL_EXTERNAL_REMAP_PATH="${REMAP_PATH}/external/envoy/bazel/external"
            mkdir -p "${BAZEL_EXTERNAL_REMAP_PATH}"
            rsync -av "/tmp/src"/envoy/bazel/external/http_parser "${BAZEL_EXTERNAL_REMAP_PATH}"
            rm -rf "/tmp/src"/envoy/bazel-envoy/external/envoy
            find "/tmp/src"/envoy/bazel-envoy/external -follow -type l -ls -delete || echo "Symlink cleanup soft fail"
            rsync -avLk "/tmp/src"/envoy/bazel-envoy/external "${REMAP_PATH}"
            declare -r RSYNC_FILTER_ARGS=("--include" "*.h" "--include" "*.cc" "--include" \
              "*.hpp" "--include" "*.cpp" "--include" "*.c" "--include" "*/" "--exclude" "*")
            rsync -avLk "${RSYNC_FILTER_ARGS[@]}" "/tmp/src"/envoy/bazel-out "${REMAP_PATH}"
            rsync -avLkR "${RSYNC_FILTER_ARGS[@]}" "${HOME}" "$GITHUB_WORKSPACE/build/fuzz-targets"
            rsync -avLkR "${RSYNC_FILTER_ARGS[@]}" /tmp "$GITHUB_WORKSPACE/build/fuzz-targets"
          fi
          for oss_fuzz_archive in $(find bazel-bin/ -name '*_oss_fuzz.tar'); do
              tar -xvf "${oss_fuzz_archive}" -C "$GITHUB_WORKSPACE/build/fuzz-targets"
          done
          rm -f bazel-*

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
