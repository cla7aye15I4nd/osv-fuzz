name: "Fuzz native libxls"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libxls
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install libxls build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y -qq autoconf-archive gettext 2>/dev/null || true

      - name: Clone and build latest libxls with AFL++ + ASan
        run: |
          set -euxo pipefail
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/libxls/libxls.git /tmp/src/libxls
          cd /tmp/src/libxls
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export LDFLAGS="-fsanitize=address"
          ./autogen.sh
          ./configure
          make -j"$(nproc)"
          # libtool leaves a wrapper script at ./xls2csv; the real ASan-instrumented
          # ELF lives at ./.libs/xls2csv. Prefer the real binary for replay/fuzzing.
          if [ -x "$PWD/.libs/xls2csv" ]; then
            XLS2CSV="$PWD/.libs/xls2csv"
          else
            XLS2CSV="$PWD/xls2csv"
          fi
          echo "XLS2CSV=$XLS2CSV" >> "$GITHUB_ENV"
          echo "BINDIR=$PWD" >> "$GITHUB_ENV"
          echo "[+] Built target: $XLS2CSV"
          file "$XLS2CSV" || true

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uxo pipefail
          mkdir -p results/dry_run
          bname=xls2csv
          shopt -s nullglob
          crash_count=0
          total=0
          for POC in "seeds/$PROJECT"/*.bin; do
            [ -f "$POC" ] || continue
            sname=$(basename "$POC" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0 \
              timeout 60 "$XLS2CSV" "$POC" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$POC" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uxo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_USE_ASAN=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1:symbolize=0
          afl-fuzz \
            -i "seeds/$PROJECT" \
            -o results/afl \
            -V "$FUZZ_DURATION" \
            -- "$XLS2CSV" @@ || true

      - name: Triage AFL++ crashes
        run: |
          set -uxo pipefail
          mkdir -p results/fuzz
          bname=xls2csv
          shopt -s nullglob
          crashes_dir=results/afl/default/crashes
          triaged=0
          if [ -d "$crashes_dir" ]; then
            for crash in "$crashes_dir"/*; do
              [ -f "$crash" ] || continue
              cname=$(basename "$crash")
              [ "$cname" = "README.txt" ] && continue
              result_file="results/fuzz/${bname}_${cname}.txt"
              echo "[*] Triaging $cname..."
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1 \
                timeout 60 "$XLS2CSV" "$crash" > /dev/null 2> "$result_file"
              set -e
              cp "$crash" "results/fuzz/${bname}_${cname}.bin"
              triaged=$((triaged + 1))
            done
          fi
          echo "[+] Triaged $triaged crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libxls
          path: results/pocs/
          retention-days: 90

