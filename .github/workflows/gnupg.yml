name: "Fuzz gnupg"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 5 * * 0"

env:
  PROJECT: gnupg
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            bison \
            bzip2 \
            flex \
            gettext \
            libtool \
            pkg-config

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive git://git.gnupg.org/libgpg-error.git /tmp/src/libgpg-error
          git clone --depth 1 --recursive git://git.gnupg.org/libgcrypt.git /tmp/src/libgcrypt
          git clone --depth 1 --recursive git://git.gnupg.org/libassuan.git /tmp/src/libassuan
          git clone --depth 1 --recursive git://git.gnupg.org/libksba.git /tmp/src/libksba
          git clone --depth 1 --recursive git://git.gnupg.org/npth.git /tmp/src/npth
          git clone --depth 1 --recursive git://git.gnupg.org/gnupg.git /tmp/tmp/src/gnupg

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          # Pattern: fuzz_* — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/gnupg" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'fuzz_.*', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done
          curl -sL -o /tmp/src/fuzzer_stubs.c "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/gnupg/fuzzer_stubs.c"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+w /etc/ld.so.cache 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/gnupg
          cd /src/gnupg
          ./autogen.sh  
          ./configure --enable-maintainer-mode --disable-doc --disable-tests --disable-nls \
            --disable-sqlite --disable-gnutls --disable-ldap --disable-card-support \
            CFLAGS="$CFLAGS" CXXFLAGS="$CXXFLAGS"
          make -j$(nproc) -C common audit-events.h status-codes.h
          make -j$(nproc) -C regexp _unicode_mapping.c
          make -j$(nproc) -C common libcommon.a libcommonpth.a libgpgrl.a
          make -j$(nproc) -C regexp libregexp.a
          make -j$(nproc) -C kbx libkeybox.a
          make -j$(nproc) -C g10 gpg
          mkdir -p g10/.libs
          find g10 -name '*.o' -type f ! -name 'gpg.o' ! -name 't-*.o' | xargs ar cru g10/.libs/libgpg.a
          ranlib g10/.libs/libgpg.a
          cd /src/gnupg
          $CC $CFLAGS -I. -Icommon -Ig10 -c /src/fuzzer_stubs.c -o fuzzer_stubs.o
          for fuzzer in fuzz_decrypt fuzz_import fuzz_list fuzz_verify; do
            [ -f /src/${fuzzer}.c ] || continue
            $CC $CFLAGS -I. -Icommon -Ig10 -c /src/${fuzzer}.c -o ${fuzzer}.o
            $CXX $CXXFLAGS fuzzer_stubs.o ${fuzzer}.o \
              g10/.libs/libgpg.a \
              kbx/libkeybox.a \
              common/libcommonpth.a \
              regexp/libregexp.a \
              common/libgpgrl.a \
              $LIB_FUZZING_ENGINE \
              -lgcrypt -lgpg-error -lassuan -lksba -lnpth -lutil \
              -o $GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer}
          done
          cp /src/*.options $GITHUB_WORKSPACE/build/fuzz-targets/ 2>/dev/null || true

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
