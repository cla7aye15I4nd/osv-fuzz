name: "Fuzz native pcapplusplus"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: pcapplusplus
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/${PROJECT}/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/${PROJECT}/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq libpcap-dev 2>/dev/null || true

      - name: Clone latest upstream source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/seladb/PcapPlusPlus.git /tmp/src/PcapPlusPlus

      - name: Build FuzzTarget with AFL++ and ASan
        run: |
          set -e
          cd /tmp/src/PcapPlusPlus
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          # AFL++ instrumented + ASan build of the libFuzzer harness FuzzTarget.
          # afl-cc detects -fsanitize=fuzzer and links AFL++'s libFuzzer-compatible
          # driver, producing a binary that accepts a file path as argument.
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPCAPPP_BUILD_FUZZERS=ON \
            -DPCAPPP_USE_SANITIZER=AddressSanitizer \
            -DPCAPPP_BUILD_EXAMPLES=OFF \
            -DPCAPPP_BUILD_TESTS=OFF \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          cmake --build build -j"$(nproc)" --target FuzzTarget
          # Locate the built harness (path may vary slightly across versions).
          BIN=$(find "$PWD/build" -type f -name FuzzTarget -perm -u+x 2>/dev/null | head -1)
          if [ -z "$BIN" ]; then
            echo "[!] FuzzTarget binary not found — build failed"
            exit 1
          fi
          echo "[+] Built FuzzTarget: $BIN"
          echo "FUZZ_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -u
          mkdir -p results/dry_run
          BIN="$FUZZ_BIN"
          bname=$(basename "$BIN")
          shopt -s nullglob
          crash_count=0
          total=0
          for seed in "seeds/${PROJECT}"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $sname through $bname..."
            set +e
            POC="$seed"
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$BIN" "$POC" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++
        run: |
          set -u
          mkdir -p results/afl
          BIN="$FUZZ_BIN"
          seed_count=$(find "seeds/${PROJECT}/" -name "*.bin" -type f 2>/dev/null | wc -l)
          if [ "$seed_count" -eq 0 ]; then
            echo "[!] No seeds — creating a minimal seed"
            mkdir -p "seeds/${PROJECT}"
            printf 'min' > "seeds/${PROJECT}/minimal_seed.bin"
          fi
          echo "[*] Fuzzing $BIN for ${FUZZ_DURATION}s..."
          AFL_SKIP_CPUFREQ=1 \
          AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 \
          AFL_NO_UI=1 \
            afl-fuzz -i "seeds/${PROJECT}" -o results/afl -m none \
              -V "$FUZZ_DURATION" -- "$BIN" @@ || true
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set -u
          mkdir -p results/fuzz
          BIN="$FUZZ_BIN"
          bname=$(basename "$BIN")
          shopt -s nullglob
          new_crashes=0
          for crash_file in results/afl/default/crashes/*; do
            [ -f "$crash_file" ] || continue
            cbase=$(basename "$crash_file")
            [ "$cbase" = "README.txt" ] && continue
            crash_id=$(echo "$cbase" | tr ':,' '__')
            result_file="results/fuzz/${bname}_${crash_id}.txt"
            echo "[*] Triaging $cbase..."
            set +e
            POC="$crash_file"
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$BIN" "$POC" > /dev/null 2> "$result_file"
            replay_exit=$?
            set -e
            if [ "$replay_exit" -ne 0 ] && [ "$replay_exit" -ne 124 ]; then
              echo "  [!] NEW CRASH: $cbase"
              cp "$crash_file" "results/fuzz/${bname}_${crash_id}.bin"
              new_crashes=$((new_crashes + 1))
            else
              rm -f "$result_file"
            fi
          done
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-pcapplusplus
          path: results/pocs/
          retention-days: 90

