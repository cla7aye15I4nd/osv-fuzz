name: "Fuzz curl"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 3 * * 0"

env:
  PROJECT: curl
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            libssl-dev libnghttp2-dev libssh2-1-dev libidn2-dev \
            librtmp-dev libpsl-dev libgsasl-dev zlib1g-dev \
            libzstd-dev libbrotli-dev

      - name: Clone curl source
        run: git clone --depth 1 https://github.com/curl/curl.git /tmp/curl-src

      - name: Clone curl-fuzzer
        run: git clone --depth 1 https://github.com/curl/curl-fuzzer.git /tmp/curl-fuzzer

      - name: Build curl with AFL++ instrumentation
        run: |
          cd /tmp/curl-src
          autoreconf -fi
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          ./configure \
            --disable-shared \
            --enable-static \
            --with-openssl \
            --with-nghttp2 \
            --with-libssh2 \
            --prefix=/tmp/curl-install
          make -j$(nproc)
          sudo make install

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets
          cd /tmp/curl-fuzzer
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CURL_INSTALL=/tmp/curl-install
          export PKG_CONFIG_PATH=/tmp/curl-install/lib/pkgconfig

          for fuzzer_src in *.cc; do
            [ -f "$fuzzer_src" ] || continue
            target_name="${fuzzer_src%.cc}"
            echo "[+] Building $target_name..."

            $CXX $CXXFLAGS -std=c++11 \
              -I/tmp/curl-install/include \
              -c "$fuzzer_src" -o "${target_name}.o" 2>/dev/null || continue

            $CXX $CXXFLAGS \
              "${target_name}.o" \
              -o "$GITHUB_WORKSPACE/build/fuzz-targets/${target_name}" \
              /tmp/curl-install/lib/libcurl.a \
              -lssl -lcrypto -lnghttp2 -lssh2 -lidn2 -lpsl \
              -lz -lzstd -lbrotlidec -lbrotlicommon \
              -lpthread -ldl -lrt 2>/dev/null || {
                echo "  [-] Link failed for $target_name, trying minimal link..."
                $CXX $CXXFLAGS \
                  "${target_name}.o" \
                  -o "$GITHUB_WORKSPACE/build/fuzz-targets/${target_name}" \
                  /tmp/curl-install/lib/libcurl.a \
                  -lssl -lcrypto -lz -lpthread -ldl 2>/dev/null || {
                    echo "  [-] Skipping $target_name"
                    continue
                  }
              }

            echo "  [+] Built $target_name"
          done

          echo ""
          echo "[+] Built targets:"
          ls -la "$GITHUB_WORKSPACE/build/fuzz-targets/" || echo "No targets built"

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
