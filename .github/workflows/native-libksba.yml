name: "Fuzz native libksba"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libksba
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install libksba build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgpg-error-dev \
            autoconf \
            automake \
            libtool \
            gettext \
            transfig \
            2>/dev/null || true

      - name: Clone and build libksba with AFL++ + ASan
        run: |
          set -e
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/gpg/libksba.git /tmp/src/libksba
          cd /tmp/src/libksba
          ./autogen.sh
          ./configure --enable-maintainer-mode
          make -j"$(nproc)"
          # Record the harness binary path for later steps
          echo "BINDIR=/tmp/src/libksba/tests" >> "$GITHUB_ENV"
          echo "TARGET_BIN=/tmp/src/libksba/tests/t-crl-parser" >> "$GITHUB_ENV"
          echo "[+] Built harness:"
          ls -la /tmp/src/libksba/tests/t-crl-parser

      - name: Dry-run replay (lost-bug check)
        run: |
          mkdir -p results/dry_run
          bin="$TARGET_BIN"
          bname=$(basename "$bin")
          shopt -s nullglob
          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0 \
              timeout 60 "$bin" "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ $exit_code -ne 0 ] && [ $exit_code -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          # Ensure the input dir has at least one seed so afl-fuzz can start
          if [ -z "$(ls -A seeds/$PROJECT 2>/dev/null)" ]; then
            mkdir -p seeds/"$PROJECT"
            printf '\x30\x00' > seeds/"$PROJECT"/dummy.bin
          fi
          afl-fuzz -i seeds/"$PROJECT" -o results/afl -V "$FUZZ_DURATION" \
            -- "$TARGET_BIN" @@ || true

      - name: Triage crashes
        run: |
          mkdir -p results/fuzz
          bin="$TARGET_BIN"
          bname=$(basename "$bin")
          shopt -s nullglob
          crash_dir="results/afl/default/crashes"
          if [ -d "$crash_dir" ]; then
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname=$(basename "$crash")
              [ "$cname" = "README.txt" ] && continue
              result_file="results/fuzz/${bname}_${cname}.txt"
              echo "[*] Triaging $cname..."
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 "$bin" "$crash" > /dev/null 2> "$result_file"
              set -e
              cp "$crash" "results/fuzz/${bname}_${cname}.bin"
            done
          else
            echo "[!] No crashes directory found at $crash_dir"
          fi

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libksba
          path: results/pocs/
          retention-days: 90

