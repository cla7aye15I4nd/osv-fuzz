name: "Fuzz mbedtls"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"

env:
  PROJECT: mbedtls
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            cmake \
            python-all-dev \
            python3-all-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/google/boringssl.git /tmp/src/boringssl
          git clone --depth 1 https://github.com/openssl/openssl.git /tmp/src/openssl

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          cd /tmp/src/mbedtls
          scripts/config.py full
          scripts/config.py set MBEDTLS_PLATFORM_TIME_ALT
          scripts/config.py unset MBEDTLS_USE_PSA_CRYPTO
          mkdir build
          cd build
          cmake -DENABLE_TESTING=ON ..
          make -j$(nproc) all
          cp programs/fuzz/fuzz_* $GITHUB_WORKSPACE/build/fuzz-targets/
          cd ..
          cd programs
          cp -r ../../openssl/fuzz/corpora/crl fuzz/corpuses/
          cp -r ../../openssl/fuzz/corpora/x509 fuzz/corpuses/
          cp -r ../../boringssl/fuzz/privkey_corpus fuzz/corpuses/
          cp ../../boringssl/fuzz/cert_corpus/* fuzz/corpuses/x509/
          zip -r fuzz/fuzz_x509crl_seed_corpus.zip ../framework/data_files/crl* fuzz/corpuses/crl
          zip -r fuzz/fuzz_x509crt_seed_corpus.zip ../framework/data_files/*.crt ../framework/data_files/dir*/*.crt  fuzz/corpuses/x509/
          zip -r fuzz/fuzz_x509csr_seed_corpus.zip ../framework/data_files/*.csr ../framework/data_files/*.req.*
          zip -r fuzz/fuzz_privkey_seed_corpus.zip ../framework/data_files/*.key ../framework/data_files/*.pem fuzz/corpuses/privkey_corpus
          zip -r fuzz/fuzz_pubkey_seed_corpus.zip ../framework/data_files/*.pub ../framework/data_files/*.pubkey
          zip -r fuzz/fuzz_dtlsclient_seed_corpus.zip fuzz/corpuses/dtlsclient
          zip -r fuzz/fuzz_dtlsserver_seed_corpus.zip fuzz/corpuses/dtlsserver
          zip -r fuzz/fuzz_client_seed_corpus.zip fuzz/corpuses/client
          zip -r fuzz/fuzz_server_seed_corpus.zip fuzz/corpuses/server
          cd fuzz
          cp *.options $GITHUB_WORKSPACE/build/fuzz-targets/
          cp fuzz_*_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/
          cd ../..
          scripts/config.py full
          scripts/config.py set MBEDTLS_PLATFORM_TIME_ALT
          scripts/config.py set MBEDTLS_USE_PSA_CRYPTO
          scripts/config.py set MBEDTLS_ECDH_VARIANT_EVEREST_ENABLED
          scripts/config.py set MBEDTLS_RSA_NO_CRT
          mkdir build-usepsa
          cd build-usepsa
          cmake -DENABLE_TESTING=OFF ..
          make -j$(nproc) -C programs/fuzz
          cd programs/fuzz
          for x in fuzz_*; do
            cp $x $GITHUB_WORKSPACE/build/fuzz-targets/usepsa-$x
            if [ -e $GITHUB_WORKSPACE/build/fuzz-targets/${x}_seed_corpus.zip ]; then
              ln -s ${x}_seed_corpus.zip $GITHUB_WORKSPACE/build/fuzz-targets/usepsa-${x}_seed_corpus.zip
            fi
            if [ -e $GITHUB_WORKSPACE/build/fuzz-targets/${x}.options ]; then
              ln -s ${x}.options $GITHUB_WORKSPACE/build/fuzz-targets/usepsa-${x}.options
            fi
          done
          cd ../..
          cd ..

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
