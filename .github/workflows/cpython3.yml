name: "Fuzz cpython3"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 20 * * 0"

env:
  PROJECT: cpython3
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            libbz2-dev \
            libc6-dev \
            libffi-dev \
            libgdbm-dev \
            libncursesw5-dev \
            libreadline-dev \
            libsqlite3-dev \
            libssl-dev \
            tk-dev \
            zlib1g-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/python/cpython.git /tmp/src/cpython3

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/cpython3
          set +e
          export ASAN_OPTIONS="detect_leaks=0"
          export MSAN_OPTIONS="halt_on_error=0:exitcode=0:report_umrs=0"
          CFLAGS=${CFLAGS//"-pthread"/}
          CFLAGS="${CFLAGS} -UNDEBUG"
          CFLAGS="${CFLAGS} -IInclude/internal/"
          FLAGS=()
          case $SANITIZER in
            address)
              FLAGS+=("--with-address-sanitizer")
              ;;
            memory)
              FLAGS+=("--with-memory-sanitizer")
              FLAGS+=("--without-ensurepip")
              FLAGS+=("CFLAGS=-mllvm -msan-keep-going=1")
              ;;
            undefined)
              FLAGS+=("--with-undefined-behavior-sanitizer")
              ;;
          esac
          ./configure "${FLAGS[@]:-}" --prefix $GITHUB_WORKSPACE/build/fuzz-targets
          make -j$(nproc) altinstall
          FUZZ_DIR=Modules/_xxtestfuzz
          for fuzz_test in $(cat $FUZZ_DIR/fuzz_tests.txt)
          do
            $CC $CFLAGS $($GITHUB_WORKSPACE/build/fuzz-targets/bin/python*-config --cflags) $FUZZ_DIR/fuzzer.c \
              -D _Py_FUZZ_ONE -D _Py_FUZZ_$fuzz_test -c -Wno-unused-function \
              -o /tmp/work/$fuzz_test.o
            $CXX $CXXFLAGS -rdynamic /tmp/work/$fuzz_test.o -o $GITHUB_WORKSPACE/build/fuzz-targets/$fuzz_test \
              $LIB_FUZZING_ENGINE $($GITHUB_WORKSPACE/build/fuzz-targets/bin/python*-config --ldflags --embed)
            if [ -d "${FUZZ_DIR}/${fuzz_test}_corpus" ]; then
              zip -j "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzz_test}_seed_corpus.zip" ${FUZZ_DIR}/${fuzz_test}_corpus/*
            fi
            if [ -e "${FUZZ_DIR}/dictionaries/${fuzz_test}.dict" ]; then
              cp "${FUZZ_DIR}/dictionaries/${fuzz_test}.dict" "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzz_test}.dict"
            fi
          done
          if [ "$SANITIZER" = "coverage" ]
          then
            mkdir -p $GITHUB_WORKSPACE/build/fuzz-targets/$GITHUB_WORKSPACE/build/fuzz-targets
            cp -r $GITHUB_WORKSPACE/build/fuzz-targets/include $GITHUB_WORKSPACE/build/fuzz-targets/$GITHUB_WORKSPACE/build/fuzz-targets/
          fi
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
