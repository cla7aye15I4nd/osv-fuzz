name: "Fuzz native libpng"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libpng
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq zlib1g-dev

      - name: Build libpng (latest) with AFL++ + ASan
        run: |
          set -euxo pipefail
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/pnggroup/libpng.git /tmp/src/libpng
          cd /tmp/src/libpng
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"
          # git checkout ships no ./configure; generate it.
          ./autogen.sh
          ./configure
          make -j"$(nproc)"
          # Stock simplified-read-API CLI example, linked against the ASan build.
          "$CC" $CFLAGS -I. contrib/examples/pngtopng.c .libs/libpng16.a -lz -lm -o pngtopng
          export BINDIR="$PWD"
          echo "BINDIR=$BINDIR" | tee -a "$GITHUB_ENV"
          echo "TARGET_BIN=$BINDIR/pngtopng" | tee -a "$GITHUB_ENV"
          ls -la "$BINDIR/pngtopng"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uxo pipefail
          mkdir -p results/dry_run
          bname="pngtopng"
          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            POC="$seed"
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
              timeout 60 "$TARGET_BIN" "$POC" /tmp/out.png > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uxo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          afl-fuzz -i seeds/"$PROJECT" -o results/afl -V "$FUZZ_DURATION" \
            -- "$TARGET_BIN" @@ /tmp/out.png || true

      - name: Triage AFL++ crashes
        run: |
          set -uxo pipefail
          mkdir -p results/fuzz
          bname="pngtopng"
          crash_dir="results/afl/default/crashes"
          if [ -d "$crash_dir" ]; then
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname=$(basename "$crash")
              [ "$cname" = "README.txt" ] && continue
              result_file="results/fuzz/${bname}_${cname}.txt"
              echo "[*] Triaging $cname..."
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 "$TARGET_BIN" "$crash" /tmp/out.png > /dev/null 2> "$result_file"
              set -e
              cp "$crash" "results/fuzz/${bname}_${cname}.bin"
            done
          else
            echo "[!] No AFL crash directory found at $crash_dir"
          fi

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libpng
          path: results/
          retention-days: 30

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libpng
          path: results/pocs/
          retention-days: 90
