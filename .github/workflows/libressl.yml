name: "Fuzz libressl"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"

env:
  PROJECT: libressl
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            bison \
            cmake \
            flex \
            libtool \
            lzip \
            texinfo

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/libressl/portable.git /tmp/src/libressl
          git clone --depth 1 https://github.com/libressl/fuzz.git /tmp/src/libressl.fuzzers

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          cd /tmp/src/libressl
          cd /tmp/src/
          tar jxf boost_1_84_0.tar.bz2
          cd boost_1_84_0/
          CFLAGS="" CXXFLAGS="" ./bootstrap.sh
          CFLAGS="" CXXFLAGS="" ./b2 headers
          cp -R boost/ /usr/include/
          mkdir -p /tmp/work/libressl
          cd /tmp/work/libressl
          CMAKE_DEFINES=""
          if [[ $CFLAGS = *sanitize=memory* ]]
          then
            CMAKE_DEFINES+=" -DOPENSSL_NO_ASM=1"
          fi
          cmake -DCMAKE_C_COMPILER=$CC -DCMAKE_CXX_COMPILER=$CXX \
                -DCMAKE_C_FLAGS="$CFLAGS" -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
                $CMAKE_DEFINES /tmp/src/libressl/
          make -j$(nproc)
          LIBRESSL_FUZZERS=/tmp/src/libressl.fuzzers
          fuzzerFiles=$(find $LIBRESSL_FUZZERS -name "*.c" | egrep -v 'driver.c|test-corpus.c')
          find . -name "*.a"
          $CC -c $CFLAGS \
              -o /tmp/work/driver.o \
              $LIBRESSL_FUZZERS/driver.c \
              -I /tmp/src/libressl/include -I /tmp/src/libressl
          for F in $fuzzerFiles; do
            fuzzerName=$(basename $F .c)
            echo "Building fuzzer $fuzzerName"
            $CC -c $CFLAGS \
                -o /tmp/work/${fuzzerName}.o \
                $F -I /tmp/src/libressl/include -I /tmp/src/libressl
            $CXX $CXXFLAGS \
                -o $GITHUB_WORKSPACE/build/fuzz-targets/${fuzzerName} -fsanitize-recover=address \
                /tmp/work/driver.o /tmp/work/${fuzzerName}.o ./ssl/libssl.a ./crypto/libcrypto.a ./tls/libtls.a $LIB_FUZZING_ENGINE
            if [ -d "$LIBRESSL_FUZZERS/corpora/${fuzzerName}/" ]; then
              zip -j $GITHUB_WORKSPACE/build/fuzz-targets/${fuzzerName}_seed_corpus.zip $LIBRESSL_FUZZERS/corpora/${fuzzerName}/*
            fi
          done
          cp /tmp/src/*.options $GITHUB_WORKSPACE/build/fuzz-targets/
          cp $LIBRESSL_FUZZERS/oids.txt $GITHUB_WORKSPACE/build/fuzz-targets/asn1.dict
          cp $LIBRESSL_FUZZERS/oids.txt $GITHUB_WORKSPACE/build/fuzz-targets/x509.dict

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
