name: "Fuzz radare2"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 14 * * 0"

env:
  PROJECT: radare2
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            pkg-config \
            meson \
            ninja-build \
            zip

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/radareorg/radare2 /tmp/src/radare2
          git clone --depth 1 --recursive https://github.com/radareorg/radare2-fuzz /tmp/src/radare2-fuzz

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sfL --retry 3 --retry-delay 5 -o /tmp/src/default.options "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/radare2/default.options"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export ASAN_OPTIONS=detect_leaks=0
          export CCACHE_DISABLE=1
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets

          cd /tmp/src/radare2

          # Build radare2 with meson using static libraries and built-in fuzz targets.
          # The enable_libfuzzer option builds ~20 fuzz targets in test/fuzz/.
          # With CC=afl-cc, the -fsanitize=fuzzer flag in each target's build rule
          # is handled by AFL++'s runtime (afl-cc intercepts it).
          meson setup builddir \
            --default-library=static \
            --prefix=/usr \
            --libdir=lib \
            --buildtype=debugoptimized \
            -Denable_tests=false \
            -Denable_r2r=false \
            -Denable_libfuzzer=true \
            -Dcli=disabled

          ninja -C builddir -j$(nproc)

          # Copy built-in fuzz targets to output
          for target in builddir/test/fuzz/fuzz_*; do
            [ -f "$target" ] && [ -x "$target" ] || continue
            bname=$(basename "$target")
            cp "$target" "$OUT/"
            [ -f "$SRC/default.options" ] && cp "$SRC/default.options" "$OUT/$bname.options"
            echo "[+] Built: $bname"
          done

          # Also attempt to build the external ia_fuzz from radare2-fuzz.
          # Install the meson build to create combined libr.a for external targets.
          R2_STATIC=$(pwd)/r2-static
          mkdir -p "$R2_STATIC/usr"
          DESTDIR="$R2_STATIC" ninja -C builddir install 2>/dev/null || true

          # Combine individual static libraries into a single libr.a
          if [ -d "$R2_STATIC/usr/lib" ]; then
            echo "CREATE /tmp/libr-combined.a" > /tmp/merge.mri
            find "$R2_STATIC/usr/lib" -name '*.a' | sort | while read lib; do
              echo "ADDLIB $lib" >> /tmp/merge.mri
            done
            echo "SAVE" >> /tmp/merge.mri
            echo "END" >> /tmp/merge.mri
            if ar -M < /tmp/merge.mri 2>/dev/null; then
              mv /tmp/libr-combined.a "$R2_STATIC/usr/lib/libr.a"
              export RADARE2_STATIC_BUILD="$R2_STATIC"
              export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
              export CXXFLAGS="${CXXFLAGS} -I ${RADARE2_STATIC_BUILD}/usr/include/libr/sdb"
              cp -r "$SRC/radare2-fuzz/targets" .
              cd targets
              if make 2>&1; then
                for target_src in *.cc; do
                  fuzzer=$(echo "$target_src" | cut -d'.' -f1)
                  [ -f "$fuzzer" ] && cp "$fuzzer" "$OUT/" && echo "[+] Built external: $fuzzer"
                  [ -f "$SRC/default.options" ] && cp "$SRC/default.options" "$OUT/$fuzzer.options"
                done
              else
                echo "[!] External ia_fuzz build failed (non-fatal, built-in targets available)"
              fi
              # Package seed corpora from radare2-fuzz
              for seed_dir in corpora/*/; do
                [ -d "$seed_dir" ] || continue
                seed=$(basename "$seed_dir")
                zip -j "corpora/$seed.zip" "$seed_dir"* 2>/dev/null && cp "corpora/$seed.zip" "$OUT/"
              done
              cd ..
            fi
          fi

          # Verify at least one fuzz target was built
          target_count=$(find "$OUT" -maxdepth 1 -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets:"
          find "$OUT" -maxdepth 1 -type f -executable -exec basename {} \; | sort
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
