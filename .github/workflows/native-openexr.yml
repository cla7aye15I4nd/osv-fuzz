name: "Fuzz native openexr"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: openexr
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone latest upstream source and build with AFL++ + ASan
        run: |
          set -euo pipefail
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/AcademySoftwareFoundation/openexr.git /tmp/src/openexr
          cd /tmp/src/openexr

          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1

          cmake -S . -B _build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=afl-cc \
            -DCMAKE_CXX_COMPILER=afl-c++ \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DBUILD_SHARED_LIBS=OFF \
            -DOPENEXR_BUILD_TOOLS=ON \
            -DBUILD_TESTING=OFF \
            -DCMAKE_RUNTIME_OUTPUT_DIRECTORY="$PWD/_build/bin"
          cmake --build _build -j"$(nproc)"

          BINDIR="$PWD/_build/bin"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built tools in $BINDIR:"
          ls -la "$BINDIR" || true

          # Verify the two CLI targets we drive were produced.
          if [ ! -x "$BINDIR/exrmakepreview" ] || [ ! -x "$BINDIR/exrmaketiled" ]; then
            echo "[!] Expected CLI binaries not found — build failed"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run
          crash_count=0
          total=0
          # Both invocations are: <bin> <input> /tmp/out.exr
          # Replay every seed against both drivers used by the collected PoCs.
          for bin_name in exrmakepreview exrmaketiled; do
            binary="$BINDIR/$bin_name"
            [ -x "$binary" ] || continue
            for seed in seeds/"$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname=$(basename "$seed" .bin)
              result_file="results/dry_run/${bin_name}_${sname}.txt"
              [ -f "$result_file" ] && continue
              total=$((total + 1))
              echo "[*] Replaying $bin_name with $sname..."
              set +e
              ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
                timeout 60 "$binary" "$seed" /tmp/out.exr > /dev/null 2> results/dry_run/.stderr_tmp
              exit_code=$?
              set -e
              if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
                echo "  [!] CRASH: $bin_name with $sname (exit=$exit_code)"
                mv results/dry_run/.stderr_tmp "$result_file"
                cp "$seed" "results/dry_run/${bin_name}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0:symbolize=1"
          # Primary driver exrmakepreview covers 4 of 5 collected PoCs.
          # AFL substitutes @@ with the mutated input path; output goes to a fixed file.
          afl-fuzz \
            -i seeds/"$PROJECT" \
            -o results/afl \
            -V "$FUZZ_DURATION" \
            -- "$BINDIR/exrmakepreview" @@ /tmp/out.exr || true

      - name: Triage crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          crashes_dir="results/afl/default/crashes"
          if [ ! -d "$crashes_dir" ]; then
            echo "[+] No crashes directory produced by AFL++"
            exit 0
          fi
          bin_name=exrmakepreview
          binary="$BINDIR/$bin_name"
          count=0
          for crash in "$crashes_dir"/*; do
            [ -f "$crash" ] || continue
            cname=$(basename "$crash")
            [ "$cname" = "README.txt" ] && continue
            report_file="results/fuzz/${bin_name}_${cname}.txt"
            echo "[*] Triaging $cname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0:symbolize=1" \
              timeout 60 "$binary" "$crash" /tmp/out.exr > /dev/null 2> "$report_file"
            set -e
            cp "$crash" "results/fuzz/${bin_name}_${cname}.bin"
            count=$((count + 1))
          done
          echo "[+] Triaged $count crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-openexr
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-openexr
          path: results/
          retention-days: 30
