name: "Fuzz native openexr"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: openexr
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install extra build dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq zlib1g-dev 2>/dev/null || true

      - name: Clone latest upstream source and build with AFL++ + ASan
        run: |
          set -euo pipefail
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1

          SRC=/tmp/src/openexr
          BUILD=/tmp/openexr-build
          rm -rf "$SRC" "$BUILD"
          mkdir -p /tmp/src

          # Retry clone (with submodules) up to 3x for flaky network.
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                https://github.com/AcademySoftwareFoundation/openexr.git "$SRC"; then
              break
            fi
            n=$((n + 1))
            echo "[!] clone failed (attempt $n) — retrying..."
            rm -rf "$SRC"
            sleep 5
          done
          if [ ! -d "$SRC" ]; then
            echo "[!] Failed to clone openexr after 3 attempts"
            exit 1
          fi
          git -C "$SRC" submodule update --init --recursive || true

          # Build OUT-OF-SOURCE (build dir outside the source tree).
          cmake -S "$SRC" -B "$BUILD" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=afl-cc \
            -DCMAKE_CXX_COMPILER=afl-c++ \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DBUILD_SHARED_LIBS=OFF \
            -DOPENEXR_BUILD_TOOLS=ON \
            -DBUILD_TESTING=OFF \
            -DOPENEXR_INSTALL_EXAMPLES=OFF \
            -DOPENEXR_BUILD_EXAMPLES=OFF \
            -DCMAKE_RUNTIME_OUTPUT_DIRECTORY="$BUILD/bin"
          cmake --build "$BUILD" -j"$(nproc)"

          # Tools may land in $BUILD/bin (RUNTIME_OUTPUT_DIRECTORY) or scattered
          # under the tree — resolve the directory that actually holds exrheader.
          BINDIR="$BUILD/bin"
          if [ ! -x "$BINDIR/exrheader" ]; then
            found=$(find "$BUILD" -type f -name exrheader -perm -u+x 2>/dev/null | head -1 || true)
            if [ -n "$found" ]; then
              BINDIR=$(dirname "$found")
            fi
          fi
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built tools in $BINDIR:"
          ls -la "$BINDIR" || true

          # Sanity: at least the two drivers from the recorded PoCs must exist.
          if [ ! -x "$BINDIR/exrmakepreview" ] || [ ! -x "$BINDIR/exrmaketiled" ]; then
            echo "[!] Expected CLI binaries not found — build failed"
            exit 1
          fi

      - name: Enumerate fuzz targets
        run: |
          set -euo pipefail
          # Known file-input CLI tools and their argument templates (@@ = input).
          # Only tools that consume a single .exr file as their primary input.
          declare -A TEMPLATES=(
            [exrheader]="@@"
            [exrinfo]="@@"
            [exrcheck]="@@"
            [exrmanifest]="@@"
            [exrmakepreview]="@@ /tmp/out_exrmakepreview.exr"
            [exrmaketiled]="@@ /tmp/out_exrmaketiled.exr"
            [exr2aces]="@@ /tmp/out_exr2aces.exr"
            [exrenvmap]="@@ /tmp/out_exrenvmap.exr"
            [exrstdattr]="@@ /tmp/out_exrstdattr.exr"
            [exrmetrics]="-i @@"
          )

          # Pick a representative seed for the showmap startup probe.
          probe=""
          for s in seeds/"$PROJECT"/*.bin; do
            [ -f "$s" ] && { probe="$s"; break; }
          done

          : > /tmp/targets.txt
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"

          for tool in "${!TEMPLATES[@]}"; do
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || { echo "[-] skip $tool (not built)"; continue; }
            args="${TEMPLATES[$tool]}"

            # Verify the target starts under AFL instrumentation via afl-showmap.
            if [ -n "$probe" ]; then
              cmd="${args/@@/$probe}"
              rm -f /tmp/showmap.out
              # shellcheck disable=SC2086
              afl-showmap -o /tmp/showmap.out -m none -t 5000 -- "$bin" $cmd \
                > /dev/null 2>&1 || true
              if [ ! -s /tmp/showmap.out ]; then
                echo "[-] skip $tool (afl-showmap produced no coverage — startup failed)"
                continue
              fi
            fi

            echo "${tool}|${args}" >> /tmp/targets.txt
            echo "[+] target: $tool  args: $args"
          done

          n=$(wc -l < /tmp/targets.txt)
          echo "[+] $n fuzz targets selected"
          if [ "$n" -eq 0 ]; then
            echo "[!] No usable fuzz targets — aborting"
            exit 1
          fi
          echo "TARGET_COUNT=$n" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"
          crash_count=0
          total=0
          # Replay every seed against every selected target.
          while IFS='|' read -r tool args; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            for seed in seeds/"$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname=$(basename "$seed" .bin)
              result_file="results/dry_run/${tool}_${sname}.txt"
              cmd="${args/@@/$seed}"
              total=$((total + 1))
              echo "[*] Replaying $tool with $sname..."
              rc=0
              # shellcheck disable=SC2086
              timeout 60 "$bin" $cmd > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "$result_file"
                cp "$seed" "results/dry_run/${tool}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done < /tmp/targets.txt
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0:symbolize=1"

          n="${TARGET_COUNT:-1}"
          per=$(( FUZZ_DURATION / n ))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Fuzzing $n targets for ${per}s each"

          while IFS='|' read -r tool args; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            echo "[*] Fuzzing $tool for ${per}s: $bin $args"
            # shellcheck disable=SC2086
            afl-fuzz \
              -i seeds/"$PROJECT" \
              -o "results/afl/$tool" \
              -m none \
              -V "$per" \
              -- "$bin" $args || true
          done < /tmp/targets.txt
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set +e
          mkdir -p results/fuzz
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0:symbolize=1"
          count=0
          while IFS='|' read -r tool args; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$tool/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname=$(basename "$crash")
              [ "$cname" = "README.txt" ] && continue
              report_file="results/fuzz/${tool}_${cname}.txt"
              cmd="${args/@@/$crash}"
              echo "[*] Triaging $tool / $cname..."
              # shellcheck disable=SC2086
              timeout 60 "$bin" $cmd > /dev/null 2> "$report_file"
              cp "$crash" "results/fuzz/${tool}_${cname}.bin"
              count=$((count + 1))
            done
          done < /tmp/targets.txt
          echo "[+] Triaged $count crashing inputs"

      - name: Sanitize result filenames
        if: always()
        run: |
          # AFL emits files like id:000000,time:... — ':' breaks upload-artifact@v4.
          find results -depth -name '*:*' | while read -r p; do
            newp=$(echo "$p" | tr ':' '_')
            [ "$p" != "$newp" ] && mv "$p" "$newp"
          done || true
          echo "[+] Sanitized ':' in result filenames"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-openexr
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-openexr
          path: results/
          retention-days: 30
