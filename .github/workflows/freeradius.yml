name: "Fuzz freeradius"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 19 * * 0"

env:
  PROJECT: freeradius
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            cmake \
            libkqueue-dev \
            libtalloc-dev \
            libunwind-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/FreeRADIUS/freeradius-server.git /tmp/src/freeradius-server

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sL -o /tmp/src/generate_seeds.py "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/freeradius/generate_seeds.py"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Make /usr/local writable for install commands
          sudo chmod -R a+w /usr/local/lib /usr/local/include /usr/local/bin 2>/dev/null || true
          sudo mkdir -p /usr/local/lib/pkgconfig && sudo chmod a+w /usr/local/lib/pkgconfig 2>/dev/null || true
          cd /tmp/src/freeradius-server
          function copy_lib
              {
              local fuzzer_path=$1
              local lib=$2
              cp $(ldd ${fuzzer_path} | grep "${lib}" | awk '{ print $3 }') $GITHUB_WORKSPACE/build/fuzz-targets/lib
              }
          mkdir -p $GITHUB_WORKSPACE/build/fuzz-targets/lib
          find . -exec touch {} +
          mkdir -p /tmp/src/json-c-build
          pushd /tmp/src/json-c-build
          cmake /tmp/src/json-c \
              -DCMAKE_INSTALL_PREFIX=${JSONC_PREFIX} \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=OFF \
              -DBUILD_STATIC_LIBS=ON \
              -DDISABLE_WERROR=ON \
              -DBUILD_TESTING=OFF \
              -DCMAKE_C_COMPILER="$CC" \
              -DCMAKE_C_FLAGS="$CFLAGS -fPIC"
          make -j$(nproc)
          make install
          popd
          FUZZER_JSON_MK=src/fuzzer/fuzzer_json.mk
          sed -i \
              -e "s|^SRC_CFLAGS\s*+= -I\$(top_builddir)/src/lib/json/|SRC_CFLAGS += -I\$(top_builddir)/src/lib/json/ -I${JSONC_PREFIX}/include|" \
              -e "s|-ljson-c|${JSONC_PREFIX}/lib/libjson-c.a|" \
              "$FUZZER_JSON_MK"
          cat "$FUZZER_JSON_MK"
          for mk in src/fuzzer/fuzzer_cf.mk src/fuzzer/fuzzer_value.mk src/fuzzer/fuzzer_xlat.mk; do
              if ! grep -q '^TGT_LDLIBS' "$mk"; then
                  echo 'TGT_LDLIBS		:= $(LIBS)' >> "$mk"
              fi
          done
          ./configure --enable-fuzzer --enable-coverage --enable-address-sanitizer \
              --with-jsonc-include-dir=${JSONC_PREFIX}/include \
              --with-jsonc-lib-dir=${JSONC_PREFIX}/lib
          make -i -j$(nproc)
          make -i install
          ldconfig
          ls ./build/bin/local/fuzzer_* | while read i; do
              patchelf --set-rpath '$ORIGIN/lib' ${i}
              copy_lib ${i} libfreeradius
              copy_lib ${i} talloc
              copy_lib ${i} kqueue
              copy_lib ${i} libunwind
              cp ${i} $GITHUB_WORKSPACE/build/fuzz-targets/
          done
          cp -r /usr/local/share/freeradius/dictionary $GITHUB_WORKSPACE/build/fuzz-targets/dict
          python3 /tmp/src/generate_seeds.py /tmp/src/generated_seeds
          for seeddir in /tmp/src/generated_seeds/*/; do
              proto=$(basename "$seeddir")
              if [ -f "$GITHUB_WORKSPACE/build/fuzz-targets/fuzzer_${proto}" ]; then
                  zip -j -q "$GITHUB_WORKSPACE/build/fuzz-targets/fuzzer_${proto}_seed_corpus.zip" "$seeddir"/* || true
              fi
          done

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
