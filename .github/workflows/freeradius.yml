name: "Fuzz freeradius"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 4 * * 0"

env:
  PROJECT: freeradius
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            libjson-c-dev \
            libkqueue-dev \
            libssl-dev \
            libtalloc-dev \
            libunwind-dev \
            patchelf \
            zip

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/FreeRADIUS/freeradius-server.git /tmp/src/freeradius-server

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sL -o /tmp/src/generate_seeds.py "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/freeradius/generate_seeds.py"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address -shared-libasan"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address -shared-libasan"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/freeradius-server
          set +e
          # Prevent ASAN from failing configure's test programs
          export ASAN_OPTIONS=detect_leaks=0
          # Normalize source-tree timestamps to avoid clock-skew build loops
          find . -exec touch {} +
          # Fix fuzzer .mk files missing TGT_LDLIBS (link failure on ubuntu-24-04)
          for mk in src/fuzzer/fuzzer_cf.mk src/fuzzer/fuzzer_value.mk src/fuzzer/fuzzer_xlat.mk; do
              if [ -f "$mk" ] && ! grep -q '^TGT_LDLIBS' "$mk"; then
                  echo 'TGT_LDLIBS		:= $(LIBS)' >> "$mk"
              fi
          done
          # Configure with fuzzer support
          ./configure --enable-fuzzer --enable-address-sanitizer
          # Preload ASAN shared runtime so GNU make can dlopen ASAN-instrumented
          # build helpers (libfreeradius-make-dlopen.so is loaded via make's
          # `load` directive; static ASAN cannot be dlopened into non-ASAN processes)
          ASAN_LIB=$(find /usr -name "libclang_rt.asan-x86_64.so" 2>/dev/null | head -1)
          # make tries to compile regular programs as fuzz targets
          # so -i flag ignores these errors
          LD_PRELOAD="${ASAN_LIB}" make -i -j$(nproc)
          LD_PRELOAD="${ASAN_LIB}" make -i install
          sudo ldconfig
          # Copy fuzzer binaries with their shared library dependencies
          mkdir -p $OUT/lib
          copy_lib() {
              local fuzzer_path=$1
              local lib=$2
              local libpath
              libpath=$(ldd "${fuzzer_path}" 2>/dev/null | grep "${lib}" | awk '{ print $3 }')
              if [ -n "$libpath" ] && [ -f "$libpath" ]; then
                  cp "$libpath" "${OUT}/lib/"
              fi
          }
          ls ./build/bin/local/fuzzer_* 2>/dev/null | while read i; do
              patchelf --set-rpath '$ORIGIN/lib' "${i}"
              copy_lib "${i}" libfreeradius
              copy_lib "${i}" talloc
              copy_lib "${i}" kqueue
              copy_lib "${i}" libunwind
              cp "${i}" "$OUT/"
          done
          # Copy ASAN shared runtime (needed by fuzzer binaries at runtime with -shared-libasan)
          if [ -n "${ASAN_LIB:-}" ] && [ -f "${ASAN_LIB}" ]; then
              cp "$ASAN_LIB" "${OUT}/lib/"
          fi
          # Copy dictionary files needed at runtime
          if [ -d /usr/local/share/freeradius/dictionary ]; then
              cp -r /usr/local/share/freeradius/dictionary $OUT/dict
          elif [ -d /usr/local/share/freeradius ]; then
              cp -r /usr/local/share/freeradius $OUT/dict
          fi
          # Generate structured seed corpora
          python3 /tmp/src/generate_seeds.py /tmp/src/generated_seeds
          for seeddir in /tmp/src/generated_seeds/*/; do
              proto=$(basename "$seeddir")
              if [ -f "$OUT/fuzzer_${proto}" ]; then
                  zip -j -q "$OUT/fuzzer_${proto}_seed_corpus.zip" "$seeddir"/* || true
              fi
          done
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
