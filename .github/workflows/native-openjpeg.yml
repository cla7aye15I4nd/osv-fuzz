name: "Fuzz native openjpeg"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Total fuzzing duration in seconds (split across targets)"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: openjpeg
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -40 || true
          if [ "$seed_count" -eq 0 ]; then
            echo "[!] No seeds found — seeding with a minimal placeholder so AFL can start"
            printf '\x00\x00\x00\x0cjP  \r\n\x87\n' > "seeds/$PROJECT/placeholder.bin"
          fi

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          # Extra deps openjpeg's bundled thirdparty / codec build may need.
          sudo apt-get install -y -qq zlib1g-dev libpng-dev libtiff-dev liblcms2-dev 2>/dev/null || true

      - name: Clone latest upstream source
        run: |
          set -e
          SRC=/tmp/src/openjpeg
          rm -rf "$SRC"
          mkdir -p /tmp/src
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                 https://github.com/uclouvain/openjpeg.git "$SRC"; then
              break
            fi
            n=$((n + 1))
            echo "[!] clone attempt $n failed — retrying in 5s"
            rm -rf "$SRC"
            sleep 5
          done
          [ -d "$SRC" ] || { echo "[!] git clone failed after 3 attempts"; exit 1; }
          git -C "$SRC" submodule update --init --recursive || true

      - name: Build CLI tools with AFL++ + AddressSanitizer
        run: |
          set -e
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          SRC=/tmp/src/openjpeg
          # CMake project: build strictly OUT-OF-SOURCE, outside the source tree.
          BUILD=/tmp/openjpeg-build
          rm -rf "$BUILD"
          mkdir -p "$BUILD"
          cmake -S "$SRC" -B "$BUILD" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_CODEC=ON \
            -DBUILD_THIRDPARTY=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_DOC=OFF \
            -DBUILD_MJ2=OFF \
            -DBUILD_JPWL=OFF \
            -DBUILD_JPIP=OFF \
            -DCMAKE_C_COMPILER=afl-cc \
            -DCMAKE_CXX_COMPILER=afl-c++ \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build "$BUILD" -j"$(nproc)"
          # Locate the directory that actually holds the codec CLI tools.
          BINDIR=""
          for cand in "$BUILD/bin" "$BUILD"; do
            if [ -x "$cand/opj_decompress" ] || [ -x "$cand/opj_compress" ]; then
              BINDIR="$cand"
              break
            fi
          done
          if [ -z "$BINDIR" ]; then
            found="$(find "$BUILD" -type f -name 'opj_decompress' -perm -u+x | head -1)"
            [ -n "$found" ] && BINDIR="$(dirname "$found")"
          fi
          [ -n "$BINDIR" ] || { echo "[!] Could not locate built CLI tools"; exit 1; }
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built binaries in $BINDIR:"
          ls -la "$BINDIR"
          test -x "$BINDIR/opj_decompress"
          test -x "$BINDIR/opj_compress"

      - name: Dry-run replay (lost-bug check)
        run: |
          # Step runs under bash -e by default; disable it up front so a
          # crashing replay (the thing we are looking for) does not abort us.
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0

          # One entry per file-input target: "<tool> <args-with-@@>".
          TARGETS=(
            "opj_decompress -i @@ -o /tmp/out.png"
            "opj_decompress -i @@ -o /tmp/out.pgm"
            "opj_compress -i @@ -o /tmp/out.jp2"
            "opj_compress -i @@ -o /tmp/out.j2k"
            "opj_compress -n 1 -i @@ -o /tmp/null.j2k"
            "opj_compress -r 20,10,1 -jpip -EPH -SOP -cinema2K 24 -n 1 -i @@ -o /tmp/out.j2k"
          )
          # opj_dump is a pure file consumer if it was built.
          if [ -x "$BINDIR/opj_dump" ]; then
            TARGETS+=("opj_dump -i @@")
          fi

          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            for t in "${TARGETS[@]}"; do
              tool="${t%% *}"
              rest="${t#* }"
              bin="$BINDIR/$tool"
              [ -x "$bin" ] || continue
              # Substitute the input path for the @@ placeholder.
              cmd="${rest//@@/$seed}"
              total=$((total + 1))
              echo "[*] Replaying $sname via $tool..."
              rc=0
              # shellcheck disable=SC2086
              timeout 60 "$bin" $cmd > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool / $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${tool}_${sname}.txt"
                cp "$seed" "results/dry_run/${tool}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0

          # Candidate file-input targets: "<tool> <args-with-@@>".
          CANDIDATES=(
            "opj_decompress -i @@ -o /tmp/out.png"
            "opj_compress -i @@ -o /tmp/out.jp2"
            "opj_compress -r 20,10,1 -jpip -EPH -SOP -cinema2K 24 -n 1 -i @@ -o /tmp/out.j2k"
          )
          if [ -x "$BINDIR/opj_dump" ]; then
            CANDIDATES+=("opj_dump -i @@")
          fi

          # Keep only targets whose instrumented binary starts under afl-showmap.
          sample="$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)"
          TARGETS=()
          NAMES=()
          for t in "${CANDIDATES[@]}"; do
            tool="${t%% *}"
            rest="${t#* }"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || { echo "[i] skip $tool (not built)"; continue; }
            probe="${rest//@@/$sample}"
            # shellcheck disable=SC2086
            if AFL_QUIET=1 timeout 60 afl-showmap -o /dev/null -m none -- \
                 "$bin" $probe >/dev/null 2>&1; then
              TARGETS+=("$t")
              NAMES+=("$tool")
              echo "[+] target OK: $t"
            else
              # afl-showmap returns non-zero when the target itself crashes on
              # the sample; that is still a usable fuzz target, so keep it.
              rc=$?
              if [ "$rc" -ge 1 ]; then
                TARGETS+=("$t")
                NAMES+=("$tool")
                echo "[+] target kept (showmap rc=$rc): $t"
              else
                echo "[!] skip (afl-showmap could not start): $t"
              fi
            fi
          done

          ntargets="${#TARGETS[@]}"
          if [ "$ntargets" -eq 0 ]; then
            echo "[!] No usable fuzz targets"
            exit 0
          fi

          # Split the budget across targets, minimum 60s each.
          per=$(( FUZZ_DURATION / ntargets ))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Fuzzing $ntargets target(s) for ${per}s each"

          for i in "${!TARGETS[@]}"; do
            t="${TARGETS[$i]}"
            tool="${NAMES[$i]}"
            rest="${t#* }"
            # Disambiguate output dir when the same tool appears twice.
            outdir="results/afl/${tool}_${i}"
            mkdir -p "$outdir"
            echo "[*] Fuzzing target $tool: $rest"
            # shellcheck disable=SC2086
            afl-fuzz -i "seeds/$PROJECT" -o "$outdir" -m none -V "$per" -- \
              "$BINDIR/$tool" ${rest} || true
            ls -la "$outdir"/default/crashes/ 2>/dev/null || echo "[i] no crashes for $tool"
          done
          echo "[+] Fuzzing finished"

      - name: Triage fuzz crashes
        run: |
          set +e
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          shopt -s nullglob

          # Recover the per-target replay command from the output dir name.
          replay_cmd() {
            case "$1" in
              opj_decompress) echo "-i @@ -o /tmp/out.png" ;;
              opj_compress)   echo "-i @@ -o /tmp/out.jp2" ;;
              opj_dump)       echo "-i @@" ;;
              *)              echo "-i @@ -o /tmp/out.png" ;;
            esac
          }

          for cdir in results/afl/*/default/crashes; do
            [ -d "$cdir" ] || continue
            # results/afl/<tool>_<i>/default/crashes -> tool = strip trailing _<i>
            odir="${cdir%/default/crashes}"
            base="$(basename "$odir")"
            tool="${base%_*}"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            tmpl="$(replay_cmd "$tool")"
            for crash in "$cdir"/*; do
              [ -f "$crash" ] || continue
              case "$(basename "$crash")" in
                README.txt) continue ;;
              esac
              cid="$(basename "$crash")"
              safe="${cid//[:,]/_}"
              cmd="${tmpl//@@/$crash}"
              echo "[*] Triaging $tool / $cid..."
              # shellcheck disable=SC2086
              timeout 60 "$bin" $cmd > /dev/null 2> "results/fuzz/${tool}_${safe}.txt"
              cp "$crash" "results/fuzz/${tool}_${safe}.bin"
            done
          done
          echo "[+] Triage complete"

      - name: Sanitize result filenames for upload
        if: always()
        run: |
          # actions/upload-artifact@v4 rejects paths containing ':' (AFL emits
          # names like id:000000,time:...). Rename them depth-first.
          if [ -d results ]; then
            find results -depth -name '*:*' | while read -r p; do
              d="$(dirname "$p")"
              b="$(basename "$p")"
              mv "$p" "$d/${b//:/_}"
            done
          fi
          echo "[+] Filename sanitization complete"

      - name: Generate report
        if: always()
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-openjpeg
          path: results/pocs/
          retention-days: 90

