name: "Fuzz rdkit"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 15 * * 0"

env:
  PROJECT: rdkit
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://gitlab.com/libeigen/eigen /tmp/src/&&
          git clone --depth 1 --recursive https://github.com/rdkit/rdkit.git /tmp/tmp/src/rdkit

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+w /etc/ld.so.cache 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/rdkit
          git clone --depth 1 -b master https://github.com/madler/zlib.git /tmp/src/zlib
          cd /tmp/src/zlib
          OLD_CFLAGS="$CFLAGS"
          export LDFLAGS="-fPIC $CFLAGS"
          export CFLAGS="-fPIC $CFLAGS"
          ./configure --static
          make -j$(nproc) clean
          make -j$(nproc) all install
          unset LDFLAGS
          export CFLAGS="$OLD_CFLAGS"
          cd /tmp/src && \
          wget --quiet https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.bz2 && \
          tar xjf boost_1_84_0.tar.bz2 && \
          cd /tmp/src/boost_1_84_0 && \
          ./bootstrap.sh --with-toolset=clang --with-libraries=serialization,system,iostreams,regex,program_options && \
          cat > /tmp/clang_wrapper.sh << 'WRAPPER'
          args=()
          for arg in "$@"; do
              if [[ "$arg" == "--target="* ]]; then
                  args+=("--target=x86_64-unknown-linux-gnu")
              else
                  args+=("$arg")
              fi
          done
          exec /usr/local/bin/clang++ "${args[@]}"
          WRAPPER
          chmod +x /tmp/clang_wrapper.sh && \
          echo "using clang : : /tmp/clang_wrapper.sh ;" > ~/user-config.jam && \
          ./b2 -q -j$(nproc) toolset=clang linkflags="-fPIC $CXXFLAGS $CXXFLAGS_EXTRA" cxxflags="-fPIC $CXXFLAGS $CXXFLAGS_EXTRA" link=static install
          cd /tmp/src/rdkit
          mkdir -p build && cd build
          cmake -DRDK_BUILD_PYTHON_WRAPPERS=OFF -DRDK_BUILD_FREETYPE_SUPPORT=OFF -DLIB_FUZZING_ENGINE=${LIB_FUZZING_ENGINE} -DRDK_BUILD_FUZZ_TARGETS=ON -DRDK_INSTALL_STATIC_LIBS=ON -DBoost_USE_STATIC_LIBS=ON ..
          make -j$(nproc) -k || true
          make install -k || true
          cd ..
          find . -type f -name '*_fuzzer' -exec cp -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets ';'
          find . -type f -name '*_fuzzer.dict' -exec cp -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets ';'
          corpora=$(find . -type d -name "*_fuzzer")
          for corpus in $corpora; do
          	corpus_basename=$(basename $corpus)
          	zip -j $GITHUB_WORKSPACE/build/fuzz-targets/${corpus_basename}_seed_corpus.zip ${corpus}/*
          done

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
