name: "Fuzz native libming"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libming
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest libming with AFL++ + ASan
        run: |
          set -e
          # libming needs freetype headers (configure) plus bison+flex to
          # generate the ActionScript parser/lexer in src/actioncompiler.
          sudo apt-get install -y -qq bison flex libfreetype-dev 2>/dev/null || \
            sudo apt-get install -y -qq bison flex libfreetype6-dev
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/libming/libming.git /tmp/src/libming
          cd /tmp/src/libming
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          # -fcommon: libming's actioncompiler defines swf4debug/swf5debug in
          # both the bison and flex outputs; clang/gcc default -fno-common turns
          # those tentative definitions into "multiple definition" link errors.
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer -fcommon"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer -fcommon"
          export LDFLAGS="-fsanitize=address"
          ./autogen.sh
          ./configure --disable-shared
          # The actioncompiler Makefile has separate .tab.c and .tab.h rules that
          # each run bison and both write swf<N>compiler.tab.c; under "make -j"
          # they race and clobber it into a corrupt file. Generate the parser/
          # lexer sources serially first, then build the rest in parallel.
          make -C src/actioncompiler \
            swf4compiler.tab.c swf4compiler.tab.h swf5compiler.tab.c swf5compiler.tab.h \
            lex.swf4.c lex.swf5.c
          make -j"$(nproc)"
          BINDIR="$(pwd)/util"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "TARGET_BIN=$BINDIR/swftocxx" >> "$GITHUB_ENV"
          echo "[+] Built binary:"
          ls -la "$BINDIR/swftocxx"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -u
          mkdir -p results/dry_run
          bin="$TARGET_BIN"
          bname="$(basename "$bin")"
          shopt -s nullglob
          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0 \
              timeout 30 "$bin" "$seed" /dev/null > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "results/dry_run/${bname}_${sname}.txt"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -u
          mkdir -p results/afl
          bin="$TARGET_BIN"
          if [ ! -x "$bin" ]; then
            echo "[!] Target binary not found: $bin"
            exit 0
          fi
          set +e
          AFL_SKIP_CPUFREQ=1 \
          AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 \
          AFL_NO_UI=1 \
            timeout "$FUZZ_DURATION" \
            afl-fuzz -i seeds/"$PROJECT" -o results/afl -m none -V "$FUZZ_DURATION" \
              -- "$bin" @@ /dev/null
          echo "[+] afl-fuzz exited with code $?"
          set -e
        continue-on-error: true

      - name: Triage AFL++ crashes
        run: |
          set -u
          mkdir -p results/fuzz
          bin="$TARGET_BIN"
          bname="$(basename "$bin")"
          crash_dir="results/afl/default/crashes"
          shopt -s nullglob
          new_crashes=0
          if [ -d "$crash_dir" ]; then
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              case "$(basename "$crash_file")" in
                README.txt) continue ;;
              esac
              crash_name="$(basename "$crash_file" | tr ':,' '__')"
              result_file="results/fuzz/${bname}_${crash_name}.txt"
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 30 "$bin" "$crash_file" /dev/null > /dev/null 2> "$result_file"
              replay_exit=$?
              set -e
              if [ "$replay_exit" -ne 0 ] && [ "$replay_exit" -ne 124 ]; then
                echo "  [!] NEW CRASH: $bname ($crash_name)"
                cp "$crash_file" "results/fuzz/${bname}_${crash_name}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          fi
          echo "[+] Triage complete: $new_crashes new crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libming
          path: results/pocs/
          retention-days: 90

