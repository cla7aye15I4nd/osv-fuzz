name: "Fuzz libyaml"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 10 * * 0"

env:
  PROJECT: libyaml
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            libtool

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/yaml/libyaml /tmp/src/libyaml

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          # Pattern: *.h — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/libyaml" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.h', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done
          # Pattern: *_fuzzer.c — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/libyaml" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*_fuzzer\\.c', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done
          curl -sL -o /tmp/src/libyaml_fuzzer.options "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/libyaml/libyaml_fuzzer.options"
          curl -sL -o /tmp/src/yaml.dict "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/libyaml/yaml.dict"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+w /etc/ld.so.cache 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/libyaml
          set +e
          ./bootstrap
          ./configure
          make "-j$(nproc)"
          for fuzzer in /tmp/src/*_fuzzer.c; do
            fuzzer_basename=$(basename -s .c $fuzzer)
            $CC $CFLAGS \
                -I /tmp/src -Iinclude \
                -c $fuzzer -o $fuzzer_basename.o
            $CXX $CXXFLAGS \
                -std=c++11 \
                $fuzzer_basename.o \
                -o $GITHUB_WORKSPACE/build/fuzz-targets/$fuzzer_basename \
                $LIB_FUZZING_ENGINE \
                src/.libs/libyaml.a
            cp /tmp/src/libyaml_seed_corpus.zip "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer_basename}_seed_corpus.zip"
            cp /tmp/src/libyaml_fuzzer.options "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer_basename}.options"
          done
          cp /tmp/src/yaml.dict $GITHUB_WORKSPACE/build/fuzz-targets/
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
