name: "Fuzz systemd"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 14 * * 0"

env:
  PROJECT: systemd
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            gperf \
            m4 \
            gettext \
            python3-pip \
            python3-jinja2 \
            libmount-dev \
            ninja-build \
            patchelf \
            wget \
            zstd \
            zip
          pip3 install --break-system-packages meson

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/systemd/systemd /tmp/src/systemd

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export LDFLAGS=""
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work

          # Create stub libFuzzingEngine so meson's oss-fuzz probe passes
          echo 'int main(){}' | $CC -x c - -c -o /tmp/work/empty.o
          sudo ar rcs /usr/lib/libFuzzingEngine.a /tmp/work/empty.o
          sudo ldconfig

          cd /tmp/src/systemd

          # Install pinned Python build requirements (meson/ninja versions)
          pip3 install --break-system-packages \
            -r .github/workflows/requirements.txt 2>/dev/null || true

          # Set PYTHONPATH so systemd code generators find system packages
          ORIG_PYTHONPATH=$(python3 -c 'import sys;print(":".join(sys.path[1:]))')
          export PYTHONPATH="$ORIG_PYTHONPATH:/usr/lib/python3/dist-packages/"

          # Configure with meson — minimal feature set for fuzzing
          build="$WORK/build"
          rm -rf "$build"
          mkdir -p "$build"

          if ! meson setup "$build" \
            -Db_lundef=false \
            -Doss-fuzz=true \
            --auto-features=disabled \
            -Dlibmount=enabled \
            -Dnspawn=enabled \
            -Dresolve=true; then
            cat "$build/meson-logs/meson-log.txt" 2>/dev/null || true
            exit 1
          fi

          ninja -v -C "$build" fuzzers

          # Install shared libraries needed at runtime
          install -Dt "$OUT/src/shared/" \
            "$build"/src/shared/libsystemd-shared-*.so \
            "$build"/src/core/libsystemd-core-*.so

          # Copy fuzz targets to output directory
          find "$build" -maxdepth 1 -type f -executable -name "fuzz-*" \
            -exec mv {} "$OUT" \;

          # Copy dictionaries and options files
          find src -type f -name "fuzz-*.dict" -exec cp {} "$OUT" \;
          cp src/fuzz/*.options "$OUT" 2>/dev/null || true

          # Package seed corpora from test data
          for d in test/fuzz/fuzz-*; do
            [ -d "$d" ] || continue
            fuzzer="$(basename "$d")"
            readarray -t generated < <(find "$build/test/fuzz" -maxdepth 1 \
              -name "${fuzzer}*" -type f 2>/dev/null)
            zip -jqr "$OUT/${fuzzer}_seed_corpus.zip" "$d" \
              "${generated[@]}" 2>/dev/null || true
          done

          # Package BCD test data as seed corpus
          bcd=$(mktemp -d)
          for i in test/test-bcd/*.zst; do
            [ -f "$i" ] || continue
            unzstd "$i" -o "$bcd/$(basename "${i%.zst}")" 2>/dev/null || true
          done
          zip -jqr "$OUT/fuzz-bcd_seed_corpus.zip" "$bcd" 2>/dev/null || true
          rm -rf "$bcd"

          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
