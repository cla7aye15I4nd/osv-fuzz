name: "Fuzz native jq"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: jq
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          # jq's autotools build from a git checkout needs bison + flex to
          # regenerate the parser/lexer.
          sudo apt-get install -y -qq bison flex 2>/dev/null || true

      - name: Clone and build latest jq with AFL++ + ASan
        run: |
          set -euxo pipefail
          # AFL++ compilers with AddressSanitizer instrumentation.
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          BINDIR=/tmp/jq-build
          rm -rf "$BINDIR"

          # Robust clone: retry up to 3x, pull vendored submodules (oniguruma).
          n=0
          until [ "$n" -ge 3 ]; do
            git clone --recurse-submodules https://github.com/jqlang/jq "$BINDIR" && break
            n=$((n + 1))
            echo "[!] clone failed (attempt $n) — retrying..."
            rm -rf "$BINDIR"
            sleep 5
          done
          [ -d "$BINDIR" ] || { echo "[!] git clone failed after 3 attempts"; exit 1; }

          cd "$BINDIR"
          git submodule update --init --recursive   # ensure oniguruma is present

          # Generate ./configure if the checkout does not ship one.
          if [ ! -x ./configure ]; then
            if [ -x ./autogen.sh ]; then
              ./autogen.sh
            else
              autoreconf -fi
            fi
          fi

          # --disable-werror keeps new compiler warnings from failing the build.
          ./configure --with-oniguruma=builtin --disable-shared --disable-werror
          make -j"$(nproc)"                          # -> ./jq (+ ./.libs/libjq.a)

          # Build the execution fuzz harness that the recorded PoC targets. Under
          # AFL++, -fsanitize=fuzzer links AFL++'s libFuzzer driver shim, giving a
          # binary that reads its input from a file argument (AFL's @@); ASan comes
          # from the instrumented libjq.a / CFLAGS above.
          "$CXX" $CXXFLAGS -fsanitize=fuzzer ./tests/jq_fuzz_execute.cpp \
              -I./src -I./vendor/oniguruma/src \
              ./.libs/libjq.a ./vendor/oniguruma/src/.libs/libonig.a \
              -o "$BINDIR/jq_fuzz_execute"

          # Record where the built CLI tools live for later steps.
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built jq tools in $BINDIR:"
          ls -la "$BINDIR/jq_fuzz_execute" "$BINDIR/.libs/jq" 2>/dev/null || true
          file "$BINDIR/jq_fuzz_execute" || true

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run

          # Build the multi-target table. Each entry: "label|binary|args" where
          # args contains @@ as the input-file placeholder.
          declare -a TARGETS=()
          # Primary: the FuzzedDataProvider execution harness (matches PoC).
          [ -x "$BINDIR/jq_fuzz_execute" ] && \
            TARGETS+=("jq_fuzz_execute|$BINDIR/jq_fuzz_execute|@@")
          # jq CLI parsing a JSON document read from a file (identity filter).
          JQ_BIN="$BINDIR/.libs/jq"; [ -x "$JQ_BIN" ] || JQ_BIN="$BINDIR/jq"
          [ -x "$JQ_BIN" ] && TARGETS+=("jq_identity|$JQ_BIN|. @@")

          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            POC="$seed"
            for entry in "${TARGETS[@]}"; do
              IFS='|' read -r label bin args <<< "$entry"
              [ -x "$bin" ] || continue
              total=$((total + 1))
              echo "[*] Replaying $label with $sname..."
              # Capture the exit code without toggling global set -e.
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
                timeout 30 "$bin" ${args//@@/$POC} > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $label with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${label}_${sname}.txt"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          declare -a TARGETS=()
          [ -x "$BINDIR/jq_fuzz_execute" ] && \
            TARGETS+=("jq_fuzz_execute|$BINDIR/jq_fuzz_execute|@@")
          JQ_BIN="$BINDIR/.libs/jq"; [ -x "$JQ_BIN" ] || JQ_BIN="$BINDIR/jq"
          [ -x "$JQ_BIN" ] && TARGETS+=("jq_identity|$JQ_BIN|. @@")

          n="${#TARGETS[@]}"
          [ "$n" -gt 0 ] || { echo "[!] No fuzz targets available"; exit 0; }

          # Split the budget across targets, at least 60s each.
          per=$(( FUZZ_DURATION / n ))
          [ "$per" -lt 60 ] && per=60

          # A seed used only to validate that each target starts under AFL.
          smseed="$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)"

          for entry in "${TARGETS[@]}"; do
            IFS='|' read -r label bin args <<< "$entry"
            [ -x "$bin" ] || continue

            # afl-showmap startup probe: a target that fails to instrument/exec
            # produces an empty map — skip it rather than wasting the budget.
            if [ -n "$smseed" ]; then
              # shellcheck disable=SC2086
              afl-showmap -m none -t 10000 -o "/tmp/map_$label" \
                -- "$bin" ${args//@@/$smseed} >/dev/null 2>&1 || true
              if [ ! -s "/tmp/map_$label" ]; then
                echo "[!] $label failed afl-showmap startup — skipping"
                continue
              fi
            fi

            echo "[*] Fuzzing $label for ${per}s..."
            # shellcheck disable=SC2086
            afl-fuzz -i "seeds/$PROJECT" -o "results/afl/$label" -m none \
              -V "$per" -- "$bin" $args || true
            ls -la "results/afl/$label/default/crashes/" 2>/dev/null || true
          done
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz

          declare -a TARGETS=()
          [ -x "$BINDIR/jq_fuzz_execute" ] && \
            TARGETS+=("jq_fuzz_execute|$BINDIR/jq_fuzz_execute|@@")
          JQ_BIN="$BINDIR/.libs/jq"; [ -x "$JQ_BIN" ] || JQ_BIN="$BINDIR/jq"
          [ -x "$JQ_BIN" ] && TARGETS+=("jq_identity|$JQ_BIN|. @@")

          new_crashes=0
          for entry in "${TARGETS[@]}"; do
            IFS='|' read -r label bin args <<< "$entry"
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$label/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              case "$(basename "$crash_file")" in
                README.txt) continue ;;
              esac
              crash_id="$(basename "$crash_file" | tr ':,' '__')"
              result_file="results/fuzz/${label}_${crash_id}.txt"
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
                timeout 30 "$bin" ${args//@@/$crash_file} > /dev/null 2> "$result_file" || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CONFIRMED CRASH: $label ($crash_id, exit=$rc)"
                cp "$crash_file" "results/fuzz/${label}_${crash_id}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          done
          echo "[+] Triage complete: $new_crashes confirmed crashes"

      - name: Sanitize result filenames
        if: always()
        run: |
          set -uo pipefail
          # AFL emits filenames containing ':' (id:000000,time:...). These break
          # actions/upload-artifact@v4, so rename any offending path to use '_'.
          # -depth renames children before parents so nested paths stay valid.
          find results -depth -name '*:*' 2>/dev/null | while read -r p; do
            d="$(dirname "$p")"
            b="$(basename "$p" | tr ':' '_')"
            mv "$p" "$d/$b" 2>/dev/null || true
          done
          echo "[+] Filename sanitization complete"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-jq
          path: results/
          retention-days: 30

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-jq
          path: results/pocs/
          retention-days: 90
