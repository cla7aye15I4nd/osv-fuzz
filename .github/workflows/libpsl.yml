name: "Fuzz libpsl"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 10 * * 0"

env:
  PROJECT: libpsl
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            autoconf-archive \
            autogen \
            automake \
            autopoint \
            bison \
            gengetopt \
            gettext \
            gperf \
            libtool \
            pkg-config \
            texinfo

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive git://git.savannah.gnu.org/gnulib.git /tmp/src/gnulib
          git clone --depth 1 --recursive https://git.savannah.gnu.org/git/libunistring.git /tmp/src/libunistring
          git clone --depth 1 --recursive https://gitlab.com/libidn/libidn2.git /tmp/src/libidn2
          git clone --depth 1 --recursive https://git.savannah.gnu.org/git/libidn.git /tmp/src/libidn
          git clone --depth 1 --recursive https://github.com/rockdaboot/libpsl.git /tmp/src/libpsl

      - name: Download fuzzer files from oss-fuzz
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/google/oss-fuzz /tmp/oss-fuzz
          cd /tmp/oss-fuzz && git sparse-checkout set projects/libpsl
          cp -r /tmp/oss-fuzz/projects/libpsl/* /tmp/src/

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/libpsl
          set +e
          export DEPS_PATH=/tmp/src/deps
          export PKG_CONFIG_PATH=$DEPS_PATH/lib/pkgconfig
          export CPPFLAGS="-I$DEPS_PATH/include"
          export LDFLAGS="-L$DEPS_PATH/lib"
          export CONFIG_SITE=/tmp/src/config.site
          export GNULIB_SRCDIR=/tmp/src/gnulib
          export GNULIB_TOOL=$GNULIB_SRCDIR/gnulib-tool
          cd /tmp/src/icu/source
          UBSAN_OPTIONS=detect_leaks=0 \
          CFLAGS="$CFLAGS -fno-sanitize=vptr" \
          CXXFLAGS="$CXXFLAGS -fno-sanitize=vptr" \
          CPPFLAGS="$CPPFLAGS -fno-sanitize=vptr" \
          ./configure --disable-shared --enable-static --disable-extras --disable-icuio --disable-layoutex \
            --disable-tests --disable-samples --with-data-packaging=static --prefix=$DEPS_PATH
          echo '#include <locale.h>' >>i18n/digitlst.h
          ln -s /usr/include/locale.h /usr/include/xlocale.h
          make -j
          sudo make install
          cd /tmp/src/libunistring
          ./autogen.sh
          ASAN_OPTIONS=detect_leaks=0 UBSAN_OPTIONS=detect_leaks=0 \
            ./configure --enable-static --disable-shared --prefix=$DEPS_PATH
          make -j
          sudo make install
          cd /tmp/src/libidn
          ./bootstrap
          ASAN_OPTIONS=detect_leaks=0 UBSAN_OPTIONS=detect_leaks=0 \
            ./configure --enable-static --disable-shared --disable-doc --prefix=$DEPS_PATH
          make -j
          sudo make install
          cd /tmp/src/libidn2
          ./bootstrap
          ASAN_OPTIONS=detect_leaks=0 UBSAN_OPTIONS=detect_leaks=0 \
            ./configure --enable-static --disable-shared --disable-doc --disable-gcc-warnings --prefix=$DEPS_PATH
          make -j
          sudo make install
          cd /tmp/src/libpsl
          ./autogen.sh
          export CXXFLAGS="$CXXFLAGS -L$DEPS_PATH/lib/"
          if test $SANITIZER = "undefined"; then
            builds="libidn2 libidn none"
          else
            builds="libicu libidn2 libidn none"
          fi
          for build in $builds; do
            unset LIBS
            if test $build = "none"; then
              BUILD_FLAGS="--disable-runtime --disable-builtin"
              cp -p list/public_suffix_list.dat list/public_suffix_list.dat.org
              LC_ALL=C.UTF-8 python3 -c $'import unicodedata\nimport sys\nfor line in sys.stdin:\n  sys.stdout.write(unicodedata.normalize("NFC", line))' <list/public_suffix_list.dat.org >list/public_suffix_list.dat
            else
              BUILD_FLAGS="--enable-runtime=$build --enable-builtin=$build"
              if test $build = "libicu"; then
                export LIBS="-lstdc++"
              fi
            fi
            ASAN_OPTIONS=detect_leaks=0 UBSAN_OPTIONS=detect_leaks=0 \
              ./configure --enable-fuzzing --enable-static --disable-shared --disable-gtk-doc $BUILD_FLAGS --prefix=$DEPS_PATH
            make clean
            make -j
            make -j check
            make -C fuzz oss-fuzz
            find fuzz -name '*_fuzzer' -exec cp -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets ';'
          done
          cd fuzz
          find . -name '*_fuzzer.dict' -exec cp -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets ';'
          find . -name '*_fuzzer.options' -exec cp -v '{}' $GITHUB_WORKSPACE/build/fuzz-targets ';'
          for dir in *_fuzzer.in; do
              fuzzer=$(basename $dir .in)
              zip -rj "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer}_seed_corpus.zip" "${dir}/"
          done
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
