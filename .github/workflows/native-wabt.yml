name: "Fuzz native wabt"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: wabt
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build wabt (latest) with AFL++ + ASan
        run: |
          set -euo pipefail
          git clone --recursive https://github.com/WebAssembly/wabt.git /tmp/wabt
          cd /tmp/wabt
          git submodule update --init
          mkdir -p build && cd build
          export AFL_USE_ASAN=1
          CC=afl-cc CXX=afl-c++ cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=OFF \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          cmake --build . -j"$(nproc)"
          BINDIR="$(pwd)"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "TARGET_BIN=$BINDIR/wasm-interp" >> "$GITHUB_ENV"
          echo "[+] Built binary:"
          ls -la "$BINDIR/wasm-interp"
          test -x "$BINDIR/wasm-interp"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run
          bname="wasm-interp"
          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $sname through $bname..."
            set +e
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
              "$TARGET_BIN" "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ $exit_code -ne 0 ] && [ $exit_code -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          if [ -z "$(find seeds/"$PROJECT" -name '*.bin' -type f 2>/dev/null)" ]; then
            echo "[!] No seeds found — seeding AFL with a minimal input"
            mkdir -p seeds/"$PROJECT"
            printf '\0asm\1\0\0\0' > seeds/"$PROJECT"/minimal.bin
          fi
          AFL_SKIP_CPUFREQ=1 \
          AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 \
          AFL_NO_UI=1 \
            afl-fuzz -i seeds/"$PROJECT" -o results/afl -m none -V "$FUZZ_DURATION" \
              -- "$TARGET_BIN" @@ || true

      - name: Triage crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          bname="wasm-interp"
          crash_dir="results/afl/default/crashes"
          new_crashes=0
          if [ -d "$crash_dir" ]; then
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              [ "$(basename "$crash_file")" = "README.txt" ] && continue
              crash_name="$(basename "$crash_file" | tr ':,' '__')"
              result_file="results/fuzz/${bname}_${crash_name}.txt"
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                "$TARGET_BIN" "$crash_file" > /dev/null 2> "$result_file"
              replay_exit=$?
              set -e
              if [ $replay_exit -ne 0 ] && [ $replay_exit -ne 124 ]; then
                echo "  [!] NEW CRASH: $bname from fuzzing ($crash_name)"
                cp "$crash_file" "results/fuzz/${bname}_${crash_name}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          fi
          echo "[+] Triage complete: $new_crashes new crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-wabt
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-wabt
          path: results/
          retention-days: 30
