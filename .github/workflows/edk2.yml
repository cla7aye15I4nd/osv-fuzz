name: "Fuzz edk2"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 7 * * 0"

env:
  PROJECT: edk2
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            nasm \
            python-is-python3 \
            uuid-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/tianocore/edk2.git /tmp/src/edk2
          git clone --depth 1 --recursive https://github.com/intel/hbfa-fl /tmp/src/hbfa-fl

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src
          set +e
          sed -i 's/GCC5_/GCC_/g; s/GCC48_/GCC_/g; s/GCC49_/GCC_/g' \
              /tmp/src/hbfa-fl/HBFA/UefiHostFuzzTestPkg/Conf/tools_def.customized
          sed -i 's/GCC\\\\d{1,2}_ALL_CC_FLAGS/GCC\\\\d{0,2}_ALL_CC_FLAGS/' \
              /tmp/src/hbfa-fl/HBFA/UefiHostTestTools/HBFAEnvSetup.py
          sed -i 's/BuildCmdList.append(.GCC5.)/BuildCmdList.append("GCC")/' \
              /tmp/src/hbfa-fl/HBFA/UefiHostTestTools/RunLibFuzzer.py
          # Patch tools_def.customized to use AFL++ compiler wrappers for fuzz targets
          AFL_CC_PATH=$(which afl-cc)
          AFL_CXX_PATH=$(which afl-c++)
          sed -i "s|/usr/bin/gcc|${AFL_CC_PATH}|g; s|/usr/bin/g++|${AFL_CXX_PATH}|g" \
              /tmp/src/hbfa-fl/HBFA/UefiHostFuzzTestPkg/Conf/tools_def.customized
          # Also patch tools_def.txt (build.sh copies this to Conf/tools_def.txt)
          sed -i 's/GCC5_/GCC_/g; s/GCC48_/GCC_/g; s/GCC49_/GCC_/g' \
              /tmp/src/hbfa-fl/HBFA/UefiHostFuzzTestPkg/Conf/tools_def.txt
          sed -i "s|/usr/bin/gcc|${AFL_CC_PATH}|g; s|/usr/bin/g++|${AFL_CXX_PATH}|g" \
              /tmp/src/hbfa-fl/HBFA/UefiHostFuzzTestPkg/Conf/tools_def.txt
          # Pre-build edk2 BaseTools with system compiler (avoids ASAN/AFL instrumentation issues)
          (
            cd /tmp/src/edk2
            for p in /tmp/src/hbfa-fl/edk2-bugfixes/*.patch; do patch -p1 < "$p" || true; done
            env -u CC -u CXX -u CFLAGS -u CXXFLAGS make -C BaseTools -j$(nproc)
          )
          # Run build.sh without CC/CXX overrides (afl-cc paths are in tools_def.txt;
          # unsetting prevents make -C BaseTools from rebuilding with afl-cc).
          # COVERAGE_FLAGS must be set (build.sh uses bash -eu and references it).
          env -u CC -u CXX -u CFLAGS -u CXXFLAGS COVERAGE_FLAGS="" \
              bash hbfa-fl/oss-fuzz/build.sh
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
