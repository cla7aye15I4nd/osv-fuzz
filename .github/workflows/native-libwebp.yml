name: "Fuzz native libwebp"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libwebp
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone latest upstream source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/webmproject/libwebp.git /tmp/src/libwebp

      - name: Build CLI tools with AFL++ + ASan
        run: |
          set -e
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          cd /tmp/src/libwebp
          # Adapted from libwebp's own oss-fuzz build (tests/fuzzer/oss-fuzz/build.sh),
          # but driven by AFL++ instrumentation instead of libFuzzer/fuzztest. We only
          # need the dwebp CLI decoder for the recorded PoC invocation, so the fuzztest
          # targets (which require FUZZTEST_COMPATIBILITY_MODE=libfuzzer) are omitted.
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=None \
            -DCMAKE_C_COMPILER=afl-cc \
            -DCMAKE_CXX_COMPILER=afl-c++ \
            -DWEBP_BUILD_DWEBP=ON \
            -DWEBP_BUILD_CWEBP=ON \
            -DWEBP_BUILD_LIBWEBPMUX=ON \
            -DWEBP_BUILD_FUZZTEST=OFF \
            -DCMAKE_C_FLAGS="$CFLAGS" \
            -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address"
          cmake --build build -j"$(nproc)"
          # dwebp lands in the build directory root.
          BINDIR="/tmp/src/libwebp/build"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools in $BINDIR:"
          ls -la "$BINDIR"/dwebp
          if [ ! -x "$BINDIR/dwebp" ]; then
            echo "[!] Expected CLI binary dwebp not built — build failed"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0
          # Recorded invocation: $BINDIR/dwebp $POC -o /dev/null
          crash_count=0
          total=0
          for seed in seeds/${{ env.PROJECT }}/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            POC="$seed"
            bin="$BINDIR/dwebp"
            [ -x "$bin" ] || continue
            total=$((total + 1))
            echo "[*] Replaying dwebp with $sname..."
            timeout 60 "$bin" "$POC" -o /dev/null > /dev/null 2> results/dry_run/.stderr_tmp
            ec=$?
            if [ $ec -ne 0 ] && [ $ec -ne 124 ]; then
              echo "  [!] CRASH: dwebp with $sname (exit=$ec)"
              mv results/dry_run/.stderr_tmp "results/dry_run/dwebp_${sname}.txt"
              cp "$seed" "results/dry_run/dwebp_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++
        run: |
          set +e
          mkdir -p results
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          # Recorded invocation with AFL's @@ standing in for the input path:
          #   dwebp @@ -o /dev/null
          afl-fuzz -i seeds/${{ env.PROJECT }} -o results/afl -V "$FUZZ_DURATION" \
            -- "$BINDIR/dwebp" @@ -o /dev/null || true

      - name: Triage AFL++ crashes
        run: |
          set +e
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          shopt -s nullglob
          for crash in results/afl/default/crashes/*; do
            [ -f "$crash" ] || continue
            cname=$(basename "$crash")
            [ "$cname" = "README.txt" ] && continue
            echo "[*] Triaging $cname..."
            "$BINDIR/dwebp" "$crash" -o /dev/null > /dev/null 2> "results/fuzz/dwebp_${cname}.txt"
            cp "$crash" "results/fuzz/dwebp_${cname}.bin"
          done

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-${{ env.PROJECT }}
          path: results/
          retention-days: 30
