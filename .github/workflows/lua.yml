name: "Fuzz lua"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: lua
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/ligurio/lunapark /tmp/src/testdir
          git clone --depth 1 --recursive https://github.com/ligurio/lunapark-corpus /tmp/src/corpus_dir

      - name: Download fuzzer files from oss-fuzz
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/google/oss-fuzz /tmp/oss-fuzz
          cd /tmp/oss-fuzz && git sparse-checkout set projects/lua
          cp -r /tmp/oss-fuzz/projects/lua/* /tmp/src/

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src
          set +e
          if [ "$SANITIZER" == "introspector" ]; then
            export CFLAGS="${CFLAGS} -fsanitize=address"
            export CXXFLAGS="${CXXFLAGS} -fsanitize=address"
          fi
          PACKAGES="build-essential ninja-build cmake make luarocks"
          if [ "$ARCHITECTURE" = "i386" ]; then
              PACKAGES="$PACKAGES zlib1g-dev:i386 libreadline-dev:i386 libunwind-dev:i386"
          elif [ "$ARCHITECTURE" = "aarch64" ]; then
              PACKAGES="$PACKAGES zlib1g-dev:arm64 libreadline-dev:arm64 libunwind-dev:arm64"
          else
              PACKAGES="$PACKAGES zlib1g-dev libreadline-dev libunwind-dev"
          fi
          sudo apt-get update
          sudo apt-get install -y $PACKAGES
          export FUZZ_INTROSPECTOR_CONFIG=/tmp/src/fuzz_introspector_exclusion.config
          cat > $FUZZ_INTROSPECTOR_CONFIG <<EOF
          FILES_TO_AVOID
          testdir/build/tests/capi/external.protobuf_mutator
          testdir/build/tests/capi/luaL_loadbuffer_proto/
          EOF
          cd /tmp/src/testdir
          if [[ $FUZZING_ENGINE == centipede ]]
          then
              sed -i \
                  '/$ENV{LIB_FUZZING_ENGINE}/a \ \ \ \ \ \ \ \ -lc++' \
                  tests/capi/CMakeLists.txt
          fi
          [[ -e /tmp/src/testdir/build ]] && rm -rf /tmp/src/testdir/build
          case $SANITIZER in
            address) SANITIZERS_ARGS="-DENABLE_ASAN=ON" ;;
            undefined) SANITIZERS_ARGS="-DENABLE_UBSAN=ON" ;;
            *) SANITIZERS_ARGS="" ;;
          esac
          export LSAN_OPTIONS="verbosity=1:log_threads=1"
          if [ "$ARCHITECTURE" = "aarch64" ]; then
              export ASAN_OPTIONS=detect_leaks=0
          fi
          : ${LD:="${CXX}"}
          : ${LDFLAGS:="${CXXFLAGS}"}  # to make sure we link with sanitizer runtime
          FUZZER_ARGS=""
          LAPI_TESTING="ON"
          if [[ "$FUZZING_ENGINE" != "libfuzzer" ]] ||
             [[ "$ARCHITECTURE" == "i386" ]] ||
             [[ "$SANITIZER" == "coverage" ]]; then
            FUZZER_ARGS="-DDISABLE_LIBFUZZER_STATIC_LINKAGE=ON"
            LAPI_TESTING="OFF"
          fi
          cmake_args=(
              -DUSE_LUA=ON
              -DOSS_FUZZ=ON
              -DENABLE_LAPI_TESTS=${LAPI_TESTING}
              $SANITIZERS_ARGS
              $FUZZER_ARGS
              -DCMAKE_C_COMPILER="${CC}"
              -DCMAKE_C_FLAGS="${CFLAGS}"
              -DCMAKE_CXX_COMPILER="${CXX}"
              -DCMAKE_CXX_FLAGS="${CXXFLAGS}"
              -DCMAKE_LINKER="${LD}"
              -DCMAKE_EXE_LINKER_FLAGS="${LDFLAGS}"
              -DCMAKE_MODULE_LINKER_FLAGS="${LDFLAGS}"
              -DCMAKE_SHARED_LINKER_FLAGS="${LDFLAGS}"
          )
          git config --global --add safe.directory '*'
          [[ -e build ]] && rm -rf build
          cmake "${cmake_args[@]}" -S . -B build -G Ninja
          cmake --build build --parallel --verbose
          LUALIB_PATH="/tmp/src/testdir/build/lua-master/source/"
          $CC $CFLAGS -I$LUALIB_PATH -c /tmp/src/fuzz_lua.c -o fuzz_lua.o
          $CXX $CXXFLAGS $LIB_FUZZING_ENGINE fuzz_lua.o -o $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_lua $LUALIB_PATH/liblua.a
          cp corpus_dir/*.dict corpus_dir/*.options $GITHUB_WORKSPACE/build/fuzz-targets/
          for f in $(find build/tests/ -name '*_test' -type f);
          do
            name=$(basename $f);
            module=$(echo $name | sed 's/_test//')
            corpus_dir="corpus_dir/$module"
            echo "Copying for $module";
            cp $f $GITHUB_WORKSPACE/build/fuzz-targets/
            [[ -e $corpus_dir ]] && find "$corpus_dir" -mindepth 1 -maxdepth 1 | zip --quiet -@ -j $GITHUB_WORKSPACE/build/fuzz-targets/"$name"_seed_corpus.zip
          done
          if [[ "$FUZZING_ENGINE" != libfuzzer ]] ||
             [[ "$SANITIZER" == "coverage" ]] ||
             [[ "$ARCHITECTURE" == "i386" ]]; then
            echo "Lua API testing is not supported."
            exit
          fi
          luarocks --local install luarocks
          eval $(luarocks path)
          luarocks config lua_version 5.5
          luarocks config variables.LUA_INCDIR $LUALIB_PATH
          luarocks config variables.LUA_LIBDIR $LUALIB_PATH
          luarocks config variables.LUA $LUALIB_PATH/lua
          VERBOSE=1 luarocks install --tree=lua_modules --server=https://luarocks.org/dev luzer LUA_LIBRARIES=$LUALIB_PATH/liblua.a LUA_INCLUDE_DIR=$LUALIB_PATH OSS_FUZZ=ON
          LUA_RUNTIME_NAME=lua
          for fuzzer in $(find /tmp/src -name '*_test.lua'); do
            /tmp/src/compile_lua_fuzzer $LUA_RUNTIME_NAME $(basename $fuzzer)
            cp $fuzzer "$GITHUB_WORKSPACE/build/fuzz-targets/"
            test_file=$(basename $fuzzer);
            test_name_we="${test_file%.*}";
            module_name=$(echo $test_name_we | sed 's/_test//' )
            corpus_dir="corpus_dir/$module_name"
            [[ -e $corpus_dir ]] && find "$corpus_dir" -mindepth 1 -maxdepth 1 | zip --quiet -@ -j $GITHUB_WORKSPACE/build/fuzz-targets/"$test_name_we"_seed_corpus.zip
          done
          cp /tmp/src/testdir/tests/lapi/lib*.lua "$GITHUB_WORKSPACE/build/fuzz-targets/"
          rm -f $GITHUB_WORKSPACE/build/fuzz-targets/table_foreachi_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/table_foreachi_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/table_clear_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/table_maxn_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/table_foreach_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/string_buffer_torture_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/bitop_tohex_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/jit_p_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/bitop_arshift_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/bitop_rol_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/bitop_tobit_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/bitop_ror_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/bitop_bswap_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/builtin_getfenv_test* \
                $GITHUB_WORKSPACE/build/fuzz-targets/string_buffer_encode_test*
          cp $LUALIB_PATH/$LUA_RUNTIME_NAME "$GITHUB_WORKSPACE/build/fuzz-targets/$LUA_RUNTIME_NAME"
          cp -R lua_modules "$GITHUB_WORKSPACE/build/fuzz-targets/"
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
