name: "Fuzz suricata"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 11 * * 0"

env:
  PROJECT: suricata
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            bison \
            cmake \
            flex \
            libpcre3-dev \
            libtool \
            pkg-config \
            tshark \
            zlib1g-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/yaml/libyaml /tmp/src/libyaml
          git clone --depth 1 --recursive https://github.com/catenacyber/quadfuzz.git /tmp/src/quadfuzz
          git clone --depth 1 --recursive https://github.com/catenacyber/fuzzpcap /tmp/src/fuzzpcap
          git clone --depth 1 --recursive https://github.com/OISF/suricata.git /tmp/src/suricata
          git clone --depth 1 --recursive --branch main-7.0.x https://github.com/OISF/suricata.git /tmp/src/suricata7
          git clone --depth 1 --recursive https://github.com/OISF/libhtp.git /tmp/src/libhtp
          git clone --depth 1 --recursive https://github.com/OISF/suricata-verify /tmp/src/suricata-verify
          # Download source tarballs expected by the oss-fuzz build script
          cd /tmp/src
          wget -q https://github.com/PhilipHazel/pcre2/releases/download/pcre2-10.39/pcre2-10.39.tar.gz
          wget -q https://www.tcpdump.org/release/libpcap-1.9.1.tar.gz
          wget -q https://github.com/akheron/jansson/releases/download/v2.14/jansson-2.14.tar.gz
          wget -q -O lz4-1.9.2.tar.gz https://github.com/lz4/lz4/archive/v1.9.2.tar.gz
          wget -q https://rules.emergingthreats.net/open/suricata/emerging.rules.zip

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src
          set +e
          if [ "$SANITIZER" = "memory" ]
          then
              (
              cd zlib
              ./configure --static
              make -j$(nproc) clean
              make -j$(nproc) all
              make -j$(nproc) install
              )
          fi
          (
          tar -xvzf pcre2-10.39.tar.gz
          cd pcre2-10.39
          ./configure --disable-shared
          make -j$(nproc) clean
          make -j$(nproc) all
          make -j$(nproc) install
          )
          tar -xvzf lz4-1.9.2.tar.gz
          cd lz4-1.9.2
          make liblz4.a
          cp lib/liblz4.a /usr/local/lib/
          cp lib/lz4*.h /usr/local/include/
          cd ..
          tar -xvzf jansson-2.14.tar.gz
          cd jansson-2.14
          ./configure --disable-shared
          make -j$(nproc)
          sudo make install
          cd ..
          tar -xvzf libpcap-1.9.1.tar.gz
          cd libpcap-1.9.1
          ./configure --disable-shared
          make -j$(nproc)
          sudo make install
          cd ..
          cd fuzzpcap
          mkdir build
          cd build
          cmake ..
          sudo make install
          cd ../..
          cd libyaml
          ./bootstrap
          ./configure --disable-shared
          make -j$(nproc)
          sudo make install
          cd ..
          export CARGO_BUILD_TARGET="x86_64-unknown-linux-gnu"
          export MSAN_OPTIONS=strict_memcmp=false
          if [ "$SANITIZER" = "address" ]
          then
              export RUSTFLAGS="$RUSTFLAGS -Cpasses=sancov-module -Cllvm-args=-sanitizer-coverage-level=4 -Cllvm-args=-sanitizer-coverage-trace-compares -Cllvm-args=-sanitizer-coverage-inline-8bit-counters -Cllvm-args=-sanitizer-coverage-pc-table -Clink-dead-code -Cllvm-args=-sanitizer-coverage-stack-depth -Ccodegen-units=1"
              export RUSTFLAGS="$RUSTFLAGS -Cdebug-assertions=yes"
          fi
          fuzz_branches=("")
          if [[ "$SANITIZER" != "memory" ]] && [[ ! -v CIFUZZ ]]
          then
              fuzz_branches+=("7")
          fi
          if [[ `shuf -i 0-9 -n 1` -eq 0 ]]
          then
              clang -fPIE -I. -c /tmp/src/quadfuzz/quadfuzz.c -o /tmp/src/quadfuzz/quadfuzz.o
              export LIB_FUZZING_ENGINE="-fsanitize=fuzzer /tmp/src/quadfuzz/quadfuzz.o"
              echo "Using quadfuzz"
          fi
          for branch in "${fuzz_branches[@]}"; do
          cp -r libhtp suricata$branch/
          (
          cd suricata$branch
          sh autogen.sh
          ./src/tests/fuzz/oss-fuzz-configure.sh
          make -j$(nproc)
          ./src/suricata --list-app-layer-protos | tail -n +2 | while read i; do cp src/fuzz_applayerparserparse $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_applayerparserparse"$branch"_$i; done
          (
          cd src
          ls fuzz_* | while read i; do cp $i $GITHUB_WORKSPACE/build/fuzz-targets/$i$branch; done
          )
          ./src/suricata --list-keywords | grep "\- " | sed 's/- //' | awk '{print "\""$0"\""}' > $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_siginit$branch.dict
          echo \"SMB\" > $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_applayerparserparse"$branch"_smb.dict
          echo "\"FPC0\"" > $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_sigpcap_aware$branch.dict
          echo "\"FPC0\"" > $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_predefpcap_aware$branch.dict
          git grep tag rust | grep '"' | cut -d '"' -f2 | sort | uniq | awk 'length($0) > 2' | awk '{print "\""$0"\""}' | grep -v '\\' > generic.dict
          cat generic.dict >> $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_siginit$branch.dict
          cat generic.dict >> $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_applayerparserparse$branch.dict
          cat generic.dict >> $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_sigpcap$branch.dict
          cat generic.dict >> $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_sigpcap_aware$branch.dict
          zip -r $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_confyamlloadstring"$branch"_seed_corpus.zip suricata.yaml
          unzip ../emerging.rules.zip
          cd rules
          cat *.rules > $GITHUB_WORKSPACE/build/fuzz-targets/fuzz.rules
          i=0
          mkdir corpus
          set +x
          cat *.rules | while read l; do echo $l > corpus/$i.rule; i=$((i+1)); done
          set -x
          zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_siginit"$branch"_seed_corpus.zip corpus
          cd ../../suricata-verify
          find . -name "*.pcap" | xargs zip -r $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_decodepcapfile"$branch"_seed_corpus.zip
          find . -name "*.yaml" | xargs zip -r $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_confyamlloadstring"$branch"_seed_corpus.zip
          find . -name "*.rules" | xargs zip -r $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_siginit"$branch"_seed_corpus.zip
          )
          done
          cd /tmp/src/suricata-verify/tests
          i=0
          mkdir corpus
          set +x
          find . -name "*.pcap" -exec dirname "{}" \; | while read t; do
          cat $t/*.rules > corpus/$i || true; echo -ne '\0' >> corpus/$i; cat $t/*.pcap >> corpus/$i || true; i=$((i+1));
          done
          set -x
          zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_sigpcap_seed_corpus.zip corpus
          rm -Rf corpus
          mkdir corpus
          set +x
          find . -name "*.pcap" -exec dirname "{}" \; | while read t; do
          grep -v "#" $t/*.rules | head -1 | cut -d "(" -f2 | cut -d ")" -f1 > corpus/$i || true; echo -ne '\0' >> corpus/$i; fpc_bin $t/*.pcap >> corpus/$i || rm corpus/$i; i=$((i+1));
          echo -ne '\0' >> corpus/$i; python3 /tmp/src/fuzzpcap/tcptofpc.py $t/*.pcap >> corpus/$i || rm corpus/$i; i=$((i+1));
          done
          set -x
          zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_sigpcap_aware_seed_corpus.zip corpus
          rm -Rf corpus
          mkdir corpus
          set +x
          find . -name "*.pcap" -exec dirname "{}" \; | while read t; do
          fpc_bin $t/*.pcap >> corpus/$i || rm corpus/$i; i=$((i+1));
          python3 /tmp/src/fuzzpcap/tcptofpc.py $t/*.pcap >> corpus/$i || rm corpus/$i; i=$((i+1));
          done
          set -x
          zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_predefpcap_aware_seed_corpus.zip corpus
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
