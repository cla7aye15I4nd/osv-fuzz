name: "Fuzz native nasm"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: nasm
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest nasm with AFL++ + ASan
        run: |
          set -euxo pipefail
          mkdir -p /tmp/src
          git clone --depth=1 https://github.com/netwide-assembler/nasm.git /tmp/src/nasm
          cd /tmp/src/nasm
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"
          # git checkout requires autoconf to generate ./configure
          sh autogen.sh
          sh configure
          make -j"$(nproc)"
          # Built assembler is left at the repo root: ./nasm
          test -x ./nasm
          echo "NASM_BIN=/tmp/src/nasm/nasm" >> "$GITHUB_ENV"
          echo "[+] Built binary:"
          ls -la /tmp/src/nasm/nasm

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run
          BIN="$NASM_BIN"
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"
          crash_count=0
          total=0
          # Recorded lost-bug invocations. Each seed is replayed through every
          # recorded invocation; $POC is the seed file.
          run_invocation () {
            # $1 = label, $2 = seed path
            local label="$1" POC="$2"
            case "$label" in
              M)       "$BIN" -M "$POC" ;;
              fbin)    "$BIN" -f bin "$POC" -o /tmp/tmp.out ;;
              complex) "$BIN" -t -Z/dev/null -g -O0 -o /dev/null -M -f bin "$POC" ;;
            esac
          }
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            for label in M fbin complex; do
              total=$((total + 1))
              result_file="results/dry_run/${label}_${sname}.txt"
              set +e
              run_invocation "$label" "$seed" > /dev/null 2> "$result_file"
              exit_code=$?
              set -e
              if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
                echo "  [!] CRASH: invocation=$label seed=$sname (exit=$exit_code)"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f "$result_file"
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"
          # Primary file-input invocation: nasm -f bin @@ -o /dev/null
          afl-fuzz -i "seeds/$PROJECT" -o results/afl -V "$FUZZ_DURATION" \
            -- "$NASM_BIN" -f bin @@ -o /dev/null || true
          echo "[+] Fuzzing step finished"

      - name: Triage crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          BIN="$NASM_BIN"
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"
          crashes_dir="results/afl/default/crashes"
          if [ ! -d "$crashes_dir" ]; then
            echo "[+] No crashes directory found — nothing to triage"
            exit 0
          fi
          triaged=0
          for crash in "$crashes_dir"/*; do
            [ -f "$crash" ] || continue
            cname=$(basename "$crash")
            [ "$cname" = "README.txt" ] && continue
            report_file="results/fuzz/nasm_${cname}.txt"
            set +e
            "$BIN" -f bin "$crash" -o /dev/null > /dev/null 2> "$report_file"
            set -e
            cp "$crash" "results/fuzz/nasm_${cname}.bin"
            triaged=$((triaged + 1))
          done
          echo "[+] Triaged $triaged crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-nasm
          path: results/pocs/
          retention-days: 90

