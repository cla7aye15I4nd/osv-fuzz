name: "Fuzz native hdf5"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: hdf5
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install extra build dependencies
        run: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            zlib1g-dev \
            libaec-dev \
            libszip-dev \
            m4 \
            2>/dev/null || true

      - name: Clone latest upstream source
        run: |
          set -e
          mkdir -p /tmp/src
          rm -rf /tmp/src/hdf5
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                 https://github.com/HDFGroup/hdf5.git /tmp/src/hdf5; then
              break
            fi
            n=$((n + 1))
            echo "[!] git clone failed (attempt $n) — retrying..."
            rm -rf /tmp/src/hdf5
            sleep 5
          done
          if [ ! -d /tmp/src/hdf5 ]; then
            echo "[!] Failed to clone hdf5 after 3 attempts"
            exit 1
          fi
          cd /tmp/src/hdf5
          git submodule update --init --recursive || true

      - name: Build CLI tools with AFL++ + ASan
        run: |
          set -e
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          # HDF5 develop / 2.x is CMake-only. Build OUT-OF-SOURCE (build dir
          # outside the source tree) so a re-run never trips over stale cache.
          SRC=/tmp/src/hdf5
          BUILD=/tmp/hdf5-build
          rm -rf "$BUILD"
          mkdir -p "$BUILD"
          cmake -S "$SRC" -B "$BUILD" \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=afl-cc \
            -DCMAKE_CXX_COMPILER=afl-c++ \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DHDF5_BUILD_TOOLS=ON \
            -DHDF5_BUILD_EXAMPLES=OFF \
            -DHDF5_BUILD_HL_LIB=ON \
            -DHDF5_BUILD_CPP_LIB=OFF \
            -DHDF5_BUILD_FORTRAN=OFF \
            -DHDF5_BUILD_JAVA=OFF \
            -DHDF5_BUILD_DOC=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build "$BUILD" -j"$(nproc)"
          # CLI tools land in <build>/bin/
          BINDIR="$BUILD/bin"
          if [ ! -d "$BINDIR" ]; then
            # Fall back to locating h5dump anywhere under the build tree.
            found=$(find "$BUILD" -type f -name h5dump -perm -u+x 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              BINDIR=$(dirname "$found")
            fi
          fi
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools in $BINDIR:"
          ls -la "$BINDIR" || true
          if [ ! -x "$BINDIR/h5dump" ]; then
            echo "[!] Expected CLI binary h5dump not built — build failed"
            exit 1
          fi

      - name: Enumerate fuzz targets
        run: |
          set -e
          # Candidate file-input CLI tools and their argument templates.
          # @@ is where AFL++ substitutes the input file. Tools requiring an
          # output path get a throwaway target so they still accept input.
          declare -A CANDIDATES=(
            ["h5dump"]="@@"
            ["h5ls"]="-r @@"
            ["h5stat"]="@@"
            ["h5debug"]="@@"
            ["h5clear"]="-s @@"
            ["h5repack"]="@@ /tmp/h5repack_out.h5"
            ["h5copy"]="-i @@ -o /tmp/h5copy_out.h5 -s / -d /copy"
            ["h5format_convert"]="@@"
          )
          : > /tmp/targets.txt
          for tool in "${!CANDIDATES[@]}"; do
            bin="$BINDIR/$tool"
            if [ -x "$bin" ]; then
              echo "${tool}|${CANDIDATES[$tool]}" >> /tmp/targets.txt
              echo "[+] Target: $tool  (args: ${CANDIDATES[$tool]})"
            else
              echo "[-] Skipping $tool (not built)"
            fi
          done
          count=$(wc -l < /tmp/targets.txt)
          echo "[+] $count fuzz targets enumerated"
          if [ "$count" -eq 0 ]; then
            echo "[!] No fuzz targets found under $BINDIR"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          crash_count=0
          total=0
          while IFS='|' read -r tool template; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname=$(basename "$seed" .bin)
              # Build argv, substituting @@ with the seed path.
              args=()
              for tok in $template; do
                if [ "$tok" = "@@" ]; then
                  args+=("$seed")
                else
                  args+=("$tok")
                fi
              done
              total=$((total + 1))
              echo "[*] Replaying $tool with $sname..."
              rc=0
              timeout 60 "$bin" "${args[@]}" > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${tool}_${sname}.txt"
                cp "$seed" "results/dry_run/${tool}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done < /tmp/targets.txt
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          # Split the total budget across all viable targets (min 60s each).
          num_targets=$(wc -l < /tmp/targets.txt)
          [ "$num_targets" -ge 1 ] || num_targets=1
          per=$((FUZZ_DURATION / num_targets))
          [ "$per" -lt 60 ] && per=60
          echo "[+] $num_targets targets, ${per}s each"

          while IFS='|' read -r tool template; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue

            # Verify the target starts cleanly under instrumentation before
            # committing fuzz time to it; skip if afl-showmap can't run it.
            showmap_args=()
            for tok in $template; do
              if [ "$tok" = "@@" ]; then
                showmap_args+=("@@")
              else
                showmap_args+=("$tok")
              fi
            done
            first_seed=$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)
            if [ -n "$first_seed" ]; then
              probe_args=()
              for tok in $template; do
                if [ "$tok" = "@@" ]; then
                  probe_args+=("$first_seed")
                else
                  probe_args+=("$tok")
                fi
              done
              if ! AFL_QUIET=1 timeout 60 afl-showmap -m none -o /dev/null \
                   -- "$bin" "${probe_args[@]}" >/dev/null 2>&1; then
                echo "[-] Skipping $tool (afl-showmap startup failed)"
                continue
              fi
            fi

            echo "[*] Fuzzing $tool for ${per}s: $bin $template"
            afl-fuzz \
              -i "seeds/$PROJECT" \
              -o "results/afl/$tool" \
              -m none \
              -V "$per" \
              -- "$bin" "${showmap_args[@]}" || true
          done < /tmp/targets.txt
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          shopt -s nullglob
          new_crashes=0
          while IFS='|' read -r tool template; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$tool/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname=$(basename "$crash")
              [ "$cname" = "README.txt" ] && continue
              args=()
              for tok in $template; do
                if [ "$tok" = "@@" ]; then
                  args+=("$crash")
                else
                  args+=("$tok")
                fi
              done
              echo "[*] Triaging $tool / $cname..."
              rc=0
              timeout 60 "$bin" "${args[@]}" > /dev/null \
                2> "results/fuzz/${tool}_${cname}.txt" || rc=$?
              cp "$crash" "results/fuzz/${tool}_${cname}.bin"
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                new_crashes=$((new_crashes + 1))
              fi
            done
          done < /tmp/targets.txt
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Sanitize result filenames
        if: always()
        run: |
          # AFL names crashes id:000000,sig:06,... — the ':' breaks
          # actions/upload-artifact@v4. Rename any path containing ':' to '_'.
          if [ -d results ]; then
            find results -depth -name '*:*' -print0 | while IFS= read -r -d '' p; do
              d=$(dirname "$p")
              b=$(basename "$p")
              nb=$(printf '%s' "$b" | tr ':' '_')
              if [ "$b" != "$nb" ]; then
                mv "$p" "$d/$nb"
              fi
            done
          fi

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-hdf5
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-hdf5
          path: results/
          retention-days: 30
