name: "Fuzz native libsass"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 16 * * 0"

env:
  PROJECT: libsass
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/${PROJECT}/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/${PROJECT}/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            libtool

      - name: Clone latest upstream source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/sass/libsass.git /tmp/src/libsass
          git clone --depth 1 https://github.com/sass/sassc.git /tmp/src/libsass/sassc

      - name: Build libsass + sassc with AFL++ and ASan
        run: |
          set -euo pipefail
          cd /tmp/src/libsass
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export LDFLAGS="-g -fsanitize=address -fno-omit-frame-pointer"
          export BUILD=static
          export SASS_LIBSASS_PATH="$PWD"

          # Build the static libsass library -> lib/libsass.a
          make -j"$(nproc)"

          # Build the sassc CLI against it -> sassc/bin/sassc
          mkdir -p sassc/bin
          make -C sassc -j"$(nproc)" build-static

          BIN="$SASS_LIBSASS_PATH/sassc/bin/sassc"
          if [ ! -x "$BIN" ]; then
            echo "[!] sassc binary not found at $BIN — build failed"
            exit 1
          fi
          echo "[+] Built target: $BIN"
          "$BIN" --version || true
          echo "BIN=$BIN" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run
          bname=$(basename "$BIN")
          crash_count=0
          total=0
          for seed in "seeds/${PROJECT}"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $sname through $bname..."
            set +e
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0 \
              timeout 30 "$BIN" "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0
          afl-fuzz \
            -i "seeds/${PROJECT}" \
            -o results/afl \
            -V "$FUZZ_DURATION" \
            -- "$BIN" @@ || true

      - name: Triage crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          bname=$(basename "$BIN")
          crashes_dir="results/afl/default/crashes"
          if [ ! -d "$crashes_dir" ]; then
            echo "[+] No crashes directory produced — nothing to triage"
            exit 0
          fi
          count=0
          for crash in "$crashes_dir"/*; do
            [ -f "$crash" ] || continue
            cname=$(basename "$crash")
            [ "$cname" = "README.txt" ] && continue
            result_file="results/fuzz/${bname}_${cname}.txt"
            echo "[*] Triaging $cname..."
            set +e
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
              timeout 30 "$BIN" "$crash" > /dev/null 2> "$result_file"
            set -e
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
            count=$((count + 1))
          done
          echo "[+] Triaged $count crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libsass
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libsass
          path: results/
          retention-days: 30
