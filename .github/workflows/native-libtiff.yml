name: "Fuzz native libtiff"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds (split across all tiff tools)"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libtiff
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest libtiff with AFL++ + ASan
        run: |
          set -eux
          # Extra deps some libtiff codecs need; ignore if already present.
          sudo apt-get install -y -qq zlib1g-dev libjpeg-dev libjbig-dev \
            liblzma-dev libzstd-dev libwebp-dev libdeflate-dev 2>/dev/null || true

          # The old github.com/vadz/libtiff mirror is archived/obsolete (frozen
          # in 2017); development moved to GitLab. Clone current upstream with a
          # 3x retry because gitlab.com occasionally times out from CI runners.
          for attempt in 1 2 3; do
            rm -rf /tmp/libtiff
            if git clone --depth 1 --recurse-submodules \
                 https://gitlab.com/libtiff/libtiff.git /tmp/libtiff; then
              break
            fi
            echo "[!] clone attempt $attempt failed, retrying..."
            sleep 10
          done
          test -d /tmp/libtiff/.git
          cd /tmp/libtiff
          git submodule update --init --recursive || true

          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export LDFLAGS="-fsanitize=address"

          # Autotools git build: generate ./configure if missing, then build
          # with -Werror disabled (new-clang warnings otherwise abort the build).
          if [ ! -x ./configure ]; then
            if [ -x ./autogen.sh ]; then
              ./autogen.sh
            else
              autoreconf -fi
            fi
          fi
          ./configure --disable-shared --disable-werror
          make -j"$(nproc)"

          # rgb2ycbcr (and thumbnail) are automake EXTRA_PROGRAMS: a plain
          # `make` builds only bin_PROGRAMS (tiffcp, tiff2pdf, tiffcrop, ...).
          # CVE-2016-5314 replays through rgb2ycbcr, so build it explicitly or
          # the dry-run/fuzz steps see it as "not found".
          make -C tools -j"$(nproc)" rgb2ycbcr || true

          # CLI tools live under /tmp/libtiff/tools
          BINDIR=/tmp/libtiff/tools
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built tools:"
          for t in tiffcp tiff2pdf tiffcrop rgb2ycbcr; do
            if [ -x "$BINDIR/$t" ]; then
              echo "  [+] $BINDIR/$t"
            else
              echo "  [!] MISSING: $BINDIR/$t"
            fi
          done
          # Fail early if the core tool did not build.
          test -x "$BINDIR/tiffcp"

      - name: Enumerate fuzz targets
        run: |
          set -u
          BINDIR="${BINDIR:-/tmp/libtiff/tools}"

          # Candidate targets: label|relative-command-with-@@ .
          # These mirror the recorded PoC invocations and cover every
          # file-input CLI tool of libtiff that was seen consuming a seed.
          CANDIDATES=(
            "tiffcp_i|tiffcp -i @@ /tmp/out.tif"
            "tiff2pdf|tiff2pdf @@"
            "tiffcp_separate|tiffcp -p separate @@ /tmp/out.tiff"
            "tiffcp|tiffcp @@ /tmp/out.tif"
            "tiffcrop|tiffcrop -i @@ /tmp/foo"
            "rgb2ycbcr|rgb2ycbcr @@ /dev/null"
          )

          # Keep only targets whose binary actually built and exists in BINDIR.
          : > /tmp/targets.txt
          for entry in "${CANDIDATES[@]}"; do
            label="${entry%%|*}"
            cmd="${entry#*|}"
            tool="${cmd%% *}"
            if [ -x "$BINDIR/$tool" ]; then
              echo "${label}|${cmd}" >> /tmp/targets.txt
              echo "[+] target: ${label} -> ${cmd}"
            else
              echo "[!] skip ${label}: $BINDIR/$tool not built"
            fi
          done

          n=$(wc -l < /tmp/targets.txt)
          echo "[+] $n fuzz targets enumerated"
          test "$n" -gt 0

      - name: Dry-run replay (lost-bug check)
        run: |
          set -u
          BINDIR="${BINDIR:-/tmp/libtiff/tools}"
          mkdir -p results/dry_run
          shopt -s nullglob

          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)

            while IFS='|' read -r label cmd; do
              [ -n "$label" ] || continue
              tool="${cmd%% *}"
              args="${cmd#* }"
              [ "$args" = "$cmd" ] && args=""
              rf="results/dry_run/${label}_${sname}.txt"
              total=$((total + 1))
              echo "[*] replay $label <= $sname"
              # Capture exit code without toggling global set -e/+e.
              rc=0
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0 \
                timeout 60 bash -c \
                'exec "$@"' _ "$BINDIR/$tool" ${args//@@/$seed} \
                >/dev/null 2>"$rf.tmp" || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $label <= $sname (exit=$rc)"
                mv "$rf.tmp" "$rf"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f "$rf.tmp"
              fi
            done < /tmp/targets.txt
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set -u
          BINDIR="${BINDIR:-/tmp/libtiff/tools}"
          mkdir -p results/afl
          shopt -s nullglob

          # afl-fuzz needs a non-empty input corpus; provide a minimal one if
          # the seed download was skipped (e.g. secrets unavailable).
          if [ -z "$(ls -A "seeds/$PROJECT" 2>/dev/null)" ]; then
            mkdir -p "seeds/$PROJECT"
            printf 'II*\000' > "seeds/$PROJECT/min.bin"
          fi

          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          n=$(wc -l < /tmp/targets.txt)
          per=$((FUZZ_DURATION / n))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Fuzzing $n targets for ${per}s each (budget ${FUZZ_DURATION}s)"

          # A sample seed for the afl-showmap startup sanity check.
          sample=$(ls "seeds/$PROJECT"/*.bin 2>/dev/null | head -1)

          while IFS='|' read -r label cmd; do
            [ -n "$label" ] || continue
            tool="${cmd%% *}"
            args="${cmd#* }"
            [ "$args" = "$cmd" ] && args=""

            # Skip any target that cannot even start under afl-showmap.
            if [ -n "$sample" ]; then
              rc=0
              afl-showmap -m none -o /dev/null -- \
                "$BINDIR/$tool" ${args//@@/$sample} >/dev/null 2>&1 || rc=$?
              # afl-showmap exits 0/1/2 on normal target runs; a startup
              # failure (missing lib, bad exec) surfaces as a higher code.
              if [ "$rc" -gt 2 ]; then
                echo "[!] skip $label: afl-showmap startup failed (rc=$rc)"
                continue
              fi
            fi

            echo "[*] afl-fuzz $label for ${per}s :: $BINDIR/$tool $args"
            # -m none is required with AddressSanitizer builds.
            # Guarded so a target that cannot start never fails the job.
            timeout $((per + 60)) \
              afl-fuzz -i "seeds/$PROJECT" -o "results/afl/$label" \
              -m none -V "$per" -- "$BINDIR/$tool" $args || true
          done < /tmp/targets.txt

      - name: Triage AFL++ crashes
        run: |
          set -u
          BINDIR="${BINDIR:-/tmp/libtiff/tools}"
          mkdir -p results/fuzz
          shopt -s nullglob

          new_crashes=0
          while IFS='|' read -r label cmd; do
            [ -n "$label" ] || continue
            tool="${cmd%% *}"
            args="${cmd#* }"
            [ "$args" = "$cmd" ] && args=""
            cdir="results/afl/$label/default/crashes"
            [ -d "$cdir" ] || continue
            for cf in "$cdir"/*; do
              [ -f "$cf" ] || continue
              case "$(basename "$cf")" in README.txt) continue;; esac
              cid=$(basename "$cf" | tr ':,' '__')
              rf="results/fuzz/${tool}_${label}_${cid}.txt"
              rc=0
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 bash -c \
                'exec "$@"' _ "$BINDIR/$tool" ${args//@@/$cf} \
                >/dev/null 2>"$rf" || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] NEW CRASH: $tool ($label) <= $cid"
                cp "$cf" "results/fuzz/${tool}_${label}_${cid}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$rf"
              fi
            done
          done < /tmp/targets.txt
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Sanitize result filenames for upload
        if: always()
        run: |
          # actions/upload-artifact@v4 rejects ':' in any path, but AFL++'s
          # raw queue/crash files are named like "id:000000,time:0,...".
          # Rename depth-first so files are fixed before their parent dirs.
          [ -d results ] || exit 0
          find results -depth -name '*:*' | while IFS= read -r p; do
            newname=$(basename "$p" | tr ':' '_')
            mv "$p" "$(dirname "$p")/$newname"
          done

      - name: Generate report
        if: always()
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libtiff
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libtiff
          path: results/
          retention-days: 30
