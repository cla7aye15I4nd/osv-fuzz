name: "Fuzz native libsoup"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libsoup
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install libsoup build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            meson ninja-build pkg-config \
            libglib2.0-dev libnghttp2-dev libsqlite3-dev libpsl-dev \
            libbrotli-dev libzstd-dev

      - name: Clone latest libsoup source and build with AFL++ + ASan
        run: |
          set -euo pipefail
          mkdir -p /tmp/src
          git clone --depth 1 https://gitlab.gnome.org/GNOME/libsoup.git /tmp/src/libsoup
          export SRC=/tmp/src/libsoup
          cd "$SRC"

          # AFL++ compilers + AddressSanitizer.
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1

          # The fuzz_* targets are built with -Dfuzzing=enabled; afl-cc wraps
          # clang and links -fsanitize=fuzzer harnesses into binaries that both
          # replay a single input file and can be driven by afl-fuzz with @@.
          # b_lundef=false so -fsanitize=fuzzer/address link cleanly.
          meson setup _build \
            -Dfuzzing=enabled -Dtests=false \
            -Dintrospection=disabled -Dvapi=disabled -Ddocs=disabled -Dsysprof=disabled \
            -Db_sanitize=address -Db_lundef=false \
            --buildtype=debugoptimized \
            -Dc_args="-g -O1 -fno-omit-frame-pointer" \
            -Dprefix="$SRC/_install"
          meson compile -C _build
          meson install -C _build

          BINDIR="$SRC/_build/fuzzing"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "FUZZ_BIN=$BINDIR/fuzz_content_sniffer" >> "$GITHUB_ENV"

          echo "[+] Built harness:"
          ls -la "$BINDIR/fuzz_content_sniffer"
          if [ ! -x "$BINDIR/fuzz_content_sniffer" ]; then
            echo "[!] fuzz_content_sniffer was not built — build failed"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run
          BIN="$FUZZ_BIN"
          bname=$(basename "$BIN")
          # libsoup shared library lives under the install prefix.
          export LD_LIBRARY_PATH="$SRC/_install/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
          crash_count=0
          total=0
          shopt -s nullglob
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            total=$((total + 1))
            result_file="results/dry_run/${bname}_${sname}.txt"
            echo "[*] Replaying $bname with $sname..."
            # Invocation: $BINDIR/fuzz_content_sniffer $POC
            POC="$seed"
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$BIN" "$POC" > /dev/null 2> "results/dry_run/.stderr_tmp"
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv "results/dry_run/.stderr_tmp" "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f "results/dry_run/.stderr_tmp"
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export LD_LIBRARY_PATH="$SRC/_install/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          # Ensure the input dir is non-empty so afl-fuzz can start.
          if [ -z "$(ls -A "seeds/$PROJECT"/*.bin 2>/dev/null)" ]; then
            mkdir -p "seeds/$PROJECT"
            printf 'seed' > "seeds/$PROJECT/minimal.bin"
          fi
          # Invocation with AFL's @@ replacing the input file path.
          afl-fuzz -i "seeds/$PROJECT" -o results/afl -m none \
            -V "$FUZZ_DURATION" -- "$FUZZ_BIN" @@ || true

      - name: Triage crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          BIN="$FUZZ_BIN"
          bname=$(basename "$BIN")
          export LD_LIBRARY_PATH="$SRC/_install/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
          crash_dir="results/afl/default/crashes"
          new_crashes=0
          shopt -s nullglob
          if [ -d "$crash_dir" ]; then
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              case "$(basename "$crash_file")" in
                README.txt) continue ;;
              esac
              crash_name=$(basename "$crash_file" | tr ':,' '__')
              result_file="results/fuzz/${bname}_${crash_name}.txt"
              POC="$crash_file"
              set +e
              ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
                timeout 60 "$BIN" "$POC" > /dev/null 2> "$result_file"
              replay_exit=$?
              set -e
              if [ "$replay_exit" -ne 0 ] && [ "$replay_exit" -ne 124 ]; then
                echo "  [!] NEW CRASH: $bname ($crash_name)"
                cp "$crash_file" "results/fuzz/${bname}_${crash_name}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          fi
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libsoup
          path: results/pocs/
          retention-days: 90

