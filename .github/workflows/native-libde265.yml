name: "Fuzz native libde265"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds (split across all dec265 invocations)"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libde265
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest libde265 with AFL++ + ASan
        run: |
          set -eux
          git clone --depth 1 https://github.com/strukturag/libde265.git /tmp/libde265
          cd /tmp/libde265
          mkdir -p build && cd build
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DENABLE_SHERLOCK265=OFF
          make -j"$(nproc)"
          # The CLI decoder is produced under build/dec265/dec265
          BINDIR=/tmp/libde265/build/dec265
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built binary:"
          if [ -x "$BINDIR/dec265" ]; then
            echo "  [+] $BINDIR/dec265"
          else
            echo "  [!] MISSING: $BINDIR/dec265"
          fi
          # Fail early if the decoder did not build.
          test -x "$BINDIR/dec265"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -u
          BINDIR="${BINDIR:-/tmp/libde265/build/dec265}"
          mkdir -p results/dry_run
          shopt -s nullglob

          # Recorded per-CVE invocations; __POC__ is the seed input path.
          declare -A INV
          INV["CVE-2023-47471"]="$BINDIR/dec265 -c -d -f 153 __POC__"
          INV["CVE-2025-61147"]="$BINDIR/dec265 -T 2147483648 __POC__"
          INV["CVE-2023-43887"]="$BINDIR/dec265 -d __POC__"

          # Stable label per CVE so multiple invocations of the same binary
          # (dec265) do not collide in the result filenames.
          declare -A LABEL
          LABEL["CVE-2023-47471"]="dec265_c_d_f153"
          LABEL["CVE-2025-61147"]="dec265_T"
          LABEL["CVE-2023-43887"]="dec265_d"

          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)

            # Map the seed to its recorded invocation by CVE id in the name.
            # If no CVE matches, replay it through every invocation.
            cases=()
            for cve in "${!INV[@]}"; do
              case "$sname" in *"$cve"*) cases+=("$cve");; esac
            done
            if [ "${#cases[@]}" -eq 0 ]; then
              cases=("${!INV[@]}")
            fi

            for cve in "${cases[@]}"; do
              cmd="${INV[$cve]//__POC__/$seed}"
              label="${LABEL[$cve]}"
              rf="results/dry_run/${label}_${sname}.txt"
              [ -f "$rf" ] && continue
              total=$((total + 1))
              echo "[*] replay $label <= $sname ($cve)"
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 bash -c "$cmd" >/dev/null 2>"$rf.tmp"
              ec=$?
              set -e
              if [ "$ec" -ne 0 ] && [ "$ec" -ne 124 ]; then
                echo "  [!] CRASH: $label <= $sname (exit=$ec)"
                mv "$rf.tmp" "$rf"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f "$rf.tmp"
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++
        run: |
          set -u
          BINDIR="${BINDIR:-/tmp/libde265/build/dec265}"
          mkdir -p results/afl
          shopt -s nullglob

          # afl-fuzz needs a non-empty input corpus; provide a minimal one if
          # the seed download was skipped (e.g. secrets unavailable).
          if [ -z "$(ls -A "seeds/$PROJECT" 2>/dev/null)" ]; then
            mkdir -p "seeds/$PROJECT"
            printf '\000\000\000\001\100' > "seeds/$PROJECT/min.bin"
          fi

          # label|command   (@@ is replaced by AFL with each test input)
          FTARGETS=(
            "dec265_c_d_f153|$BINDIR/dec265 -c -d -f 153 @@"
            "dec265_T|$BINDIR/dec265 -T 2147483648 @@"
            "dec265_d|$BINDIR/dec265 -d @@"
          )

          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          n=${#FTARGETS[@]}
          per=$((FUZZ_DURATION / n))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Fuzzing $n targets for ${per}s each (budget ${FUZZ_DURATION}s)"

          for entry in "${FTARGETS[@]}"; do
            label="${entry%%|*}"
            cmd="${entry#*|}"
            echo "[*] afl-fuzz $label for ${per}s :: $cmd"
            # -m none is required with AddressSanitizer builds.
            # Guarded so a target that cannot start never fails the job.
            timeout $((per + 60)) \
              afl-fuzz -i "seeds/$PROJECT" -o "results/afl/$label" \
              -V "$per" -m none -- $cmd || true
          done || true

      - name: Triage AFL++ crashes
        run: |
          set -u
          BINDIR="${BINDIR:-/tmp/libde265/build/dec265}"
          mkdir -p results/fuzz
          shopt -s nullglob

          FTARGETS=(
            "dec265_c_d_f153|$BINDIR/dec265 -c -d -f 153 @@"
            "dec265_T|$BINDIR/dec265 -T 2147483648 @@"
            "dec265_d|$BINDIR/dec265 -d @@"
          )

          new_crashes=0
          for entry in "${FTARGETS[@]}"; do
            label="${entry%%|*}"
            cmd="${entry#*|}"
            cdir="results/afl/$label/default/crashes"
            [ -d "$cdir" ] || continue
            for cf in "$cdir"/*; do
              [ -f "$cf" ] || continue
              case "$(basename "$cf")" in README.txt) continue;; esac
              cid=$(basename "$cf" | tr ':,' '__')
              rf="results/fuzz/${label}_${cid}.txt"
              rcmd="${cmd//@@/$cf}"
              set +e
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 bash -c "$rcmd" >/dev/null 2>"$rf"
              ec=$?
              set -e
              if [ "$ec" -ne 0 ] && [ "$ec" -ne 124 ]; then
                echo "  [!] NEW CRASH: $label <= $cid"
                cp "$cf" "results/fuzz/${label}_${cid}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$rf"
              fi
            done
          done
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libde265
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libde265
          path: results/
          retention-days: 30
