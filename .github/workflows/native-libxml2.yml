name: "Fuzz native libxml2"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libxml2
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest libxml2 with AFL++ + ASan
        run: |
          set -euxo pipefail
          # Use AFL++ compilers with AddressSanitizer instrumentation.
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          mkdir -p /tmp/src
          git clone --depth 1 https://gitlab.gnome.org/GNOME/libxml2.git /tmp/src/libxml2
          cd /tmp/src/libxml2

          SRC="$PWD"
          # autogen.sh regenerates the Autotools files (git tree) and forwards
          # args to ./configure. Enable HTML/regexp/schemas so the xmllint modes
          # exercised by the lost-bug PoCs (--html, --recover) are compiled in.
          ./autogen.sh --without-python --with-html --with-regexps --with-schemas
          make -j"$(nproc)"

          # Prefer the real ELF binary in .libs over the libtool shell wrapper so
          # afl-fuzz drives an instrumented executable directly. Fall back to the
          # libtool wrapper if the .libs binary is absent.
          if [ -x "$SRC/.libs/xmllint" ]; then
            BIN="$SRC/.libs/xmllint"
          else
            BIN="$SRC/xmllint"
          fi

          # Legacy testregexp driver (CVE-2016-1840). Present only in old trees
          # (<=2.9.x); removed from the current source. Record it if it exists,
          # otherwise that PoC is simply skipped below.
          TESTREGEXP=""
          for cand in "$SRC/.libs/testregexp" "$SRC/testregexp"; do
            if [ -x "$cand" ]; then TESTREGEXP="$cand"; break; fi
          done

          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "BINDIR=$SRC" >> "$GITHUB_ENV"
          echo "BIN=$BIN" >> "$GITHUB_ENV"
          echo "TESTREGEXP=$TESTREGEXP" >> "$GITHUB_ENV"
          echo "[+] Built xmllint target: $BIN"
          file "$BIN" || true
          "$BIN" --version 2>&1 | head -2 || true
          if [ -n "$TESTREGEXP" ]; then
            echo "[+] testregexp driver available: $TESTREGEXP"
          else
            echo "[i] testregexp driver not present in this tree (CVE-2016-1840 skipped)"
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run

          # Map a seed name to the xmllint flags its recorded PoC invocation used.
          # Seeds are named after their CVE; unknown seeds default to plain xmllint.
          flags_for_seed() {
            case "$1" in
              *2016-1837*|*2016-2073*|*2016-1839*|*2016-1833*) echo "html" ;;
              *2016-9598*|*2016-4483*)                         echo "recover" ;;
              *2016-1840*)                                     echo "regexp" ;;
              *)                                               echo "plain" ;;
            esac
          }

          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            mode="$(flags_for_seed "$sname")"

            case "$mode" in
              html)    cmd=("$BIN" --html "$seed") ; bname="xmllint" ;;
              recover) cmd=("$BIN" --recover "$seed") ; bname="xmllint" ;;
              plain)   cmd=("$BIN" "$seed") ; bname="xmllint" ;;
              regexp)
                if [ -z "$TESTREGEXP" ]; then
                  echo "[i] Skipping $sname — testregexp driver not built in current tree"
                  continue
                fi
                cmd=("$TESTREGEXP" "$seed") ; bname="testregexp" ;;
            esac

            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname ($mode) with $sname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 30 "${cmd[@]}" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          # Fuzz each xmllint parsing mode the lost bugs live in. testregexp is
          # added only when the legacy driver was built. xmllint takes the input
          # document as a file argument, so @@ is AFL's mutated input.
          modes=("plain" "html" "recover")
          if [ -n "$TESTREGEXP" ]; then
            modes+=("regexp")
          fi

          num_modes=${#modes[@]}
          per_target=$((FUZZ_DURATION / num_modes))
          [ "$per_target" -lt 60 ] && per_target=60
          echo "[+] Fuzzing ${num_modes} mode(s), ${per_target}s each"

          for mode in "${modes[@]}"; do
            out_dir="results/afl/$mode"
            mkdir -p "$out_dir"
            case "$mode" in
              plain)   target=("$BIN" @@) ;;
              html)    target=("$BIN" --html @@) ;;
              recover) target=("$BIN" --recover @@) ;;
              regexp)  target=("$TESTREGEXP" @@) ;;
            esac
            echo "[*] Fuzzing mode=$mode -> ${target[*]}"
            afl-fuzz -i "seeds/$PROJECT" -o "$out_dir" -m none \
              -V "$per_target" -- "${target[@]}" || true
            ls -la "$out_dir/default/crashes/" 2>/dev/null || true
          done
          echo "[+] Fuzzing step finished"

      - name: Triage AFL crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          new_crashes=0

          for mode in plain html recover regexp; do
            crash_dir="results/afl/$mode/default/crashes"
            [ -d "$crash_dir" ] || continue
            case "$mode" in
              plain)   pre=("$BIN") ; bname="xmllint" ;;
              html)    pre=("$BIN" --html) ; bname="xmllint" ;;
              recover) pre=("$BIN" --recover) ; bname="xmllint" ;;
              regexp)  pre=("$TESTREGEXP") ; bname="testregexp" ;;
            esac
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              case "$(basename "$crash_file")" in
                README.txt) continue ;;
              esac
              crash_id="$(basename "$crash_file" | tr ':,' '__')"
              result_file="results/fuzz/${bname}_${mode}_${crash_id}.txt"
              set +e
              ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
                timeout 30 "${pre[@]}" "$crash_file" > /dev/null 2> "$result_file"
              replay_exit=$?
              set -e
              if [ "$replay_exit" -ne 0 ] && [ "$replay_exit" -ne 124 ]; then
                echo "  [!] CONFIRMED CRASH: $mode/$crash_id"
                cp "$crash_file" "results/fuzz/${bname}_${mode}_${crash_id}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          done
          echo "[+] Triage complete: $new_crashes confirmed crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libxml2
          path: results/
          retention-days: 30

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libxml2
          path: results/pocs/
          retention-days: 90
