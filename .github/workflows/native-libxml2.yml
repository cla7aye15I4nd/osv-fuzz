name: "Fuzz native libxml2"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libxml2
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest libxml2 with AFL++ + ASan
        run: |
          set -euxo pipefail

          # Extra apt deps libxml2's optional features may need.
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y -qq \
            zlib1g-dev liblzma-dev libreadline-dev \
            gettext autopoint 2>/dev/null || true

          # AFL++ compilers with AddressSanitizer instrumentation.
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          mkdir -p /tmp/src
          SRC=/tmp/src/libxml2
          rm -rf "$SRC"

          # Robust clone: recurse submodules, retry up to 3x.
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                 https://gitlab.gnome.org/GNOME/libxml2.git "$SRC"; then
              break
            fi
            n=$((n + 1))
            echo "[!] clone attempt $n failed; retrying..."
            rm -rf "$SRC"
            sleep 5
          done
          [ -d "$SRC" ] || { echo "[!] clone failed after 3 attempts"; exit 1; }
          cd "$SRC"
          git submodule update --init --recursive || true

          # Autotools git build: regenerate ./configure if absent, disable
          # -Werror so newer-compiler warnings never fail the build. Enable the
          # HTML/regexp/schemas features the recorded PoCs exercise.
          if [ ! -x ./configure ]; then
            if [ -x ./autogen.sh ]; then
              NOCONFIGURE=1 ./autogen.sh || autoreconf -fi
            else
              autoreconf -fi
            fi
          fi
          ./configure --disable-werror --without-python \
            --with-html --with-regexps --with-schemas
          make -j"$(nproc)"

          # Prefer the real ELF binaries in .libs over the libtool shell
          # wrappers so afl drives instrumented executables directly.
          if [ -x "$SRC/.libs/xmllint" ]; then
            BINDIR="$SRC/.libs"
          else
            BINDIR="$SRC"
          fi
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools in $BINDIR:"
          ls -la "$BINDIR" | head -40 || true
          if [ ! -x "$BINDIR/xmllint" ]; then
            echo "[!] xmllint not built — build failed"; exit 1
          fi
          file "$BINDIR/xmllint" || true

      - name: Enumerate fuzz targets
        run: |
          set -euo pipefail
          # Build the TARGETS array: "<label>|<binary>|<args-with-@@>".
          # Each xmllint parsing mode from the recorded PoCs is its own target,
          # plus the legacy testregexp driver when present in the tree.
          declare -a TARGETS=()
          if [ -x "$BINDIR/xmllint" ]; then
            TARGETS+=("xmllint_plain|$BINDIR/xmllint|@@")
            TARGETS+=("xmllint_html|$BINDIR/xmllint|--html @@")
            TARGETS+=("xmllint_recover|$BINDIR/xmllint|--recover @@")
          fi
          # Legacy testregexp driver (CVE-2016-1840) — only in old (<=2.9.x) trees.
          for cand in "$BINDIR/testregexp" "$SRC/testregexp" "$SRC/.libs/testregexp"; do
            if [ -x "$cand" ]; then
              TARGETS+=("testregexp|$cand|@@")
              break
            fi
          done
          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "[!] No fuzz targets discovered"; exit 1
          fi
          printf '%s\n' "${TARGETS[@]}" > /tmp/targets.txt
          echo "[+] Discovered ${#TARGETS[@]} target(s):"
          cat /tmp/targets.txt

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          crash_count=0
          total=0
          while IFS='|' read -r label bin args; do
            [ -n "$label" ] || continue
            [ -x "$bin" ] || continue
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname=$(basename "$seed" .bin)
              total=$((total + 1))
              echo "[*] Replaying $label with $sname..."
              # shellcheck disable=SC2086
              timeout 30 "$bin" ${args/@@/"$seed"} > /dev/null 2> results/dry_run/.stderr_tmp
              rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $label with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${label}_${sname}.txt"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done < /tmp/targets.txt
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          num_targets=$(grep -c . /tmp/targets.txt)
          per_target=$((FUZZ_DURATION / num_targets))
          [ "$per_target" -lt 60 ] && per_target=60
          echo "[+] Fuzzing ${num_targets} target(s), ${per_target}s each"

          while IFS='|' read -r label bin args; do
            [ -n "$label" ] || continue
            [ -x "$bin" ] || continue

            # Skip targets that fail afl-showmap startup (instrumentation/exec issue).
            first_seed=$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)
            if [ -n "$first_seed" ]; then
              # shellcheck disable=SC2086
              AFL_QUIET=1 afl-showmap -m none -o /dev/null -- \
                "$bin" ${args/@@/"$first_seed"} > /dev/null 2>&1
              sm=$?
              if [ "$sm" -ne 0 ] && [ "$sm" -ne 1 ] && [ "$sm" -ne 2 ]; then
                echo "[!] Skipping $label — afl-showmap startup failed (rc=$sm)"
                continue
              fi
            fi

            out_dir="results/afl/$label"
            mkdir -p "$out_dir"
            echo "[*] Fuzzing $label -> $bin $args"
            # shellcheck disable=SC2086
            afl-fuzz -i "seeds/$PROJECT" -o "$out_dir" -m none \
              -V "$per_target" -- "$bin" $args || true
            ls -la "$out_dir/default/crashes/" 2>/dev/null || true
          done < /tmp/targets.txt
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set +e
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          new_crashes=0
          while IFS='|' read -r label bin args; do
            [ -n "$label" ] || continue
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$label/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              case "$(basename "$crash_file")" in
                README.txt) continue ;;
              esac
              crash_id=$(basename "$crash_file" | tr ':,' '__')
              result_file="results/fuzz/${label}_${crash_id}.txt"
              # shellcheck disable=SC2086
              timeout 30 "$bin" ${args/@@/"$crash_file"} > /dev/null 2> "$result_file"
              rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CONFIRMED CRASH: $label/$crash_id (exit=$rc)"
                cp "$crash_file" "results/fuzz/${label}_${crash_id}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          done < /tmp/targets.txt
          echo "[+] Triage complete: $new_crashes confirmed crashes"

      - name: Sanitize result filenames
        if: always()
        run: |
          # AFL filenames like id:000000,time:... contain ':' which breaks
          # actions/upload-artifact@v4. Rename any offending path under results/.
          if [ -d results ]; then
            find results -depth -name '*:*' | while read -r p; do
              d=$(dirname "$p"); b=$(basename "$p")
              mv "$p" "$d/${b//:/_}"
            done
          fi

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

