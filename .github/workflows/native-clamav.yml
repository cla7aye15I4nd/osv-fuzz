name: "Fuzz native clamav"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: clamav
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install clamav build dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config python3 git \
            libssl-dev libbz2-dev zlib1g-dev libxml2-dev libpcre2-dev \
            libjson-c-dev libcurl4-openssl-dev libncurses-dev
          # Rust toolchain is required by libclamav since 1.0.
          if ! command -v cargo >/dev/null 2>&1; then
            curl -sSf https://sh.rustup.rs | sh -s -- -y
          fi

      - name: Clone and build latest clamav with AFL++ + ASan
        run: |
          set -e
          # Ensure cargo is on PATH (rustup installs to ~/.cargo/bin).
          [ -f "$HOME/.cargo/env" ] && . "$HOME/.cargo/env"
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/Cisco-Talos/clamav.git /tmp/src/clamav
          cd /tmp/src/clamav
          mkdir -p build && cd build
          # Build with AFL++ compiler wrappers + AddressSanitizer.
          # libmspack (CVE-2017-6419) is built-in by default.
          export AFL_USE_ASAN=1
          CC=afl-cc CXX=afl-c++ \
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address" \
            -DENABLE_MILTER=OFF -DENABLE_TESTS=OFF -DENABLE_EXAMPLES=OFF \
            -DBYTECODE_RUNTIME=interpreter
          ninja
          BIN="/tmp/src/clamav/build/clamscan/clamscan"
          if [ ! -x "$BIN" ]; then
            echo "[!] Build failed — $BIN not found"
            exit 1
          fi
          # clamscan refuses to start with no signature database; provide a dummy one.
          # The vulnerable parsers run during the scan regardless of loaded signatures.
          mkdir -p /tmp/db
          printf 'dummy:0:0:deadbeef\n' > /tmp/db/dummy.ndb
          echo "BINDIR=/tmp/src/clamav/build/clamscan" >> "$GITHUB_ENV"
          echo "BIN=$BIN" >> "$GITHUB_ENV"
          echo "[+] Built target:"
          ls -la "$BIN"
          "$BIN" --version || true

      - name: Dry-run replay (lost-bug check)
        run: |
          set -u
          mkdir -p results/dry_run
          bname=$(basename "$BIN")
          shopt -s nullglob
          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
            timeout 60 "$BIN" --database=/tmp/db "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -u
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          afl-fuzz -i seeds/"$PROJECT" -o results/afl -V "$FUZZ_DURATION" \
            -- "$BIN" --database=/tmp/db @@ || true

      - name: Triage AFL++ crashes
        run: |
          set -u
          mkdir -p results/fuzz
          bname=$(basename "$BIN")
          shopt -s nullglob
          for crash in results/afl/default/crashes/*; do
            [ -f "$crash" ] || continue
            cname=$(basename "$crash")
            [ "$cname" = "README.txt" ] && continue
            result_file="results/fuzz/${bname}_${cname}.txt"
            echo "[*] Triaging $cname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
            timeout 60 "$BIN" --database=/tmp/db "$crash" > /dev/null 2> "$result_file"
            set -e
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
          done

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-clamav
          path: results/
          retention-days: 30

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-clamav
          path: results/pocs/
          retention-days: 90
