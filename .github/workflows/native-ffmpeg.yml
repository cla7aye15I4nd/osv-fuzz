name: "Fuzz native ffmpeg"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: ffmpeg
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest ffmpeg with AFL++ + ASan
        run: |
          set -euo pipefail
          # FFmpeg's asm paths need nasm/yasm; pkg-config keeps configure happy.
          sudo apt-get install -y -qq nasm yasm pkg-config 2>/dev/null || true

          mkdir -p /tmp/src

          # Clone with a 3x retry (transient network failures are common on CI).
          n=0
          until [ "$n" -ge 3 ]; do
            rm -rf /tmp/src/ffmpeg
            if git clone --depth 1 --recurse-submodules \
                 https://github.com/FFmpeg/FFmpeg.git /tmp/src/ffmpeg; then
              break
            fi
            n=$((n + 1))
            echo "[!] clone failed (attempt $n) — retrying in 5s"
            sleep 5
          done
          [ -d /tmp/src/ffmpeg ] || { echo "[!] clone failed after 3 attempts"; exit 1; }

          cd /tmp/src/ffmpeg
          git submodule update --init --recursive || true
          export SRC="$(pwd)"

          # AFL++ instrumentation + AddressSanitizer.
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1

          # BINDIR lives OUTSIDE the tree so `make distclean` (for the ossfuzz
          # reconfigure below) cannot wipe the CLI binaries we already built.
          BINDIR=/tmp/ffmpeg-bin
          mkdir -p "$BINDIR"

          # --- ffmpeg / ffprobe CLI with AFL++ + ASan (covers the -i <file> PoCs) ---
          # FFmpeg ships a hand-written ./configure (NOT autotools/cmake); no
          # autogen/autoreconf needed. FFmpeg has no --disable-werror flag and
          # does not use -Werror by default; --disable-doc trims the build.
          ./configure \
            --cc=afl-cc --cxx=afl-c++ \
            --enable-gpl --enable-nonfree \
            --disable-stripping --disable-doc \
            --extra-cflags="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            --extra-cxxflags="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            --extra-ldflags="-fsanitize=address"
          make -j"$(nproc)" ffmpeg ffprobe

          for t in ffmpeg ffprobe; do
            if [ -x "$SRC/$t" ]; then
              cp "$SRC/$t" "$BINDIR/$t"
              echo "[+] Built CLI tool: $t"
            fi
          done
          if [ ! -x "$BINDIR/ffmpeg" ]; then
            echo "[!] ffmpeg CLI not built — cannot continue"
            find "$SRC" -maxdepth 1 -name 'ffmpeg*' -type f 2>/dev/null || true
            exit 1
          fi

          # --- OSS-Fuzz decoder harness for the *_fuzzer PoC (AV_CODEC_ID_IDF) ---
          # Best-effort: a harness build failure must NOT sink the CLI-based run.
          set +e
          (
            set -e
            cd "$SRC"
            make distclean
            ./configure \
              --cc=afl-cc --cxx=afl-c++ \
              --enable-gpl --enable-nonfree \
              --disable-stripping --disable-doc \
              --enable-ossfuzz \
              --extra-cflags="-g -O1 -fsanitize=address,fuzzer-no-link -fno-omit-frame-pointer" \
              --extra-cxxflags="-g -O1 -fsanitize=address,fuzzer-no-link -fno-omit-frame-pointer" \
              --extra-ldflags="-fsanitize=address"
            make -j"$(nproc)" tools/target_dec_fuzzer
            afl-cc -g -O1 -fsanitize=address,fuzzer -fno-omit-frame-pointer \
              -DFFMPEG_DECODER=IDF -I"$SRC" \
              tools/target_dec_fuzzer.c -o "$BINDIR/ffmpeg_AV_CODEC_ID_IDF_fuzzer" \
              "$SRC"/libavcodec/libavcodec.a "$SRC"/libavformat/libavformat.a \
              "$SRC"/libavutil/libavutil.a "$SRC"/libswresample/libswresample.a \
              "$SRC"/libavformat/libavformat.a -lm -lz
          )
          set -e
          if [ -x "$BINDIR/ffmpeg_AV_CODEC_ID_IDF_fuzzer" ]; then
            echo "[+] Built harness: ffmpeg_AV_CODEC_ID_IDF_fuzzer"
          else
            echo "[!] IDF fuzzer harness not built — continuing with CLI targets only"
          fi

          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "SRC_DIR=$SRC" >> "$GITHUB_ENV"

          # --- Enumerate file-input targets -> TSV (tool<TAB>arg-template with @@) ---
          TARGETS_FILE="$GITHUB_WORKSPACE/targets.tsv"
          : > "$TARGETS_FILE"
          [ -x "$BINDIR/ffmpeg" ]  && printf 'ffmpeg\t-i @@ -f null -\n' >> "$TARGETS_FILE"
          [ -x "$BINDIR/ffprobe" ] && printf 'ffprobe\t@@\n'            >> "$TARGETS_FILE"
          [ -x "$BINDIR/ffmpeg_AV_CODEC_ID_IDF_fuzzer" ] && \
            printf 'ffmpeg_AV_CODEC_ID_IDF_fuzzer\t@@\n' >> "$TARGETS_FILE"
          echo "TARGETS_FILE=$TARGETS_FILE" >> "$GITHUB_ENV"
          echo "[+] Fuzz targets:"
          cat "$TARGETS_FILE"

      - name: Dry-run replay (lost-bug check)
        run: |
          # No `set -e`: we capture exit codes explicitly with `|| rc=$?`.
          set -uo pipefail
          mkdir -p results/dry_run
          crash_count=0
          total=0
          while IFS=$'\t' read -r tool args; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname="$(basename "$seed" .bin)"
              cmd_args="${args//@@/$seed}"
              total=$((total + 1))
              echo "[*] Replaying $tool with $sname..."
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0 \
                timeout 60 "$bin" $cmd_args > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${tool}_${sname}.txt"
                cp "$seed" "results/dry_run/${tool}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done < "$TARGETS_FILE"
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          ntargets=$(grep -c . "$TARGETS_FILE" 2>/dev/null || echo 0)
          if [ "$ntargets" -lt 1 ]; then
            echo "[!] No fuzz targets — nothing to do"
            exit 0
          fi

          # Split the budget across targets, floor of 60s each.
          per=$((FUZZ_DURATION / ntargets))
          [ "$per" -lt 60 ] && per=60
          echo "[+] $ntargets target(s), ${per}s each"

          seed0="$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)"
          if [ -z "$seed0" ]; then
            echo "[!] No seeds available — skipping fuzzing"
            exit 0
          fi

          while IFS=$'\t' read -r tool args; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue

            # Startup gate: skip targets that afl-showmap cannot execute.
            smargs="${args//@@/$seed0}"
            # shellcheck disable=SC2086
            if ! AFL_SKIP_CPUFREQ=1 afl-showmap -o /dev/null -m none -t 10000 \
                 -- "$bin" $smargs >/dev/null 2>&1; then
              echo "[!] Skipping $tool — afl-showmap startup failed"
              continue
            fi

            echo "[*] Fuzzing $tool for ${per}s..."
            # shellcheck disable=SC2086
            afl-fuzz -i "seeds/$PROJECT" -o "results/afl/$tool" -m none -V "$per" \
              -- "$bin" $args || true
            echo "[+] Finished fuzzing $tool"
          done < "$TARGETS_FILE"

      - name: Triage AFL++ crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          new_crashes=0
          while IFS=$'\t' read -r tool args; do
            [ -n "$tool" ] || continue
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$tool/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname="$(basename "$crash")"
              [ "$cname" = "README.txt" ] && continue
              safe="$(echo "$cname" | tr ':,' '__')"
              result_file="results/fuzz/${tool}_${safe}.txt"
              cmd_args="${args//@@/$crash}"
              echo "[*] Triaging $tool/$cname..."
              rc=0
              # shellcheck disable=SC2086
              ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                timeout 60 "$bin" $cmd_args > /dev/null 2> "$result_file" || rc=$?
              cp "$crash" "results/fuzz/${tool}_${safe}.bin"
              new_crashes=$((new_crashes + 1))
              echo "  [i] $tool/$cname triaged (exit=$rc)"
            done
          done < "$TARGETS_FILE"
          echo "[+] Triaged $new_crashes crash input(s)"

      - name: Sanitize result filenames
        if: always()
        run: |
          set -uo pipefail
          # AFL names files like id:000000,time:... — the ':' breaks
          # actions/upload-artifact@v4. Rename any offending path component.
          if [ -d results ]; then
            find results -depth -name '*:*' -print0 | while IFS= read -r -d '' p; do
              d="$(dirname "$p")"
              b="$(basename "$p")"
              mv "$p" "$d/${b//:/_}" || true
            done
          fi

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-ffmpeg
          path: results/pocs/
          retention-days: 90

