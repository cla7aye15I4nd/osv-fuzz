name: "Fuzz xs"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"

env:
  PROJECT: xs
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/dvyukov/go-fuzz-corpus /tmp/src/&&
          git clone --depth 1 https://github.com/google/fuzzing /tmp/src/&&
          git clone --depth 1 https://github.com/tc39/test262 /tmp/src/&&
          git clone --depth 1 https://github.com/Moddable-OpenSource/moddable /tmp/src/moddable

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          cd /tmp/src/moddable
          mv /tmp/src/{*.zip,*.dict} $GITHUB_WORKSPACE/build/fuzz-targets
          export MODDABLE=$PWD
          FUZZ_TARGETS=(
            xst
            xst_jsonparse
          )
          REALBIN_PATH=$GITHUB_WORKSPACE/build/fuzz-targets
          cd "$MODDABLE/xs/makefiles/lin"
          FUZZING=1 OSSFUZZ=1 FUZZ_METER=2560000 make debug
          cd "$MODDABLE"
          cp ./build/bin/lin/debug/xst $REALBIN_PATH/xst
          cp /tmp/src/xst.options $GITHUB_WORKSPACE/build/fuzz-targets/
          cd "$MODDABLE/xs/makefiles/lin"
          make -f xst.mk clean
          FUZZING=1 OSSFUZZ=1 OSSFUZZ_JSONPARSE=1 FUZZ_METER=2560000 make debug
          cd "$MODDABLE"
          cp ./build/bin/lin/debug/xst $REALBIN_PATH/xst_jsonparse
          cp /tmp/src/xst.options $GITHUB_WORKSPACE/build/fuzz-targets/xst_jsonparse.options

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
