name: "Fuzz ntopng"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 9 * * 0"

env:
  PROJECT: ntopng
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            bison \
            flex \
            groff \
            libc++-dev \
            libc++abi-dev \
            libcurl4-openssl-dev \
            libglib2.0-dev \
            liblzma-dev \
            libsqlite3-dev \
            libtool \
            libxml2-dev \
            libzstd-dev \
            ninja-build \
            pkg-config

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/ntop/ntopng.git /tmp/src/ntopng
          git clone --depth 1 --recursive https://github.com/google/libprotobuf-mutator.git /tmp/src/libprotobuf-mutator
          git clone --depth 1 --recursive https://github.com/ntop/nDPI.git /tmp/src/nDPI
          # Download static-linking dependencies (mirroring oss-fuzz Dockerfile)
          cd /tmp/src
          wget -q https://www.tcpdump.org/release/libpcap-1.9.1.tar.gz
          tar -xzf libpcap-1.9.1.tar.gz
          wget -q https://github.com/zeromq/libzmq/releases/download/v4.3.5/zeromq-4.3.5.tar.gz
          tar -xzf zeromq-4.3.5.tar.gz
          wget -q -O json-c-0.17-20230812.tar.gz \
            https://github.com/json-c/json-c/archive/refs/tags/json-c-0.17-20230812.tar.gz
          tar -xzf json-c-0.17-20230812.tar.gz
          wget -q https://github.com/maxmind/libmaxminddb/releases/download/1.7.1/libmaxminddb-1.7.1.tar.gz
          tar -xzf libmaxminddb-1.7.1.tar.gz

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address -stdlib=libc++"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export NDPI_HOME=/tmp/src/nDPI
          export NTOPNG_HOME=/tmp/src/ntopng
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/ntopng
          CFLAGS_SAVE="$CFLAGS"
          CXXFLAGS_SAVE="$CXXFLAGS"
          unset CFLAGS
          unset CXXFLAGS
          export AFL_NOOPT=1
          export CFLAGS="-Wno-error=unused-command-line-argument"
          export CXXFLAGS="-stdlib=libc++ -Wno-error=unused-command-line-argument"
          cd /tmp/src/libpcap-1.9.1
          ./configure --disable-shared
          make -j$(nproc)
          sudo make install
          cd /tmp/src/zeromq-4.3.5
          ./autogen.sh
          (
          export CXXFLAGS="-Wno-error=missing-braces -Wno-error=unused-command-line-argument -stdlib=libc++"
          ./configure --without-documentation --without-libsodium --enable-static --disable-shared
          make -j$(nproc)
          sudo make install
          )
          cd /tmp/src/json-c-json-c-0.17-20230812
          mkdir build
          cd build
          cmake -DBUILD_SHARED_LIBS=OFF ..
          make -j$(nproc)
          sudo make install
          cd /tmp/src/libmaxminddb-1.7.1
          ./configure --disable-shared --enable-static
          make -j$(nproc)
          sudo make install
          cd $NDPI_HOME
          ./autogen.sh
          ./configure
          make -j$(nproc)
          make -C $NTOPNG_HOME/third-party/lua-5.4.6 generic
          cd $NTOPNG_HOME/third-party/rrdtool-1.4.8
          ./configure --disable-libdbi --disable-libwrap --disable-rrdcgi --disable-libtool-lock \
              --disable-nls --disable-rpath --disable-perl --disable-ruby --disable-lua \
              --disable-tcl --disable-python --disable-dependency-tracking --disable-rrd_graph
          cd src
          make librrd_th.la
          export CFLAGS="${CFLAGS_SAVE}"
          export CXXFLAGS="${CXXFLAGS_SAVE}"
          unset AFL_NOOPT
          sudo ldconfig
          cd $NTOPNG_HOME
          ./autogen.sh
          ./configure --enable-fuzztargets --without-hiredis --with-zmq-static \
              --with-json-c-static --with-maxminddb-static
          make -j$(nproc) fuzz_all
          find fuzz/ -regex 'fuzz/fuzz_[a-z_]*\(\.\(zip\|dict\|options\)\)?' -exec cp {} $GITHUB_WORKSPACE/build/fuzz-targets/ \;
          mkdir -p $GITHUB_WORKSPACE/build/fuzz-targets/install $GITHUB_WORKSPACE/build/fuzz-targets/data-dir $GITHUB_WORKSPACE/build/fuzz-targets/docs $GITHUB_WORKSPACE/build/fuzz-targets/scripts/callbacks
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

