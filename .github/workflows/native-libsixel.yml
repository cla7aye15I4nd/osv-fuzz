name: "Fuzz native libsixel"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libsixel
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y -qq \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libpng-dev \
            libjpeg-dev \
            libcurl4-openssl-dev \
            zlib1g-dev \
            2>/dev/null || true

      - name: Clone latest libsixel source
        run: |
          set -euo pipefail
          mkdir -p /tmp/src
          rm -rf /tmp/src/libsixel
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                https://github.com/libsixel/libsixel.git /tmp/src/libsixel; then
              break
            fi
            n=$((n + 1))
            echo "[!] clone failed (attempt $n) — retrying..."
            rm -rf /tmp/src/libsixel
            sleep 5
          done
          [ -d /tmp/src/libsixel ] || { echo "[!] clone failed after retries"; exit 1; }
          git -C /tmp/src/libsixel submodule update --init --recursive || true

      - name: Build libsixel CLI tools with AFL++ + ASan
        run: |
          set -euo pipefail
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          cd /tmp/src/libsixel
          # libsixel (>= 2.0) builds with Meson. Build OUT-OF-SOURCE.
          # NOTE: meson feature options use enabled/disabled (not true/false).
          BUILD_DIR=/tmp/libsixel-build
          rm -rf "$BUILD_DIR"
          meson setup "$BUILD_DIR" \
            -Dbuildtype=debug \
            -Db_sanitize=address \
            -Db_lundef=false \
            -Dc_args="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -Dc_link_args="-fsanitize=address"
          meson compile -C "$BUILD_DIR"
          # CLI tools land in <build>/converters
          BINDIR="$BUILD_DIR/converters"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools in $BINDIR:"
          ls -la "$BINDIR" || true
          if [ ! -x "$BINDIR/img2sixel" ]; then
            echo "[!] img2sixel was not built — aborting"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          # Multi-target: parallel arrays of file-input CLI tools + arg template
          # ("@@" marks the input path). Every seed is replayed against each.
          declare -a TOOLS ARGS
          if [ -x "$BINDIR/img2sixel" ]; then
            TOOLS+=("img2sixel"); ARGS+=("@@ -o /tmp/out_img2sixel.six")
          fi
          if [ -x "$BINDIR/sixel2png" ]; then
            TOOLS+=("sixel2png"); ARGS+=("-i @@ -o /tmp/out_sixel2png.png")
          fi
          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            POC="$seed"
            for i in "${!TOOLS[@]}"; do
              tool="${TOOLS[$i]}"
              bin="$BINDIR/$tool"
              [ -x "$bin" ] || continue
              # Build argv, substituting @@ with the seed path.
              read -r -a argv <<< "${ARGS[$i]}"
              for j in "${!argv[@]}"; do
                [ "${argv[$j]}" = "@@" ] && argv[$j]="$POC"
              done
              total=$((total + 1))
              echo "[*] Replaying $tool with $sname ..."
              rc=0
              timeout 60 "$bin" "${argv[@]}" > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $tool with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${tool}_${sname}.txt"
                cp "$seed" "results/dry_run/${tool}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1:symbolize=0
          declare -a TOOLS ARGS
          if [ -x "$BINDIR/img2sixel" ]; then
            TOOLS+=("img2sixel"); ARGS+=("@@ -o /tmp/out_img2sixel.six")
          fi
          if [ -x "$BINDIR/sixel2png" ]; then
            TOOLS+=("sixel2png"); ARGS+=("-i @@ -o /tmp/out_sixel2png.png")
          fi
          ntargets="${#TOOLS[@]}"
          if [ "$ntargets" -eq 0 ]; then
            echo "[!] No fuzzable targets found"; exit 0
          fi
          # Split the budget across targets (minimum 60s each).
          per=$((FUZZ_DURATION / ntargets))
          [ "$per" -lt 60 ] && per=60
          # Pick a representative seed for the afl-showmap startup gate.
          probe=""
          for s in seeds/"$PROJECT"/*.bin; do [ -f "$s" ] && { probe="$s"; break; }; done
          for i in "${!TOOLS[@]}"; do
            tool="${TOOLS[$i]}"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            read -r -a argv <<< "${ARGS[$i]}"
            # showmap gate: substitute @@ with the probe seed.
            declare -a probe_argv
            probe_argv=("${argv[@]}")
            for j in "${!probe_argv[@]}"; do
              [ "${probe_argv[$j]}" = "@@" ] && probe_argv[$j]="$probe"
            done
            if [ -n "$probe" ]; then
              if ! afl-showmap -o /dev/null -m none -t 5000 -- "$bin" "${probe_argv[@]}" >/dev/null 2>&1; then
                echo "[!] Skipping $tool — afl-showmap startup failed"
                continue
              fi
            fi
            echo "[*] Fuzzing $tool for ${per}s ..."
            afl-fuzz \
              -i "seeds/$PROJECT" \
              -o "results/afl/$tool" \
              -m none \
              -V "$per" \
              -- "$bin" "${argv[@]}" || true
          done
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set +e
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1
          declare -a TOOLS ARGS
          if [ -x "$BINDIR/img2sixel" ]; then
            TOOLS+=("img2sixel"); ARGS+=("@@ -o /tmp/out_img2sixel.six")
          fi
          if [ -x "$BINDIR/sixel2png" ]; then
            TOOLS+=("sixel2png"); ARGS+=("-i @@ -o /tmp/out_sixel2png.png")
          fi
          shopt -s nullglob
          n=0
          for i in "${!TOOLS[@]}"; do
            tool="${TOOLS[$i]}"
            bin="$BINDIR/$tool"
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$tool/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname="$(basename "$crash")"
              [ "$cname" = "README.txt" ] && continue
              read -r -a argv <<< "${ARGS[$i]}"
              for j in "${!argv[@]}"; do
                [ "${argv[$j]}" = "@@" ] && argv[$j]="$crash"
              done
              n=$((n + 1))
              echo "[*] Triaging $tool crash $cname ..."
              timeout 60 "$bin" "${argv[@]}" > /dev/null 2> "results/fuzz/${tool}_${cname}.txt"
              cp "$crash" "results/fuzz/${tool}_${cname}.bin"
            done
          done
          echo "[+] Triage complete: $n crashing inputs re-run"

      - name: Sanitize result filenames for upload
        if: always()
        run: |
          # actions/upload-artifact@v4 rejects paths containing ':'.
          # AFL names crashes like id:000000,sig:06,... — rename ':' -> '_'.
          if [ -d results ]; then
            find results -depth -name '*:*' | while IFS= read -r p; do
              d="$(dirname "$p")"
              b="$(basename "$p" | tr ':' '_')"
              mv "$p" "$d/$b"
            done
          fi

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libsixel
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libsixel
          path: results/
          retention-days: 30
