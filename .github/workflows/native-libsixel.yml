name: "Fuzz native libsixel"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libsixel
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libpng-dev \
            libjpeg-dev \
            libcurl4-openssl-dev \
            zlib1g-dev \
            2>/dev/null || true

      - name: Clone latest libsixel source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/saitoha/libsixel /tmp/src/libsixel

      - name: Build img2sixel with AFL++ and ASan
        run: |
          set -e
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export LDFLAGS="-fsanitize=address"
          cd /tmp/src/libsixel
          # libsixel uses autotools (configure.ac / autogen.sh), not meson.
          ./autogen.sh
          ./configure --enable-debug
          make -j"$(nproc)"
          BINDIR="$(pwd)/converters"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "IMG2SIXEL=$BINDIR/img2sixel" >> "$GITHUB_ENV"
          echo "[+] Built binaries:"
          ls -la "$BINDIR" || true
          if [ ! -x "$BINDIR/img2sixel" ]; then
            echo "[!] img2sixel was not built — aborting"
            exit 1
          fi

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          BIN="$IMG2SIXEL"
          bname="img2sixel"
          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            total=$((total + 1))
            # Select the recorded invocation flags per CVE seed (default: plain).
            case "$sname" in
              *CVE-2025-9300*)
                ARGS=(--7bit-mode -8 --invert --palette-type=auto --verbose "$seed" -o /dev/null) ;;
              *CVE-2019-20024*)
                ARGS=("$seed") ;;
              *)
                ARGS=("$seed" -o /dev/null) ;;
            esac
            echo "[*] Replaying $sname ..."
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
              timeout 60 "$BIN" "${ARGS[@]}" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "results/dry_run/${bname}_${sname}.txt"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_USE_ASAN=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1
          afl-fuzz \
            -i "seeds/$PROJECT" \
            -o results/afl \
            -V "$FUZZ_DURATION" \
            -- "$IMG2SIXEL" @@ -o /dev/null || true
          echo "[+] Fuzzing step finished"

      - name: Triage crashes
        run: |
          set +e
          mkdir -p results/fuzz
          BIN="$IMG2SIXEL"
          bname="img2sixel"
          crash_dir="results/afl/default/crashes"
          if [ ! -d "$crash_dir" ]; then
            echo "[+] No crashes directory found — nothing to triage"
            exit 0
          fi
          n=0
          for crash in "$crash_dir"/*; do
            [ -f "$crash" ] || continue
            cname="$(basename "$crash")"
            [ "$cname" = "README.txt" ] && continue
            n=$((n + 1))
            echo "[*] Triaging $cname ..."
            ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1 \
              timeout 60 "$BIN" "$crash" -o /dev/null > /dev/null 2> "results/fuzz/${bname}_${cname}.txt"
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
          done
          echo "[+] Triaged $n crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libsixel
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libsixel
          path: results/
          retention-days: 30
