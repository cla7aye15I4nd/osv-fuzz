name: "Fuzz native libdwarf-code"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libdwarf-code
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest libdwarf-code with AFL++ + ASan
        run: |
          set -e
          git clone --depth 1 https://github.com/davea42/libdwarf-code.git /tmp/src/libdwarf-code
          cd /tmp/src/libdwarf-code
          sh autogen.sh
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export LDFLAGS="-fsanitize=address"
          ./configure
          make -j"$(nproc)"
          BINDIR="$PWD/src/bin/dwarfdump"
          if [ ! -x "$BINDIR/dwarfdump" ]; then
            echo "[!] dwarfdump binary not found — build failed"
            exit 1
          fi
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "TARGET_BIN=$BINDIR/dwarfdump" >> "$GITHUB_ENV"
          echo "[+] Built ASan dwarfdump: $BINDIR/dwarfdump"

      - name: Dry-run replay (lost-bug check)
        run: |
          mkdir -p results/dry_run
          bname=dwarfdump
          crash_count=0
          total=0
          for seed in seeds/${PROJECT}/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            result_file="results/dry_run/${bname}_${sname}.txt"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$TARGET_BIN" -a "$seed" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "$result_file"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          afl-fuzz -i seeds/${PROJECT} -o results/afl -V "$FUZZ_DURATION" \
            -- "$TARGET_BIN" -a @@ || true

      - name: Triage AFL++ crashes
        run: |
          mkdir -p results/fuzz
          bname=dwarfdump
          crash_count=0
          for crash in results/afl/default/crashes/*; do
            [ -f "$crash" ] || continue
            cname=$(basename "$crash")
            [ "$cname" = "README.txt" ] && continue
            result_file="results/fuzz/${bname}_${cname}.txt"
            echo "[*] Triaging $cname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$TARGET_BIN" -a "$crash" > /dev/null 2> "$result_file"
            set -e
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
            crash_count=$((crash_count + 1))
          done
          echo "[+] Triaged $crash_count crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libdwarf-code
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libdwarf-code
          path: results/
          retention-days: 30
