name: "Fuzz native libzip"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libzip
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install libzip build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y -qq zlib1g-dev 2>/dev/null || true

      - name: Clone latest libzip source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 https://github.com/nih-at/libzip.git /tmp/src/libzip

      - name: Build libzip CLI (ziptool) with AFL++ + ASan
        run: |
          set -e
          export AFL_USE_ASAN=1
          cd /tmp/src/libzip
          mkdir -p build && cd build
          CC=afl-cc CXX=afl-c++ \
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_BZIP2=OFF -DENABLE_LZMA=OFF -DENABLE_ZSTD=OFF \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build . -j"$(nproc)"
          # Locate the built ziptool CLI binary
          BIN="/tmp/src/libzip/build/src/ziptool"
          if [ ! -x "$BIN" ]; then
            BIN="$(find /tmp/src/libzip/build -type f -name ziptool -perm -u+x | head -1)"
          fi
          if [ -z "$BIN" ] || [ ! -x "$BIN" ]; then
            echo "[!] ziptool binary not found — build failed"
            exit 1
          fi
          echo "[+] Built ziptool: $BIN"
          echo "ZIPTOOL=$BIN" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          bname="ziptool"
          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            total=$((total + 1))
            echo "[*] Replaying $bname with $sname..."
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$ZIPTOOL" "$seed" cat index > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            if [ $exit_code -ne 0 ] && [ $exit_code -ne 124 ]; then
              echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "results/dry_run/${bname}_${sname}.txt"
              cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          afl-fuzz \
            -i "seeds/$PROJECT" \
            -o results/afl \
            -V "$FUZZ_DURATION" \
            -- "$ZIPTOOL" @@ cat index
          echo "[+] Fuzzing step finished"
          true || true
        continue-on-error: true

      - name: Triage crashes
        run: |
          set +e
          mkdir -p results/fuzz
          bname="ziptool"
          crash_dir="results/afl/default/crashes"
          if [ ! -d "$crash_dir" ]; then
            echo "[+] No crashes directory produced by AFL"
            exit 0
          fi
          for crash in "$crash_dir"/*; do
            [ -f "$crash" ] || continue
            cname="$(basename "$crash")"
            [ "$cname" = "README.txt" ] && continue
            echo "[*] Triaging $cname..."
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
              timeout 60 "$ZIPTOOL" "$crash" cat index > /dev/null 2> "results/fuzz/${bname}_${cname}.txt"
            cp "$crash" "results/fuzz/${bname}_${cname}.bin"
          done
          echo "[+] Triage complete"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libzip
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libzip
          path: results/
          retention-days: 30
