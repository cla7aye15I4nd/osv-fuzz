name: "Fuzz libavif"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 15 * * 0"

env:
  PROJECT: libavif
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            cmake \
            meson \
            nasm \
            ninja-build \
            python3-setuptools \
            python3-wheel

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/AOMediaCodec/libavif.git /tmp/src/libavif

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sL -o /tmp/src/avif_decode_seed_corpus.zip "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/libavif/avif_decode_seed_corpus.zip"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/libavif

          # Patch dav1d build for sanitizer support (from upstream build.sh)
          DAV1D_EXTRA_FLAGS="-Db_sanitize=$SANITIZER -Db_lundef=false"
          sed -i "s:meson setup \(.*\) dav1d/build dav1d:meson setup \1 ${DAV1D_EXTRA_FLAGS} dav1d/build dav1d:g" ./ext/dav1d.cmd

          # Build all dependencies using upstream ext scripts
          cd ext
          touch zlib.patch
          bash aom.cmd
          bash dav1d.cmd
          bash libjpeg.cmd
          bash libsharpyuv.cmd
          bash libyuv.cmd
          bash zlibpng.cmd
          cd ..

          # Build libavif as a static library (no fuzztest framework needed)
          cmake -G Ninja -S . -B build \
            -DBUILD_SHARED_LIBS=OFF \
            -DAVIF_CODEC_AOM=LOCAL \
            -DAVIF_CODEC_DAV1D=LOCAL \
            -DAVIF_CODEC_AOM_DECODE=ON \
            -DAVIF_CODEC_AOM_ENCODE=ON \
            -DAVIF_JPEG=LOCAL \
            -DAVIF_LIBSHARPYUV=LOCAL \
            -DAVIF_LIBYUV=LOCAL \
            -DAVIF_ZLIBPNG=LOCAL \
            -DAVIF_BUILD_TESTS=OFF \
            -DAVIF_ENABLE_WERROR=OFF
          cmake --build build --config Release --parallel

          # Write standalone decode fuzzer (libavif only ships fuzztest-based
          # targets which are incompatible with AFL++ -- they need libfuzzer
          # engine and wrapper scripts that afl-fuzz cannot drive)
          cat > /tmp/work/avif_decode_fuzzer.c << 'FUZZ_EOF'
          #include <stdint.h>
          #include <stddef.h>
          #include "avif/avif.h"

          int LLVMFuzzerTestOneInput(const uint8_t *data, size_t size) {
              if (size == 0) return 0;
              avifDecoder *decoder = avifDecoderCreate();
              if (!decoder) return 0;
              decoder->maxThreads = 1;
              decoder->imageSizeLimit = 512 * 512;
              decoder->imageDimensionLimit = 512;
              avifResult result = avifDecoderSetIOMemory(decoder, data, size);
              if (result == AVIF_RESULT_OK) {
                  result = avifDecoderParse(decoder);
                  if (result == AVIF_RESULT_OK) {
                      while (avifDecoderNextImage(decoder) == AVIF_RESULT_OK) {
                      }
                  }
              }
              avifDecoderDestroy(decoder);
              return 0;
          }
          FUZZ_EOF

          # Collect all static libraries from cmake build tree and ext deps
          ALL_LIBS=$(find /tmp/src/libavif/build /tmp/src/libavif/ext \
            -name '*.a' -type f 2>/dev/null | sort -u | tr '\n' ' ')
          echo "[+] Static libraries: $ALL_LIBS"

          # Compile and link the standalone fuzzer
          $CXX $CXXFLAGS $LIB_FUZZING_ENGINE \
            -I /tmp/src/libavif/include \
            /tmp/work/avif_decode_fuzzer.c \
            -Wl,--start-group \
            $ALL_LIBS \
            -Wl,--end-group \
            -lpthread -lm -ldl \
            -o $OUT/avif_decode_fuzzer

          # Copy seed corpus alongside the fuzzer
          if [ -f "$SRC/avif_decode_seed_corpus.zip" ]; then
            cp "$SRC/avif_decode_seed_corpus.zip" "$OUT/avif_decode_fuzzer_seed_corpus.zip"
          fi

          find $OUT/
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built -- build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
