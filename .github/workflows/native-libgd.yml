name: "Fuzz native libgd"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libgd
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -40 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Build latest libgd with AFL++ + AddressSanitizer
        run: |
          set -euo pipefail

          # --- Toolchain: AFL++ compiler wrappers + AddressSanitizer ---
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          # --- Paths ---
          BUILD="$HOME/osv-asan/libgd"      # source + build tree
          PREFIX="$BUILD/install"           # install prefix
          BINDIR="$PREFIX/bin"              # built programs live here

          # extra runtime deps for image codecs used by libgd
          sudo apt-get install -y -qq zlib1g-dev libpng-dev 2>/dev/null || true

          # --- Get LATEST source (shallow; no full history) ---
          rm -rf "$BUILD"
          git clone --depth 1 https://github.com/libgd/libgd "$BUILD"
          cd "$BUILD"

          # --- Autotools build (same path oss-fuzz uses) ---
          ./bootstrap.sh
          # libgd's configure auto-adds -Werror for git checkouts with a GCC-
          # like compiler (configure.ac), turning any warning from tip-of-tree
          # master or the afl-cc/ASan toolchain into a hard build error.
          # Disable it so the latest source always builds.
          ./configure --prefix="$PREFIX" --disable-shared --disable-werror
          make -j"$(nproc)"
          make install
          # Shipped CLI tools now in $BINDIR: gd2togif gd2topng gdtopng ...

          # --- Extra harness: libgd ships NO command-line TGA reader ---
          cat > "$BUILD/gd_read_tga.c" <<'EOF'
          #include <stdio.h>
          #include <gd.h>
          int main(int argc, char **argv){
            if (argc < 2) return 1;
            FILE *f = fopen(argv[1], "rb");
            if(!f) return 1;
            gdImagePtr im = gdImageCreateFromTga(f);
            fclose(f);
            if(im) gdImageDestroy(im);
            return 0;
          }
          EOF
          $CC $CFLAGS -I"$PREFIX/include" "$BUILD/gd_read_tga.c" \
              -o "$BINDIR/gd_read_tga" -L"$PREFIX/lib" -lgd -lz -lm

          echo "[+] Built binaries:"
          ls -la "$BINDIR"
          test -x "$BINDIR/gd_read_tga"
          test -x "$BINDIR/gd2togif"

          # Record paths for later steps
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "TGA_BIN=$BINDIR/gd_read_tga" >> "$GITHUB_ENV"
          echo "GD2_BIN=$BINDIR/gd2togif" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          # GitHub Actions runs every `run:` block with an implicit `bash -e`
          # (errexit). This replay step is *designed* to run targets that exit
          # nonzero (a crashing/erroring seed is exactly the "lost bug" we look
          # for), so errexit must be OFF here -- otherwise the first nonzero
          # exit aborts the whole step before `rc=$?` is captured. Turn it off
          # explicitly so the loop can record crashes and keep going.
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"

          # Each libgd target is a plain file-input CLI. The seed replaces $POC.
          #   gd_read_tga  <in>
          #   gd2togif     <in> /dev/null
          # Seeds are a mixed pool (some TGA, some GD2); replay every seed
          # against every target and keep only the ones that crash.
          replay_target() {
            local bname="$1"; shift
            local bin="$1"; shift
            # remaining args are the invocation template; the literal token
            # __POC__ is substituted with the current seed path.
            for seed in seeds/"$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname=$(basename "$seed" .bin)
              args=()
              for a in "$@"; do
                if [ "$a" = "__POC__" ]; then args+=("$seed"); else args+=("$a"); fi
              done
              echo "[*] Replaying $bname with $sname..."
              rc=0
              "$bin" "${args[@]}" > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $bname / $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${bname}_${sname}.txt"
                cp "$seed" "results/dry_run/${bname}_${sname}.bin"
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          }

          replay_target gd_read_tga "$TGA_BIN" __POC__
          replay_target gd2togif    "$GD2_BIN" __POC__ /dev/null

          echo "[+] Dry-run reports:"
          ls -la results/dry_run/ 2>/dev/null || true

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_USE_ASAN=1
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0:symbolize=0"

          # Split the budget across the two file-input targets.
          HALF=$(( FUZZ_DURATION / 2 ))
          [ "$HALF" -lt 30 ] && HALF="$FUZZ_DURATION"

          echo "[*] Fuzzing gd_read_tga for ${HALF}s ..."
          afl-fuzz -i "seeds/$PROJECT" -o results/afl/tga -m none -V "$HALF" \
            -- "$TGA_BIN" @@ || true

          echo "[*] Fuzzing gd2togif for ${HALF}s ..."
          afl-fuzz -i "seeds/$PROJECT" -o results/afl/gd2 -m none -V "$HALF" \
            -- "$GD2_BIN" @@ /dev/null || true

          echo "[+] AFL output:"
          find results/afl -maxdepth 3 -type d 2>/dev/null || true

      - name: Triage crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"

          triage() {
            local bname="$1"; shift
            local crash_dir="$1"; shift
            local bin="$1"; shift
            # remaining args: invocation template using __POC__
            [ -d "$crash_dir" ] || return 0
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              case "$(basename "$crash")" in
                README.txt) continue ;;
              esac
              cid=$(basename "$crash")
              args=()
              for a in "$@"; do
                if [ "$a" = "__POC__" ]; then args+=("$crash"); else args+=("$a"); fi
              done
              echo "[*] Triaging $bname / $cid ..."
              "$bin" "${args[@]}" > /dev/null 2> "results/fuzz/${bname}_${cid}.txt" || true
              cp "$crash" "results/fuzz/${bname}_${cid}.bin"
            done
          }

          triage gd_read_tga results/afl/tga/default/crashes "$TGA_BIN" __POC__
          triage gd2togif    results/afl/gd2/default/crashes "$GD2_BIN" __POC__ /dev/null

          echo "[+] Triage reports:"
          ls -la results/fuzz/ 2>/dev/null || true

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libgd
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libgd
          path: results/
          retention-days: 30
