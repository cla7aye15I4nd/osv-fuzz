name: "Fuzz native jasper"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: jasper
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -40 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest jasper with AFL++ + ASan
        run: |
          set -euxo pipefail

          # Build deps: libjpeg-dev satisfies JAS_ENABLE_LIBJPEG (find_package(JPEG)).
          sudo apt-get install -y -qq libjpeg-dev 2>/dev/null || true

          # Robust clone: --recurse-submodules with a 3x retry.
          mkdir -p /tmp/src
          rm -rf /tmp/src/jasper
          n=0
          until [ "$n" -ge 3 ]; do
            git clone --depth 1 --recurse-submodules \
              https://github.com/jasper-software/jasper.git /tmp/src/jasper && break
            n=$((n + 1))
            echo "[!] clone failed (attempt $n) — retrying..."
            rm -rf /tmp/src/jasper
            sleep 5
          done
          [ -d /tmp/src/jasper ] || { echo "[!] clone failed after retries"; exit 1; }
          cd /tmp/src/jasper
          git submodule update --init --recursive || true

          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1

          # jasper forbids in-source builds: build dir OUTSIDE the source tree.
          BUILD_DIR=/tmp/jasper-build
          rm -rf "$BUILD_DIR"
          cmake -S . -B "$BUILD_DIR" \
            -DCMAKE_C_COMPILER=afl-cc -DCMAKE_CXX_COMPILER=afl-c++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DBUILD_TESTING=OFF \
            -DJAS_ENABLE_SHARED=false \
            -DJAS_ENABLE_PROGRAMS=true \
            -DJAS_ENABLE_LIBJPEG=true \
            -DJAS_ENABLE_LIBHEIF=false \
            -DJAS_ENABLE_OPENGL=false \
            -DJAS_ENABLE_DOC=false
          cmake --build "$BUILD_DIR" -j"$(nproc)"

          BINDIR="$BUILD_DIR/src/app"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built binaries in $BINDIR:"
          ls -la "$BINDIR" || true
          for b in jasper imginfo; do
            if [ ! -x "$BINDIR/$b" ]; then
              echo "[!] Expected binary $b not built — build failed"
              exit 1
            fi
          done

      - name: Enumerate fuzz targets
        run: |
          set -uo pipefail
          : "${BINDIR:?BINDIR not set — build step failed}"

          # Multi-target: every file-input CLI tool of the project.
          # Format per line: "<tool>|<args-with-@@>" where @@ is the input file.
          # Recorded invocations:
          #   imginfo -f @@
          #   jasper  -f @@ -F /tmp/out.jp2
          #   jasper  -f @@ -F /tmp/out.jpc -T jpc
          declare -A TARGETSPEC=(
            [imginfo]="-f @@"
            [jasper]="-f @@ -F /tmp/out.jp2"
            [jasper_jpc]="-f @@ -F /tmp/out.jpc -T jpc"
          )
          # Map each target label to the actual binary name.
          declare -A TARGETBIN=(
            [imginfo]="imginfo"
            [jasper]="jasper"
            [jasper_jpc]="jasper"
          )

          : > /tmp/targets.txt
          for label in imginfo jasper jasper_jpc; do
            bin="${TARGETBIN[$label]}"
            if [ -x "$BINDIR/$bin" ]; then
              echo "${label}|${bin}|${TARGETSPEC[$label]}" >> /tmp/targets.txt
              echo "[+] Target: $label -> $bin ${TARGETSPEC[$label]}"
            else
              echo "[!] Skipping $label: $BINDIR/$bin not executable"
            fi
          done
          echo "[+] Wired $(wc -l < /tmp/targets.txt) targets"

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          : "${BINDIR:?BINDIR not set — build step failed}"
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0

          crash_count=0
          total=0
          for seed in seeds/"$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            while IFS='|' read -r label bin argtmpl; do
              [ -n "$label" ] || continue
              [ -x "$BINDIR/$bin" ] || continue
              # Substitute @@ with the seed path.
              args=()
              for a in $argtmpl; do
                if [ "$a" = "@@" ]; then args+=("$seed"); else args+=("$a"); fi
              done
              total=$((total + 1))
              echo "[*] Replaying $label with $sname..."
              rc=0
              timeout 30 "$BINDIR/$bin" "${args[@]}" > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: ${label}_${sname} (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${label}_${sname}.txt"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done < /tmp/targets.txt
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set -uo pipefail
          : "${BINDIR:?BINDIR not set — build step failed}"
          mkdir -p results/afl

          if [ -z "$(ls -A seeds/"$PROJECT"/*.bin 2>/dev/null)" ]; then
            echo "[!] No seeds present — creating a minimal seed"
            mkdir -p seeds/"$PROJECT"
            printf '\x00' > seeds/"$PROJECT"/minimal.bin
          fi

          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          n_targets=$(wc -l < /tmp/targets.txt)
          [ "$n_targets" -lt 1 ] && n_targets=1
          per=$(( FUZZ_DURATION / n_targets ))
          [ "$per" -lt 60 ] && per=60
          echo "[+] Splitting ${FUZZ_DURATION}s across ${n_targets} target(s): ${per}s each"

          while IFS='|' read -r label bin argtmpl; do
            [ -n "$label" ] || continue
            [ -x "$BINDIR/$bin" ] || continue

            # Validate the target starts up under afl-showmap; skip if it fails.
            first_seed=$(ls -1 seeds/"$PROJECT"/*.bin 2>/dev/null | head -1)
            if [ -n "$first_seed" ]; then
              smap_args=()
              for a in $argtmpl; do
                if [ "$a" = "@@" ]; then smap_args+=("$first_seed"); else smap_args+=("$a"); fi
              done
              if ! AFL_SKIP_CPUFREQ=1 timeout 60 afl-showmap -m none -o /dev/null \
                   -- "$BINDIR/$bin" "${smap_args[@]}" >/dev/null 2>&1; then
                # afl-showmap exits nonzero on a crashing seed too; only skip when
                # instrumentation is truly absent (no map produced at all).
                if ! AFL_SKIP_CPUFREQ=1 timeout 60 afl-showmap -m none -o /tmp/smap.chk \
                     -- "$BINDIR/$bin" "${smap_args[@]}" >/dev/null 2>&1; then
                  if [ ! -s /tmp/smap.chk ]; then
                    echo "[!] Skipping $label: afl-showmap produced no coverage map"
                    continue
                  fi
                fi
              fi
            fi

            echo "[*] Fuzzing $label ($bin $argtmpl) for ${per}s..."
            # shellcheck disable=SC2086
            ( set -x
              timeout "$per" afl-fuzz -i seeds/"$PROJECT" -o "results/afl/$label" -m none \
                -V "$per" -- "$BINDIR/$bin" $argtmpl ) || true
          done < /tmp/targets.txt

          echo "[+] Fuzzing finished"
          ls -la results/afl/*/default/crashes/ 2>/dev/null || echo "[+] No crashes directory produced"

      - name: Triage crashes
        run: |
          set +e
          mkdir -p results/fuzz
          : "${BINDIR:?BINDIR not set — build step failed}"
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          shopt -s nullglob

          new_crashes=0
          while IFS='|' read -r label bin argtmpl; do
            [ -n "$label" ] || continue
            [ -x "$BINDIR/$bin" ] || continue
            crash_dir="results/afl/$label/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cbase=$(basename "$crash")
              [ "$cbase" = "README.txt" ] && continue
              cid=$(echo "$cbase" | tr ':,' '__')
              out="results/fuzz/${label}_${cid}.txt"
              args=()
              for a in $argtmpl; do
                if [ "$a" = "@@" ]; then args+=("$crash"); else args+=("$a"); fi
              done
              rc=0
              timeout 30 "$BINDIR/$bin" "${args[@]}" > /dev/null 2> "$out" || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] Reproduced crash: ${label}_${cid} (exit=$rc)"
                cp "$crash" "results/fuzz/${label}_${cid}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$out"
              fi
            done
          done < /tmp/targets.txt
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Sanitize result filenames
        if: always()
        run: |
          set -uo pipefail
          # AFL filenames like id:000000,time:... contain ':' which breaks
          # actions/upload-artifact@v4. Rename any path under results/ with ':'.
          if [ -d results ]; then
            find results -depth -name '*:*' | while read -r p; do
              newp=$(echo "$p" | tr ':' '_')
              [ "$p" = "$newp" ] && continue
              mv "$p" "$newp" 2>/dev/null || true
            done
          fi
          echo "[+] Filename sanitization complete"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-jasper
          path: results/pocs/
          retention-days: 90

