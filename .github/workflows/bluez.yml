name: "Fuzz bluez"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 10 * * 0"

env:
  PROJECT: bluez
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            libbluetooth-dev \
            libdbus-1-dev \
            libical-dev \
            libreadline-dev \
            libreadline8 \
            libtool \
            libudev-dev \
            pkg-config \
            python-docutils \
            systemd \
            udev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive git://git.kernel.org/pub/scm/libs/ell/ell.git /tmp/src/ell
          git clone --depth 1 --recursive https://github.com/bluez/bluez /tmp/src/bluez
          git clone --depth 1 --recursive https://github.com/GNOME/glib /tmp/src/&&

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          # Pattern: *.sh — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/bluez" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.sh', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done
          # Pattern: *.c — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/bluez" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.c', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/bluez
          set +e
          ./bootstrap
          autoreconf -f
          ./configure --disable-systemd
          make -j$(nproc)
          INCLUDES="-I. -I./src -I./lib -I./gobex -I/usr/local/include/glib-2.0/ -I/src/glib/_build/glib/ -I/usr/include/bluetooth"
          STATIC_LIBS="./src/.libs/libshared-glib.a ./lib/.libs/libbluetooth-internal.a  -l:libical.a -l:libicalss.a -l:libicalvcal.a -l:libdbus-1.a /src/glib/_build/glib/libglib-2.0.a"
          $CC $CFLAGS $INCLUDES /tmp/src/fuzz_xml.c -c
          $CC $CFLAGS $INCLUDES /tmp/src/fuzz_sdp.c -c
          $CC $CFLAGS $INCLUDES /tmp/src/fuzz_textfile.c -c
          $CC $CFLAGS $INCLUDES /tmp/src/fuzz_gobex.c -c
          $CC $CFLAGS $INCLUDES /tmp/src/fuzz_hci.c -c
          $CXX $CXXFLAGS $LIB_FUZZING_ENGINE \
           ./src/bluetoothd-sdp-xml.o fuzz_xml.o -o $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_xml \
           $STATIC_LIBS -ldl -lpthread
          $CXX $CXXFLAGS $LIB_FUZZING_ENGINE \
           fuzz_sdp.o -o $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_sdp $STATIC_LIBS -ldl -lpthread
          $CXX $CXXFLAGS $LIB_FUZZING_ENGINE fuzz_textfile.o -o $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_textfile \
            $STATIC_LIBS -ldl -lpthread src/textfile.o
          $CXX $CXXFLAGS $LIB_FUZZING_ENGINE \
            fuzz_gobex.o ./gobex/gobex*.o -o $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_gobex \
           $STATIC_LIBS -ldl -lpthread
          $CXX $CXXFLAGS $LIB_FUZZING_ENGINE \
           fuzz_hci.o ./gobex/gobex*.o -o $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_hci \
           $STATIC_LIBS -ldl -lpthread
          echo "[libfuzzer]" > $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_gobex.options
          echo "detect_leaks=0" >> $GITHUB_WORKSPACE/build/fuzz-targets/fuzz_gobex.options
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
