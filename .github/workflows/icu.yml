name: "Fuzz icu"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 21 * * 0"

env:
  PROJECT: icu
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/unicode-org/icu.git /tmp/src/icu

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Make /usr/local writable for install commands
          sudo chmod -R a+w /usr/local/lib /usr/local/include /usr/local/bin 2>/dev/null || true
          sudo mkdir -p /usr/local/lib/pkgconfig && sudo chmod a+w /usr/local/lib/pkgconfig 2>/dev/null || true
          cd /tmp/src
          mkdir -p /tmp/work/icu
          cd /tmp/work/icu
          DEFINES="-DU_CHARSET_IS_UTF8=1 -DU_USING_ICU_NAMESPACE=0 -DU_ENABLE_DYLOAD=0 -DU_USE_STRTOD_L=0"
          CFLAGS="$CFLAGS $DEFINES"
          CXXFLAGS="$CXXFLAGS $DEFINES"
          CFLAGS=$CFLAGS CXXFLAGS=$CXXFLAGS CC=$CC CXX=$CXX \
            /bin/bash /tmp/src/icu/icu4c/source/runConfigureICU Linux \
             --with-library-bits=64 --with-data-packaging=static --enable-static --disable-shared
          export ASAN_OPTIONS="detect_leaks=0"
          export UBSAN_OPTIONS="detect_leaks=0,enum=0"
          make -j$(nproc)
          CXXFLAGS="$CXXFLAGS $(config/icu-config --noverify --cxxflags)"
          $CXX $CXXFLAGS -c /tmp/src/icu/icu4c/source/test/fuzzer/locale_util.cpp \
               -I/tmp/src/icu/icu4c/source/common \
               -I/tmp/src/icu4c/source/test/fuzzer
          FUZZER_PATH=/tmp/src/icu/icu4c/source/test/fuzzer
          FUZZERS=$FUZZER_PATH/*_fuzzer.cpp
          for fuzzer in $FUZZERS; do
            file=${fuzzer:${#FUZZER_PATH}+1}
            $CXX $CXXFLAGS \
              $fuzzer -o $GITHUB_WORKSPACE/build/fuzz-targets/${file/.cpp/} locale_util.o \
              -I/tmp/src/icu/icu4c/source/common -I/tmp/src/icu/icu4c/source/i18n -L/tmp/work/icu/lib \
              $LIB_FUZZING_ENGINE -licui18n -licuuc -licutu -licudata
          done
          CORPUS=/tmp/src/icu/icu4c/source/test/fuzzer/*_fuzzer_seed_corpus.txt
          for corpus in $CORPUS; do
              zipfile=${corpus:${#FUZZER_PATH}+1}
              zip $GITHUB_WORKSPACE/build/fuzz-targets/${zipfile/.txt/.zip} $corpus
          done
          cp /tmp/src/icu/icu4c/source/test/fuzzer/*.dict  $GITHUB_WORKSPACE/build/fuzz-targets/

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
