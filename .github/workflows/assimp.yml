name: "Fuzz assimp"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 4 * * 0"

env:
  PROJECT: assimp
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            cmake \
            ninja-build \
            zip

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/assimp/assimp.git /tmp/src/assimp

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/assimp
          set +e
          mkdir -p build
          cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}" \
            -DCMAKE_C_FLAGS="${CFLAGS}" \
            -DCMAKE_CXX_FLAGS="${CXXFLAGS}" \
            -DASSIMP_BUILD_ZLIB=ON \
            -DASSIMP_BUILD_TESTS=OFF \
            -DASSIMP_BUILD_ASSIMP_TOOLS=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DASSIMP_BUILD_ALL_IMPORTERS_BY_DEFAULT=ON \
            -DASSIMP_BUILD_ALL_EXPORTERS_BY_DEFAULT=ON
          ninja
          build_fuzzer() {
              local fuzzer_name=$1
              local source_file=$2
              echo "Building $fuzzer_name..."
              $CXX $CXXFLAGS -I../include -I../build/include -c "$source_file" -o "${fuzzer_name}.o"
              $CXX $CXXFLAGS $LIB_FUZZING_ENGINE "${fuzzer_name}.o" -o "$GITHUB_WORKSPACE/build/fuzz-targets/${fuzzer_name}" \
                  ./lib/libassimp.a \
                  ./contrib/zlib/libzlibstatic.a \
                  -lpthread -ldl
          }
          build_fuzzer "assimp_fuzzer" "../fuzz/assimp_fuzzer.cc"
          (cd ../test/models && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_seed_corpus.zip .)
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer.dict || true
          build_fuzzer "assimp_roundtrip_fuzzer" "../fuzz/assimp_roundtrip_fuzzer.cc"
          (cd ../test/models && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_roundtrip_fuzzer_seed_corpus.zip .)
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_roundtrip_fuzzer.dict || true
          build_fuzzer "assimp_postprocess_fuzzer" "../fuzz/assimp_postprocess_fuzzer.cc"
          (cd ../test/models && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_postprocess_fuzzer_seed_corpus.zip .)
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_postprocess_fuzzer.dict || true
          build_fuzzer "assimp_fuzzer_obj" "../fuzz/assimp_fuzzer_obj.cc"
          if [ -d "../test/models/OBJ" ]; then
              (cd ../test/models/OBJ && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_obj_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_obj.dict || true
          build_fuzzer "assimp_fuzzer_gltf" "../fuzz/assimp_fuzzer_gltf.cc"
          mkdir -p gltf_corpus
          [ -d "../test/models/glTF" ] && cp -r ../test/models/glTF/* gltf_corpus/
          [ -d "../test/models/glTF2" ] && cp -r ../test/models/glTF2/* gltf_corpus/
          if [ -d "gltf_corpus" ] && [ "$(ls -A gltf_corpus)" ]; then
              (cd gltf_corpus && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_gltf_seed_corpus.zip .)
          fi
          rm -rf gltf_corpus
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_gltf.dict || true
          build_fuzzer "assimp_fuzzer_glb" "../fuzz/assimp_fuzzer_glb.cc"
          mkdir -p glb_corpus
          [ -d "../test/models/glTF" ] && find ../test/models/glTF -name "*.glb" -exec cp {} glb_corpus/ \; 2>/dev/null || true
          [ -d "../test/models/glTF2" ] && find ../test/models/glTF2 -name "*.glb" -exec cp {} glb_corpus/ \; 2>/dev/null || true
          if [ -d "glb_corpus" ] && [ "$(ls -A glb_corpus)" ]; then
              (cd glb_corpus && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_glb_seed_corpus.zip .)
          fi
          rm -rf glb_corpus
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_glb.dict || true
          build_fuzzer "assimp_fuzzer_fbx" "../fuzz/assimp_fuzzer_fbx.cc"
          if [ -d "../test/models/FBX" ]; then
              (cd ../test/models/FBX && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_fbx_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_fbx.dict || true
          build_fuzzer "assimp_fuzzer_collada" "../fuzz/assimp_fuzzer_collada.cc"
          if [ -d "../test/models/Collada" ]; then
              (cd ../test/models/Collada && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_collada_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_collada.dict || true
          build_fuzzer "assimp_fuzzer_stl" "../fuzz/assimp_fuzzer_stl.cc"
          if [ -d "../test/models/STL" ]; then
              (cd ../test/models/STL && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_stl_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_stl.dict || true
          build_fuzzer "assimp_fuzzer_3ds" "../fuzz/assimp_fuzzer_3ds.cc"
          if [ -d "../test/models/3DS" ]; then
              (cd ../test/models/3DS && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_3ds_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_3ds.dict || true
          build_fuzzer "assimp_fuzzer_3mf" "../fuzz/assimp_fuzzer_3mf.cc"
          if [ -d "../test/models/3MF" ]; then
              (cd ../test/models/3MF && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_3mf_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_3mf.dict || true
          build_fuzzer "assimp_fuzzer_amf" "../fuzz/assimp_fuzzer_amf.cc"
          if [ -d "../test/models/AMF" ]; then
              (cd ../test/models/AMF && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_amf_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_amf.dict || true
          build_fuzzer "assimp_fuzzer_ase" "../fuzz/assimp_fuzzer_ase.cc"
          if [ -d "../test/models/ASE" ]; then
              (cd ../test/models/ASE && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_ase_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_ase.dict || true
          build_fuzzer "assimp_fuzzer_blend" "../fuzz/assimp_fuzzer_blend.cc"
          if [ -d "../test/models/BLEND" ]; then
              (cd ../test/models/BLEND && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_blend_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_blend.dict || true
          build_fuzzer "assimp_fuzzer_ifc" "../fuzz/assimp_fuzzer_ifc.cc"
          if [ -d "../test/models/IFC" ]; then
              (cd ../test/models/IFC && zip -q -r $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_ifc_seed_corpus.zip .)
          fi
          cp ../fuzz/assimp_fuzzer.dict $GITHUB_WORKSPACE/build/fuzz-targets/assimp_fuzzer_ifc.dict || true
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
