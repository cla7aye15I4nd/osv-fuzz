name: "Fuzz native rtl_433"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: rtl_433
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/${PROJECT}/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/${PROJECT}/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build latest rtl_433 with AFL++ + ASan
        run: |
          set -euo pipefail
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/dd32/rtl_433.git /tmp/src/rtl_433
          cd /tmp/src/rtl_433
          # Build with AFL++ instrumentation + AddressSanitizer (adapted from the
          # recorded Clang/CMake recipe: CC/CXX -> afl-cc/afl-c++, AFL_USE_ASAN=1).
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          cmake -B build \
            -DCMAKE_C_COMPILER=afl-cc \
            -DCMAKE_CXX_COMPILER=afl-c++ \
            -DCMAKE_C_FLAGS="$CFLAGS" \
            -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build build -j"$(nproc)"
          # Built CLI binary (SDR hardware not needed for -y test mode).
          BIN="$PWD/build/src/rtl_433"
          if [ ! -x "$BIN" ]; then
            echo "[!] rtl_433 binary not found at $BIN"
            find "$PWD/build" -name rtl_433 -type f -executable 2>/dev/null | head
            exit 1
          fi
          echo "[+] Built target: $BIN"
          echo "BINDIR=$PWD/build/src" >> "$GITHUB_ENV"
          echo "TARGET_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          BIN="$TARGET_BIN"
          bname=$(basename "$BIN")
          mkdir -p results/dry_run
          crash_count=0
          total=0
          shopt -s nullglob
          for POC in seeds/${PROJECT}/*.bin; do
            [ -f "$POC" ] || continue
            sname=$(basename "$POC" .bin)
            total=$((total + 1))
            echo "[*] Replaying $sname through $bname..."
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
            timeout 30 "$BIN" -y @"$POC" > /dev/null 2> results/dry_run/.stderr_tmp
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
              echo "  [!] CRASH: $sname (exit=$exit_code)"
              mv results/dry_run/.stderr_tmp "results/dry_run/${bname}_${sname}.txt"
              cp "$POC" "results/dry_run/${bname}_${sname}.bin"
              crash_count=$((crash_count + 1))
            else
              rm -f results/dry_run/.stderr_tmp
            fi
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          BIN="$TARGET_BIN"
          mkdir -p results/afl
          # rtl_433's -y option reads test data from a file only when the argument
          # is prefixed with '@' (i.e. "-y @<file>"). AFL's @@ token cannot emit
          # that leading '@' cleanly, so drive the target through a tiny wrapper
          # that reconstructs the exact recorded invocation "-y @<input>".
          cat > /tmp/rtl_433_wrapper.sh <<EOF
          #!/bin/bash
          exec "$BIN" -y @"\$1"
          EOF
          chmod +x /tmp/rtl_433_wrapper.sh
          # The wrapper execs the instrumented binary, so coverage is still
          # collected; AFL_SKIP_BIN_CHECK lets afl-fuzz accept the shell wrapper.
          AFL_SKIP_CPUFREQ=1 \
          AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1 \
          AFL_SKIP_BIN_CHECK=1 \
          ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
          afl-fuzz -i "seeds/${PROJECT}" -o results/afl -m none -V "$FUZZ_DURATION" \
            -- /tmp/rtl_433_wrapper.sh @@ || true

      - name: Triage fuzz crashes
        run: |
          set -uo pipefail
          BIN="$TARGET_BIN"
          bname=$(basename "$BIN")
          mkdir -p results/fuzz
          crash_dir="results/afl/default/crashes"
          if [ ! -d "$crash_dir" ]; then
            echo "[+] No crashes directory produced by afl-fuzz"
            exit 0
          fi
          new_crashes=0
          shopt -s nullglob
          for crash_file in "$crash_dir"/*; do
            [ -f "$crash_file" ] || continue
            case "$(basename "$crash_file")" in
              README.txt) continue ;;
            esac
            crash_id=$(basename "$crash_file" | tr ':,' '__')
            result_file="results/fuzz/${bname}_${crash_id}.txt"
            set +e
            ASAN_OPTIONS="abort_on_error=1:detect_leaks=0" \
            timeout 30 "$BIN" -y @"$crash_file" > /dev/null 2> "$result_file"
            replay_exit=$?
            set -e
            if [ "$replay_exit" -ne 0 ] && [ "$replay_exit" -ne 124 ]; then
              echo "  [!] Confirmed crash: $crash_id (exit=$replay_exit)"
              cp "$crash_file" "results/fuzz/${bname}_${crash_id}.bin"
              new_crashes=$((new_crashes + 1))
            else
              rm -f "$result_file"
            fi
          done
          echo "[+] Triage complete: $new_crashes confirmed crashes"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-rtl_433
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-rtl_433
          path: results/
          retention-days: 30
