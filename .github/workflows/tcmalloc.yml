name: "Fuzz tcmalloc"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 16 * * 0"

env:
  PROJECT: tcmalloc
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            libtool \
            libc++-dev \
            libc++abi-dev
          # Install Bazelisk (provides the bazel command)
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel
          # Download bazel_build_fuzz_tests helper from oss-fuzz
          sudo curl -fsSL -o /usr/local/bin/bazel_build_fuzz_tests \
            https://raw.githubusercontent.com/google/oss-fuzz/master/infra/base-images/base-builder/bazel_build_fuzz_tests
          sudo chmod +x /usr/local/bin/bazel_build_fuzz_tests

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/google/tcmalloc /tmp/src/tcmalloc

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export FUZZING_LANGUAGE=cc
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work

          # Create a minimal rules_fuzzing_oss_fuzz engine repository.
          # This replicates what the oss-fuzz Docker image provides: a Bazel
          # package that wraps $LIB_FUZZING_ENGINE so bazel_build_fuzz_tests
          # can build cc_fuzz_test targets with AFL++ instrumentation.
          mkdir -p /tmp/rules_fuzzing_oss_fuzz
          cat > /tmp/rules_fuzzing_oss_fuzz/WORKSPACE << 'WEOF'
          workspace(name = "rules_fuzzing_oss_fuzz")
          WEOF
          cat > /tmp/rules_fuzzing_oss_fuzz/BUILD.bazel << 'BEOF'
          load("@rules_fuzzing//fuzzing:cc_defs.bzl", "cc_fuzzing_engine")

          cc_library(
              name = "oss_fuzz_stub",
              linkopts = ["-fsanitize=fuzzer"],
              visibility = ["//visibility:public"],
          )

          cc_fuzzing_engine(
              name = "oss_fuzz_engine",
              display_name = "OSS-Fuzz (AFL++)",
              launcher = "oss_fuzz_launcher.sh",
              library = ":oss_fuzz_stub",
              visibility = ["//visibility:public"],
          )
          BEOF
          cat > /tmp/rules_fuzzing_oss_fuzz/oss_fuzz_launcher.sh << 'LEOF'
          #!/bin/bash
          exec "$@"
          LEOF
          chmod +x /tmp/rules_fuzzing_oss_fuzz/oss_fuzz_launcher.sh

          export BAZEL_EXTRA_BUILD_FLAGS="--inject_repository=rules_fuzzing_oss_fuzz=/tmp/rules_fuzzing_oss_fuzz"

          cd /tmp/src/tcmalloc
          set +e
          sed -i 's/standalone/sandboxed/g' /usr/local/bin/bazel_build_fuzz_tests
          bazel_build_fuzz_tests
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
