name: "Fuzz upx"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 2 * * 0"

env:
  PROJECT: upx
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            cmake \
            libtool

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/upx/upx-testsuite.git /tmp/src/testsuite
          git clone --depth 1 --recursive https://github.com/upx/upx-testsuite-v2.git /tmp/src/testsuite2
          git clone --depth 1 --recursive https://github.com/MykolaMykhno/upx-testsuite-v3.git /tmp/src/testsuite3
          git clone --depth 1 --recursive https://github.com/upx/upx.git /tmp/src/upx

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sL -o /tmp/src/fuzzers/ "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/upx/fuzzers/"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Make /usr/local writable for install commands
          sudo chmod -R a+w /usr/local/lib /usr/local/include /usr/local/bin 2>/dev/null || true
          sudo mkdir -p /usr/local/lib/pkgconfig && sudo chmod a+w /usr/local/lib/pkgconfig 2>/dev/null || true
          cd /src/upx
          sed -i 's/ \&\& __clang_major__ < 15//m' /src/upx/src/util/util.cpp
          git apply   --ignore-space-change --ignore-whitespace  /tmp/src/upx/fuzzers/build.patch
          mkdir -p build/debug
          cd build/debug
          cmake ../.. -DCMAKE_CXX_FLAGS="${CXXFLAGS} -fno-sanitize=signed-integer-overflow" -DCMAKE_C_FLAGS="${CFLAGS} -fno-sanitize=signed-integer-overflow"
          for fuzzer in $(find /tmp/src -name '*_fuzzer.cpp'); do
              fuzz_basename=$(basename -s .cpp $fuzzer)
              cmake --build . --target $fuzz_basename -v
          done
          cp ./*_fuzzer $GITHUB_WORKSPACE/build/fuzz-targets/
          mkdir -p /tmp/src/corpus/
          cp /tmp/src/testsuite3/files/corpus/* /tmp/src/corpus/
          for architecture in $(ls /tmp/src/testsuite/files/packed/); do
              for file in $(ls /tmp/src/testsuite/files/packed/$architecture); do
                  cp /tmp/src/testsuite/files/packed/$architecture/$file /tmp/src/corpus/$architecture-$file
              done
          done
          for architecture in $(ls /tmp/src/testsuite2/files/all/); do
              for file in $(ls /tmp/src/testsuite2/files/all/$architecture); do
                  cp /tmp/src/testsuite2/files/all/$architecture/$file /tmp/src/corpus/$architecture-$file
              done
          done
          for fuzzer in $(find /tmp/src -name '*_fuzzer.cpp'); do
              fuzz_basename=$(basename -s .cpp $fuzzer)
              zip -q $GITHUB_WORKSPACE/build/fuzz-targets/${fuzz_basename}_seed_corpus.zip /tmp/src/corpus/*
          done

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
