name: "Fuzz tdengine"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 17 * * 0"

env:
  PROJECT: tdengine
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            libjansson-dev \
            liblzma-dev \
            libtool \
            pkg-config \
            zlib1g-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/taosdata/TDengine /tmp/src/tdengine

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          # Pattern: *.options — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/tdengine" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.options', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done
          curl -sL -o /tmp/src/sql-fuzzer.c "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/tdengine/sql-fuzzer.c"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Make /usr/local writable for install commands
          sudo chmod -R a+w /usr/local/lib /usr/local/include /usr/local/bin 2>/dev/null || true
          sudo mkdir -p /usr/local/lib/pkgconfig && sudo chmod a+w /usr/local/lib/pkgconfig 2>/dev/null || true
          cd /tmp/src/tdengine
          if [ -f .gitmodules ]; then
            sed -i 's/git@/https:\/\//g' .gitmodules
            sed -i 's/:taos/\/taos/g' .gitmodules
            sed -i 's/\.git//g' .gitmodules
            git submodule update --init --recursive
          fi
          sed -i 's/-Werror[^ ]*//g' ./cmake/define.cmake
          sed -i 's|-DBUILD_GEOSOP:BOOL=OFF|-DBUILD_GEOSOP:BOOL=OFF\n        CMAKE_ARGS -DCMAKE_CXX_FLAGS=-Wno-deprecated-literal-operator|' ./cmake/external.cmake
          sed -i 's/__atomic_and_fetch((void\*\*)(ptr), (val)/__atomic_and_fetch((size_t*)(ptr), (size_t)(val)/g' ./source/os/src/osAtomic.c
          sed -i 's/__atomic_fetch_and((void\*\*)(ptr), (val)/__atomic_fetch_and((size_t*)(ptr), (size_t)(val)/g' ./source/os/src/osAtomic.c
          sed -i 's/__atomic_or_fetch((void\*\*)(ptr), (val)/__atomic_or_fetch((size_t*)(ptr), (size_t)(val)/g' ./source/os/src/osAtomic.c
          sed -i 's/__atomic_fetch_or((void\*\*)(ptr), (val)/__atomic_fetch_or((size_t*)(ptr), (size_t)(val)/g' ./source/os/src/osAtomic.c
          sed -i 's/__atomic_xor_fetch((void\*\*)(ptr), (val)/__atomic_xor_fetch((size_t*)(ptr), (size_t)(val)/g' ./source/os/src/osAtomic.c
          sed -i 's/__atomic_fetch_xor((void\*\*)(ptr), (val)/__atomic_fetch_xor((size_t*)(ptr), (size_t)(val)/g' ./source/os/src/osAtomic.c
          mkdir debug && cd debug
          export LDFLAGS="${CXXFLAGS}"
          if [[ $SANITIZER = *coverage* ]]; then
            ln -f -s /usr/bin/gold /usr/bin/ld
          fi
          cmake -DBUILD_HTTP=true -DBUILD_TEST=false ..
          cmake --build . --target parser nodes catalog function scalar -- -j$(nproc)
          TDENGINE_SRC=/src/tdengine
          BUILDLIB=${TDENGINE_SRC}/debug/build/lib
          EXTLIB=${TDENGINE_SRC}/.externals/install
          $CC $CFLAGS \
               -I${TDENGINE_SRC}/include/libs/parser \
               -I${TDENGINE_SRC}/include/libs/nodes \
               -I${TDENGINE_SRC}/include/libs/catalog \
               -I${TDENGINE_SRC}/include/libs/qcom \
               -I${TDENGINE_SRC}/include/libs/transport \
               -I${TDENGINE_SRC}/include/libs/scalar \
               -I${TDENGINE_SRC}/include/libs/function \
               -I${TDENGINE_SRC}/include/libs/decimal \
               -I${TDENGINE_SRC}/include/common \
               -I${TDENGINE_SRC}/include/util \
               -I${TDENGINE_SRC}/include/os \
               -I${TDENGINE_SRC}/include/client \
               -o sql-fuzzer.o -c /tmp/src/sql-fuzzer.c
          $CC $CFLAGS $LIB_FUZZING_ENGINE sql-fuzzer.o -o $GITHUB_WORKSPACE/build/fuzz-targets/sql-fuzzer \
               -Wl,--start-group \
               ${BUILDLIB}/libparser.a \
               ${BUILDLIB}/libplanner.a \
               ${BUILDLIB}/libcatalog.a \
               ${BUILDLIB}/libfunction.a \
               ${BUILDLIB}/libscalar.a \
               ${BUILDLIB}/libnodes.a \
               ${BUILDLIB}/libqcom.a \
               ${BUILDLIB}/libtransport.a \
               ${BUILDLIB}/libgeometry.a \
               ${BUILDLIB}/libutil.a \
               ${BUILDLIB}/libcommon.a \
               ${BUILDLIB}/libos.a \
               ${BUILDLIB}/libdecimal.a \
               ${BUILDLIB}/libwideInteger.a \
               ${BUILDLIB}/libTSZ.a \
               ${BUILDLIB}/libaes.a \
               ${BUILDLIB}/libsm4.a \
               ${BUILDLIB}/libcrypt.a \
               ${BUILDLIB}/libtotp.a \
               ${EXTLIB}/ext_geos/Debug/lib/libgeos_c.a \
               ${EXTLIB}/ext_geos/Debug/lib/libgeos.a \
               ${EXTLIB}/ext_lz4/Debug/lib/liblz4.a \
               ${EXTLIB}/ext_ssl/Debug/lib/libssl.a \
               ${EXTLIB}/ext_ssl/Debug/lib/libcrypto.a \
               ${EXTLIB}/ext_zlib/Debug/lib/libz.a \
               ${EXTLIB}/ext_xxhash/Debug/usr/local/lib/libxxhash.a \
               ${EXTLIB}/ext_tz/Debug/usr/lib/libtz.a \
               ${EXTLIB}/ext_cjson/Debug/lib/libcjson.a \
               ${EXTLIB}/ext_pcre2/Debug/lib/libpcre2-8.a \
               ${EXTLIB}/ext_lzma2/Debug/usr/local/lib/libfast-lzma2.a \
               ${EXTLIB}/ext_libuv/Debug/lib/libuv.a \
               ${EXTLIB}/ext_curl/Debug/lib/libcurl.a \
               -Wl,--end-group -lpthread -ldl -lm -lstdc++
          cp /tmp/src/*.options $GITHUB_WORKSPACE/build/fuzz-targets/

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
