name: "Fuzz ujson"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 23 * * 0"

env:
  PROJECT: ujson
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/ultrajson/ultrajson.git /tmp/src/ultrajson

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="-fsanitize=address -g"
          export CXXFLAGS="-fsanitize=address -g"
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets

          cd /tmp/src/ultrajson

          # Write inline C harness for ujson's JSON decoder.
          # Uses stub dconv (strtod-based) to avoid the double-conversion C++ dependency.
          cat > /tmp/work/ujson_fuzzer.c << 'HARNESS_EOF'
          #include <stdint.h>
          #include <stdlib.h>
          #include <string.h>
          #include "ultrajson.h"

          /* Stub dconv functions using libc strtod */
          void dconv_s2d_init(void **s2d, int f, double e, double j,
                              const char *i, const char *n) { *s2d = (void*)1; }
          double dconv_s2d(void *s2d, const char *buf, int len, int *out) {
              char tmp[256]; int n = len < 255 ? len : 255;
              memcpy(tmp, buf, n); tmp[n] = '\0';
              char *end; double v = strtod(tmp, &end);
              *out = (int)(end - tmp); return v;
          }
          void dconv_s2d_free(void **s2d) { *s2d = NULL; }
          void dconv_d2s_init(void **d, int a, const char *b, const char *c,
                              char d2, int e, int f, int g, int h) { *d = (void*)1; }
          int  dconv_d2s(void *d, double v, char *b, int l, int *s) {
              *s = snprintf(b, l, "%g", v); return 1;
          }
          void dconv_d2s_free(void **d) { *d = NULL; }

          static JSOBJ cb_str(void *p, JSUINT32 *s, JSUINT32 *e) { return (JSOBJ)1; }
          static void  cb_addkey(void *p, JSOBJ o, JSOBJ n, JSOBJ v) {}
          static void  cb_additem(void *p, JSOBJ o, JSOBJ v) {}
          static JSOBJ cb_true(void *p) { return (JSOBJ)1; }
          static JSOBJ cb_false(void *p) { return (JSOBJ)1; }
          static JSOBJ cb_null(void *p) { return (JSOBJ)1; }
          static JSOBJ cb_nan(void *p) { return (JSOBJ)1; }
          static JSOBJ cb_posinf(void *p) { return (JSOBJ)1; }
          static JSOBJ cb_neginf(void *p) { return (JSOBJ)1; }
          static JSOBJ cb_obj(void *p) { return (JSOBJ)1; }
          static JSOBJ cb_arr(void *p) { return (JSOBJ)1; }
          static JSOBJ cb_int(void *p, JSINT32 v) { return (JSOBJ)1; }
          static JSOBJ cb_long(void *p, JSINT64 v) { return (JSOBJ)1; }
          static JSOBJ cb_ulong(void *p, JSUINT64 v) { return (JSOBJ)1; }
          static JSOBJ cb_intstr(void *p, char *v, size_t l) { return (JSOBJ)1; }
          static JSOBJ cb_dbl(void *p, double v) { return (JSOBJ)1; }
          static void  cb_release(void *p, JSOBJ o) {}

          int LLVMFuzzerTestOneInput(const uint8_t *data, size_t size) {
              if (size == 0 || size > 1024 * 1024) return 0;
              char *buf = (char *)malloc(size + 1);
              if (!buf) return 0;
              memcpy(buf, data, size);
              buf[size] = '\0';

              JSONObjectDecoder dec;
              memset(&dec, 0, sizeof(dec));
              dec.newString = cb_str;
              dec.objectAddKey = cb_addkey;
              dec.arrayAddItem = cb_additem;
              dec.newTrue = cb_true;   dec.newFalse = cb_false;
              dec.newNull = cb_null;   dec.newNaN = cb_nan;
              dec.newPosInf = cb_posinf; dec.newNegInf = cb_neginf;
              dec.newObject = cb_obj;  dec.newArray = cb_arr;
              dec.newInt = cb_int;     dec.newLong = cb_long;
              dec.newUnsignedLong = cb_ulong;
              dec.newIntegerFromString = cb_intstr;
              dec.newDouble = cb_dbl;
              dec.releaseObject = cb_release;
              dec.malloc = malloc; dec.free = free; dec.realloc = realloc;
              dconv_s2d_init(&dec.s2d, 0, 0.0, 0.0, "Inf", "NaN");
              JSON_DecodeObject(&dec, buf, size);
              dconv_s2d_free(&dec.s2d);
              free(buf);
              return 0;
          }
          HARNESS_EOF

          # Compile ujson decoder with AFL++ instrumentation
          cd /tmp/src/ultrajson
          afl-cc $CFLAGS -c lib/ultrajsondec.c -Ilib -o /tmp/work/ultrajsondec.o

          # Compile harness (includes stub dconv + fuzzer entry point)
          afl-cc $CFLAGS -c /tmp/work/ujson_fuzzer.c -Ilib -o /tmp/work/ujson_fuzzer.o

          # Link into AFL++ fuzz target
          afl-cc -fsanitize=fuzzer,address \
              /tmp/work/ujson_fuzzer.o \
              /tmp/work/ultrajsondec.o \
              -lm -o $OUT/ujson_fuzzer

          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
