name: "Fuzz native libredwg"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: libredwg
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          # dwggrep needs libpcre2; autogen needs perl.
          sudo apt-get install -y -qq libpcre2-dev perl 2>/dev/null || true

      - name: Build latest libredwg with AFL++ + ASan
        run: |
          set -euo pipefail

          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-fsanitize=address"

          SRC=/tmp/libredwg
          rm -rf "$SRC"
          git clone --depth 1 https://github.com/LibreDWG/libredwg.git "$SRC"
          cd "$SRC"

          sh ./autogen.sh
          # --disable-shared => programs/ and examples/ are real ASan executables
          # (no libtool wrapper scripts). Do NOT pass --enable-release: it disables
          # unstable DWG features that some of these older CVEs live in.
          ./configure --disable-shared --disable-bindings --disable-docs
          make -j"$(nproc)"

          BINDIR="$SRC/programs"
          if [ ! -x "$BINDIR/dwgread" ]; then
            echo "[!] Build failed — $BINDIR/dwgread not found"
            exit 1
          fi
          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools:"
          ls -la "$BINDIR"/dwgread "$BINDIR"/dwgbmp "$BINDIR"/dwg2dxf \
                 "$BINDIR"/dwg2SVG "$BINDIR"/dwggrep "$SRC"/examples/dwg2svg2 || true

      - name: Dry-run replay (lost-bug check)
        run: |
          set -uo pipefail
          mkdir -p results/dry_run

          # target table: "label|executable|extra_arg"  (extra_arg may be empty)
          targets=(
            "dwgbmp|$BINDIR/dwgbmp|"
            "dwg2SVG|$BINDIR/dwg2SVG|"
            "dwgread|$BINDIR/dwgread|"
            "dwg2dxf|$BINDIR/dwg2dxf|"
            "dwg2dxf_y|$BINDIR/dwg2dxf|-y"
            "dwggrep|$BINDIR/dwggrep|.*"
            "dwg2svg2|$SRC/examples/dwg2svg2|"
          )

          crash_count=0
          total=0
          for entry in "${targets[@]}"; do
            IFS='|' read -r bname bin pre <<< "$entry"
            [ -x "$bin" ] || { echo "[!] skip missing $bin"; continue; }
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname="$(basename "$seed" .bin)"
              result_file="results/dry_run/${bname}_${sname}.txt"
              total=$((total + 1))
              echo "[*] Replaying $bname with $sname..."
              set +e
              if [ -n "$pre" ]; then
                ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                  timeout 30 "$bin" "$pre" "$seed" > /dev/null 2> "results/dry_run/.stderr_tmp"
              else
                ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                  timeout 30 "$bin" "$seed" > /dev/null 2> "results/dry_run/.stderr_tmp"
              fi
              exit_code=$?
              set -e
              if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
                echo "  [!] CRASH: $bname with $sname (exit=$exit_code)"
                mv "results/dry_run/.stderr_tmp" "$result_file"
                cp "$seed" "results/dry_run/${bname}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f "results/dry_run/.stderr_tmp"
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total tests"

      - name: Fuzz with AFL++
        run: |
          set -uo pipefail
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          targets=(
            "dwgbmp|$BINDIR/dwgbmp|"
            "dwg2SVG|$BINDIR/dwg2SVG|"
            "dwgread|$BINDIR/dwgread|"
            "dwg2dxf|$BINDIR/dwg2dxf|"
            "dwg2dxf_y|$BINDIR/dwg2dxf|-y"
            "dwggrep|$BINDIR/dwggrep|.*"
            "dwg2svg2|$SRC/examples/dwg2svg2|"
          )

          # Split the total budget evenly across the distinct targets (min 60s each).
          ntargets=${#targets[@]}
          per_target=$(( FUZZ_DURATION / ntargets ))
          [ "$per_target" -lt 60 ] && per_target=60
          echo "[+] $ntargets targets, ${per_target}s each"

          for entry in "${targets[@]}"; do
            IFS='|' read -r bname bin pre <<< "$entry"
            [ -x "$bin" ] || { echo "[!] skip missing $bin"; continue; }
            out="results/afl/$bname"
            echo "[*] Fuzzing $bname for ${per_target}s..."
            # Guard so a target that can't start does not fail the job.
            if [ -n "$pre" ]; then
              afl-fuzz -i "seeds/$PROJECT" -o "$out" -m none -V "$per_target" \
                -- "$bin" "$pre" @@ || true
            else
              afl-fuzz -i "seeds/$PROJECT" -o "$out" -m none -V "$per_target" \
                -- "$bin" @@ || true
            fi
          done

      - name: Triage AFL++ crashes
        run: |
          set -uo pipefail
          mkdir -p results/fuzz

          targets=(
            "dwgbmp|$BINDIR/dwgbmp|"
            "dwg2SVG|$BINDIR/dwg2SVG|"
            "dwgread|$BINDIR/dwgread|"
            "dwg2dxf|$BINDIR/dwg2dxf|"
            "dwg2dxf_y|$BINDIR/dwg2dxf|-y"
            "dwggrep|$BINDIR/dwggrep|.*"
            "dwg2svg2|$SRC/examples/dwg2svg2|"
          )

          new_crashes=0
          for entry in "${targets[@]}"; do
            IFS='|' read -r bname bin pre <<< "$entry"
            crash_dir="results/afl/$bname/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash_file in "$crash_dir"/*; do
              [ -f "$crash_file" ] || continue
              case "$(basename "$crash_file")" in
                README.txt) continue ;;
              esac
              cname="$(basename "$crash_file" | tr ':,' '__')"
              result_file="results/fuzz/${bname}_${cname}.txt"
              set +e
              if [ -n "$pre" ]; then
                ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                  timeout 30 "$bin" "$pre" "$crash_file" > /dev/null 2> "$result_file"
              else
                ASAN_OPTIONS=abort_on_error=1:detect_leaks=0 \
                  timeout 30 "$bin" "$crash_file" > /dev/null 2> "$result_file"
              fi
              replay_exit=$?
              set -e
              if [ "$replay_exit" -ne 0 ] && [ "$replay_exit" -ne 124 ]; then
                echo "  [!] NEW CRASH: $bname $cname (exit=$replay_exit)"
                cp "$crash_file" "results/fuzz/${bname}_${cname}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          done
          echo "[+] Triage complete: $new_crashes crashing inputs"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libredwg
          path: results/
          retention-days: 30

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libredwg
          path: results/pocs/
          retention-days: 90
