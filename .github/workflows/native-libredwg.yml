name: "Fuzz native libredwg"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 17 * * 0"

env:
  PROJECT: libredwg
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Install libredwg build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          # dwggrep needs libpcre2; autogen needs perl/autotools/texinfo.
          sudo apt-get install -y -qq \
            autoconf automake libtool pkg-config perl \
            libpcre2-dev texinfo 2>/dev/null || true

      - name: Clone and build libredwg with AFL++ + ASan
        run: |
          set -euo pipefail
          mkdir -p /tmp/src
          SRC=/tmp/src/libredwg
          rm -rf "$SRC"

          # Wrap the clone in a 3x retry to survive flaky network.
          n=0
          until [ "$n" -ge 3 ]; do
            if git clone --depth 1 --recurse-submodules \
                https://github.com/LibreDWG/libredwg.git "$SRC"; then
              break
            fi
            n=$((n + 1))
            echo "[!] clone failed (attempt $n) — retrying..."
            rm -rf "$SRC"
            sleep 5
          done
          [ -d "$SRC" ] || { echo "[!] clone failed after 3 attempts"; exit 1; }
          cd "$SRC"
          git submodule update --init --recursive || true

          # Generate ./configure if the tree does not ship one.
          if [ ! -x ./configure ]; then
            if [ -x ./autogen.sh ]; then
              sh ./autogen.sh
            else
              autoreconf -fi
            fi
          fi

          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export LDFLAGS="-fsanitize=address"

          # --disable-shared => programs/ and examples/ are real ASan+AFL
          #   executables (no libtool wrapper scripts).
          # --disable-werror => git checkouts default to -Werror and the AFL++
          #   instrumentation trips warnings that would abort the build.
          # Do NOT pass --enable-release: it drops unstable DWG features that
          #   some of these older CVEs live in.
          ./configure \
              --disable-shared --disable-bindings --disable-docs --disable-werror \
            || ./configure \
              --disable-shared --disable-bindings --disable-docs
          make -j"$(nproc)"

          BINDIR="$SRC/programs"
          if [ ! -x "$BINDIR/dwgread" ]; then
            echo "[!] Build failed — $BINDIR/dwgread not found"
            exit 1
          fi
          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools in $BINDIR:"
          ls -la "$BINDIR" 2>/dev/null | head -40 || true
          ls -la "$SRC/examples" 2>/dev/null | head -40 || true

      - name: Build target list
        run: |
          set -euo pipefail
          # Each entry: "<label>|<binary path>|<args template with @@>"
          # @@ marks where the input file goes (AFL + replay share the template).
          declare -a TARGETS=()
          add_target() {
            local label="$1" bin="$2" args="$3"
            if [ -x "$bin" ] && ! head -c2 "$bin" 2>/dev/null | grep -q '#!'; then
              TARGETS+=("${label}|${bin}|${args}")
              echo "[+] target: $label -> $bin $args"
            else
              echo "[-] skip (missing / wrapper script): $label ($bin)"
            fi
          }
          add_target dwgread  "$BINDIR/dwgread"          "@@"
          add_target dwgbmp   "$BINDIR/dwgbmp"           "@@"
          add_target dwg2dxf  "$BINDIR/dwg2dxf"          "-y @@"
          add_target dwg2SVG  "$BINDIR/dwg2SVG"          "@@"
          add_target dwggrep  "$BINDIR/dwggrep"          ".* @@"
          add_target dwg2svg2 "$SRC/examples/dwg2svg2"   "@@"

          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "[!] No fuzzable targets found"; exit 1
          fi
          printf '%s\n' "${TARGETS[@]}" > /tmp/targets.txt
          echo "TARGETS_FILE=/tmp/targets.txt" >> "$GITHUB_ENV"
          echo "[+] $(grep -c . /tmp/targets.txt) targets wired"

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          crash_count=0
          total=0
          while IFS='|' read -r label bin args; do
            [ -n "$label" ] || continue
            [ -x "$bin" ] || continue
            for seed in "seeds/$PROJECT"/*.bin; do
              [ -f "$seed" ] || continue
              sname=$(basename "$seed" .bin)
              total=$((total + 1))
              echo "[*] Replaying $label with $sname..."
              args_expanded="${args//@@/$seed}"
              # shellcheck disable=SC2086
              timeout 60 "$bin" $args_expanded > /dev/null 2> results/dry_run/.stderr_tmp
              rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $label with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${label}_${sname}.txt"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done < "$TARGETS_FILE"
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=0

          n_targets=$(grep -c . "$TARGETS_FILE")
          per=$(( FUZZ_DURATION / n_targets ))
          [ "$per" -lt 60 ] && per=60
          echo "[*] $n_targets targets, ${per}s each"

          seed0=$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)

          while IFS='|' read -r label bin args; do
            [ -n "$label" ] || continue
            [ -x "$bin" ] || continue
            # Verify the target starts under instrumentation before fuzzing it.
            if [ -n "$seed0" ]; then
              args_probe="${args//@@/$seed0}"
              # shellcheck disable=SC2086
              AFL_QUIET=1 timeout 60 afl-showmap -m none -o /dev/null \
                -- "$bin" $args_probe >/dev/null 2>&1
              probe_rc=$?
              if [ "$probe_rc" -ge 126 ] && [ "$probe_rc" -ne 124 ]; then
                echo "[-] afl-showmap startup failed for $label (rc=$probe_rc) — skipping"
                continue
              fi
            fi
            echo "[*] Fuzzing $label ($bin $args) for ${per}s..."
            # shellcheck disable=SC2086
            afl-fuzz \
              -i "seeds/$PROJECT" \
              -o "results/afl/$label" \
              -m none \
              -V "$per" \
              -- "$bin" $args || true
          done < "$TARGETS_FILE"
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set +e
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          shopt -s nullglob
          new_crashes=0
          while IFS='|' read -r label bin args; do
            [ -n "$label" ] || continue
            [ -x "$bin" ] || continue
            crash_dir="results/afl/$label/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cbase=$(basename "$crash")
              [ "$cbase" = "README.txt" ] && continue
              cname=$(echo "$cbase" | tr ':,' '__')
              result_file="results/fuzz/${label}_${cname}.txt"
              args_expanded="${args//@@/$crash}"
              echo "[*] Triaging $label / $cbase..."
              # shellcheck disable=SC2086
              timeout 60 "$bin" $args_expanded > /dev/null 2> "$result_file"
              rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] NEW CRASH: $label ($cname, exit=$rc)"
                cp "$crash" "results/fuzz/${label}_${cname}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "$result_file"
              fi
            done
          done < "$TARGETS_FILE"
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Sanitize result filenames for upload
        if: always()
        run: |
          # actions/upload-artifact@v4 rejects any path containing ':'.
          # AFL++ names its queue/crash inputs like
          #   id:000000,time:0,execs:0,orig:CVE-2018-14471.bin
          # so strip colons from every file/dir under results/ before upload.
          [ -d results ] || exit 0
          find results -depth -name '*:*' -print0 | while IFS= read -r -d '' p; do
            newp="$(dirname "$p")/$(basename "$p" | tr ':' '_')"
            [ "$p" = "$newp" ] || mv -f "$p" "$newp"
          done
          echo "[+] Sanitized result filenames"

      - name: Generate report
        if: always()
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-libredwg
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-libredwg
          path: results/
          retention-days: 30
