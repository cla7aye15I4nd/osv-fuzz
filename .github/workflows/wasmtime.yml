name: "Fuzz wasmtime"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 12 * * 0"

env:
  PROJECT: wasmtime
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            cmake \
            libclang-dev \
            libgmp-dev \
            libtool \
            llvm-dev \
            pkg-config

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/bytecodealliance/wasm-tools /tmp/src/wasm-tools
          git clone --depth 1 --recursive https://github.com/bytecodealliance/regalloc2 /tmp/src/regalloc2
          git clone --depth 1 --recursive https://github.com/bytecodealliance/wasmtime /tmp/src/wasmtime
          git clone --depth 1 --recursive https://github.com/bytecodealliance/wasmtime-libfuzzer-corpus /tmp/src/wasmtime-libfuzzer-corpus

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          # Pattern: *.options — download matching files via GitHub API
          curl -sL "https://api.github.com/repos/google/oss-fuzz/contents/projects/wasmtime" | \
            python3 -c "import json,sys,re; files=json.load(sys.stdin); [print(f['download_url']) for f in files if re.match(r'.*\\.options', f['name'])]" | \
            while read url; do curl -sLO --output-dir /tmp/src "$url"; done

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE=""
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Make /usr/local writable for install commands
          sudo chmod -R a+w /usr/local/lib /usr/local/include /usr/local/bin 2>/dev/null || true
          sudo mkdir -p /usr/local/lib/pkgconfig && sudo chmod a+w /usr/local/lib/pkgconfig 2>/dev/null || true
          cd /tmp/src/wasmtime
          git submodule update --init --recursive
          build() {
            project=$1
            shift
            fuzzer_prefix=$1
            shift
            fuzz_targets=$1
            shift
            fuzz_target_path=$1
            shift
            PROJECT_DIR=/tmp/src/$project
            cd $PROJECT_DIR
            crate_src_abspath=`cargo metadata --no-deps --format-version 1 | jq -r '.workspace_root'`
            while read i; do
              export RUSTFLAGS="$RUSTFLAGS --remap-path-prefix $i=$crate_src_abspath/$i"
            done <<< "$(find . -name "*.rs" | cut -d/ -f2 | uniq)"
            export RUSTFLAGS="$RUSTFLAGS --cfg=arc_try_new"
            cd $PROJECT_DIR/fuzz && cargo fuzz build --sanitizer none --strip-dead-code -O --debug-assertions "$@"
            FUZZ_TARGET_OUTPUT_DIR=$PROJECT_DIR/$fuzz_target_path/x86_64-unknown-linux-gnu/release
            if [ "x$fuzz_targets" = "x" ]; then
                fuzz_targets=$PROJECT_DIR/fuzz/fuzz_targets/*.rs
            fi
            for f in $fuzz_targets; do
                src_name=$(basename ${f%.*})
                dst_name=$fuzzer_prefix$src_name
                cp $FUZZ_TARGET_OUTPUT_DIR/$src_name $GITHUB_WORKSPACE/build/fuzz-targets/$dst_name
                if [[ -f /tmp/src/$dst_name.options ]]; then
                  cp /tmp/src/$dst_name.options $GITHUB_WORKSPACE/build/fuzz-targets/$dst_name.options
                else
                  cp /tmp/src/default.options $GITHUB_WORKSPACE/build/fuzz-targets/$dst_name.options
                fi
            done
          }
          eval $(opam env)
          rustup target add wasm32-unknown-unknown wasm32-wasip1 wasm32-wasip2
          export CARGO_INCREMENTAL=0
          export CARGO_PROFILE_DEV_DEBUG=0
          export CARGO_PROFILE_DEV_STRIP=debuginfo
          export CARGO_PROFILE_RELEASE_DEBUG=0
          build wasmtime "" "" target
          build wasm-tools wasm-tools- "" target --features wasmtime
          build regalloc2 regalloc2- ion fuzz/target
          if [ "$SANITIZER" = "coverage" ]; then
            cp --recursive --dereference --no-preserve mode,ownership --parents \
              $HOME/.opam/4.11.2/lib/ocaml $GITHUB_WORKSPACE/build/fuzz-targets
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
