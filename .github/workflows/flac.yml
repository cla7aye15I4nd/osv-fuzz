name: "Fuzz flac"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 14 * * 0"

env:
  PROJECT: flac
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            default-jdk \
            gettext \
            libtool \
            libtool-bin \
            pkg-config \
            sudo

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/xiph/flac.git /tmp/src/flac
          git clone --depth 1 --recursive https://github.com/xiph/ogg.git /tmp/src/ogg
          git clone --depth 1 --recursive https://github.com/google/ExoPlayer.git /tmp/src/ExoPlayer

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sfL --retry 3 --retry-delay 5 -H "Authorization: token $GITHUB_TOKEN" -o /tmp/src/fuzzer_exo.cpp "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/flac/fuzzer_exo.cpp"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src
          set +e
          export ASAN_OPTIONS="detect_leaks=0"
          if [[ $CFLAGS = *sanitize=address* ]]
          then
              export CXXFLAGS="$CXXFLAGS -DASAN"
          fi
          if [[ $CFLAGS = *sanitize=memory* ]]
          then
              export CXXFLAGS="$CXXFLAGS -DMSAN"
          fi
          export CFLAGS="$CFLAGS -D_FORTIFY_SOURCE=0"
          export CXXFLAGS="$CXXFLAGS -D_FORTIFY_SOURCE=0 -D_GLIBCXX_DEBUG"
          mkdir /tmp/src/libogg-install
          cd /tmp/src/ogg
          ./autogen.sh
          ./configure --disable-crc --disable-shared --prefix="/tmp/src/libogg-install"
          make -j$(nproc)
          sudo make install
          cd /tmp/src/flac/
          ./autogen.sh
          if [[ $CFLAGS = *sanitize=memory* ]]
          then
              LD_LIBRARY_PATH="/tmp/src/libogg-install/lib" ./configure --with-ogg="/tmp/src/libogg-install" --enable-static --disable-shared --disable-oggtest --disable-examples --disable-programs --disable-xmms-plugin --disable-asm-optimizations --disable-sse --enable-oss-fuzzers
          else
              LD_LIBRARY_PATH="/tmp/src/libogg-install/lib" ./configure --with-ogg="/tmp/src/libogg-install" --enable-static --disable-shared --disable-oggtest --disable-examples --disable-programs --disable-xmms-plugin --enable-oss-fuzzers
          fi
          make -j$(nproc)
          cd /tmp/src/flac/oss-fuzz
          cp fuzzer_* $GITHUB_WORKSPACE/build/fuzz-targets
          cd /tmp/src
          $CXX $CXXFLAGS -I /tmp/src/flac/oss-fuzz/ -I /tmp/src/flac/include/ -I /tmp/src/ExoPlayer/extensions/flac/src/main/jni/ -I /usr/lib/jvm/java-11-openjdk-amd64/include/ -I /usr/lib/jvm/java-11-openjdk-amd64/include/linux/ fuzzer_exo.cpp \
              /tmp/src/flac/src/libFLAC++/.libs/libFLAC++.a /tmp/src/flac/src/libFLAC/.libs/libFLAC.a /tmp/src/libogg-install/lib/libogg.a $LIB_FUZZING_ENGINE -o $GITHUB_WORKSPACE/build/fuzz-targets/fuzzer_exo
          cd /tmp/src/flac/
          echo "#define FUZZING_BUILD_MODE_FLAC_SANITIZE_SIGNED_INTEGER_OVERFLOW" >> config.h
          make -j$(nproc)
          cd /tmp/src/flac/oss-fuzz
          cp fuzzer_encoder fuzzer_encoder_v2 $GITHUB_WORKSPACE/build/fuzz-targets
          cd /tmp/src/flac/oss-fuzz/seedcorpus || exit 0
          for fuzzerName in *; do
              zip -j $GITHUB_WORKSPACE/build/fuzz-targets/${fuzzerName}_seed_corpus.zip ${fuzzerName}/*
          done
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
