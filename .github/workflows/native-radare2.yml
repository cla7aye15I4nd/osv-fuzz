name: "Fuzz native radare2"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 13 * * 0"

env:
  PROJECT: radare2
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Clone and build radare2 with AFL++ + ASan
        run: |
          set -euo pipefail
          # ---- Extra apt deps the radare2 build may need -----------------------
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y -qq pkg-config patch libc6-dev 2>/dev/null || true

          # ---- Clone (submodules + 3x retry) ----------------------------------
          mkdir -p /tmp/src
          rm -rf /tmp/src/radare2
          cloned=0
          for attempt in 1 2 3; do
            if git clone --depth 1 --recurse-submodules \
                 https://github.com/radareorg/radare2 /tmp/src/radare2; then
              cloned=1
              break
            fi
            echo "[!] clone attempt $attempt failed — retrying"
            rm -rf /tmp/src/radare2
            sleep 5
          done
          [ "$cloned" -eq 1 ] || { echo "[!] git clone failed after 3 attempts"; exit 1; }
          git -C /tmp/src/radare2 submodule update --init --recursive || true

          cd /tmp/src/radare2

          # ---- AFL++ + AddressSanitizer toolchain -----------------------------
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export LDFLAGS="-fsanitize=address"

          # radare2 uses an ACR-generated ./configure (autotools-like). Generate it
          # if the tree does not ship one.
          if [ ! -x ./configure ]; then
            if [ -x ./autogen.sh ]; then
              ./autogen.sh
            elif [ -x ./configure.acr ] && command -v acr >/dev/null 2>&1; then
              acr
            elif command -v autoreconf >/dev/null 2>&1; then
              autoreconf -fi
            fi
          fi

          # Self-contained local prefix so the CLI tools and the libr .so files
          # live together. Pass --disable-werror only if configure understands it.
          CONFIGURE_ARGS="--prefix=$PWD/install"
          if ./configure --help 2>&1 | grep -q -- '--disable-werror'; then
            CONFIGURE_ARGS="$CONFIGURE_ARGS --disable-werror"
          fi
          # shellcheck disable=SC2086
          ./configure $CONFIGURE_ARGS
          make -j"$(nproc)"
          make install

          BINDIR="$PWD/install/bin"
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/install/lib" >> "$GITHUB_ENV"
          echo "[+] Built CLI tools in $BINDIR:"
          ls -la "$BINDIR" || true
          if [ ! -x "$BINDIR/radare2" ] || [ ! -x "$BINDIR/radiff2" ]; then
            echo "[!] radare2/radiff2 were not built — aborting"
            exit 1
          fi

      - name: Prepare fuzz targets
        run: |
          # Shared, sourced by the dry-run, fuzz and triage steps. Every candidate
          # target is a "label|argv..." string, pipe-delimited so multi-word tokens
          # (e.g. "aos 268435456") survive as a single argv element. "@@" marks the
          # file-input position (real path when replaying, AFL placeholder when
          # fuzzing). $BINDIR is resolved from the environment at source time and
          # only tools that were actually built are kept.
          cat > /tmp/r2_targets.sh <<'EOF'
          CANDIDATES=(
            "radiff2|radiff2|-T|@@|@@"
            "r2_import256|radare2|-q|-N|-n|-e|scr.color=false|-i|@@|malloc://256"
            "r2_load|radare2|-q|-e|scr.color=0|-e|cmd.load=o-.|-c|q|@@"
            "r2_plain|radare2|-e|scr.color=0|-q|-c|q|@@"
            "r2_aos|radare2|-q|-N|-n|-e|scr.color=false|-c|aos 268435456|-c|q|@@"
            "r2_import1|radare2|-q|-n|-N|-e|scr.color=0|-e|scr.interactive=false|-i|@@|malloc://1"
            "rabin2|rabin2|-x|@@"
            "rafind2|rafind2|-Z|-s|r2|@@"
            "rasm2|rasm2|-D|-B|@@"
          )

          # Keep only candidates whose CLI binary was built into $BINDIR.
          TARGETS=()
          for _c in "${CANDIDATES[@]}"; do
            IFS='|' read -ra _p <<< "$_c"
            if [ -x "$BINDIR/${_p[1]}" ]; then
              TARGETS+=("$_c")
            fi
          done

          # build_cmd <entry> <input> -> sets LABEL and the CMD array.
          # Substitutes @@ with <input>; never toggles global set -e/+e.
          build_cmd() {
            local entry="$1" inp="$2" i tok
            IFS='|' read -ra _t <<< "$entry"
            LABEL="${_t[0]}"
            CMD=("$BINDIR/${_t[1]}")
            for ((i = 2; i < ${#_t[@]}; i++)); do
              tok="${_t[$i]}"
              [ "$tok" = "@@" ] && tok="$inp"
              CMD+=("$tok")
            done
          }
          EOF
          echo "[+] Wrote /tmp/r2_targets.sh"

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          source /tmp/r2_targets.sh
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0
          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname="$(basename "$seed" .bin)"
            for entry in "${TARGETS[@]}"; do
              build_cmd "$entry" "$seed"
              total=$((total + 1))
              echo "[*] Replaying $sname via $LABEL: ${CMD[*]}"
              rc=0
              timeout 120 "${CMD[@]}" > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $LABEL / $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${LABEL}_${sname}.txt"
                cp "$seed" "results/dry_run/${LABEL}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          source /tmp/r2_targets.sh
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1
          export AFL_USE_ASAN=1
          # The seed corpus is made of known-crashing PoCs; skip (don't abort on)
          # any seed that crashes/hangs during calibration.
          export AFL_IGNORE_SEED_PROBLEMS=1
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:allocator_may_return_null=1:symbolize=1:symbolize=0

          ntargets=${#TARGETS[@]}
          if [ "$ntargets" -eq 0 ]; then
            echo "[!] No fuzz targets available — skipping"
            exit 0
          fi
          # Split the total budget across the targets (min 60s each).
          per=$((FUZZ_DURATION / ntargets))
          [ "$per" -lt 60 ] && per=60

          someseed="$(find "seeds/$PROJECT" -name '*.bin' -type f | head -1)"

          for entry in "${TARGETS[@]}"; do
            build_cmd "$entry" "$someseed"
            label="$LABEL"
            # Startup sanity check: skip targets whose binary is not instrumented.
            if ! afl-showmap -o /dev/null -m none -t 10000 -- "${CMD[@]}" \
                 > /tmp/showmap.log 2>&1; then
              if grep -qi "no instrumentation" /tmp/showmap.log; then
                echo "[!] Skipping $label — afl-showmap: no instrumentation detected"
                continue
              fi
            fi
            build_cmd "$entry" "@@"
            echo "[*] Fuzzing $label for ${per}s: ${CMD[*]}"
            afl-fuzz \
              -i "seeds/$PROJECT" \
              -o "results/afl/$label" \
              -m none \
              -V "$per" \
              -- "${CMD[@]}" || true
          done
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set +e
          source /tmp/r2_targets.sh
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0:symbolize=1
          n=0
          for entry in "${TARGETS[@]}"; do
            label="${entry%%|*}"
            crash_dir="results/afl/$label/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cname="$(basename "$crash")"
              [ "$cname" = "README.txt" ] && continue
              n=$((n + 1))
              build_cmd "$entry" "$crash"
              echo "[*] Triaging $label / $cname ..."
              rc=0
              timeout 120 "${CMD[@]}" > /dev/null 2> "results/fuzz/${label}_${cname}.txt" || rc=$?
              cp "$crash" "results/fuzz/${label}_${cname}.bin"
            done
          done
          echo "[+] Triaged $n crashing inputs"

      - name: Sanitize result filenames
        if: always()
        run: |
          # AFL emits files like id:000000,time:...,op:... — the ':' breaks
          # actions/upload-artifact@v4. Rename each offending path component to '_'.
          # -depth processes children before parents so renames stay valid.
          if [ -d results ]; then
            find results -depth -name '*:*' -print0 | while IFS= read -r -d '' p; do
              d="$(dirname "$p")"
              b="$(basename "$p")"
              nb="$(printf '%s' "$b" | tr ':' '_')"
              [ "$b" = "$nb" ] || mv "$p" "$d/$nb"
            done
          fi

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-radare2
          path: results/pocs/
          retention-days: 90

