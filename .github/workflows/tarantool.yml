name: "Fuzz tarantool"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 15 * * 0"

env:
  PROJECT: tarantool
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            cmake \
            coreutils \
            libc++-18-dev \
            libc++abi-18-dev \
            libcurl4-openssl-dev \
            libncurses5-dev \
            libreadline-dev \
            libssl-dev \
            libtool \
            libunwind-dev \
            libyaml-dev \
            libzstd-dev \
            lld \
            luajit \
            ninja-build \
            sed \
            zlib1g-dev

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 50 https://github.com/tarantool/tarantool /tmp/src/tarantool
          cd /tmp/src/tarantool
          git fetch --tags
          git submodule update --init --recursive --depth 1 || true
          # Create an annotated tag at HEAD so git describe works in shallow clone
          git config user.email "ci@osv-fuzz"
          git config user.name "osv-fuzz"
          git tag -a -f -m "fuzz build" v99.0.0-fuzz HEAD
          # Also tag luajit submodule so its SetVersion.cmake git describe works
          # Format must match: v{major}.{minor}.{patch}[-beta{N}]-{tweak}-g{hash}
          if [ -d third_party/luajit ]; then
            cd third_party/luajit
            git config user.email "ci@osv-fuzz"
            git config user.name "osv-fuzz"
            short=$(git rev-parse --short HEAD)
            git tag -a -f -m "fuzz build" "v2.1.0-beta3-0-g${short}" HEAD
            cd ../..
          fi
          cd -
          rm -rf /tmp/src/tarantool/test/static 2>/dev/null || true
          git clone --depth 1 --recursive https://github.com/ligurio/tarantool-corpus /tmp/src/tarantool/test/static

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sfL --retry 3 --retry-delay 5 -o /tmp/src/compile_lua_fuzzer "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/tarantool/compile_lua_fuzzer"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          # Replace static libm with empty stub to avoid IFUNC errors on glibc 2.39+
          sudo rm -f /usr/lib/x86_64-linux-gnu/libm.a /usr/lib/x86_64-linux-gnu/libm-2.39.a
          echo '!<arch>' | sudo tee /usr/lib/x86_64-linux-gnu/libm.a > /dev/null
          cd /tmp/src/tarantool
          set +e
          [[ -e /tmp/src/tarantool/build ]] && rm -rf /tmp/src/tarantool/build
          export FUZZ_INTROSPECTOR_CONFIG=/tmp/src/fuzz_introspector_exclusion.config
          cat > $FUZZ_INTROSPECTOR_CONFIG <<EOF
          FILES_TO_AVOID
          tarantool/build/test
          tarantool/build/icu-prefix
          EOF
          cd /tmp/src/tarantool
          case $SANITIZER in
            address) SANITIZERS_ARGS="-DENABLE_ASAN=ON" ;;
            undefined) SANITIZERS_ARGS="-DENABLE_UB_SANITIZER=ON" ;;
            *) SANITIZERS_ARGS="" ;;
          esac
          export LSAN_OPTIONS="verbosity=1:log_threads=1"
          if [ "$ARCHITECTURE" = "aarch64" ]; then
              export ASAN_OPTIONS=detect_leaks=0
          fi
          : ${LD:="${CXX}"}
          : ${LDFLAGS:="${CXXFLAGS}"}  # to make sure we link with sanitizer runtime
          FUZZER_ARGS=""
          if [[ "$FUZZING_ENGINE" == libfuzzer ]]; then
            FUZZER_ARGS="-DENABLE_LIBFUZZER_STATIC_LINKAGE=ON"
          fi
          cmake_args=(
              -DBUILD_STATIC=ON
              -DENABLE_BACKTRACE=ON
              -DENABLE_FUZZER=ON
              -DOSS_FUZZ=ON
              -DLUA_USE_APICHECK=ON
              -DLUA_USE_ASSERT=ON
              -DLUAJIT_USE_SYSMALLOC=ON
              -DLUAJIT_ENABLE_GC64=ON
              $SANITIZERS_ARGS
              $FUZZER_ARGS
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_C_COMPILER="${CC}"
              -DCMAKE_C_FLAGS="${CFLAGS} -Wno-error=unused-command-line-argument -fno-sanitize=unsigned-integer-overflow"
              -DCMAKE_CXX_COMPILER="${CXX}"
              -DCMAKE_CXX_FLAGS="${CXXFLAGS} -Wno-error=unused-command-line-argument -fno-sanitize=unsigned-integer-overflow"
              -DCMAKE_LINKER="${LD}"
              -DCMAKE_EXE_LINKER_FLAGS="${LDFLAGS}"
              -DCMAKE_MODULE_LINKER_FLAGS="${LDFLAGS}"
              -DCMAKE_SHARED_LINKER_FLAGS="${LDFLAGS}"
              -DENABLE_BUNDLED_ICU=ON
              -DENABLE_BUNDLED_LIBUNWIND=ON
              -DENABLE_BUNDLED_ZSTD=OFF
          )
          git config --global --add safe.directory '*'
          [[ -e build ]] && rm -rf build
          cmake "${cmake_args[@]}" -S . -B build
          cmake --build build --target fuzzers --parallel --verbose
          cp test/static/*.dict test/static/*.options $GITHUB_WORKSPACE/build/fuzz-targets/
          for f in $(find build/test/fuzz/ \( -name '*_fuzzer' -o -name '*_test' \) -type f);
          do
            name=$(basename $f);
            module=$(echo $name | sed 's/_fuzzer//' | sed 's/_test//' )
            corpus_dir="test/static/corpus/$module"
            echo "Copying for $module";
            cp $f $GITHUB_WORKSPACE/build/fuzz-targets/
            if [ -e "$corpus_dir" ]; then
              zip --quiet -j $GITHUB_WORKSPACE/build/fuzz-targets/"$name"_seed_corpus.zip $corpus_dir/*
            fi
          done
          if [[ "$FUZZING_ENGINE" == libfuzzer ]] &&
             [[ "$SANITIZER" != "coverage" ]]; then
            cmake --build build --target tarantool --parallel --verbose
            LUA_RUNTIME_NAME=tarantool
            TARANTOOL_PATH=build/src/$LUA_RUNTIME_NAME
            LUA_MODULES_DIR=lua_modules
            sudo apt-get install -y luarocks
            LUA_LIBRARIES=$(realpath build/third_party/luajit/src/libluajit.a)
            LUA_INCLUDE_DIR=$(realpath third_party/luajit/src)
            luarocks install --lua-version 5.1 --server=https://luarocks.org/dev --tree=$LUA_MODULES_DIR luzer LUA_LIBRARIES="$LUA_LIBRARIES" LUA_INCLUDE_DIR="$LUA_INCLUDE_DIR" OSS_FUZZ=ON ENABLE_LUAJIT=ON LUAJIT_FRIENDLY_MODE=ON
            lua_lib_path="build/test/fuzz/lua-tests/src/tests/lapi/lib*.lua"
            if [ -f $lua_lib_path ]; then
                cp $lua_lib_path $GITHUB_WORKSPACE/build/fuzz-targets
            fi
            LUZER_TEST_DIR="build/luzer_tests"
            cmake --build build --parallel --verbose --target copy_tests
            for test_path in $(find $LUZER_TEST_DIR -name "*.lua" -type f);
            do
              test_file=$(basename $test_path);
              test_name_we="${test_file%.*}";
              module_name=$(echo $test_name_we | sed 's/_test//' )
              "/tmp/src/compile_lua_fuzzer" "$LUA_RUNTIME_NAME" $test_file
              cp "$test_path" "$GITHUB_WORKSPACE/build/fuzz-targets/"
              corpus_dir="test/static/corpus/$module_name"
              if [ -e "$corpus_dir" ]; then
                zip --quiet -j $GITHUB_WORKSPACE/build/fuzz-targets/"$test_name_we"_seed_corpus.zip $corpus_dir/*
                echo "Build corpus '$GITHUB_WORKSPACE/build/fuzz-targets/"$test_name_we"_seed_corpus.zip' for the test '$test_name_we'"
              fi
            done
            cp $TARANTOOL_PATH "$GITHUB_WORKSPACE/build/fuzz-targets/$LUA_RUNTIME_NAME"
            cp -R $LUA_MODULES_DIR "$GITHUB_WORKSPACE/build/fuzz-targets/"
            rm -f "$GITHUB_WORKSPACE/build/fuzz-targets/compile_lua_fuzzer" "/tmp/src/compile_lua_fuzzer"
          fi
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find seeds/${{ env.PROJECT }}/ -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la seeds/${{ env.PROJECT }}/ 2>/dev/null | head -20

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
