name: "Fuzz s2opc"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 22 * * 0"

env:
  PROJECT: s2opc
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            cmake

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://gitlab.com/systerel/S2OPC /tmp/src/S2OPC
          git clone --depth 1 --recursive https://gitlab.com/systerel/S2OPC-fuzzing-data /tmp/src/S2OPC-fuzzing-data

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+w /etc/ld.so.cache 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/S2OPC
          if [ -f /usr/local/bin/clang-22 ]; then
            export CFLAGS="${CFLAGS} -Wno-error=unterminated-string-initialization"
          fi
          MBEDTLS_BUILD=/tmp/work/mbedtls
          EXPAT_BUILD=/tmp/work/expat
          S2OPC_BUILD=/tmp/work/s2opc
          SAMPLES=/tmp/src/S2OPC-fuzzing-data
          tar xjf /tmp/src/mbedtls.tbz2 -C /tmp/work
          sed 's,#define MBEDTLS_AESNI_C,//#define MBEDTLS_AESNI_C,' -i /tmp/work/mbedtls-2.*/include/mbedtls/config.h
          mkdir -p $MBEDTLS_BUILD
          cd $MBEDTLS_BUILD
          cmake -DPYTHON_EXECUTABLE="/usr/bin/python3" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                /tmp/work/mbedtls-2.*
          make -j$(nproc)
          make -j$(nproc) install
          tar xzf /tmp/src/check.tgz -C /tmp/work
          cd /tmp/work/check-0.*
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POSITION_INDEPENDENT_CODE=1 \
                /tmp/work/check-0.*
          make -j$(nproc)
          make -j$(nproc) install
          tar xzf /tmp/src/expat.tgz -C /tmp/work
          mkdir -p $EXPAT_BUILD
          cd $EXPAT_BUILD
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                -DEXPAT_SHARED_LIBS=OFF \
                /tmp/work/expat-2.*
          make -j$(nproc)
          make -j$(nproc) install
          mkdir -p $S2OPC_BUILD
          cd $S2OPC_BUILD
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DCMAKE_C_COMPILER="$CC" -DCMAKE_C_FLAGS="$CFLAGS" -DCMAKE_EXE_LINKER_FLAGS="$CXXFLAGS" \
                -DCMAKE_C_LINK_EXECUTABLE="$CXX <FLAGS> <CMAKE_C_LINK_FLAGS> <LINK_FLAGS> <OBJECTS>  -o <TARGET> <LINK_LIBRARIES>" \
                -DWITH_OSS_FUZZ=ON -DENABLE_FUZZING=ON \
                /tmp/src/S2OPC
          cmake --build . --target fuzzers
          cp bin/* $GITHUB_WORKSPACE/build/fuzz-targets
          cd $SAMPLES
          for dir in $(find -maxdepth 1 -type d -not -name ".*"); do
              find $dir -exec zip -j $GITHUB_WORKSPACE/build/fuzz-targets/$(basename $dir)_fuzzer_seed_corpus.zip {} +
          done

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
