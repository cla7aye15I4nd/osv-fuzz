name: "Fuzz augeas"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 6 * * 0"

env:
  PROJECT: augeas
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++ and dependencies
        run: |
          bash scripts/setup_aflpp.sh
          sudo apt-get install -y -qq \
            autoconf \
            automake \
            bison \
            flex \
            libreadline-dev \
            libselinux1-dev \
            libtool \
            libxml2-dev \
            pkg-config

      - name: Clone source
        run: |
          mkdir -p /tmp/src
          git clone --depth 1 --recursive https://github.com/hercules-team/augeas /tmp/src/augeas

      - name: Download fuzzer files from oss-fuzz
        run: |
          mkdir -p /tmp/src
          curl -sL -o /tmp/src/replay_build.sh "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/augeas/replay_build.sh"
          curl -sL -o /tmp/src/augeas_escape_name_fuzzer.cc "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/augeas/augeas_escape_name_fuzzer.cc"
          curl -sL -o /tmp/src/augeas_fa_fuzzer.cc "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/augeas/augeas_fa_fuzzer.cc"
          curl -sL -o /tmp/src/augeas_api_fuzzer.cc "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/augeas/augeas_api_fuzzer.cc"
          curl -sL -o /tmp/src/augeas_lens_fuzzer.cc "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/augeas/augeas_lens_fuzzer.cc"
          curl -sL -o /tmp/src/augeas_lens_fuzzer.options "https://raw.githubusercontent.com/google/oss-fuzz/master/projects/augeas/augeas_lens_fuzzer.options"

      - name: Build fuzz targets with AFL++
        run: |
          mkdir -p build/fuzz-targets /tmp/work
          export CC=afl-cc
          export CXX=afl-c++
          export CFLAGS="${CFLAGS:-} -fsanitize=address"
          export CXXFLAGS="${CXXFLAGS:-} -fsanitize=address"
          export FUZZING_ENGINE=afl
          export LIB_FUZZING_ENGINE="-fsanitize=fuzzer"
          export SANITIZER=address
          export ARCHITECTURE=x86_64
          export SRC=/tmp/src
          export OUT=$GITHUB_WORKSPACE/build/fuzz-targets
          export WORK=/tmp/work
          # Take ownership of /usr/local for install commands (Docker runs as root)
          sudo chown -R $(id -u):$(id -g) /usr/local 2>/dev/null || true
          # Allow ldconfig to update cache
          sudo chmod a+rw /etc/ld.so.cache 2>/dev/null || true
          sudo touch /etc/ld.so.cache~ && sudo chmod a+rw /etc/ld.so.cache~ 2>/dev/null || true
          echo '/usr/local/lib' | sudo tee /etc/ld.so.conf.d/local.conf > /dev/null 2>/dev/null || true
          cd /tmp/src/augeas
          set +e
          ./autogen.sh
          ./configure --enable-static --disable-shared --without-selinux
          make -j$(nproc)
          awk '
          /#define FA_H_/ {
              print
              print ""
              print "#ifdef __cplusplus"
              print "extern \"C\" {"
              print "#endif"
              print ""
              next
          }
          /^#endif$/ && !done {
              print ""
              print "#ifdef __cplusplus"
              print "}"
              print "#endif"
              print ""
              done = 1
          }
          { print }
          ' src/fa.h > src/fa.h.tmp && mv src/fa.h.tmp src/fa.h
          ASAN_OPTIONS=detect_leaks=0
          cp /tmp/src/augeas_escape_name_fuzzer.cc .
          cp /tmp/src/augeas_fa_fuzzer.cc .
          cp /tmp/src/augeas_api_fuzzer.cc .
          cp /tmp/src/augeas_lens_fuzzer.cc .
          for fuzzer in augeas_api_fuzzer augeas_escape_name_fuzzer augeas_fa_fuzzer augeas_lens_fuzzer; do
              $CXX $CXXFLAGS -std=c++11 -Isrc/ `xml2-config --cflags` \
                  $fuzzer.cc -o $GITHUB_WORKSPACE/build/fuzz-targets/$fuzzer $LIB_FUZZING_ENGINE \
                  src/.libs/libaugeas.a src/.libs/libfa.a ./gnulib/lib/.libs/libgnu.a \
                  /usr/lib/x86_64-linux-gnu/libxml2.a
          done
          cp /tmp/src/augeas_lens_fuzzer.options $GITHUB_WORKSPACE/build/fuzz-targets/
          set -e
          # Verify at least one fuzz target was built
          target_count=$(find $OUT -type f -executable 2>/dev/null | wc -l)
          echo "[+] Built $target_count fuzz targets"
          if [ "$target_count" -eq 0 ]; then
            echo "[!] No fuzz targets built — build failed"
            exit 1
          fi

      - name: Verify fuzz targets
        run: |
          echo "[+] Built targets:"
          ls -la build/fuzz-targets/ 2>/dev/null || echo "No targets built"
          find build/fuzz-targets/ -type f -executable 2>/dev/null | head -20

      - name: Upload built fuzz targets
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: build/fuzz-targets/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download seeds from R2
        run: bash scripts/download_seeds.sh "$PROJECT"

      - name: Install AFL++
        run: bash scripts/setup_aflpp.sh

      - name: Download fuzz targets
        uses: actions/download-artifact@v4
        with:
          name: fuzz-targets-${{ env.PROJECT }}
          path: fuzz-targets/

      - name: Fix permissions
        run: chmod +x fuzz-targets/*

      - name: Run dry run (replay seeds)
        run: |
          bash scripts/dry_run.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/

      - name: Run fuzzing
        run: |
          FUZZ_DURATION=${{ env.FUZZ_DURATION }} \
          bash scripts/fuzz.sh \
            fuzz-targets/ \
            seeds/${{ env.PROJECT }}/ \
            results/dry_run/ \
            results/fuzz/

      - name: Generate report
        run: python3 scripts/report.py results/ ${{ env.PROJECT }}

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-${{ env.PROJECT }}
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ env.PROJECT }}
          path: results/
          retention-days: 30
