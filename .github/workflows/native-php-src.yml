name: "Fuzz native php-src"

on:
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzzing duration in seconds"
        default: "1800"
  schedule:
    - cron: "0 17 * * 0"

env:
  PROJECT: php-src
  FUZZ_DURATION: ${{ inputs.fuzz_duration || '1800' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  R2_BUCKET: osv-fuzz-seeds

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout osv-fuzz
        uses: actions/checkout@v4

      - name: Download native seeds from R2
        run: bash scripts/download_native_seeds.sh "$PROJECT"

      - name: Validate seeds
        run: |
          seed_count=$(find "seeds/$PROJECT/" -name "*.bin" -type f 2>/dev/null | wc -l)
          echo "[+] Seeds available: $seed_count"
          ls -la "seeds/$PROJECT/" 2>/dev/null | head -20 || true

      - name: Install AFL++ and dependencies
        run: bash scripts/setup_aflpp.sh

      - name: Build php-src (PHP CLI) with AFL++ + ASan
        run: |
          set -euo pipefail

          # --- extra build deps PHP needs (default build + bundled GD) ---
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autoconf automake libtool bison re2c pkg-config \
            libxml2-dev libsqlite3-dev zlib1g-dev \
            2>/dev/null || true

          mkdir -p /tmp/src
          # --- robust git clone: 3x retry, submodules ---
          SRC=/tmp/src/php-src
          rm -rf "$SRC"
          ok=0
          for attempt in 1 2 3; do
            if git clone --depth 1 --recurse-submodules \
                 https://github.com/php/php-src.git "$SRC"; then
              ok=1
              break
            fi
            echo "[!] clone attempt $attempt failed; retrying..."
            rm -rf "$SRC"
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "[!] git clone failed after 3 attempts"
            exit 1
          fi
          cd "$SRC"
          git submodule update --init --recursive || true

          # --- afl-cc + ASan toolchain ---
          export CC=afl-cc
          export CXX=afl-c++
          export AFL_USE_ASAN=1
          export CFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer"
          export LDFLAGS="-fsanitize=address"

          # --- autotools: generate ./configure if missing (PHP uses buildconf) ---
          if [ ! -x ./configure ]; then
            if [ -x ./buildconf ]; then
              ./buildconf --force
            elif [ -x ./autogen.sh ]; then
              ./autogen.sh
            else
              autoreconf -fi
            fi
          fi

          # --enable-gd builds bundled libgd (XBM support via libgd/gd_xbm.c).
          # --disable-werror keeps afl-cc warnings from breaking the build.
          ./configure \
            --enable-gd \
            --enable-cli \
            --disable-all \
            --without-pear \
            --disable-werror
          make -j"$(nproc)"

          BINDIR="$SRC/sapi/cli"
          if [ ! -x "$BINDIR/php" ]; then
            echo "[!] Expected CLI binary $BINDIR/php not built — build failed"
            exit 1
          fi
          echo "BINDIR=$BINDIR" >> "$GITHUB_ENV"
          echo "[+] Built PHP CLI: $BINDIR/php"
          ls -la "$BINDIR/php"
          "$BINDIR/php" -v || true

          # --- fuzz harnesses: php is a script interpreter, so each file-input
          #     "target" is a small PHP driver that consumes the mutated file
          #     (@@) through a GD image loader. ---
          HARNESS_DIR=/tmp/php-harness
          mkdir -p "$HARNESS_DIR"
          cat > "$HARNESS_DIR/harness_xbm.php" <<'PHP'
          <?php
          // Load a crafted .xbm through GD (libgd/gd_xbm.c) — the recorded PoC path.
          if ($argc < 2) { exit(0); }
          if (!function_exists('imagecreatefromxbm')) { exit(0); }
          $im = @imagecreatefromxbm($argv[1]);
          if ($im !== false) { @imagedestroy($im); }
          PHP
          cat > "$HARNESS_DIR/harness_gdstring.php" <<'PHP'
          <?php
          // Auto-detecting GD loader: exercises the other bundled decoders on the
          // mutated bytes (broadens coverage beyond the XBM path).
          if ($argc < 2) { exit(0); }
          if (!function_exists('imagecreatefromstring')) { exit(0); }
          $data = @file_get_contents($argv[1]);
          if ($data === false) { exit(0); }
          $im = @imagecreatefromstring($data);
          if ($im !== false) { @imagedestroy($im); }
          PHP
          echo "HARNESS_DIR=$HARNESS_DIR" >> "$GITHUB_ENV"
          echo "[+] Wrote harnesses to $HARNESS_DIR"
          ls -la "$HARNESS_DIR"

      - name: Dry-run replay (lost-bug check)
        run: |
          set +e
          mkdir -p results/dry_run
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0

          # Parallel arrays: one entry per file-input target.
          #   LABELS -> unique result-name prefix
          #   CMDS   -> full command with @@ as the mutated-file placeholder
          LABELS=("xbm" "gdstring")
          CMDS=(
            "$BINDIR/php -d error_reporting=0 $HARNESS_DIR/harness_xbm.php @@"
            "$BINDIR/php -d error_reporting=0 $HARNESS_DIR/harness_gdstring.php @@"
          )

          crash_count=0
          total=0
          for seed in "seeds/$PROJECT"/*.bin; do
            [ -f "$seed" ] || continue
            sname=$(basename "$seed" .bin)
            for i in "${!LABELS[@]}"; do
              label="${LABELS[$i]}"
              cmd="${CMDS[$i]//@@/$seed}"
              total=$((total + 1))
              echo "[*] Replaying $label with $sname..."
              rc=0
              # shellcheck disable=SC2086
              timeout 60 $cmd > /dev/null 2> results/dry_run/.stderr_tmp || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] CRASH: $label with $sname (exit=$rc)"
                mv results/dry_run/.stderr_tmp "results/dry_run/${label}_${sname}.txt"
                cp "$seed" "results/dry_run/${label}_${sname}.bin"
                crash_count=$((crash_count + 1))
              else
                rm -f results/dry_run/.stderr_tmp
              fi
            done
          done
          echo "[+] Dry run complete: $crash_count crashes out of $total replays"

      - name: Fuzz with AFL++ (multi-target)
        run: |
          set +e
          mkdir -p results/afl
          export AFL_SKIP_CPUFREQ=1
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_NO_UI=1

          LABELS=("xbm" "gdstring")
          CMDS=(
            "$BINDIR/php -d error_reporting=0 $HARNESS_DIR/harness_xbm.php @@"
            "$BINDIR/php -d error_reporting=0 $HARNESS_DIR/harness_gdstring.php @@"
          )

          # First seed used to verify instrumentation via afl-showmap.
          first_seed=""
          for s in "seeds/$PROJECT"/*.bin; do
            [ -f "$s" ] || continue
            first_seed="$s"
            break
          done

          # Filter to targets whose instrumented binary actually starts up.
          RUN_LABELS=()
          RUN_CMDS=()
          for i in "${!LABELS[@]}"; do
            label="${LABELS[$i]}"
            cmd="${CMDS[$i]}"
            if [ -n "$first_seed" ]; then
              showcmd="${cmd//@@/$first_seed}"
              # shellcheck disable=SC2086
              afl-showmap -o /tmp/showmap_"$label" -m none -t 5000 -- $showcmd > /dev/null 2>&1
              if [ ! -s /tmp/showmap_"$label" ]; then
                echo "[!] Skipping $label — afl-showmap produced no coverage (startup failed)"
                continue
              fi
            fi
            RUN_LABELS+=("$label")
            RUN_CMDS+=("$cmd")
          done

          ntargets=${#RUN_LABELS[@]}
          if [ "$ntargets" -eq 0 ]; then
            echo "[!] No fuzzable targets survived afl-showmap — nothing to fuzz"
            exit 0
          fi

          # Split the total budget across targets (min 60s each).
          per=$(( FUZZ_DURATION / ntargets ))
          if [ "$per" -lt 60 ]; then per=60; fi
          echo "[+] Fuzzing $ntargets target(s) for ${per}s each"

          for i in "${!RUN_LABELS[@]}"; do
            label="${RUN_LABELS[$i]}"
            cmd="${RUN_CMDS[$i]}"
            echo "[*] Fuzzing target '$label' for ${per}s: $cmd"
            # shellcheck disable=SC2086
            afl-fuzz -i "seeds/$PROJECT" -o "results/afl/$label" -m none \
              -V "$per" -- $cmd || true
          done
          echo "[+] Fuzzing step finished"

      - name: Triage AFL++ crashes
        run: |
          set +e
          mkdir -p results/fuzz
          export ASAN_OPTIONS=abort_on_error=1:detect_leaks=0

          LABELS=("xbm" "gdstring")
          CMDS=(
            "$BINDIR/php -d error_reporting=0 $HARNESS_DIR/harness_xbm.php @@"
            "$BINDIR/php -d error_reporting=0 $HARNESS_DIR/harness_gdstring.php @@"
          )

          shopt -s nullglob
          new_crashes=0
          for i in "${!LABELS[@]}"; do
            label="${LABELS[$i]}"
            crash_dir="results/afl/$label/default/crashes"
            [ -d "$crash_dir" ] || continue
            for crash in "$crash_dir"/*; do
              [ -f "$crash" ] || continue
              cbase=$(basename "$crash")
              [ "$cbase" = "README.txt" ] && continue
              cname=$(echo "$cbase" | tr ':,' '__')
              cmd="${CMDS[$i]//@@/$crash}"
              echo "[*] Triaging $label/$cname..."
              rc=0
              # shellcheck disable=SC2086
              timeout 60 $cmd > /dev/null 2> "results/fuzz/${label}_${cname}.txt" || rc=$?
              if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
                echo "  [!] NEW CRASH: $label ($cname, exit=$rc)"
                cp "$crash" "results/fuzz/${label}_${cname}.bin"
                new_crashes=$((new_crashes + 1))
              else
                rm -f "results/fuzz/${label}_${cname}.txt"
              fi
            done
          done
          echo "[+] Triage complete: $new_crashes reproduced crashes"

      - name: Sanitize result filenames
        if: always()
        run: |
          set +e
          # AFL names files like id:000000,time:... — the ':' breaks
          # actions/upload-artifact@v4. Rename any offending path under results/.
          find results -depth -name '*:*' | while IFS= read -r path; do
            newpath=$(echo "$path" | tr ':' '_')
            [ "$path" = "$newpath" ] && continue
            mv -f "$path" "$newpath" 2>/dev/null || true
          done
          echo "[+] Sanitized result filenames"

      - name: Generate report
        run: python3 scripts/report.py results/ "$PROJECT"

      - name: Upload PoC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pocs-native-php-src
          path: results/pocs/
          retention-days: 90

      - name: Upload full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-native-php-src
          path: results/
          retention-days: 30
